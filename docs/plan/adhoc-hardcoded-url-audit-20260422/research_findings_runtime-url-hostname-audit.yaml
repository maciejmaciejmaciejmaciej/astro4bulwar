plan_id: adhoc-hardcoded-url-audit-20260422
objective: >-
	Audyt tylko-do-odczytu źródeł runtime pod zip/, astro-site/ i wordpress-plugin/
	pod kątem zahardkodowanych URL-i lub hostname'ów, które wyglądają na klientowe,
	historyczne albo powinny pochodzić z env/config.
focus_area: runtime-url-hostname-audit
created_at: 2026-04-22T00:00:00Z
created_by: github-copilot-gpt-5.4
status: completed

tldr: |
	- Warstwa bazowych URL-i dla React i Astro jest w większości czysta: główne endpointy WordPress/bridge/site są składane z env/config, nie z literałów domenowych.
	- Najmocniejsze znalezisko runtime to zahardkodowany slug testowy '/react/<page-slug>' w astro-site/src/components/StickyCartControls.astro:54.
	- Najwięcej klientowo-historycznych literałów zostało w treści runtime: footerach i stronach cateringowych React oraz w fallbackowym footerze Astro.
	- Plugin WordPress nie ma zahardkodowanego webhooka Make ani ścieżek deploy/SSH; znalezione literały URL w QuoteService.php to akceptowalne endpointy dostawców zewnętrznych.

research_metadata:
	methodology: >-
		Hybrydowe wyszukiwanie przez grep_search i semantic_search, następnie celowane read_file
		na plikach z dopasowaniami oraz pomocniczy run_in_terminal do policzenia linii i
		potwierdzenia zakresu plików. Zakres został zawężony do runtime source pod zip/src,
		zip/components, astro-site/src i wordpress-plugin/bulwar-bridge/src.
	scope: >-
		Audyt obejmuje tylko źródła runtime i tylko literały URL/host/path mogące wskazywać na
		domeny klientowe, historyczne base URL-e, bridge URL-e, webhook URL-e, hosty SSH lub
		absolutne ścieżki deploy. Świadomie pominięto docs, workflowy, skrypty operacyjne,
		vendor i build output.
	confidence: high
	coverage: 89
	decision_blockers: 0
	research_blockers: 0

