patterns_found:
	- category: architecture
		pattern: Bazowe URL-e runtime są centralizowane w helperach config/env.
		description: >-
			Główne ścieżki komunikacji z WordPress i bridge nie zawierają wpisanych domen;
			frontend React i Astro pobierają base URL z env/config i doklejają ścieżki REST.
		examples:
			- file: zip/src/lib/clientRuntimeConfig.ts
				location: zip/src/lib/clientRuntimeConfig.ts:49
				snippet: getWordPressBaseUrl() / getBridgeBaseUrl() / getSiteUrl()
			- file: astro-site/src/lib/config.ts
				location: astro-site/src/lib/config.ts:19
				snippet: getWordPressBaseUrl() wymaga PUBLIC_WORDPRESS_BASE_URL
			- file: astro-site/src/lib/wordpress.ts
				location: astro-site/src/lib/wordpress.ts:220
				snippet: fetchWordPressBuildablePages() korzysta z getWordPressBaseUrl()
		prevalence: common

	- category: content
		pattern: Klientowe linki marketingowe i prawne są wpisane bezpośrednio w komponentach stron.
		description: >-
			Część runtime UI nadal zawiera konkretne domeny, adres e-mail i social links Bulwar,
			zamiast pobierać je z layoutu globalnego albo osobnej konfiguracji treści.
		examples:
			- file: zip/src/components/sections/CateringPageFooter.tsx
				location: zip/src/components/sections/CateringPageFooter.tsx:22
				snippet: href="https://bulwarrestauracja.pl"
			- file: zip/src/pages/CateringWielkanocnyPage.tsx
				location: zip/src/pages/CateringWielkanocnyPage.tsx:87
				snippet: const cateringPageSocialLinks = [{ href: "https://facebook.com/..." }, ...]
			- file: zip/src/pages/CateringWielkanocnyThankYouPage.tsx
				location: zip/src/pages/CateringWielkanocnyThankYouPage.tsx:28
				snippet: const cateringPageLegalLinks = [{ href: "https://bulwarrestauracja.pl/regulamin/" }, ...]
		prevalence: occasional

	- category: fallback
		pattern: Astro ma fallback layout z zahardkodowanymi danymi marki.
		description: >-
			Normalny fetch layoutu jest config-driven, ale opcjonalna ścieżka fallbacku może
			odtworzyć Bulwar-specyficzne kontakty, sociale i linki prawne, jeśli flaga fallbacku
			zostanie włączona i fetch layoutu nie powiedzie się.
		examples:
			- file: astro-site/src/lib/wordpress.ts
				location: astro-site/src/lib/wordpress.ts:56
				snippet: const DEFAULT_GLOBAL_LAYOUT_DATA = { footer: { ... } }
			- file: astro-site/src/pages/[slug].astro
				location: astro-site/src/pages/[slug].astro:48
				snippet: return DEFAULT_GLOBAL_LAYOUT_DATA when allowGlobalLayoutFallback
		prevalence: rare

	- category: external_integration
		pattern: Plugin hardcode'uje tylko neutralne endpointy dostawców zewnętrznych.
		description: >-
			URL-e w warstwie PHP dotyczą publicznych API geokodowania/routingu i nie wskazują na
			klientową domenę ani historyczny host aplikacji.
		examples:
			- file: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php
				location: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php:145
				snippet: https://maps.googleapis.com/maps/api/distancematrix/json
			- file: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php
				location: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php:163
				snippet: https://router.project-osrm.org/route/v1/driving/
		prevalence: occasional

