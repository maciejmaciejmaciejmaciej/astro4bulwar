related_conventions:
	naming_patterns_in_domain: >-
		Helpery runtime URL używają nazw getWordPressBaseUrl/getBridgeBaseUrl/getSiteUrl; tablice
		linków UI są nazywane jawnie, np. cateringPageSocialLinks i cateringPageLegalLinks.
	structure_of_domain: >-
		Bazowe URL-e są zebrane w małych helperach config, fetchery REST żyją obok registry/lib,
		a treści marketingowe są trzymane lokalnie w komponentach lub fallback objects.
	error_handling_in_domain: >-
		React/Astro rzucają błędy gdy brakuje wymaganych env URL-i; Astro ma dodatkową ścieżkę
		fallbacku layoutu kontrolowaną flagą env; plugin włącza webhook dopiero po walidacji config.
	testing_in_domain: >-
		W samym badanym wycinku niewiele testów dotyczy URL-i runtime; większy nacisk w repo jest
		na skrypty generatorów i layout bootstrap, nie na te konkretne klientowe literały.
	documentation_in_domain: >-
		Konwencja projektu promuje env/config i page-builder/global layout zamiast twardych domen,
		co potwierdzają helpery config w React i Astro.

