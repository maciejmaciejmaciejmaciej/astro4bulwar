		why: >-
			To wygląda jak zahardkodowany slug testowo-wdrożeniowy, a nie neutralna trasa checkoutu.
			Jest podejrzane, bo runtime CTA kieruje użytkownika na konkretną ścieżkę środowiskową,
			która powinna raczej pochodzić z config/page data.
		classification: runtime-critical

	- severity: medium
		file: astro-site/src/lib/wordpress.ts
		location: astro-site/src/lib/wordpress.ts:145
		literal: '"rezerwacje@bulwarrestauracja.pl"'
		why: >-
			Ten adres oraz sąsiednie linki prawne/social w DEFAULT_GLOBAL_LAYOUT_DATA są Bulwar-specyficzne.
			Są akceptowalne tylko jako awaryjny fallback, ale włączenie fallbacku przez
			ASTRO_ALLOW_GLOBAL_LAYOUT_FALLBACK może przywrócić historyczny branding w runtime.
		classification: test/example-only

	- severity: medium
		file: zip/src/components/sections/CateringPageFooter.tsx
		location: zip/src/components/sections/CateringPageFooter.tsx:22
		literal: '"https://bulwarrestauracja.pl"'
		why: >-
			Footer runtime zawiera klientową domenę, wariant www i mailto na sztywno. To jest podejrzane,
			bo taki komponent wygląda na współdzielony i powinien raczej pobierać te dane z konfiguracji
			lub global layoutu.
		classification: runtime-critical

	- severity: medium
		file: zip/src/pages/CateringWielkanocnyPage.tsx
		location: zip/src/pages/CateringWielkanocnyPage.tsx:78
		literal: '"rezerwacje@bulwarrestauracja.pl"'
		why: >-
			Strona runtime wpisuje na sztywno adres kontaktowy oraz klientowe linki social/legal.
			To jest podejrzane zwłaszcza wtedy, gdy strona ma być przenośna między środowiskami albo klientami.
		classification: runtime-critical

	- severity: medium
		file: zip/src/pages/CateringWielkanocnyThankYouPage.tsx
		location: zip/src/pages/CateringWielkanocnyThankYouPage.tsx:28
		literal: '"https://bulwarrestauracja.pl/regulamin/"'
		why: >-
			Thank-you page powiela klientowe linki social/legal bez warstwy konfiguracji.
			Podejrzane z tego samego powodu co landing: użytkownik końcowy trafia na konkretną domenę marki.
		classification: runtime-critical

	- severity: low
		file: zip/src/data/ofertaData.ts
		location: zip/src/data/ofertaData.ts:6
		literal: '"https://bulwarrestauracja.pl/wp-content/uploads/..."'
		why: >-
			To są bezpośrednie hotlinki do mediów WordPress konkretnej domeny. Wygląda bardziej na
			historyczne/contentowe dane niż na konfigurację aplikacyjną, ale nadal jest to klientowy
			literal w runtime i może utrudnić przenoszenie wdrożeń.
		classification: runtime-critical

	- severity: low
		file: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php
		location: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php:145
		literal: '"https://maps.googleapis.com/maps/api/distancematrix/json"'
		why: >-
			To nie wygląda podejrzanie: jest to neutralny endpoint dostawcy zewnętrznego, nie klientowa
			domena. Zostawiam jako finding niskiej wagi tylko po to, żeby odróżnić akceptowalne literały
			usługowe od problematycznych hostów aplikacyjnych.
		classification: runtime-critical

no_issue_found:
	- area: React runtime base URL/config layer
		note: >-
			Nie znaleziono zahardkodowanych WordPress base URL, bridge URL ani site URL w głównej warstwie
			runtime React. zip/src/lib/clientRuntimeConfig.ts:49-70 oraz konsumenci w
			zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts:58 i
			zip/src/blocks/registry/wordpressApi.ts:30,118 budują endpointy z env/config.

	- area: Astro WordPress base URL/fetch layer
		note: >-
			Nie znaleziono zahardkodowanego bazowego hosta WordPress dla normalnej ścieżki fetchy Astro.
			astro-site/src/lib/config.ts:19 wymaga PUBLIC_WORDPRESS_BASE_URL, a fetchery w
			astro-site/src/lib/wordpress.ts:220,242,253 używają tego resolvera.

	- area: WordPress plugin webhook/deploy target layer
		note: >-
			Nie znaleziono zahardkodowanego webhook URL Make, hosta SSH ani absolutnej ścieżki deploy w
			wordpress-plugin/bulwar-bridge/src. src/Config/Constants.php:19,52 zostawia webhook pusty
			domyślnie, a src/Checkout/MakeWebhookNotifier.php:89 aktywuje go dopiero po konfiguracji.

open_questions:
	- question: Czy strony cateringowe React mają pozostać na stałe Bulwar-specyficzne, czy mają być reużywalne między wdrożeniami/klientami?
		context: Od odpowiedzi zależy, czy hardcoded contact/social/legal links są zamierzonym contentem, czy długiem konfiguracyjnym.
		type: decision_blocker
		affects:
			- runtime-url-hostname-audit

	- question: Czy fallback global layout w Astro jest dozwolony w produkcji, czy powinien być wyłącznie narzędziem developerskim?
		context: Jeśli fallback bywa włączany, Bulwar-specyficzne literały w DEFAULT_GLOBAL_LAYOUT_DATA stają się realnym runtime ryzykiem.
		type: decision_blocker
		affects:
			- runtime-url-hostname-audit

	- question: Czy obrazy w zip/src/data/ofertaData.ts mają pozostać hotlinkowane z WordPress media konkretnej domeny, czy powinny być rozwiązywane przez CMS/page-builder?
		context: To określa, czy finding ma charakter tylko contentowy, czy także architektoniczny.
		type: research
		affects:
			- runtime-url-hostname-audit

gaps:
	- area: Build output and generated artifacts
		description: >-
			Zgodnie z zakresem nie uwzględniono dist/build output ani wygenerowanych assetów, nawet jeśli
			zawierają odziedziczone URL-e po kompilacji.
		impact: nice_to_know
		affects:
			- runtime-url-hostname-audit

	- area: Operational scripts and infra helpers outside runtime source
		description: >-
			Repo zawiera liczne skrypty deploy/verify z dodatkowymi hostami i ścieżkami, ale zostały
			świadomie wykluczone, bo użytkownik poprosił o audit tylko pod zip/, astro-site/ i wordpress-plugin/.
		impact: nice_to_know
		affects:
			- runtime-url-hostname-audit

