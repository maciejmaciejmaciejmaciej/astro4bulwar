plan_id: navbar-footer-global-layout-v1-followups
objective: |
  Implement the two remaining non-blocking follow-ups for the navbar/footer global layout rollout: add resilience to the React global layout shell so transient fetch failures do not permanently remove navbar/footer for the session, and remove placeholder runtime defaults from production-facing layout components while moving fixtures/defaults to tests/helpers only.
created_at: 2026-04-18T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 5
  risk_score: medium

tldr: |
  The current React shared shell in zip/src/layouts/RootLayout.tsx fetches global layout once on mount and only renders Navbar2/Footer when globalLayout is non-null, so an initial transient failure leaves shared chrome absent for the entire browser session. At the same time, the React presenters in zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx and zip/src/components/sections/Footer.tsx still import DEFAULT_GLOBAL_LAYOUT_DATA from zip/src/lib/fetchWordPressGlobalLayout.ts, and the Astro layout presenters in astro-site/src/layouts/BaseLayout.astro, astro-site/src/components/Navbar.astro, and astro-site/src/components/Footer.astro still default props from astro-site/src/lib/wordpress.ts even though astro-site/src/pages/[slug].astro already owns the gated build-time fallback boundary. Extend the existing rollout from docs/plan/navbar-footer-global-layout-v1/ with minimal changes: add unresolved-state recovery in RootLayout without reintroducing fake initial chrome, make React and Astro layout presenters fully prop-driven, remove the leftover React runtime fixture export once presenters stop consuming it, and update operator documentation to match the implemented behavior.
