pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: A retry or revalidation path in zip/src/layouts/RootLayout.tsx keeps firing after repeated failures, causing noisy logs or unnecessary requests while the shell remains unresolved.
      likelihood: medium
      impact: medium
      mitigation: Keep the recovery policy bounded and state-aware so retries only run while the layout is unresolved or when a deliberate revalidation trigger occurs, and never clear already resolved chrome on failure.
    - scenario: Removing presenter-level defaults from zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx, zip/src/components/sections/Footer.tsx, astro-site/src/layouts/BaseLayout.astro, astro-site/src/components/Navbar.astro, or astro-site/src/components/Footer.astro exposes a caller that was accidentally relying on placeholder props.
      likelihood: medium
      impact: high
      mitigation: Limit the change to the known shared-shell entrypoints in zip/src/layouts/RootLayout.tsx and astro-site/src/pages/[slug].astro, and verify with focused tests plus astro check that all production call sites now pass explicit layout data.
  assumptions:
    - RootLayout remains the sole React shared-shell owner for navbar/footer/cart chrome, as already mounted in zip/src/App.tsx.
    - The bridge payload contract and meta-status gate stay unchanged; this follow-up does not modify wordpress-plugin/bulwar-bridge or the public endpoint contract.
    - The gated Astro fallback owned by astro-site/src/pages/[slug].astro remains in place because this follow-up only removes placeholder defaults from production-facing layout components, not the existing build-entry fallback policy.

