plan_id: content-driven-pages-feasibility-20260326
objective: Assess feasibility of making pages in the React app content-driven from JSON without adding an editor UI.
focus_area: zip
created_at: 2026-03-26T00:00:00Z
created_by: gem-researcher
status: completed

tldr: |
  - The current React app already mixes hardcoded page composition with data-fed sections; the strongest existing precedent is the catering flow, which imports JSON, normalizes it, and renders repeated blocks from structured data.
  - Home page composition is still manual in JSX, so a block-config JSON layer is feasible but would require an explicit block registry and page-schema loader rather than just moving strings to data files.
  - Many section components already accept props, which lowers implementation cost for selected pages; some key sections remain hardcoded internally and would need refactoring before they can be driven by JSON safely.
  - The app currently exposes only a small active route surface in App.tsx, while many additional page files are generated placeholders, so a selective rollout fits the present state of the project better than an app-wide migration.
  - Existing scripts already generate routes, placeholder pages, and TS data files from external sources, which means the repository already tolerates content generation workflows outside the UI.

research_metadata:
  methodology: Hybrid retrieval using semantic_search and grep_search, followed by targeted read_file inspection of routing, page, section, data, and generation-script files.
  scope: Focused on zip/ React app structure, active routes, page composition, content/data separation, and existing JSON/data ingestion patterns.
  confidence: high
  coverage: 85

