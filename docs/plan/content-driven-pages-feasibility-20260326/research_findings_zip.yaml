    pattern: Manual page composition in JSX
    description: Pages are primarily assembled by importing sections and writing them in a fixed JSX order inside the page component.
    examples:
      - file: zip/src/pages/HomePage.tsx
        location: zip/src/pages/HomePage.tsx:22
        snippet: <HeroSection ... /> ... <ModernInterior ... /> ... <CateringSection ... />
      - file: zip/src/pages/TemplatePage.tsx
        location: zip/src/pages/TemplatePage.tsx:39
        snippet: <HeroSection /> <ReservationQuickBar /> <ModernInterior /> <TheSelection />
