related_conventions:
  naming_patterns_in_domain: Pages use PascalCase names ending with Page; section components use PascalCase Section naming; data modules export named constants such as portfolioItems and cateringWielkanocnyHeroData.
  structure_of_domain: Routing lives in App.tsx and main.tsx; page orchestrators live in src/pages; reusable render blocks live in src/components/sections; structured content lives in src/data; generation scripts sit beside source files or at zip root.
  error_handling_in_domain: Strongest data validation exists in JSON-backed catering data, where normalizers throw descriptive runtime errors for invalid shape or values; most other content paths rely on TypeScript props and defaults rather than validation.
  testing_in_domain: Tests exist around the catering flow and related state utilities; there is no visible test pattern for generic marketing-page composition.
  documentation_in_domain: Domain knowledge is implicit in file structure and scripts rather than dedicated documentation.

related_dependencies:
  internal:
    - component: zip/src/components/sections
      relationship_to_domain: Provides the renderable blocks that any JSON schema would need to reference.
      direction: outbound
    - component: zip/src/data
      relationship_to_domain: Supplies typed content objects and normalized datasets to page components.
      direction: outbound
    - component: zip/src/lib/cateringCart.ts
      relationship_to_domain: Couples the catering page to checkout/cart behavior beyond pure content concerns.
      direction: outbound
    - component: zip/src/lib/cateringThankYou.ts
      relationship_to_domain: Supplies route constants used by the active route surface.
      direction: outbound
  external:
    - name: react-router-dom
      purpose_for_domain: Defines page-level routing and internal links.
    - name: framer-motion
      purpose_for_domain: Powers section-level animation behavior, which a content schema would not replace.
    - name: lucide-react
      purpose_for_domain: Supplies icon references for some structured blocks.

open_questions:
  - question: Which pages are intended to become real content pages versus remain generated placeholders?
    context: Many page files exist, but App.tsx currently exposes only a narrow route set, so migration scope depends on product intent rather than file count.
  - question: Should the JSON format be restricted to plain content values or also allow choosing shared chrome variants such as header/footer/navigation behavior?
    context: Shared chrome is partly duplicated between page types and partly hardcoded inside shared components.
  - question: Is content expected to remain local in the repo as JSON files, or eventually come from WordPress/export scripts?
    context: The repo already has generation scripts and scraped-content pipelines, which could affect the right schema boundary.

gaps:
  - area: Final target page inventory
    description: The active route map does not clarify which of the many placeholder pages are scheduled for implementation.
    impact: This limits precision when estimating full-app migration scope.
  - area: Future authoring workflow
    description: The repository shows content generation scripts, but no agreed long-term source of truth for non-catering page content.
    impact: This affects whether JSON should be treated as hand-authored config, generated build artifact, or synchronized export.
  - area: Shared schema coverage
    description: Not all sections were inspected, and several likely remain hardcoded similarly to RegionalCuisine and Navbar.
    impact: This may slightly understate the refactor effort for an all-pages block schema.
