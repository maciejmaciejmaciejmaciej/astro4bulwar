plan_id: adhoc-universal-multilink-simple-version
objective: Research the existing Universal Multilink Block so a new derived sibling block can be scoped without implementation.
focus_area: universal-multilink-block
created_at: 2026-04-26
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - The existing block is owned by `zip/src/blocks/universal_multilink_block/schema.ts`, which delegates React runtime rendering to `zip/src/components/sections/Feature18.tsx` and Astro rendering to `astro-site/src/components/UniversalMultilinkBlockSection.astro`.
  - The live contract is strict: `leftColumn.primaryCta` is required, and each card requires `meta`, `title`, `description`, `linkLabel`, and `linkHref`; there is no current optional-main-CTA behavior.
  - The per-box time label is rendered from `card.meta` and the per-box description from `card.description` in both React and Astro; the small learn-more text is `card.linkLabel`.
  - A new sibling block key will need a new block definition plus registry, AI descriptor, Astro type/registry wiring, docs, and tests; the existing machine manifest is a consumed parity artifact that will also need regeneration or update.
  - The smallest behavior delta is not in styling but in contract/rendering: the base block always renders the top CTA and always expects meta and description fields.

