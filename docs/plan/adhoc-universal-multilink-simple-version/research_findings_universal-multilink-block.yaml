patterns_found:
  - category: architecture
    pattern: The first-class block delegates React rendering to an existing section component while Astro keeps a separate explicit renderer.
    description: The block definition does not implement its own JSX; it wraps `Feature18` for React and uses a dedicated Astro component for static rendering.
    examples:
      - file: zip/src/blocks/universal_multilink_block/schema.ts
        location: zip/src/blocks/universal_multilink_block/schema.ts:74
        snippet: "componentName: 'Feature18'"
      - file: zip/src/blocks/universal_multilink_block/schema.ts
        location: zip/src/blocks/universal_multilink_block/schema.ts:81
        snippet: "return createElement(Feature18, { key: section.id, content: data })"
      - file: astro-site/src/components/PageBuilderSection.astro
        location: astro-site/src/components/PageBuilderSection.astro:400
        snippet: "renderer.blockKey === 'universal_multilink_block'"
    prevalence: common

  - category: contract
    pattern: The existing block contract is fully required and content-only.
    description: Top CTA label and href are both mandatory, and every card must supply meta, description, link text, and link target; `source` is null.
    examples:
      - file: zip/src/blocks/registry/common.ts
        location: zip/src/blocks/registry/common.ts:8
        snippet: "label: z.string().min(1), href: z.string().min(1)"
      - file: zip/src/blocks/universal_multilink_block/schema.ts
        location: zip/src/blocks/universal_multilink_block/schema.ts:13
        snippet: "meta: z.string().min(1)"
      - file: zip/src/blocks/universal_multilink_block/schema.ts
        location: zip/src/blocks/universal_multilink_block/schema.ts:15
        snippet: "description: z.string().min(1)"
      - file: docs/block-registry/universal_multilink_block.md
        location: docs/block-registry/universal_multilink_block.md:66
        snippet: "source = null"
    prevalence: common

  - category: rendering
    pattern: Card time label, description, and learn-more text are direct field-to-markup bindings in both runtimes.
    description: There is no formatting or fallback layer between the schema fields and rendered text nodes for `meta`, `description`, and `linkLabel`.
    examples:
      - file: zip/src/components/sections/Feature18.tsx
        location: zip/src/components/sections/Feature18.tsx:114
        snippet: "{card.meta}"
      - file: zip/src/components/sections/Feature18.tsx
        location: zip/src/components/sections/Feature18.tsx:121
        snippet: "{card.description}"
      - file: zip/src/components/sections/Feature18.tsx
        location: zip/src/components/sections/Feature18.tsx:129
        snippet: "{card.linkLabel}"
      - file: astro-site/src/components/UniversalMultilinkBlockSection.astro
        location: astro-site/src/components/UniversalMultilinkBlockSection.astro:45
        snippet: "<p class='universal-multilink-block__meta'>{card.meta}</p>"
      - file: astro-site/src/components/UniversalMultilinkBlockSection.astro
        location: astro-site/src/components/UniversalMultilinkBlockSection.astro:49
        snippet: "<p class='universal-multilink-block__description'>{card.description}</p>"
    prevalence: common

  - category: testing
    pattern: Coverage is split between one block-focused React test and generic registry/Astro parity tests.
    description: The most specific test is in `wave2-pagebuilder.test.tsx`; the remaining tests verify registry readiness and Astro projection at the shared-system level.
    examples:
      - file: zip/src/blocks/registry/wave2-pagebuilder.test.tsx
        location: zip/src/blocks/registry/wave2-pagebuilder.test.tsx:1319
        snippet: "test('universal_multilink_block registers stable defaults and renders schema-driven cards'"
      - file: zip/src/blocks/registry/registry-invariants.test.tsx
        location: zip/src/blocks/registry/registry-invariants.test.tsx:69
        snippet: "shared registry readiness contract exposes one gate with machine-manifest parity"
      - file: astro-site/src/lib/astroRegistry.test.ts
        location: astro-site/src/lib/astroRegistry.test.ts:66
        snippet: "resolveAstroRenderer resolves the approved template follow-up renderers"
    prevalence: common

