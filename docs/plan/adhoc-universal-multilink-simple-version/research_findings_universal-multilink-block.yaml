related_conventions:
  naming_patterns_in_domain: Business block keys use snake_case (`universal_multilink_block`); block docs and manifest reuse the key; React and Astro component files use PascalCase section names (`Feature18`, `UniversalMultilinkBlockSection`).
  structure_of_domain: Each first-class block owns a `schema.ts`; shared registration happens in `zip/src/blocks/registry/index.ts`; AI editing metadata lives in `zip/src/blocks/registry/ai/descriptors.cjs`; Astro requires a renderer component, Astro registry entry, Astro type schema, and dispatcher branch.
  error_handling_in_domain: Contract errors are validation-time failures via `z.string().min(1)` and `safeParse`-style tests rather than runtime null guards.
  testing_in_domain: Specific block behavior is asserted in `wave2-pagebuilder.test.tsx`; registry and Astro readiness parity are asserted generically in shared invariant tests.
  documentation_in_domain: Human-facing block docs live in `docs/block-registry/<blockKey>.md`; machine-facing readiness lives in `docs/block-registry/registry.machine.json`.

