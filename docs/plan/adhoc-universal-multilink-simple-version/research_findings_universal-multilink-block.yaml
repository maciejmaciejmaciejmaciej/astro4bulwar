open_questions:
  - question: What exact sibling block key and file naming convention should be used for "Universal Multilink Block simple version"?
    context: The current domain uses snake_case business keys, but the requested new name was provided only as a human label.
    type: decision_blocker
    affects:
      - adhoc-universal-multilink-simple-version
  - question: Should the simple sibling omit `cards[].meta` and `cards[].description` from its contract entirely, or keep the fields optional while suppressing rendering?
    context: The current schema and both renderers require and render those fields unconditionally, so the answer changes whether the new work is a new data contract or only a new render variant.
    type: decision_blocker
    affects:
      - adhoc-universal-multilink-simple-version

