created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 6
  risk_score: medium

tldr: |
  The minimal safe path is to keep `universal_multilink_block` intact and introduce `universal_multilink_block_simple` behind sibling-specific adapters or wrappers, not data-shape heuristics inside the parent path (sources: user request; docs/plan/adhoc-universal-multilink-simple-version/research_findings_universal-multilink-block.yaml; zip/src/components/sections/Feature18.tsx; astro-site/src/components/PageBuilderSection.astro).
  Blocking coverage needs to be explicit, not indirect: the React gate should prove the parent still renders `leftColumn.primaryCta`, `cards[].meta`, and `cards[].description`, while the simple sibling proves top-CTA omission plus reduced-card output and AI descriptor/generator behavior (sources: user request; zip/src/blocks/registry/wave2-pagebuilder.test.tsx; zip/src/blocks/registry/registry-invariants.test.tsx; zip/src/blocks/registry/ai/descriptors.cjs).
  Astro readiness should be justified by a dedicated per-block validation route that renders the simple sibling through `PageBuilderSection.astro`, plus targeted type and registry tests, instead of relying on the broad aggregate validation fixture alone (sources: user request; /memories/repo/astro-readiness.md; astro-site/src/pages/validation/restaurant-menu-drawer-type/index.astro; astro-site/src/lib/types.test.ts; astro-site/src/lib/astroRegistry.test.ts).

