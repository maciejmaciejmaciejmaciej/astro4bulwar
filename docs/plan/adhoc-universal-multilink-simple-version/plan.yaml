    - component: Astro sibling runtime wiring
      responsibility: Mirror the reduced contract into Astro parsing and dispatch while keeping the parent block path explicit.
      interfaces:
        - Astro block-key union and reduced schema entry
        - "`PageBuilderSection.astro` branch for the simple sibling"
        - sibling wrapper or explicit opt-in rendering path for optional CTA omission
    - component: focused Astro validation route and tests
      responsibility: Provide a per-block executable Astro gate and targeted contract tests for both the preserved parent and the new simple sibling.
      interfaces:
        - dedicated validation route under `src/pages/validation/**`
        - parent preservation assertions for `primaryCta`, `meta`, and `description`
        - simple-sibling omitted-CTA and reduced-card assertions
    - component: Astro registry and documentation metadata
      responsibility: Promote the block to machine-readable readiness and human-readable documentation only after the focused gates pass.
      interfaces:
