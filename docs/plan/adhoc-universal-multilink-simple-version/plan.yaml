pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: A shared renderer shortcut for the simple sibling regresses the existing `universal_multilink_block` in React or Astro and drops the parent CTA, meta, or description output.
      likelihood: medium
      impact: high
      mitigation: 'Prefer sibling-specific adapters or wrappers and make the parent regression executable in both stacks before metadata sync; do not infer simple mode from missing parent fields (sources: user request; zip/src/components/sections/Feature18.tsx; astro-site/src/components/UniversalMultilinkBlockSection.astro; zip/src/blocks/registry/wave2-pagebuilder.test.tsx; astro-site/src/lib/types.test.ts).'
    - scenario: The simple sibling is marked AI-ready or Astro-ready even though the omitted-CTA case only passes broad aggregate fixtures and was never exercised through the dedicated block path.
      likelihood: medium
      impact: high
      mitigation: 'Add sibling-specific AI smoke assertions and a dedicated `src/pages/validation/**` Astro route that renders through `PageBuilderSection.astro`; delay manifest promotion until those focused gates pass (sources: user request; /memories/repo/astro-readiness.md; zip/src/blocks/registry/registry-invariants.test.tsx; astro-site/src/pages/validation/restaurant-menu-drawer-type/index.astro).'
  assumptions:
    - 'The sibling block key should remain `universal_multilink_block_simple`, matching the repo''s snake_case naming and existing `_simple` precedent (sources: user request; docs/plan/adhoc-universal-multilink-simple-version/research_findings_universal-multilink-block.yaml; zip/src/blocks/about_2_simple/schema.ts).'
    - 'A dedicated Astro validation route should live under `astro-site/src/pages/validation/**`, not `__validation`, because the repo memory already records that private routes are skipped for emitted validation pages (sources: /memories/repo/astro-readiness.md; astro-site/src/pages/validation/restaurant-menu-drawer-type/index.astro).'
    - 'The omitted-top-CTA AI contract can be smoke-tested in a focused existing test file instead of relying only on the broader shared invariant suite, as long as the test calls the descriptor build/editable-field surface directly (sources: user request; zip/src/blocks/registry/registry-invariants.test.tsx; zip/src/blocks/registry/wave2-pagebuilder.test.tsx).'

implementation_specification:
  code_structure: |
    Keep the new business contract isolated in `zip/src/blocks/universal_multilink_block_simple/schema.ts`. Prefer a thin sibling-specific adapter or wrapper on each runtime side so the existing parent path remains explicit and stable: in React, feed the sibling through a local adapter or an explicit opt-in mode into `Feature18.tsx`; in Astro, feed the sibling through a local wrapper or explicit dispatcher branch rather than teaching the parent path to guess simple mode from omitted fields.
    Make the focused executable gates first-class. On the zip side, extend the narrow React block test so it asserts both parent preservation and simple-sibling omission behavior, and add direct descriptor build/editable-field smoke for the missing top CTA URL. On the Astro side, add a dedicated validation route under `astro-site/src/pages/validation/universal-multilink-block-simple/index.astro` that renders a single inline section through `PageBuilderSection.astro`, plus targeted parser and registry tests. Do not rely on the aggregate `templateBlockAstroValidation` fixture as the only Astro gate for this block.
    Sequence metadata last: only after the focused React, AI, and Astro gates are in place should the plan update `astro-site/src/lib/astroRegistry.ts`, `docs/block-registry/registry.machine.json`, and the human-readable block doc (sources: zip/src/blocks/registry/index.ts; zip/src/blocks/registry/ai/descriptors.cjs; astro-site/src/lib/types.ts; astro-site/src/components/PageBuilderSection.astro; astro-site/src/lib/astroRegistry.ts; docs/block-registry/registry.machine.json).
