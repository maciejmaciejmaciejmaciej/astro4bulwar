plan_id: adhoc-universal-multilink-simple-version
objective: Implement a new page-builder and Astro-ready block named Universal Multilink Block simple version as a sibling of universal_multilink_block, with explicit parent-regression coverage, omitted-CTA AI smoke validation, a focused Astro execution gate, and sibling-specific adapters where that reduces risk.
