created_by: GitHub Copilot
status: pending_approval
research_confidence: high

tldr: |
  Update only the Easter breakfast-for-two product copy and the split-row desktop proportions.
  Keep the existing normalization and overall UI structure intact.
  Validate the touched data/layout paths, then rebuild and deploy using the existing dhosting script plus chmod fix.
open_questions:
  - Confirm the implementer should paste the exact approved breakfast item list from the user message into product id 88 without any wording additions or reordering.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The wrong product record is edited because product 88 is confused with another split-format item.
      likelihood: low
      impact: high
      mitigation: Match both category id 26 and product id 88 before editing, and verify rendered output against the exact approved list.
    - scenario: Desktop width changes spill into unrelated combined rows or mobile layouts.
      likelihood: medium
      impact: medium
      mitigation: Constrain layout edits to the split-mode desktop path in ProductItemAlt and validate both split and combined rows at desktop and mobile breakpoints.
    - scenario: Live deploy succeeds but file permissions are incorrect, causing 403 or white screen.
      likelihood: low
      impact: critical
      mitigation: Use the existing dhosting deploy flow and run the directory 755 plus file 644 permission fix immediately after upload/extract.
  assumptions:
    - The authoritative copy for the breakfast-for-two list has already been provided by the user outside the workspace files.
    - The existing split HTML rendering in the Easter product flow is the intended rendering path for product 88.
    - The deploy-react.sh flow remains the approved live deployment path for the React app on client.example.

implementation_specification:
  code_structure: |
    Keep the hotfix inside the existing Easter data source and active product-row component. Do not introduce new components, data models, or styling systems. Reuse the current split-product HTML rendering path and only rebalance desktop grid proportions in the active row component.
  affected_areas:
    - zip/src/data/cateringWielkanocny.json
    - zip/src/components/sections/ProductItemAlt.tsx
    - zip/src/components/sections/ProductItemAlt.test.tsx
    - deploy-react.sh
  component_details:
    - component: Easter catering data source
      responsibility: Store the exact raw product copy for category 26 / product 88 using supported HTML list markup only.
      interfaces:
        - Raw product entry with id, nazwa_produktu, opis_produktu, gramatura, cena, vegan, vegetarian
    - component: ProductItemAlt
      responsibility: Render split-mode and combined-mode product rows while preserving current mobile behavior and adjusting only desktop column proportions.
      interfaces:
        - ProductItemAltProps for combinedText or split productName plus productDescriptionHtml
    - component: Focused regression test
      responsibility: Assert the split desktop row still renders the intended structure/classes after the width rebalance.
      interfaces:
        - Static markup test for ProductItemAlt split-mode rendering
    - component: Existing live deploy script
      responsibility: Publish the built React bundle to the dhosting live path and preserve the required chmod behavior.
      interfaces:
        - unzip to live react directory
        - chmod 755 for directories and 644 for files
  dependencies:
    - component: zip/src/components/sections/ProductItemAlt.tsx
      relationship: consumes split productDescriptionHtml produced from zip/src/data/cateringWielkanocny.json through the existing normalizer
    - component: zip/src/components/sections/ProductItemAlt.test.tsx
      relationship: verifies the desktop split layout contract exposed by ProductItemAlt
    - component: deploy-react.sh
      relationship: deploys the bundle created after validation passes
  integration_points:
    - Existing JSON import and normalization path in zip/src/data/cateringWielkanocny.ts
    - Existing active Easter page render path through CateringProductListAlt -> ProductItemAlt
    - Existing zip build output and dhosting deployment workflow

