objective: |
  Apply a narrow live hotfix for the Easter catering page: replace only the wrong opis_produktu for product id 88 in category id 26 with the exact user-provided list formatted as supported HTML bullets, widen the desktop split-row description area while shrinking the middle separator area, run focused validation, and redeploy live through the existing dhosting flow with permission repair.
