plan_id: adhoc-registry-ai-instance-split
objective: Prepare a concise implementation plan for refactoring BULWAR APP so AI registry descriptors keep only technical per-block rules, instance-level business meaning lives on page block instances, the AI schema generator merges both sources, generic fallback remains intact, and source-backed blocks keep their current safe editing behavior.
created_at: '2026-04-18T00:00:00Z'
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 5
  risk_score: medium

tldr: |
  The safest sequence is: first lock the canonical instance-level description contract and backward-compatible output shape, then strip business wording out of the shared AI descriptors, then move description assembly into the AI schema generator while preserving the generic fallback, and only after that update the tests that currently encode the old model (sources: docs/plan/adhoc-registry-ai-instance-split/research_findings_page-builder-ai-schema.yaml, zip/src/blocks/registry/ai/descriptors.cjs, SCRIPTS/generate-page-builder-ai-schema.js, SCRIPTS/generate-page-builder-ai-schema.test.js, zip/src/blocks/registry/registry-invariants.test.tsx).
  The highest-risk area is source-backed blocks because their descriptors currently combine user guidance with routing rules that protect WooCommerce and WordPress-backed content from direct AI edits; the refactor must remove business copy without weakening contentSource, editableFields, editRoute, or doNotEditDirectly semantics (sources: zip/src/blocks/registry/ai/descriptors.cjs, docs/plan/adhoc-registry-ai-instance-split/research_findings_page-builder-ai-schema.yaml).

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Source-backed menu and posts blocks lose their current protective edit guidance when business descriptions are removed from descriptors.
      likelihood: medium
      impact: high
      mitigation: Treat contentSource, editableFields, editRoute, and doNotEditDirectly as the non-negotiable technical contract and keep dedicated regression coverage for woo_category, woo_products, and wordpress_posts variants before and after the refactor (sources: zip/src/blocks/registry/ai/descriptors.cjs, SCRIPTS/generate-page-builder-ai-schema.test.js, zip/src/blocks/registry/registry-invariants.test.tsx).
    - scenario: The generator switches description sourcing to instance data but drops backward compatibility for blocks that do not yet provide an instance-level description.
      likelihood: medium
      impact: high
      mitigation: Keep the output field description in page_builder_schema_for_ai, resolve it from instance-level metadata first, and fall back to the existing generic generator path for unsupported or newly added blocks (sources: SCRIPTS/generate-page-builder-ai-schema.js, docs/plan/adhoc-registry-ai-instance-split/research_findings_page-builder-ai-schema.yaml, .github/instructions/page-builder.instructions.md).
    - scenario: Tests are updated too narrowly and stop guarding the id mapping and fallback guarantees required by the page-builder workflow.
      likelihood: medium
      impact: medium
      mitigation: Update assertions away from registry-authored business prose, but keep invariant checks for stable ids, non-empty descriptions at output level, and safe fallback for missing descriptors (sources: .github/instructions/page-builder.instructions.md, SCRIPTS/generate-page-builder-ai-schema.test.js, zip/src/blocks/registry/registry-invariants.test.tsx).
  assumptions:
    - The compatibility-preserving target is to keep blocks[].description in page_builder_schema_for_ai, but change its source from registry-authored business copy to instance-level page data plus fallback when instance copy is missing (source: user request).
    - The canonical place for instance-level business meaning can be introduced through existing open meta on draft blocks and render sections, avoiding a broad schema migration for block data contracts (sources: zip/src/blocks/registry/firebasePageDraft.ts, zip/src/blocks/registry/pageBuilderSchema.ts, docs/plan/adhoc-registry-ai-instance-split/research_findings_page-builder-ai-schema.yaml).
    - PageBuilderBlockDefinition.description in the main block registry type is outside the primary scope unless a nearby test must be adjusted to avoid contradictory expectations (sources: user request, zip/src/blocks/registry/types.ts).

implementation_specification:
  code_structure: |
    Keep the change centered on three layers. Layer 1 is the shared AI descriptor registry, which should expose only technical editing rules and content builders per block type. Layer 2 is the page instance contract, which should carry the business-purpose description for a concrete block instance through existing meta-capable structures. Layer 3 is the AI schema generator, which should merge the instance description with the technical registry payload and preserve the current output field names where compatibility matters.
    The implementation should avoid a broad rewrite of render schemas or WordPress controller logic because both the render schema section model and firebase draft model already allow instance metadata passthrough (sources: zip/src/blocks/registry/pageBuilderSchema.ts, zip/src/blocks/registry/firebasePageDraft.ts, SCRIPTS/make-page-draft-compile-gate.js).
  affected_areas:
    - zip/src/blocks/registry/ai/descriptors.cjs
    - SCRIPTS/generate-page-builder-ai-schema.js
    - SCRIPTS/generate-page-builder-ai-schema.test.js
    - zip/src/blocks/registry/registry-invariants.test.tsx
    - zip/src/blocks/registry/pageBuilderSchema.ts
    - zip/src/blocks/registry/firebasePageDraft.ts
    - SCRIPTS/make-page-draft-compile-gate.js
  component_details:
    - component: Instance description contract
      responsibility: Define where the per-page business meaning of a block instance lives and how the generator reads it without breaking existing page-builder flows.
      interfaces:
        - A canonical instance-level metadata key for business-purpose description attached to a draft block and preserved on the render section instance.
        - A precedence rule for generating blocks[].description in page_builder_schema_for_ai.
    - component: Technical AI descriptor registry
      responsibility: Provide only technical block-type editing rules and content builders shared by the generator.
      interfaces:
        - contentSource
        - editableFields
        - editRoute
        - doNotEditDirectly
        - build(section)
    - component: AI schema generator merge layer
      responsibility: Compose final AI blocks from section instance data and technical descriptor data while preserving stable ids and generic fallback behavior.
      interfaces:
        - buildAiBlock(section)
        - buildGenericDescriptor(section)
        - description resolution strategy
    - component: Regression test suite
      responsibility: Prove that the new contract preserves fallback behavior, stable mapping, and source-backed safety while removing the old dependency on registry-authored business descriptions.
      interfaces:
        - Script-level generator tests
        - Registry invariant coverage tests
  dependencies:
    - component: firebase draft and render schema meta passthrough
      relationship: Supplies the lowest-impact path for instance-level business descriptions.
    - component: AI descriptor registry
      relationship: Continues to define technical editing behavior consumed by the generator.
    - component: AI schema generator
      relationship: Becomes the canonical merge point for instance description plus descriptor rules.
    - component: generator and invariant tests
      relationship: Must be updated to validate the new source of description without losing contract coverage.
  integration_points:
    - SCRIPTS/generate-page-builder-ai-schema.js
    - SCRIPTS/make-page-draft-compile-gate.js
    - zip/src/blocks/registry/pageBuilderSchema.ts
    - zip/src/blocks/registry/firebasePageDraft.ts

