open_questions:
  - question: Jakie ma byc kanoniczne zrodlo instancyjnego opisu biznesowego przed wygenerowaniem AI schema?
    context: Generator aktualnie bierze description z registry descriptor, a render schema ma tylko otwarte meta bez ustalonej konwencji kluczy.
    type: decision_blocker
    affects: [adhoc-registry-ai-instance-split]
  - question: Czy pole blocks[].description ma zostac zachowane dla kompatybilnosci i tylko zmienic znaczenie, czy ma zostac zastapione nowym polem typu instanceDescription/businessPurpose?
    context: Testy i obecne payloady znaja pole description; WordPress controller nie waliduje shape, ale tooling i testy juz tak.
    type: decision_blocker
    affects: [adhoc-registry-ai-instance-split]
  - question: Czy pole PageBuilderBlockDefinition.description ma podlegac tej samej zasadzie refactoru juz teraz, czy pozostaje poza zakresem tej zmiany?
    context: Pole istnieje w zip/src/blocks/registry/types.ts, ale znalezione uzycia sa tylko testowe.
    type: research
    affects: [adhoc-registry-ai-instance-split]

