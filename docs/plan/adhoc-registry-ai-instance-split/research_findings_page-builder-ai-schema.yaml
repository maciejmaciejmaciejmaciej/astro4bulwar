patterns_found:
  - category: architecture
    pattern: Generator jest jedynym miejscem skladania finalnego AI block payload.
    description: Registry descriptors sa tylko zrodlem danych, a pole description trafia do outputu dopiero w buildAiBlock.
    examples:
      - file: SCRIPTS/generate-page-builder-ai-schema.js
        location: SCRIPTS/generate-page-builder-ai-schema.js:229
        snippet: const descriptor = AI_BLOCK_REGISTRY[section.blockKey] ?? buildGenericDescriptor(section);
      - file: SCRIPTS/generate-page-builder-ai-schema.js
        location: SCRIPTS/generate-page-builder-ai-schema.js:235
        snippet: description: resolveDescriptorValue(descriptor.description, section)
    prevalence: common

  - category: structure
    pattern: Descriptors mieszaja opis biznesowy bloku z kontraktem technicznym edycji.
    description: W jednym obiekcie obok siebie wystepuja description, contentSource, editableFields, editRoute i doNotEditDirectly.
    examples:
      - file: zip/src/blocks/registry/ai/descriptors.cjs
        location: zip/src/blocks/registry/ai/descriptors.cjs:433
        snippet: description: 'Ten blok wyswietla sekcje opowiadajaca o restauracji...'
      - file: zip/src/blocks/registry/ai/descriptors.cjs
        location: zip/src/blocks/registry/ai/descriptors.cjs:446
        snippet: editRoute: 'Zmiany copy wprowadzaj bezposrednio...'
    prevalence: common

  - category: fallback
    pattern: Nowe bloki bez descriptora maja bezpieczny fallback poza registry.
    description: Generic fallback wyprowadza description i techniczne pola bez zaleznosci od dedykowanego wpisu blockKey.
    examples:
      - file: SCRIPTS/generate-page-builder-ai-schema.js
        location: SCRIPTS/generate-page-builder-ai-schema.js:196
        snippet: function buildGenericDescriptor(section) {
      - file: SCRIPTS/generate-page-builder-ai-schema.test.js
        location: SCRIPTS/generate-page-builder-ai-schema.test.js:501
        snippet: test('AI schema generator falls back safely for a new block without a dedicated descriptor'
    prevalence: common

  - category: data-model
    pattern: Instancje sekcji i draft blockow maja otwarte meta.
    description: Obecny model pozwala dosztukowac per-instance wskazowki bez zmiany data schema blokow.
    examples:
      - file: zip/src/blocks/registry/pageBuilderSchema.ts
        location: zip/src/blocks/registry/pageBuilderSchema.ts:14
        snippet: meta: z.record(z.string(), z.unknown()).default({})
      - file: zip/src/blocks/registry/firebasePageDraft.ts
        location: zip/src/blocks/registry/firebasePageDraft.ts:30
        snippet: meta: z.record(z.string(), z.unknown()).default({})
    prevalence: common

  - category: testing
    pattern: Testy pilnuja wording description, nie tylko shape techniczny.
    description: Refactor bedzie wymagal zmiany asercji z regexow biznesowych na asercje pochodzenia instancyjnego albo neutralnego fallbacku.
    examples:
      - file: SCRIPTS/generate-page-builder-ai-schema.test.js
        location: SCRIPTS/generate-page-builder-ai-schema.test.js:107
        snippet: assert.match(output.blocks[0].description, /wewnetrznej podstrony|wewnetrzny route|internal/i)
      - file: zip/src/blocks/registry/registry-invariants.test.tsx
        location: zip/src/blocks/registry/registry-invariants.test.tsx:140
        snippet: assert.equal(typeof aboutDescriptor.description, 'string')
    prevalence: common

