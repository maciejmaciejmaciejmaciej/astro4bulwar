  structure_of_domain: Render schema trzyma sections[], AI schema trzyma blocks[] mapowane 1:1 po id.
  error_handling_in_domain: Generator i compile gate rzucaja jawne bledy dla zlego kształtu inputu i brakujacych source mappings.
  testing_in_domain: Poziom skryptowy przez node:test oraz end-to-end invariant coverage dla calego registry.
  documentation_in_domain: Reguly page-builder instruction wymagaja zachowania mapowania po id i generowania instancyjnego description.

