plan_id: adhoc-registry-ai-instance-split
objective: Zbadac obecny kontrakt registry AI descriptors i generatora page_builder_schema_for_ai pod refactor rozdzielajacy opisy techniczne od biznesowych opisow instancji.
focus_area: page-builder-ai-schema
