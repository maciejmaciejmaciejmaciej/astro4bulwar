tldr: |
  - Generator AI schema sklada dzis jeden obiekt per blok z danymi technicznymi i opisem biznesowo-redakcyjnym; linie laczenia sa w SCRIPTS/generate-page-builder-ai-schema.js:229-253.
  - Wspolne registry descriptors w zip/src/blocks/registry/ai/descriptors.cjs przechowuja jednoczesnie techniczny kontrakt edycji i opis celu/widoku bloku; przyklady zaczynaja sie od zip/src/blocks/registry/ai/descriptors.cjs:270, 433, 455, 492.
  - Fallback dla nowych blokow jest centralny i dziala poza registry przez buildGenericDescriptor; nieznane bloki nadal dostaja description, editableFields, editRoute i doNotEditDirectly z generatora.
  - Instancje render schema i firebase draft maja juz otwarte meta jako record unknown, wiec istnieje gotowy kanal na instancyjne wskazowki bez rozszerzania danych blokow.
  - Twarde zalozenia o obecnym polu description siedza glownie w testach generatora i registry invariants, nie w runtime WordPress/React.

