    wave: 1
    agent: "gem-implementer"
    priority: "high"
    status: "pending"
    dependencies: []
    context_files:
      - "zip/src/App.tsx"
    estimated_effort: "medium"
    estimated_files: 3
    estimated_lines: 200
    focus_area: "zip/src/App.tsx subcomponents"
    verification:
      - "Ensure components export correctly without type errors."
    acceptance_criteria:
