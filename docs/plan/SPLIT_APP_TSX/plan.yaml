plan_id: "SPLIT_APP_TSX"
objective: "Create a plan.yaml file breaking down the extraction of 19 UI sections and 3 subcomponents from zip/src/App.tsx into individual components within zip/src/components/sections/, based on the docs/plan/SPLIT_APP_TSX/research_findings_zip_src_app_tsx.yaml. Organize it into extraction waves."
created_at: "2026-03-22T00:00:00Z"
created_by: "gem-planner"
status: "pending_approval"
research_confidence: "high"

tldr: |
  Extract 19 UI layout sections and 3 inline subcomponents from the monolithic `zip/src/App.tsx` into isolated files under `zip/src/components/sections/` and `zip/src/components/ui/` or `components/shared/`.
  This is organized in waves based on dependencies: base subcomponents first, followed by structural layout elements, then content sections, and finally re-integration in App.tsx.

open_questions:
  - "Should we remove the duplicated 'Wielkanoc w Bulwarze' section when integrating, or render the extracted component twice?"
  - "Should state management for the cart (currently localized in ProductItem) be refactored concurrently, or left as-is for a separate task?"

pre_mortem:
  overall_risk_level: "medium"
  critical_failure_modes:
    - scenario: "Breaking imports due to missing types or shared constants during extraction"
      likelihood: "medium"
      impact: "high"
      mitigation: "Ensure shared data and types are extracted first or duplicated locally before finalizing the shared data layer."
    - scenario: "Styling layout breakage when extracting components to separate files"
      likelihood: "low"
      impact: "medium"
      mitigation: "Maintain original layout wrapper classes correctly during extraction."
  assumptions:
    - "The exact layout and visual appearance should remain unchanged."
    - "Global state refactor will follow in a separate plan. Local state within App.tsx will be passed as props if needed, or left within extracted components if isolated."

implementation_specification:
  code_structure: "New component files will be created in `zip/src/components/sections/` and `zip/src/components/ui/` (for common ones). `App.tsx` will become a composition of these imported sections."
  affected_areas:
    - "zip/src/App.tsx"
    - "zip/src/components/sections/*"
    - "zip/src/components/ui/*"
  component_details:
    - component: "Shared Components (ProductItem, Project5a, About28)"
      responsibility: "Reusable UI blocks"
      interfaces:
        - "Props matching original inline definitions."
    - component: "Layout Sections (Navbar, Footer, Cart Controls)"
      responsibility: "Main app shell"
      interfaces:
        - "Accept necessary state props for cart toggling/counting."
    - component: "Content Sections (Hero, Menu, Oferta, etc.)"
      responsibility: "Display static/hardcoded data for the landing page"
      interfaces:
        - "No props required initially unless state depends on it."
  dependencies:
    - component: "Content Sections"
      relationship: "uses Shared Components (e.g. Sałatki na wynos uses ProductItem)"
    - component: "App.tsx"
      relationship: "composes Layout and Content Sections"
  integration_points:
    - "App.tsx root layout"

contracts:
  - from_task: "extract-subcomponents"
    to_task: "extract-content-sections-c"
    interface: "ProductItem component export"
    format: "React component with props: { name, description, weight, price }"
  - from_task: "extract-subcomponents"
    to_task: "extract-content-sections-a"
    interface: "About28 and Project5a component exports"
    format: "React components"

