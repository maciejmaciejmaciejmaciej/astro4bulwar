patterns_found:
  - category: "structure"
    pattern: "Monolithic Template"
    description: "The entire landing page layout resides in App.tsx. Hardcoded data and styling intertwines deeply with markup."
    examples:
      - file: "zip/src/App.tsx"
        location: "zip/src/App.tsx:377"
        snippet: "export default function App() {"
    prevalence: "common"
  - category: "structure"
    pattern: "Inline Components"
    description: "Auxiliary component blocks (like ProductItem, About28) are declared in the same file rather than split out."
    examples:
      - file: "zip/src/App.tsx"
        location: "zip/src/App.tsx:11"
        snippet: "function ProductItem({ name, description, weight, price }..."
    prevalence: "common"
  - category: "architecture"
    pattern: "Local State Misalignment"
    description: "ProductItem uses local useState to track quantity and cart additions, but no context or prop is passing this data up to a global CheckoutCart."
    examples:
      - file: "zip/src/App.tsx"
        location: "zip/src/App.tsx:11"
        snippet: "const [cartCount, setCartCount] = useState(0);"
    prevalence: "common"

