plan_id: catering-raw-id-rename-20260326
objective: Rename ambiguous raw Easter catering keys from category.id to category_id and product.id to product_id while preserving normalized/public contracts as id to minimize blast radius.
created_at: 2026-03-26T00:00:00Z
created_by: GitHub Copilot
status: pending_approval
research_confidence: high

tldr: |
  Keep the change isolated to the raw Easter catering source and its normalizer. Rename raw JSON keys to category_id and product_id, update the raw TypeScript interfaces and normalization reads accordingly, and leave every normalized/public consumer contract unchanged as id. Only update tests that directly assert raw source field names or guard the id mapping boundary.
open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: A direct consumer outside the scoped tests reads cateringWielkanocnySource[*].id or pozycje[*].id and breaks after the raw rename.
      likelihood: medium
      impact: medium
      mitigation: Search for direct raw-source property access before implementation and update only the directly coupled test/assertion surface if no production consumers exist.
  assumptions:
    - The intended public contract boundary is zip/src/data/cateringWielkanocny.ts, where normalized category/product objects must continue exposing id.
    - Direct production consumers use cateringWielkanocnyCategories rather than the raw JSON shape.
    - Scope remains limited to zip/src/data/cateringWielkanocny.json, zip/src/data/cateringWielkanocny.ts, and directly coupled tests.

implementation_specification:
  code_structure: Keep raw schema changes local to the source JSON and Raw* interfaces; map renamed raw keys back into the existing normalized/public contracts inside the existing normalizer.
  affected_areas:
    - zip/src/data/cateringWielkanocny.json
    - zip/src/data/cateringWielkanocny.ts
    - zip/src/pages/CateringWielkanocnyPage.test.tsx
    - zip/src/lib/cateringCart.test.ts
  component_details:
    - component: Raw Easter catering JSON
      responsibility: Store raw category and product identifiers under explicit raw-only names category_id and product_id.
      interfaces:
        - Raw category objects expose category_id instead of id.
        - Raw product objects expose product_id instead of id.
    - component: cateringWielkanocny normalizer
      responsibility: Accept the renamed raw keys, validate them, and continue emitting normalized/public category and product contracts with id.
      interfaces:
        - RawCateringCategory uses category_id and pozycje.
        - RawCateringProduct uses product_id.
        - CateringCategoryContract remains id/title/description/imageUrl/products.
        - CateringProductContract remains id plus existing content/price fields.
    - component: Directly coupled tests
      responsibility: Assert the raw-source rename where raw data is intentionally inspected and assert that normalized/public ids remain unchanged.
      interfaces:
        - Raw-source assertions reference category_id and product_id.
        - Normalized assertions continue referencing id.
  dependencies:
    - component: Raw Easter catering JSON
      relationship: Provides the renamed raw identifier fields consumed by the normalizer.
    - component: cateringWielkanocny normalizer
      relationship: Translates raw category_id/product_id into the unchanged normalized/public id contract consumed by the rest of the app.
    - component: Directly coupled tests
      relationship: Validate the raw-to-normalized boundary without expanding scope to unrelated UI or checkout behavior.
  integration_points:
    - Existing import of cateringWielkanocny.json in zip/src/data/cateringWielkanocny.ts
    - Existing exports cateringWielkanocnySource and cateringWielkanocnyCategories
    - Existing tests that inspect raw source data or normalized ids

