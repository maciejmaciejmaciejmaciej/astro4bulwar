plan_id: "template-missing-blocks-astro-readiness-20260424"
objective: >-
  Prepare Astro readiness for the remaining /template page-builder blocks
  hero_simple_no_text_py32, hero_simple_no_text_normal_wide,
  about_2_simple, promo2, simple_heading_and_paragraph,
  big_img_and_bolded_tex_editorial_style_block,
  menu_two_columns_with_no_heading_no_img,
  menu_two_columns_with_with_heading_no_img, just_pralax_img_horizontal,
  menu_three_columns_with_with_heading_no_img,
  premium_call_to_action_with_image_carousel, and oferta_posts_section,
  while minimizing rollout risk for source-backed blocks and preserving
  visual parity with TemplatePage. Sources: zip/src/pages/TemplatePage.tsx,
  docs/block-registry/registry.machine.json,
  astro-site/src/lib/astroRegistry.ts,
  astro-site/src/lib/pageBuilder.ts.
created_at: "2026-04-24T00:00:00Z"
created_by: "gem-planner"
status: "pending"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 25
  risk_score: "high"

tldr: |
  Variant C keeps the same 12-block scope as the earlier alternatives, but it
  optimizes the sequence around two risks already visible in the repo state:
  1) all 12 targets already have React runtime, docs, AI descriptor, and tests,
  while Astro remains the missing capability, so the critical path should focus
  on Astro projection rather than reopening registry groundwork; 2) the most
  failure-prone blocks are the source-backed Promo2/menu family and
  oferta_posts_section, because React currently hydrates them through explicit
  source resolvers before render, while Astro only resolves a narrower menu
  subset today. Sources: docs/block-registry/registry.machine.json,
  zip/src/blocks/registry/resolvePageBuilderSources.ts,
  astro-site/src/lib/pageBuilder.ts, astro-site/src/lib/woo.ts,
  astro-site/src/lib/wordpress.ts.
  The plan therefore front-loads a TemplatePage parity matrix and Astro type
  contract, lands source-hydration seams before renderer work for source-backed
  blocks, batches direct-edit renderers by visual family, and flips readiness in
  the shared manifest only after Astro projection, tests, and build evidence are
  complete. Sources: zip/src/pages/TemplatePage.tsx,
  docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md,
  astro-site/src/lib/astroRegistry.ts,
  astro-site/src/lib/pageBuilder.test.ts.

open_questions:
  - >-
    Can the hero pair share one Astro presenter with thin block-specific shells
    if the `py32` and `normal_wide` spacing differences remain exact, or should
    each block keep a dedicated renderer to make parity review simpler?
    Sources: docs/block-registry/hero_simple_no_text_py32.md,
    docs/block-registry/hero_simple_no_text_normal_wide.md,
    zip/src/pages/TemplatePage.tsx.
  - >-
    Is one mocked source-backed validation per source type sufficient for ready
    promotion, or does the rollout require one live client-data smoke pass for
    Woo-backed and WordPress-backed sections before `astroRenderer.available`
    becomes true in the manifest? Sources: astro-site/src/lib/pageBuilder.test.ts,
    astro-site/src/lib/woo.ts, astro-site/src/lib/wordpress.ts,
    docs/block-registry/promo2.md, docs/block-registry/oferta_posts_section.md.

pre_mortem:
  overall_risk_level: "high"
  critical_failure_modes:
    - scenario: >-
        Astro renderers for Promo2 and the menu blocks ship without matching the
        existing React source-hydration semantics, so category-derived titles,
        column splitting, or empty-state behavior drift from the runtime already
        used by TemplatePage and page-builder publishing.
      likelihood: "high"
      impact: "critical"
      mitigation: >-
        Land the Astro Woo-resolution seam before the source-backed renderers,
        derive its behavior from the existing Astro menu resolver and React
        source resolver, and do not mark any of the Promo2/menu family blocks
        Astro-ready until resolver tests and projection parity both pass.
        Sources: astro-site/src/lib/woo.ts,
        astro-site/src/lib/pageBuilder.ts,
        zip/src/blocks/registry/resolvePageBuilderSources.ts,
        docs/block-registry/promo2.md.
    - scenario: >-
        Direct-edit blocks become technically renderable in Astro but lose the
        visual rhythm, wrapper width, or shell geometry that TemplatePage uses as
        the canonical reference, creating false-ready blocks that diverge from
        the approved design language.
      likelihood: "medium"
      impact: "high"
      mitigation: >-
        Freeze a per-block parity matrix first, validate against the global CSS
        adaptation contract, and keep the readiness flip separated from renderer
        implementation so parity evidence is reviewed before the manifest is
        updated. Sources: zip/src/pages/TemplatePage.tsx,
        docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md,
        .github/instructions/design-system.instructions.md.
    - scenario: >-
        The shared readiness manifest and Astro projection drift apart, leaving
        blocks marked Astro-ready in docs/block-registry/registry.machine.json
        while astro-site/src/lib/astroRegistry.ts is missing the renderer entry or
        points at the wrong file.
      likelihood: "medium"
      impact: "high"
      mitigation: >-
        Keep all readiness flips in one late integration task that updates the
        projection, manifest, and parity test together, and require the existing
        Astro registry parity test plus build validation before completion.
        Sources: astro-site/src/lib/astroRegistry.ts,
        astro-site/src/lib/astroRegistry.test.ts,
        docs/block-registry/registry.machine.json.
  assumptions:
    - >-
      The 12 target blocks are already registered and marked `refining`, with
      React runtime, AI descriptors, docs, and contract tests available, so this
      rollout should avoid redesigning block contracts and concentrate on Astro
      types, renderers, resolvers, and readiness projection. Sources:
      docs/block-registry/registry.machine.json,
      zip/src/blocks/registry/index.ts,
      zip/src/blocks/registry/ai/descriptors.cjs.
    - >-
      Astro already treats `resolveAstroRenderer()` and
      `resolveAstroPageSections()` as the ready gate for enabled sections, so the
      safest implementation path is to extend those seams instead of adding a new
      parallel dispatcher. Sources: astro-site/src/lib/astroRegistry.ts,
      astro-site/src/lib/pageBuilder.ts,
      astro-site/src/lib/pageBuilder.test.ts.
    - >-
      TemplatePage remains the canonical visual reference, and the adaptation
      contract explicitly allows token and styling normalization but forbids
      casual changes to outer geometry, width strategy, or section composition.
      Sources: zip/src/pages/TemplatePage.tsx,
      docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md,
      .github/instructions/design-system.instructions.md.

implementation_specification:
  code_structure: |
    The safest code structure keeps Astro support on the same boundaries that
    already govern Astro builds today. The Astro-side payload contract remains in
    astro-site/src/lib/types.ts. Source hydration stays centralized in
    astro-site/src/lib/pageBuilder.ts and delegates to astro-site/src/lib/woo.ts
    for Woo-backed sections and astro-site/src/lib/wordpress.ts for
    WordPress-backed sections. Presentation stays in dedicated Astro section
    components under astro-site/src/components/, grouped by visual family so
    direct-edit blocks and source-backed blocks can evolve independently. The
    only place that flips blocks from refining to Astro-ready is the late shared
    projection task that updates astro-site/src/lib/astroRegistry.ts and
    docs/block-registry/registry.machine.json together. Sources:
    astro-site/src/lib/types.ts, astro-site/src/lib/pageBuilder.ts,
    astro-site/src/lib/woo.ts, astro-site/src/lib/wordpress.ts,
    astro-site/src/lib/astroRegistry.ts,
    docs/block-registry/registry.machine.json.
  affected_areas:
    - "astro-site/src/components/**"
    - "astro-site/src/lib/types.ts"
    - "astro-site/src/lib/pageBuilder.ts"
    - "astro-site/src/lib/woo.ts"
    - "astro-site/src/lib/wordpress.ts"
    - "astro-site/src/lib/astroRegistry.ts"
    - "astro-site/src/lib/*.test.ts"
    - "docs/block-registry/registry.machine.json"
    - "docs/block-registry/index.md"
    - "docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md"
  component_details:
    - component: "TemplatePage parity matrix"
      responsibility: >-
        Freeze the approved shell, width, spacing, heading rhythm, image
        composition, and source-backed safety invariants for the 12 target blocks
        so renderer tasks have one parity contract instead of inferring visual
        behavior from multiple files.
      interfaces:
        - "block family manifest for hero, editorial, media/CTA, Promo2/menu, and oferta groups"
        - "per-block parity checklist bound to TemplatePage and block-registry docs"
    - component: "Astro payload type contract"
      responsibility: >-
        Extend Astro-side Zod and TypeScript parsing so all 12 block keys can be
        parsed with the same direct-edit or source-backed constraints already
        documented in the shared registry docs.
      interfaces:
        - "pageBuilderSchema block unions for the 12 target block keys"
        - "typed source contracts for woo_category and wordpress_posts blocks"
    - component: "Astro source-hydration seam"
      responsibility: >-
        Resolve Woo-backed and WordPress-backed sections before render so Astro
        receives already-hydrated block data instead of teaching each renderer to
        fetch live data ad hoc.
      interfaces:
        - "resolveAstroPageSections(sections)"
        - "resolveMenuBlock(block)"
        - "fetchWordPressPageBuilderSchema(slug) and post-mapping helpers"
    - component: "Astro section renderer packs"
      responsibility: >-
        Implement family-specific Astro presenters that preserve TemplatePage
        geometry while rendering parsed block data for direct-edit and
        source-backed families.
      interfaces:
        - "Hero and editorial renderer components"
        - "Promo2/menu renderer components"
        - "Oferta posts and CTA/media renderer components"
    - component: "Shared readiness projection"
      responsibility: >-
        Keep Astro renderer lookup, readiness state, and registry parity tests in
        sync so the 12 blocks become Astro-ready only when the renderers,
        resolvers, and tests exist together.
      interfaces:
        - "resolveAstroRenderer(blockKey)"
        - "listAstroRendererBlockKeys()"
        - "registry.machine.json readiness capabilities"
  dependencies:
    - component: "TemplatePage parity matrix"
      relationship: "Feeds all renderer tasks with the approved visual shell and no-redesign constraints."
    - component: "Astro payload type contract"
      relationship: "Supplies parseable section types to the resolver and renderer tasks."
    - component: "Astro source-hydration seam"
      relationship: "Must exist before Promo2/menu and oferta renderers can be trusted as Astro-ready."
    - component: "Shared readiness projection"
      relationship: "Consumes renderer and resolver outputs and is the only layer allowed to mark Astro readiness true."
  integration_points:
    - "zip/src/pages/TemplatePage.tsx"
    - "docs/block-registry/registry.machine.json"
    - "docs/block-registry/promo2.md"
    - "docs/block-registry/oferta_posts_section.md"
    - "zip/src/blocks/registry/resolvePageBuilderSources.ts"
    - "astro-site/src/lib/types.ts"
    - "astro-site/src/lib/pageBuilder.ts"
    - "astro-site/src/lib/woo.ts"
    - "astro-site/src/lib/wordpress.ts"
    - "astro-site/src/lib/astroRegistry.ts"

