related_conventions:
  naming_patterns_in_domain: React source components use PascalCase section names; shared registry uses snake_case or kebab-case block keys; Astro renderers use PascalCase *.astro file names tied to block-key projection.
  structure_of_domain: Exact counterpart lookup is block-key first, then readiness manifest, then Astro projection path; composition-adjacent analogues are documented in block-registry markdown rather than inferred from filenames alone.
  error_handling_in_domain: astroRegistry throws if a block key is missing, not ready, or mismatched between readiness data and the Astro projection.
  testing_in_domain: astroRegistry.test.ts and pageBuilder.test.ts assert Astro readiness behavior and block dispatching; registry.machine.json is the source of truth for readiness parity.
  documentation_in_domain: docs/block-registry/*.md documents current React renderer mappings and, where relevant, composition rules between blocks.

related_dependencies:
  internal:
    - component: zip/src/blocks/registry/index.ts
      relationship_to_domain: Publishes docs paths and Astro renderer paths for shared registry reporting.
      direction: outbound
    - component: docs/block-registry/*.md
      relationship_to_domain: Documents current renderer mappings and composition rules used to identify nearest Astro analogues.
      direction: outbound
    - component: astro-site/src/styles/global.css
      relationship_to_domain: Supplies shared styling for MenuCategorySection.astro.
      direction: outbound
  external: []

