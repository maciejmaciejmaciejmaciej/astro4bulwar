patterns_found:
  - category: architecture
    pattern: Astro projection is keyed by shared registry readiness, not by React component name.
    description: Exact Astro counterparts are available only when the block key is both ready and astroRenderer.available in the shared readiness manifest, then mirrored in astro-site/src/lib/astroRegistry.ts and PageBuilderSection.astro.
    examples:
      - file: astro-site/src/lib/astroRegistry.ts
        location: astro-site/src/lib/astroRegistry.ts:33
        snippet: "astroRendererProjection only includes about-1, gallery-masonry-style1, menu-category-photo-parallax-full-width, our-services, and universal_header_block_2."
      - file: astro-site/src/components/PageBuilderSection.astro
        location: astro-site/src/components/PageBuilderSection.astro:51
        snippet: "Only menu-category-photo-parallax-full-width and universal_header_block_2 from the target-adjacent set are rendered by Astro branches."
    prevalence: common
  - category: registry
    pattern: Three of the four /template target blocks remain React-only in the shared readiness manifest.
    description: universal_multilink_block, universal_header_block_1, and block_download are implemented on React and documented, but Astro readiness is explicitly false.
    examples:
      - file: docs/block-registry/registry.machine.json
        location: docs/block-registry/registry.machine.json:139
        snippet: '"block_download" -> "astroRenderer": { "available": false }'
      - file: docs/block-registry/registry.machine.json
        location: docs/block-registry/registry.machine.json:635
        snippet: '"universal_header_block_1" -> "astroRenderer": { "available": false }'
      - file: docs/block-registry/registry.machine.json
        location: docs/block-registry/registry.machine.json:694
        snippet: '"universal_multilink_block" -> "astroRenderer": { "available": false }'
    prevalence: occasional
  - category: composition
    pattern: The parallax two-column menu block maps only to a composition-adjacent Astro analogue, not an exact Astro counterpart.
    description: Its block doc states that the React block is derived from menu-category-photo-parallax-full-width plus the shared menu panel treatment, while the shared registry marks the exact block key as not Astro-ready.
    examples:
      - file: docs/block-registry/menu_two_columns_with_with_heading_with_img_fullwidth_paralax.md
        location: docs/block-registry/menu_two_columns_with_with_heading_with_img_fullwidth_paralax.md:20
        snippet: "This block is intentionally derived from menu-category-photo-parallax-full-width for the full-width parallax hero shell."
      - file: docs/block-registry/registry.machine.json
        location: docs/block-registry/registry.machine.json:372
        snippet: '"menu_two_columns_with_with_heading_with_img_fullwidth_paralax" -> "astroRenderer": { "available": false }'
      - file: docs/block-registry/registry.machine.json
        location: docs/block-registry/registry.machine.json:401
        snippet: '"menu-category-photo-parallax-full-width" -> "astroRenderer": { "available": true, "path": "astro-site/src/components/MenuCategorySection.astro" }'
    prevalence: rare
  - category: radius
    pattern: Radius handling is still hardcoded where Astro exact counterparts exist.
    description: "UniversalHeaderBlock2Section.astro uses raw border-radius: 4px values, and the nearest menu analogue does not expose a semantic radius token either."
    examples:
      - file: astro-site/src/components/UniversalHeaderBlock2Section.astro
        location: astro-site/src/components/UniversalHeaderBlock2Section.astro:209
        snippet: 'border-radius: 4px;'
      - file: astro-site/src/components/UniversalHeaderBlock2Section.astro
        location: astro-site/src/components/UniversalHeaderBlock2Section.astro:227
        snippet: 'border-radius: 4px;'
      - file: astro-site/src/styles/global.css
        location: astro-site/src/styles/global.css:325
        snippet: 'menu-section selectors define hero/content/grid/item rules without any radius token or border-radius declaration.'
    prevalence: occasional
  - category: radius
    pattern: React source blocks still carry literal rounded-* utility classes.
    description: All four /template-mounted React suspects use hardcoded Tailwind radius utilities rather than a central semantic radius abstraction.
    examples:
      - file: zip/src/components/sections/Feature18.tsx
        location: zip/src/components/sections/Feature18.tsx:99
        snippet: 'rounded-[4px]'
      - file: zip/src/components/sections/Project5c.tsx
        location: zip/src/components/sections/Project5c.tsx:124
        snippet: 'rounded-[4px]'
      - file: zip/src/components/sections/OccasionalMenuPdfDownloadSection.tsx
        location: zip/src/components/sections/OccasionalMenuPdfDownloadSection.tsx:110
        snippet: 'rounded-[24px]'
      - file: zip/src/components/sections/MenuTwoColumnsWithWithHeadingWithImgFullwidthParalaxSection.tsx
        location: zip/src/components/sections/MenuTwoColumnsWithWithHeadingWithImgFullwidthParalaxSection.tsx:39
        snippet: 'rounded-t-[4px] rounded-b-none'
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: shared registry readiness manifest
      responsibility: Declares per-block lifecycle and capability readiness, including Astro renderer availability.
      location: docs/block-registry/registry.machine.json
      relationship_to_domain: Determines whether an exact Astro counterpart exists.
    - component: Astro registry projection
      responsibility: Maps ready block keys to concrete Astro component paths.
      location: astro-site/src/lib/astroRegistry.ts
      relationship_to_domain: Domain depends on this for exact Astro counterpart lookup.
    - component: Astro page-builder section dispatcher
      responsibility: Renders Astro components for supported block keys.
      location: astro-site/src/components/PageBuilderSection.astro
      relationship_to_domain: Uses Astro renderer outputs.
    - component: Astro shared menu renderer
      responsibility: Renders the ready menu-category-photo-parallax-full-width block.
      location: astro-site/src/components/MenuCategorySection.astro
      relationship_to_domain: Nearest Astro analogue for the React parallax menu block.
    - component: Astro universal header block 2 renderer
      responsibility: Renders the ready editorial header/story block.
      location: astro-site/src/components/UniversalHeaderBlock2Section.astro
      relationship_to_domain: Exact Astro counterpart for the ready editorial/header variant.
  interfaces_used_by_domain:
    - interface: PageBuilderSection
      location: astro-site/src/lib/types.ts:192
      usage_pattern: Union type accepted by the Astro dispatcher after block-key validation.
    - interface: SharedRegistryReadinessManifest
      location: astro-site/src/lib/astroRegistry.ts:15
      usage_pattern: Validates lifecycle and Astro readiness before resolving a component path.
  data_flow_involving_domain: TemplatePage defines block-key usage in React preview -> shared registry docs/manifests declare block-key readiness -> astro-site/src/lib/astroRegistry.ts resolves only Astro-ready block keys -> astro-site/src/components/PageBuilderSection.astro dispatches to the matching Astro component.
  key_relationships_to_domain:
    - from: zip/src/pages/TemplatePage.tsx
      to: docs/block-registry/registry.machine.json
      relationship: imports block definitions whose keys are tracked in the readiness manifest
    - from: docs/block-registry/registry.machine.json
      to: astro-site/src/lib/astroRegistry.ts
      relationship: astroRegistry reads and enforces readiness parity
    - from: astro-site/src/lib/astroRegistry.ts
      to: astro-site/src/components/PageBuilderSection.astro
      relationship: provides resolved Astro renderer descriptors
    - from: astro-site/src/components/PageBuilderSection.astro
      to: astro-site/src/components/MenuCategorySection.astro
      relationship: composes
    - from: astro-site/src/components/PageBuilderSection.astro
      to: astro-site/src/components/UniversalHeaderBlock2Section.astro
      relationship: composes

