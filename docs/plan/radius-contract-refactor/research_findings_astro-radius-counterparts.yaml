plan_id: radius-contract-refactor
objective: Find Astro counterparts for the React blocks used on /template that still need central radius alignment, and record whether Astro-side radius handling is hardcoded or semantic.
focus_area: astro-radius-counterparts
created_at: 2026-04-22
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - /template mounts Feature18 via universal_multilink_block, Project5c via universal_header_block_1, OccasionalMenuPdfDownloadSection via block_download, MenuTwoColumnsWithWithHeadingWithImgFullwidthParalaxSection via menu_two_columns_with_with_heading_with_img_fullwidth_paralax, and Project10 via universal_header_block_2; Feature20 is only mounted on /template2.
  - Exact Astro-ready counterparts exist only for universal_header_block_2 and for the separate menu-category-photo-parallax-full-width block that the parallax menu block is explicitly derived from; universal_multilink_block, universal_header_block_1, and block_download have no Astro renderer registered.
  - The exact Astro counterpart UniversalHeaderBlock2Section.astro still hardcodes border-radius: 4px for both the CTA and hero image frame.
  - The nearest Astro menu analogue MenuCategorySection.astro currently has no local or shared radius declarations for its menu-section surface, so it is not yet using a central semantic radius token either.
  - React source blocks in scope still use hardcoded rounded-* utilities such as rounded-[4px], rounded-[8px], rounded-[24px], rounded-t-[4px], and rounded-b-[4px].

research_metadata:
  methodology: Hybrid retrieval using grep_search, file_search, semantic_search, and targeted read_file inspection of TemplatePage wiring, shared registry readiness, Astro projection files, Astro CSS, and the suspected React source components.
  scope: Focused on zip/src/pages/TemplatePage.tsx, zip/src/pages/TemplatePage2.tsx, the five suspected React files, astro-site/src/components, astro-site/src/lib/astroRegistry.ts, astro-site/src/styles/global.css, and shared registry/docs mappings.
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 0

