turnaround_hypotheses:
  - hypothesis: Small frontend changes often inherit a full release-style deploy loop instead of staying in a purely local edit-refresh cycle.
    evidence:
      - .github/copilot-instructions.md:34 makes SCP deployment plus post-deploy chmod a required step.
      - deploy-react.sh:7-15 backs up the current react directory, unzips a prepared archive, and recursively repairs permissions.
      - memories/session/copilot-private-session-memory.md:80-83 logs the actual 2026-03-26 flow as build, package, upload, deploy, chmod repair, and live verification.
    impact: Even a wording or spacing tweak can expand into build, packaging, remote deployment, and production verification work.

  - hypothesis: The project’s explicit verification rules make tiny changes slower because they discourage trusting a quick local fix.
    evidence:
      - .github/copilot-instructions.md:29 says to never assume and always verify the current state.
      - .github/copilot-instructions.md:33 and :50-53 require strict adherence to the existing design library and cross-checking against TemplatePage.
      - Current terminal context shows live SSH inspection of the deployed bundle content rather than stopping at a local code change.
    impact: Copy or layout tweaks require extra comparison and verification passes before they are considered safe.

  - hypothesis: Small layout changes in the product row are cumbersome because ProductItemAlt duplicates important UI in separate responsive branches.
    evidence:
      - ProductItemAlt.tsx:105-137 implements one mobile quantity/add-to-cart block.
      - ProductItemAlt.tsx:139-165 implements a second desktop quantity/add-to-cart block with the same behavior.
      - ProductItemAlt.tsx:49-53 also switches layout based on structured vs combined product content.
    impact: A tiny button, spacing, or alignment tweak can require synchronized edits across multiple branches and breakpoint checks.

  - hypothesis: Copy changes are slower because the Easter menu content model is mixed, not uniform.
    evidence:
      - cateringWielkanocny.json:3-16 uses nazwa_produktu plus opis_produktu HTML for the first product.
      - cateringWielkanocny.json:25-40 uses zespolona_nazwa_z_opisem for later products.
      - cateringWielkanocny.ts:128-180 converts these into different render contracts and throws if split-mode fields are incomplete.
      - ProductItemAlt.tsx:67-70 renders split-mode descriptions via dangerouslySetInnerHTML.
    impact: A “small text edit” is not always a single field update; the editor must first identify which content mode that product uses and how it will render.

  - hypothesis: The seasonal menu file has enough breadth and special-case behavior that localizing one tiny content change still requires careful navigation and regression awareness.
    evidence:
      - Terminal measurement of zip/src/data/cateringWielkanocny.json found 9 categories and 42 products.
      - CateringWielkanocnyPage.test.tsx:32-45 pins the first category as a split-mode breakfast entry.
      - CateringWielkanocnyPage.test.tsx:47-63 pins category ordering relative to the standalone menu block and Pieczywo.
    impact: Tiny edits still happen inside a non-trivial dataset with contract-like ordering and shape assumptions.

  - hypothesis: The repo lacks one integrated command for tiny-change verification and release, so operators have to stitch the loop together manually.
    evidence:
      - zip/package.json:6-11 only defines dev, build, preview, clean, and tsc.
      - deploy-react.sh exists outside zip and expects a prebuilt react-deploy.zip rather than building it itself.
      - zip/README.md is generic AI Studio boilerplate and does not document the real BULWAR deploy flow.
    impact: The lack of a single test/build/deploy command increases command-switching and procedural overhead for otherwise small edits.

  - hypothesis: Repository clutter likely slows navigation and search enough that even finding the right source file can feel heavier than it should.
    evidence:
      - The zip folder currently contains node_modules, dist, 10 deploy-* directories, and 7 react-deploy*.zip archives.
      - Terminal measurement found 21,697 files under zip/node_modules and 48 top-level items in zip.
      - Multiple historical deploy snapshots sit beside active source, increasing source-vs-artifact noise during exploration.
    impact: Code search, indexing, and human orientation are noisier, which lengthens the time to make and confidently verify tiny changes.

open_questions:
  - question: How often are tiny copy or spacing changes accepted after local preview only versus requiring full live verification?
    context: The documented and logged process clearly supports live verification, but the threshold for when that heavier loop is mandatory is not codified in the inspected files.
  - question: Are old deploy-* directories and release archives intentionally retained for rollback, or are they just accumulated working artifacts?
    context: Their presence clearly adds workspace noise, but the inspected evidence does not say whether that tradeoff is deliberate.

gaps:
  - area: Measured timings
    description: No stopwatch-style duration metrics for build, upload, deploy, or verification steps were captured during this research.
    impact: Findings explain likely causes of slowness with strong structural evidence, but they do not quantify minutes per step.
  - area: Team policy threshold for live deploys
    description: The files show the process and constraints, but not a formal rule describing when a local-only check is acceptable for tiny UI changes.
    impact: This limits precision about whether the heavy deploy loop is universal or just common in practice.
