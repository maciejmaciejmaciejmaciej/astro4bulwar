        location: deploy-react.sh:7-15
        snippet: Existing /react is backed up, a ZIP is unzipped, and permissions are recursively repaired.
      - file: memories/session/copilot-private-session-memory.md
        location: memories/session/copilot-private-session-memory.md:80-83
        snippet: Deployment log records build, package, upload, deploy, chmod repair, and live verification.
