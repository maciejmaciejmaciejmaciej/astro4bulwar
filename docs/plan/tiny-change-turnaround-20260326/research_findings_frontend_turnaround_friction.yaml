  error_handling_in_domain: Invalid data is rejected early by normalization with thrown errors for empty strings, wrong types, broken image paths, and incomplete split-mode products.
  testing_in_domain: Current tests cover page chrome, the first category split-mode contract, and category ordering rather than only broad snapshot output.
  documentation_in_domain: The deploy and design workflow is documented more strongly in instructions and plan artifacts than in the frontend README.

