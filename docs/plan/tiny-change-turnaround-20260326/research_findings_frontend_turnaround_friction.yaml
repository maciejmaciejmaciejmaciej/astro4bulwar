plan_id: tiny-change-turnaround-20260326
objective: Identify evidence-based hypotheses for why tiny BULWAR APP changes can feel slow or cumbersome.
focus_area: frontend_turnaround_friction
created_at: 2026-03-26T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
  - Tiny frontend changes are coupled to a live-like deployment loop: build, package, SCP upload, remote unzip, permission repair, and post-deploy verification.
  - The active catering UI and data path have multiple branching structures: ProductItemAlt renders separate mobile and desktop action blocks, and the Easter menu data supports both combined-text and split HTML modes.
  - Repository clutter is measurable in the frontend workspace: zip currently contains node_modules, dist, 10 deploy-* directories, 7 react-deploy*.zip archives, and 21,697 files under node_modules.
  - Current scripts cover local dev, build, preview, and type-check, but not the actual release workflow; that workflow is documented separately and executed manually.
  - The Easter dataset is not a trivial flat copy file: it currently contains 9 categories and 42 products, and tests assert special ordering and content-shape behavior for the first category.

research_metadata:
  methodology: Hybrid retrieval using read_file, grep_search, list_dir, and terminal measurements; relationship discovery between the Easter JSON source, its normalization layer, ProductItemAlt rendering, tests, and the documented deploy flow.
  scope: Focused on .github/copilot-instructions.md, deploy-react.sh, zip/package.json, zip/src/components/sections/ProductItemAlt.tsx, zip/src/data/cateringWielkanocny.json, the directly connected normalization/tests, and the current documented deploy workflow.
  confidence: high
  coverage: 90

