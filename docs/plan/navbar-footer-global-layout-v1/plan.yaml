plan_id: navbar-footer-global-layout-v1
objective: |
  Implement the approved global navbar/footer architecture in BULWAR APP so the navbar is stored as a global WordPress settings object, the footer is stored in a shared page-builder page referenced internally by footerPageId, and the bridge exposes one normalized global layout payload consumed by both React and Astro without redesigning the current chrome.
created_at: 2026-04-18T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 11
  risk_score: medium

tldr: |
  Add a dedicated bridge global-layout payload because the plugin currently exposes only page-level page-builder responses in wordpress-plugin/bulwar-bridge/src/Http/Routes.php while React and Astro still hardcode or duplicate navbar/footer chrome in zip/src/App.tsx, zip/src/layouts/RootLayout.tsx, zip/src/pages/HomePage.tsx, zip/src/pages/TemplatePage.tsx, zip/src/pages/TestowaBlueprintPage.tsx, and astro-site/src/layouts/BaseLayout.astro. Keep footer storage inside a shared footer page, but make v1 authoring a dedicated footer block inside that page's sections and resolve that block server-side into normalized footer data so neither client receives raw footer page-builder sections or footerPageId. Then migrate the React shell in duplicate-safe phases: parameterize presenters, move HomePage into RootLayout with one cart/drawer owner, clean TemplatePage and TestowaBlueprintPage before expanding them under RootLayout, wire Astro BaseLayout to the same payload, and finish with endpoint smoke checks plus npm run lint and npm run build in zip and npm run build in astro-site.
open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The shared footer page is referenced correctly by footerPageId, but its stored page_builder_schema does not contain the dedicated footer block expected by the bridge resolver, causing empty or malformed footer data at runtime.
      likelihood: medium
      impact: high
      mitigation: Lock a narrow footer block authoring contract in T1, validate it in the bridge resolver in T2, and keep stable fallback semantics so React and Astro do not lose chrome if optional fields are missing.
    - scenario: TemplatePage or TestowaBlueprintPage are mounted under RootLayout before their local Navbar/Footer usage is removed, producing duplicate navbar, footer, cart controls, or checkout drawer state during the rollout.
      likelihood: medium
      impact: critical
      mitigation: Move only HomePage under RootLayout first, then remove local chrome from TemplatePage and TestowaBlueprintPage before expanding the shared route group in the same task.
    - scenario: RootLayout becomes the active shell for all routes and unintentionally wraps catering pages that currently own page-specific chrome and cart behavior in zip/src/pages/CateringWielkanocnyPage.tsx and zip/src/pages/CateringWielkanocnyThankYouPage.tsx.
      likelihood: medium
      impact: high
      mitigation: Group only the standard shared-chrome routes under RootLayout in App.tsx and leave catering routes mounted directly unless explicitly migrated later.
    - scenario: React and Astro drift into slightly different interpretations of the new payload, so one runtime accepts data that the other rejects or ignores.
      likelihood: medium
      impact: high
      mitigation: Create mirrored typed contract/parsing modules in T1, use the bridge payload from T2 as the only runtime source, and validate both builds plus route smoke checks in T8.
  assumptions:
    - This scope introduces a read-focused bridge contract and does not require building a WordPress admin UI for editing navbar settings; the bridge may read a single option directly with get_option as long as the option name and payload shape are documented.
    - The footer remains stored in a shared page-builder page, but the bridge resolves one dedicated footer block from that page's sections into normalized footer content instead of asking React or Astro to render raw footer page-builder sections.
    - footerPageId remains an internal bridge storage detail for the shared footer page reference and is not part of the public React or Astro runtime contract.
    - Existing catering-specific routes keep their page-scoped chrome outside this refactor because current route composition already treats them separately in zip/src/App.tsx.

implementation_specification:
  code_structure: |
    Introduce one canonical global-layout contract in repo code, then make the bridge the sole resolver for runtime layout data. The bridge should expose a dedicated GET endpoint returning public navbar data and resolved footer content, while keeping footerPageId internal to bridge storage and admin/debug workflows. React should fetch that payload once in RootLayout and pass it into presentational Navbar/Footer components while keeping StickyCartControls and CheckoutDrawer ownership in RootLayout. Astro should fetch the same payload during page build/render and pass it into BaseLayout while preserving the current page-builder fetch path for page sections. To keep changes minimal, footer authoring should live in one dedicated footer block inside the shared footer page sections, and the bridge should resolve that block server-side into normalized footer data instead of adding a generic footer page-builder renderer in the clients.
  affected_areas:
    - wordpress-plugin/bulwar-bridge/src/Http/Routes.php
    - wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
    - wordpress-plugin/bulwar-bridge/src/Config/Constants.php
    - zip/src/blocks/registry/pageBuilderSchema.ts
    - zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx
    - zip/src/components/sections/Footer.tsx
    - zip/src/App.tsx
    - zip/src/layouts/RootLayout.tsx
    - zip/src/pages/HomePage.tsx
    - zip/src/pages/TemplatePage.tsx
    - zip/src/pages/TestowaBlueprintPage.tsx
    - astro-site/src/lib/types.ts
    - astro-site/src/lib/wordpress.ts
    - astro-site/src/components/Navbar.astro
    - astro-site/src/components/Footer.astro
    - astro-site/src/layouts/BaseLayout.astro
    - "astro-site/src/pages/[slug].astro"
    - docs/plan/navbar-footer-global-layout-v1/
  component_details:
    - component: GlobalLayoutContract
      responsibility: Define the normalized public payload shape shared by the bridge, React, and Astro, including strict field names for navbar settings and resolved footer content but excluding internal storage identifiers.
      interfaces:
        - GlobalLayoutData.navbar.brand
        - GlobalLayoutData.navbar.primaryItems[] with optional children[]
        - GlobalLayoutData.navbar.companyLinks[]
        - GlobalLayoutData.navbar.legalLinks[]
        - GlobalLayoutData.footer with brand, address, contact, hours, socialLinks, legalLinks, and copyright
    - component: SharedFooterBlockAuthoringContract
      responsibility: Define the dedicated footer block stored inside the shared footer page_builder_schema.sections array so the bridge can resolve footer content server-side without exposing raw page-builder sections to clients.
      interfaces:
        - SharedFooterSectionData.brand
        - SharedFooterSectionData.address
        - SharedFooterSectionData.contact
        - SharedFooterSectionData.hours
        - SharedFooterSectionData.socialLinks[]
        - SharedFooterSectionData.legalLinks[]
        - SharedFooterSectionData.copyright
    - component: BridgeGlobalLayoutResolver
      responsibility: Read the global navbar settings option, resolve footerPageId internally, load the referenced page_builder_schema, locate and validate the dedicated footer block, and expose a public GET endpoint without altering the existing page-builder page route behavior.
      interfaces:
        - GET /wp-json/bulwar/v1/layout/global
        - WordPress option payload for navbar settings and internal footerPageId
        - page_builder_schema.sections[] dedicated footer block on the shared footer page
    - component: ReactGlobalLayoutShell
      responsibility: Activate RootLayout as the standard shared chrome owner, fetch the bridge payload once, and pass normalized data into the existing Navbar/Footer presenters while preserving current cart drawer ownership and route behavior without duplicate intermediate shell states.
      interfaces:
        - fetchWordPressGlobalLayout()
        - RootLayout layout state and loading/fallback policy
        - App.tsx nested route group for shared-chrome pages
    - component: AstroGlobalLayoutShell
      responsibility: Fetch the same bridge payload for Astro pages, pass it into BaseLayout, and keep the existing page-builder section rendering pipeline unchanged beyond the added global-layout fetch.
      interfaces:
        - fetchWordPressGlobalLayout()
        - BaseLayout globalLayout prop
        - "[slug].astro page-build orchestration"
  dependencies:
    - component: GlobalLayoutContract
      relationship: Supplies the canonical field names and nullability rules consumed by the bridge resolver and both frontends.
    - component: BridgeGlobalLayoutResolver
      relationship: Must exist before RootLayout and BaseLayout can consume live shared layout data.
    - component: ReactGlobalLayoutShell
      relationship: Depends on the bridge payload and the data-driven React presenters.
    - component: AstroGlobalLayoutShell
      relationship: Depends on the bridge payload and the data-driven Astro presenters.
  integration_points:
    - wordpress-plugin/bulwar-bridge/src/Http/Routes.php existing REST registration pattern
    - wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php page-builder normalization conventions
    - zip/src/App.tsx current direct route composition
    - zip/src/layouts/RootLayout.tsx current inactive shared shell
    - zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx current React navbar DOM and class structure
    - zip/src/components/sections/Footer.tsx current React footer DOM and class structure
    - astro-site/src/layouts/BaseLayout.astro current Astro shell
    - astro-site/src/components/Navbar.astro current Astro navbar DOM and class structure
    - astro-site/src/components/Footer.astro current Astro footer DOM and class structure
    - astro-site/src/lib/wordpress.ts current WordPress fetch helper pattern

