plan_id: refactor-app-tsx
objective: Extract all sections from zip/src/App.tsx into individual components inside zip/src/components/sections/ and refactor App.tsx to import them, grouping by waves of 4-5 components to avoid merge conflicts.
created_at: '2026-03-22T00:00:00Z'
created_by: gem-planner
status: approved
research_confidence: high

tldr: |
  - App.tsx is currently a monolithic file containing ~20 inline sections and subcomponents.
  - The plan is to extract these sections into separate files in `zip/src/components/sections/`.
  - The extraction is divided into waves, 4-5 components each, to prevent massive merge conflicts.
  - Finally, App.tsx will be refactored to import and use the new components instead of inline code.

open_questions:
  - Should we keep the duplicated 'Wielkanoc w Bulwarze Section (Copied)' or use the same component twice? (Plan assumes using the same component twice).
  - Are there any shared local states in App.tsx that need to be passed down as props to these sections?

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Extracted components depend on local state in App.tsx that isn't passed down.
      likelihood: medium
      impact: high
      mitigation: Implementers must carefully check for missing variables/props when extracting each section.
    - scenario: Merge conflicts if multiple implementers touch App.tsx simultaneously.
      likelihood: high
      impact: medium
      mitigation: The execution is strictly sequenced by waves. App.tsx is only modified marginally in the early waves or fully in the final wave.
  assumptions:
    - zip/src/components/sections/ directory can be created.
    - Tailwind classes and UI components from zip/src/components/ui will resolve correctly from the new file locations.

implementation_specification:
  code_structure: Each section becomes a self-contained exported React component in `zip/src/components/sections/`.
  affected_areas:
    - zip/src/App.tsx
    - zip/src/components/sections/*
  component_details:
    - component: ProductItem
      responsibility: Display product
    - component: Sub-sections
      responsibility: Modularized UI parts like Navbar, Hero, Menu, Footer
  dependencies:
    - component: zip/src/App.tsx
      relationship: Composes all the subcomponents.
  integration_points:
    - App.tsx will be the main integration point importing everything.

