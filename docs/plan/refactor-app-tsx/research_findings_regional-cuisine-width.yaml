patterns_found:
  - category: architecture
    pattern: Content-only pagebuilder registration
    description: The pagebuilder layer wires content props into renderer components and does not participate in image geometry decisions.
    examples:
      - file: zip/src/blocks/regional_cuisine/schema.ts
        location: zip/src/blocks/regional_cuisine/schema.ts:87-103
        snippet: >-
          renderSection maps data into the RegionalCuisine props without any sizing logic.
      - file: astro-site/src/components/PageBuilderSection.astro
        location: astro-site/src/components/PageBuilderSection.astro:322-329
        snippet: >-
          The regional_cuisine branch forwards titleLines, description, actions, and image into RegionalCuisineSection.
    prevalence: common

  - category: responsive-layout
    pattern: Fixed desktop image geometry with breakpoint switch at tablet width
    description: Both React and Astro change from mobile inline image to an absolute right-side image at 768px and assign it the same fixed width and negative right offset.
    examples:
      - file: zip/src/components/sections/RegionalCuisine.tsx
        location: zip/src/components/sections/RegionalCuisine.tsx:32
        snippet: >-
          className="absolute top-1/2 right-[-150px] hidden h-[1080px] w-[863px] -translate-y-1/2 md:block ..."
      - file: astro-site/src/components/RegionalCuisineSection.astro
        location: astro-site/src/components/RegionalCuisineSection.astro:167-173
        snippet: >-
          right: -150px; width: 863px; height: 1080px; inside @media (min-width: 768px)
    prevalence: specific

  - category: layout-risk
    pattern: Viewport-relative overflow driven by fixed width plus negative offset
    description: On narrow non-phone viewports, a fixed 863px width can exceed half of the viewport before any container-based centering or clipping reduces it, and the negative right offset does not compensate enough on small tablets.
    examples:
      - file: zip/src/components/sections/RegionalCuisine.tsx
        location: zip/src/components/sections/RegionalCuisine.tsx:30-40
        snippet: >-
          The image frame is absolutely positioned against the theme-section-wrapper and sits above the grid content.
      - file: astro-site/src/components/RegionalCuisineSection.astro
        location: astro-site/src/components/RegionalCuisineSection.astro:167-177
        snippet: >-
          The Astro desktop frame reproduces the same fixed-size geometry in CSS.
    prevalence: specific

