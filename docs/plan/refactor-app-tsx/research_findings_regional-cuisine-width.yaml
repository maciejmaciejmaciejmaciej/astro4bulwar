plan_id: refactor-app-tsx
objective: Inspect the Regional Cuisine block across React, pagebuilder, and Astro and identify the smallest change needed to keep the right-side image from exceeding half of the viewport width on non-phone screens.
focus_area: regional-cuisine-width
created_at: 2026-04-25
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - The pagebuilder path does not size the image; it only routes Regional Cuisine content into the React and Astro section renderers.
  - The direct overflow control in React is the desktop image wrapper in zip/src/components/sections/RegionalCuisine.tsx at line 32, which uses a fixed width of 863px and a negative right offset of -150px from the md breakpoint upward.
  - The Astro implementation reproduces the same behavior in astro-site/src/components/RegionalCuisineSection.astro at lines 167-173 with width: 863px and right: -150px inside the min-width: 768px media query.
  - A small-tablet overflow is locally explained by the combination of the early desktop breakpoint and the fixed 863px width; on a 768px-wide viewport the image can cover nearly the full viewport instead of staying within 50vw.
  - The smallest safe enforcement change is to keep the existing 863px desktop target and add a non-phone max-width cap of 50vw on the desktop image frame in both renderers.

