    Route constants live in a tiny lib module, persistence helpers use explicit read/write/load/clear names,
    and thank-you page state is expressed as snapshotResult with a ready/missing/stale tri-state.
  structure_of_domain: >-
    Source-of-truth persistence logic is isolated in src/lib, route constants in a dedicated helper,
    route declaration in App.tsx, and the UI shell for the thank-you page follows the existing catering page composition.
  error_handling_in_domain: >-
    Missing, invalid, and stale snapshot states are normalized into a controlled read result and mapped to explicit fallback copy.
  testing_in_domain: >-
    Focused node:test coverage exists for snapshot lifecycle helpers and thank-you page rendering against a memory-backed localStorage stub.
  documentation_in_domain: >-
    docs/plan/thank-you-url-20260326/plan.yaml defines the intended architecture, including snapshot persistence,
    route behavior, and the expectation that the thank-you route depends on persisted client state.

