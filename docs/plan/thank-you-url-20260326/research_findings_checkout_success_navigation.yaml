patterns_found:
  - category: architecture
    pattern: localStorage-backed thank-you hydration
    description: >-
      The thank-you page does not fetch order confirmation from the backend or route params; it depends solely on a persisted localStorage snapshot.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:644
        snippet: const nextSnapshot = writeCheckoutSuccessSnapshot(window.localStorage, nextSnapshotBase);
      - file: zip/src/pages/CateringWielkanocnyThankYouPage.tsx
        location: zip/src/pages/CateringWielkanocnyThankYouPage.tsx:59
        snippet: return readCheckoutSuccessSnapshot(window.localStorage);
    prevalence: common

  - category: structure
    pattern: route constant reused between writer and reader sides
    description: >-
      The thank-you route constant is centralized and used consistently by routing and navigation code.
    examples:
      - file: zip/src/lib/cateringThankYou.ts
        location: zip/src/lib/cateringThankYou.ts:2
        snippet: export const CATERING_WIELKANOCNY_THANK_YOU_PATH = "/catering-wielkanocny/dziekujemy";
      - file: zip/src/App.tsx
        location: zip/src/App.tsx:12
        snippet: <Route path={CATERING_WIELKANOCNY_THANK_YOU_PATH} element={<CateringWielkanocnyThankYouPage />} />
    prevalence: common

  - category: error_handling
    pattern: controlled fallback on missing or stale persisted data
    description: >-
      Missing or expired persisted data is treated as a first-class state and produces intentional fallback UI instead of a broken route.
    examples:
      - file: zip/src/lib/checkoutSuccessSnapshot.ts
        location: zip/src/lib/checkoutSuccessSnapshot.ts:224
        snippet: return { status: "missing", snapshot: null, shouldClear: false };
      - file: zip/src/pages/CateringWielkanocnyThankYouPage.tsx
        location: zip/src/pages/CateringWielkanocnyThankYouPage.tsx:43
        snippet: return status === "stale" ? "To podsumowanie wygasło" : "Brak aktywnego podsumowania zamówienia";
    prevalence: common

  - category: architecture
    pattern: dormant in-drawer success renderer remains after route-based flow
    description: >-
      The component still contains an in-drawer confirmation branch, but the active success sequence closes the drawer and navigates immediately, making route-based confirmation the intended flow.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:646
        snippet: setSuccessSnapshot(nextSnapshot); onClearCart?.(); onClose(); navigate(CATERING_WIELKANOCNY_THANK_YOU_PATH);
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:688
        snippet: {successSnapshot ? ( <CheckoutSuccessConfirmation snapshot={successSnapshot} /> ) : (
    prevalence: occasional

