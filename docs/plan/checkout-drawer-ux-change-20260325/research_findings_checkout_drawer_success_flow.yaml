related_conventions:
	naming_patterns_in_domain: Human-facing section labels use uppercase, spaced Polish titles. State and handlers follow camelCase names such as quoteData, selectedSlot, handleClearCart, and isFulfillmentComplete.
	structure_of_domain: The drawer uses a two-column layout with summary on the left and multi-step form on the right. Form choices are implemented as bordered cards, and actions use the shared Button component with rounded-[4px].
	error_handling_in_domain: Field errors render inline in red text below controls. Submit/async request failures are stored in local string state and rendered near the relevant section or submit button.
	testing_in_domain: No checkout-drawer-specific test file was found in the reviewed area. Cart derivation helpers are covered in zip/src/lib/cateringCart.test.ts.
	documentation_in_domain: The bridge order response contract is documented in wordpress-plugin/bulwar-bridge/docs/contracts.md, while the frontend drawer behavior is only documented by source.

