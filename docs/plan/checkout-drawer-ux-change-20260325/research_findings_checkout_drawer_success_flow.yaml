patterns_found:
	- category: structure
		pattern: Section-gated checkout form
		description: The drawer divides checkout into personal data, payment, fulfillment, and submit sections. Later sections are visually and interactively gated with opacity and pointer-events-none until earlier sections are complete.
		examples:
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:650
				snippet: "Box 2 and Box 3 wrap classes with !isPersonalDataComplete / !isPaymentComplete to lock later steps."
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:840
				snippet: "The submit section applies opacity-50 pointer-events-none until all three completion booleans are truthy."
		prevalence: common

	- category: error_handling
		pattern: Mixed schema validation plus imperative submit guards
		description: Zod handles field-level validation, while onSubmit adds request-precondition guards for cart presence, currently supported payment type, slot selection, and required delivery quote state.
		examples:
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:15
				snippet: "checkoutSchema.superRefine adds custom issues for missing date, time slot, and delivery address."
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:487
				snippet: "onSubmit sets submitError for empty cart, unsupported payment, missing slot, and missing delivery quote."
		prevalence: common

	- category: architecture
		pattern: Local-state checkout success handling
		description: The success path does not create a dedicated success state. It uses the immediate bridge response for a browser alert and then exits the drawer flow by clearing cart state and closing the drawer.
		examples:
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:548
				snippet: "alert(`Zamówienie zapisane. Numer: ${payload.data.order_number}`); onClearCart?.(); onClose();"
		prevalence: occasional

	- category: naming
		pattern: Presentational radio-card controls instead of native-looking inputs
		description: Selectable options are rendered as label-wrapped bordered cards with sr-only radios and custom filled-circle indicators. This is the only established selectable-control pattern found in the checkout UI.
		examples:
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:715
				snippet: "Payment method uses label + sr-only radio + custom w-5 h-5 rounded-full indicator."
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:747
				snippet: "Fulfillment type uses the same card pattern and classes."
		prevalence: common

	- category: structure
		pattern: No existing checkbox implementation in the zip frontend
		description: The reviewed frontend contains Button and marquee UI primitives, but no checkbox component file and no checkbox usage were found during targeted searches of zip source files.
		examples:
			- file: zip/components/ui/button.tsx
				location: zip/components/ui/button.tsx:1
				snippet: "The ui folder currently exposes button.tsx and marquee.tsx only."
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:717
				snippet: "Checkout uses sr-only radio inputs, not checkboxes, for its selectable controls."
		prevalence: rare

