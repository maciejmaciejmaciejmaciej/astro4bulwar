plan_id: checkout-drawer-ux-change-20260325
objective: Research the current checkout drawer implementation for an urgent UX change around order submission success.
focus_area: checkout_drawer_success_flow
created_at: 2026-03-25T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
	- The checkout submit CTA in the drawer is currently labeled "Kontynuuj zamówienie" and switches to "Zapisuję zamówienie..." while the order request is in flight.
	- Submission is gated by zod validation, derived section-completion booleans, and runtime checks for non-empty cart, manual cash payment, selected slot, and a delivery quote for delivery orders.
	- There is no existing checkbox component or checkbox usage in the zip frontend; the nearest reusable interaction pattern is the card-style sr-only radio control already used for payment, fulfillment type, date, and time slot.
	- Successful order creation currently triggers a browser alert, then clears the cart and closes the drawer immediately, so no inline success state exists today.
	- All data required for an inline success summary already exists locally in CheckoutDrawer state/props or in the bridge response: cart items, subtotal, computed delivery fee, payment method, fulfillment type, selected slot, delivery address, and response totals/order number.

research_metadata:
	methodology: Hybrid retrieval using semantic_search plus grep_search, followed by targeted read_file examination of the checkout drawer, its page-level state source, cart serialization helpers, shared button component, and bridge order contract documentation.
	scope: Focused review of the checkout drawer success path, surrounding cart state plumbing, reusable form-control patterns, and the bridge response surface relevant to an inline success summary.
	confidence: high
	coverage: 92

