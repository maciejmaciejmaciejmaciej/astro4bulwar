domain_security_considerations:
	sensitive_areas:
		- area: customer PII capture
			location: zip/components/CheckoutDrawer.tsx:663
			concern: Full name, phone, email, and delivery address are collected locally and posted to the bridge order endpoint.
		- area: bridge order submission
			location: zip/components/CheckoutDrawer.tsx:511
			concern: The client sends idempotency_key, customer fields, fulfillment tokens, and cart lines directly to the bridge endpoint.
	authentication_patterns_in_domain: No authenticated frontend session pattern is present in this drawer flow; the bridge endpoints are treated as public checkout endpoints.
	authorization_patterns_in_domain: The drawer relies on bridge-issued opaque quote_token and slot_token values rather than client-authenticated authorization state.
	data_validation_in_domain: Zod validates required fields client-side, and the bridge contract documents server-side validation/error envelopes for payment, quote, slot, and product constraints.

