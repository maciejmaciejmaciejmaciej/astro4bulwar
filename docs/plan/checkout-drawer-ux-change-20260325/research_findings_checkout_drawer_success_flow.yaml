open_questions:
	- question: Should the post-success drawer remain open as a confirmation state, or should it still close after the user acknowledges the inline summary?
		context: The current implementation closes immediately, so the desired lifecycle of the new inline success state affects whether onClose moves to a later user action.
	- question: If the urgent UX change includes a consent checkbox, what exact copy and required/optional behavior should that control have?
		context: No existing checkbox pattern was found, so the semantics of the new control are not derivable from current code.

