plan_id: "client-bootstrap-2026-04-22"
objective: >
  Make this repo fast and safe to reuse for a new client by replacing scattered
  client-specific literals with one local source of truth plus automation,
  while preserving the current WordPress + React + Astro + bridge topology.
created_at: "2026-04-22T00:00:00Z"
created_by: "gem-planner"
status: "pending"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 12
  risk_score: "medium"

tldr: |
  The smallest proper long-term solution is to standardize on one repo-root,
  gitignored client env file and one bootstrap CLI that validates it and emits
  the runtime/deploy artifacts each surface already wants: repo-root
  .env.page-builder.local, astro-site/.env.local, zip/.env.local, and one
  sourceable local deploy/bridge env fragment. This matches the repo's existing
  env-first runtime patterns in .env.example, zip/.env.example, and
  SCRIPTS/page-builder-runtime/cli.ts, while removing hardcoded current-client
  values from astro-site/astro.config.mjs, astro-site/src/lib/config.ts,
  zip/components/CheckoutDrawer.tsx, deploy-react.sh,
  SCRIPTS/deploy-astro-static.ps1, .github/workflows/deploy-astro-dhosting.yml,
  and set-bridge-config.sh.

  Phase 1 should fully convert the high-leverage surfaces that block safe reuse:
  Astro runtime URL config, React runtime URL config, page-builder runtime env,
  local deploy scripts, GitHub Actions deploy paths, and bridge secret/path
  injection. It should not try to fully normalize every legacy one-off ops
  script in the same pass. Files such as get_db.js, import.php, verify-*.sh,
  wpcli-create-test-order.php, SCRIPTS/run_upload.js,
  SCRIPTS/upload_products.js, and SCRIPTS/sync_catering_category.js should only
  be converted where a shared WP_ROOT or WORDPRESS_BASE_URL helper is cheap; a
  full rewrite of all of them would widen scope disproportionately because they
  mix deployment paths, WordPress bootstrapping, and client content/migration
  logic. Sources: /memories/repo/deployment-setup-audit.md,
  docs/setup/repo-do-klonowania-plan-parametryzacji.md,
  docs/setup/template-manifest-nowej-instancji.md,
  .env.example, zip/.env.example, SCRIPTS/page-builder-runtime/cli.ts,
  astro-site/astro.config.mjs, astro-site/src/lib/config.ts,
  zip/components/CheckoutDrawer.tsx, deploy-react.sh,
  SCRIPTS/deploy-astro-static.ps1, SCRIPTS/rollback-astro-static.ps1,
  .github/workflows/deploy-astro-dhosting.yml, set-bridge-config.sh.

open_questions:
  - >
    Should the first pass also push non-secret values into GitHub repository
    variables automatically, or only align the workflow to consume
    vars/secrets with a generated copy-ready mapping? Minimal safe scope is to
    align the workflow contract now and keep GitHub-side sync as a documented
    operator step, because no existing GitHub automation helper is present in
    this repo. Source: .github/workflows/deploy-astro-dhosting.yml.
  - >
    Which legacy ops scripts must be converted in the first pass beyond the
    setup-critical path? Minimal safe scope is to convert only the scripts used
    repeatedly during bootstrap/deploy and document the remainder as an
    explicit manual boundary until a second pass. Sources:
    docs/setup/template-manifest-nowej-instancji.md,
    docs/setup/repo-do-klonowania-plan-parametryzacji.md,
    /memories/repo/deployment-setup-audit.md.

pre_mortem:
  overall_risk_level: "medium"
  critical_failure_modes:
    - scenario: >
        The repo gains a new root config file, but Astro/React/deploy scripts
        still keep silent Bulwar fallbacks, so operators believe bootstrap is
        authoritative while the old domain can still leak into runtime or
        deploy behavior.
      likelihood: "medium"
      impact: "critical"
      mitigation: >
        Every converted consumer must fail closed on missing required values and
        remove the hardcoded client.example fallback entirely. Verify
        this with targeted build/tests and focused grep checks. Sources:
        astro-site/astro.config.mjs, astro-site/src/lib/config.ts,
        zip/components/CheckoutDrawer.tsx,
        zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts,
        zip/src/blocks/registry/wordpressApi.ts,
        zip/src/blocks/registry/wooStoreApi.ts,
        zip/src/lib/fetchWordPressGlobalLayout.ts.
    - scenario: >
        The bootstrap CLI writes generated files, but operators edit those
        generated files manually later, causing drift between the intended local
        source of truth and what builds/deploys actually consume.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        Emit generated files with clear do-not-edit headers, keep generation
        idempotent, and document the root client env as the only editable input.
        Add a --check mode so drift is detectable before build/deploy. Sources:
        SCRIPTS/page-builder-runtime/cli.ts, .env.example,
        docs/setup/klonowanie-astro-wordpress-woocommerce.md.
    - scenario: >
        Secret hygiene work on set-bridge-config.sh becomes a half-migration:
        client secrets leave the tracked script, but the local secret/loading
        boundary is unclear, or wp-config write behavior regresses.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        Keep set-bridge-config.sh focused on backup + inject, but make it read
        all values from a generated local env fragment and preserve explicit
        backup-before-write semantics. Do not broaden it into a general remote
        provisioner in this pass. Sources: set-bridge-config.sh,
        /memories/repo/deployment-setup-audit.md.
  assumptions:
    - >
      The architecture remains unchanged: WordPress backend/API on the client
      domain, React frontend in zip/, Astro frontend in astro-site/, and the WP
      bridge/page-builder runtime preserved as-is. Source:
      c:/Users/macie/Documents/BULWAR APP - kopia/.github/copilot-instructions.md.
    - >
      A repo-root env contract is the least invasive shared source of truth,
      because the repo already uses env examples and the page-builder runtime
      already auto-loads repo-root .env.page-builder.local. Sources:
      .env.example, zip/.env.example,
      SCRIPTS/page-builder-runtime/cli.ts,
      /memories/repo/deployment-setup-audit.md.
    - >
      Secrets must stay out of tracked files; tracked examples and gitignored
      local files are acceptable, and CI can use GitHub vars/secrets for the
      same contract. Sources: .gitignore,
      /memories/repo/deployment-setup-audit.md,
      .github/workflows/deploy-astro-dhosting.yml.

implementation_specification:
  code_structure: |
    Use four layers. Layer 1 is one repo-root local client env contract, for
    example .env.client.local as the only editable source of truth, with a
    tracked example file that documents required keys for WordPress, React,
    Astro, deploy, CI, and bridge injection. Layer 2 is a small Node/TypeScript
    bootstrap CLI under SCRIPTS/ that validates the root env, fails fast on
    missing values, and emits generated artifacts for each consumer surface.
    Layer 3 is consumer wiring: Astro, React, and local deploy scripts stop
    using hardcoded literals and instead read generated env/config artifacts.
    Layer 4 is operations: the GitHub workflow consumes repo/environment
    vars/secrets with the same names, setup docs point operators to bootstrap
    instead of manual find-and-replace, and legacy one-off scripts are called
    out as partially converted or deferred rather than silently left ambiguous.
  affected_areas:
    - ".gitignore"
    - ".env.example"
    - ".env.page-builder.local.example"
    - "SCRIPTS/**"
    - "astro-site/astro.config.mjs"
    - "astro-site/src/lib/config.ts"
    - "zip/src/**"
    - "deploy-react.sh"
    - ".github/workflows/deploy-astro-dhosting.yml"
    - "set-bridge-config.sh"
    - "docs/setup/**"
  component_details:
    - component: "Repo-root client env contract"
      responsibility: >
        Define all required client-specific values once, including WordPress
        base URL, Astro site/base path, React bridge/WordPress origins, SSH and
        remote deploy paths, and local-only bridge secret inputs.
      interfaces:
        - "Tracked example file for the root client contract."
        - "Clear required vs optional key list with fail-fast semantics."
        - "Gitignore rules that keep local variants untracked while keeping examples tracked."
    - component: "Client bootstrap CLI"
      responsibility: >
        Parse the root client env, validate it, emit generated runtime/deploy
        files, and support a check-only mode for CI/operator preflight.
      interfaces:
        - "bootstrapClientConfig({ inputPath, mode: 'write' | 'check' })"
        - "writeGeneratedEnvArtifacts()"
        - "printCiVariableMapping()"
    - component: "Astro runtime adapter"
      responsibility: >
        Read required env values for Astro site and WordPress base URL, so Astro
        build and runtime never silently target the previous client.
      interfaces:
        - "Required env read in astro.config.mjs for site/base values."
        - "Required env read in astro-site/src/lib/config.ts for WordPress base URL."
    - component: "React runtime adapter"
      responsibility: >
        Centralize Vite env reads for WordPress/bridge origins and remove all
        current-client fallback literals from page-builder/global-layout/
        checkout paths.
      interfaces:
        - "Shared getRequiredClientRuntimeConfig() helper or equivalent."
        - "Consumers throw or fail clearly when expected Vite env is missing."
    - component: "Deploy and bridge adapter"
      responsibility: >
        Make local deploy scripts, the GitHub workflow, and set-bridge-config.sh
        consume the same contract instead of embedding remote paths, users, and
        live secrets in tracked files.
      interfaces:
        - "Generated local deploy env fragment for bash/PowerShell consumers."
        - "GitHub workflow vars/secrets names aligned with the bootstrap contract."
        - "Local bridge injection script reads all values from env."
    - component: "Bootstrap operator docs"
      responsibility: >
        Replace manual parameterization steps with a short bootstrap-first flow
        and explicitly document the scripts that remain partially converted.
      interfaces:
        - "Bootstrap usage guide."
        - "Updated new-client manifest/checklist language."
        - "Deferred legacy-script boundary and rationale."
  dependencies:
    - component: "Client bootstrap CLI"
      relationship: >
        Depends on the repo-root client env contract to know canonical key names,
        tracked example paths, and which artifacts to generate.
    - component: "Astro runtime adapter"
      relationship: >
        Depends on the bootstrap CLI output contract for astro-site/.env.local
        or equivalent generated env values.
    - component: "React runtime adapter"
      relationship: >
        Depends on the bootstrap CLI output contract for zip/.env.local and the
        canonical runtime key names.
    - component: "Deploy and bridge adapter"
      relationship: >
        Depends on the bootstrap CLI output contract for local deploy fragments
        and on the same canonical names being mirrored into GitHub vars/secrets.
    - component: "Bootstrap operator docs"
      relationship: >
        Depend on the final artifact names and command shape produced by the
        contract, bootstrap, and consumer-wiring tasks.
  integration_points:
    - "repo-root client env file and tracked example"
    - "repo-root .env.page-builder.local"
    - "astro-site/.env.local"
    - "zip/.env.local"
    - "deploy-react.sh"
    - "SCRIPTS/deploy-astro-static.ps1"
    - "SCRIPTS/rollback-astro-static.ps1"
    - ".github/workflows/deploy-astro-dhosting.yml"
    - "set-bridge-config.sh"
    - "docs/setup/**"

