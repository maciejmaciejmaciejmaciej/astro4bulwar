plan_id: none
objective: Identify the component(s) used on route/page /catering-wielkanocny, specifically the old component containing a table, and identify the reference catering sales component with images whose desktop width should be matched.
focus_area: zip/src route and section components for catering-wielkanocny
created_at: 2026-03-24
created_by: GitHub Copilot
status: completed

tldr: |
  - Route /catering-wielkanocny is mapped directly in App.tsx to CateringWielkanocnyPage.
  - The active page renders CateringWielkanocnyHero, Hero24, and CateringProductListAlt; the product list is table-like but not a literal HTML table.
  - The clearest older predecessor is SalatkiNaWynosSection from TemplatePage/App.backup, which renders ProductItem rows in a 3-column grid and uses max-w-4xl.
  - The image-based reference sales block is HomePage's CateringSection, which uses page-margin plus an inner max-w-7xl grid and padded rounded container.
  - Width is primarily controlled by the shared page-margin utility in index.css plus per-section inner max width classes like max-w-4xl or max-w-7xl.

research_metadata:
  methodology: Hybrid retrieval using grep_search and file_search for route/component discovery, then read_file for targeted inspection of active and legacy section components and shared CSS utilities.
  scope: Medium-depth review of route mapping, page composition, current and legacy catering-related sections, and shared width utilities.
  confidence: high
  coverage: 88

