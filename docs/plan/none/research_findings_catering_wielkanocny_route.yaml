patterns_found:
  - category: structure
    pattern: Route component imports a page which composes section components directly.
    description: Active routing is simple and page files explicitly list their section blocks in render order.
    examples:
      - file: zip/src/App.tsx
        location: zip/src/App.tsx:11
        snippet: <Route path="/catering-wielkanocny" element={<CateringWielkanocnyPage />} />
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:81
        snippet: <CateringWielkanocnyHero />
    prevalence: common
  - category: architecture
    pattern: Section width is controlled by page-margin plus an inner max-width wrapper.
    description: Most sections use page-margin for viewport padding and max-w-* with mx-auto for actual content width.
    examples:
      - file: zip/src/components/sections/CateringSection.tsx
        location: zip/src/components/sections/CateringSection.tsx:41
        snippet: <section className={cn("page-margin", className)}>
      - file: zip/src/components/sections/CateringSection.tsx
        location: zip/src/components/sections/CateringSection.tsx:43
        snippet: <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
      - file: zip/src/components/sections/CateringProductListAlt.tsx
        location: zip/src/components/sections/CateringProductListAlt.tsx:47
        snippet: <div className="max-w-4xl mx-auto space-y-8 md:space-y-10">
    prevalence: common
  - category: structure
    pattern: Product list rows imitate a table using CSS grid rather than HTML table elements.
    description: Rows are split into content, dotted leader, and price/actions columns, producing a menu-table look.
    examples:
