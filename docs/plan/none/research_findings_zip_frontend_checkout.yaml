patterns_found:
  - category: architecture
    pattern: Page-owned cart state with presentational checkout drawer
    description: >-
      The active catering page owns cart state and persistence, while the drawer
      consumes derived display props and does not own the cart domain model.
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:88
        snippet: const [cartState, setCartState] = useState(() => loadCateringCartState(...))
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:205
        snippet: cartItems, itemCount, subtotal, onSetCartLineQuantity, onClearCart arrive via props
    prevalence: common

  - category: state
    pattern: Browser-only cart persistence in localStorage
    description: >-
      Cart state is loaded from and saved back to localStorage, with no server
      synchronization or session token in the current implementation.
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:93
        snippet: window.localStorage.getItem(CATERING_CART_STORAGE_KEY)
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:104
        snippet: window.localStorage.setItem(CATERING_CART_STORAGE_KEY, serializeCateringCartState(cartState))
    prevalence: common

  - category: structure
    pattern: Product identity is preserved as numeric base product IDs
    description: >-
      Both simple products and the special two-person set carry backend-relevant
      numeric product IDs through the cart domain model.
    examples:
      - file: zip/src/lib/cateringCart.ts
        location: zip/src/lib/cateringCart.ts:200
        snippet: baseProductId: product.id
      - file: zip/src/data/cateringSpecialMenuFor2.ts
        location: zip/src/data/cateringSpecialMenuFor2.ts:83
        snippet: baseProductId: 53
    prevalence: common

  - category: validation
    pattern: Drawer form validation is local and schema-driven
    description: >-
      The checkout drawer uses react-hook-form plus Zod and conditional
      validation for delivery details, but validation stops at the client.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:15
        snippet: const checkoutSchema = z.object({ ... }).superRefine(...)
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:231
        snippet: const form = useForm<CheckoutFormValues>({ resolver: zodResolver(checkoutSchema) })
    prevalence: common

  - category: pricing
    pattern: Delivery pricing is currently UI-derived and static
    description: >-
      The displayed delivery fee is computed directly in the drawer from the
      selected delivery method, independent of address, distance, or backend
      response.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:369
        snippet: values.deliveryMethod === "delivery" ? formatCurrency(15) : formatCurrency(0)
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:372
        snippet: totalPrice + (values.deliveryMethod === "delivery" ? 15 : 0)
    prevalence: common

  - category: structure
    pattern: Availability options are hard-coded arrays
    description: >-
      Delivery dates and time windows are embedded directly in the drawer file
      rather than fetched from an external service or configuration.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:69
        snippet: const AVAILABLE_DATES = [ ... ]
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:75
        snippet: const TIME_SLOTS = [ ... ]
    prevalence: common

  - category: architecture
    pattern: Submit flow is a placeholder terminal action
    description: >-
      The checkout submit handler has validated form data available but does not
      yet construct or send an order payload to a backend.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:281
        snippet: console.log("Order submitted:", data)
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:283
        snippet: alert("Zamówienie złożone pomyślnie!")
    prevalence: common

