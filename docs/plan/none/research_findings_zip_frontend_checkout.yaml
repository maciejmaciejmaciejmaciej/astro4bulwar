plan_id: none
objective: >-
  Research BULWAR APP frontend checkout architecture in zip/. Focus on current
  cart/checkout flow, any existing delivery cost logic, payment flow, and where
  a backend bridge would connect. Identify relevant files, current state
  handling, and likely integration points for address autocomplete/delivery cost
  calculation, slot availability fetch, and checkout submit.
focus_area: zip_frontend_checkout
created_at: 2026-03-24
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - The only implemented cart and checkout flow is on the Easter catering route; the rest of the site can open the drawer UI but does not supply cart state.
  - Cart state is fully client-side in localStorage, with normalized product IDs preserved in cart lines and transformed into drawer display items just before rendering.
  - Delivery pricing in the drawer is currently a fixed UI-only surcharge of 15 zł, while page copy separately advertises a different business rule of 9 zł/km plus 10 zł start fee and free delivery above 800 zł.
  - Payment flow is form-only: the UI captures cash vs online, but submit currently just logs data, shows an alert, and closes the drawer with no API call.
  - The main backend bridge seams are the delivery address field and totals block in the drawer, the static date/time arrays in the drawer, and the drawer submit handler that already receives validated checkout form data.

research_metadata:
  methodology: >-
    Hybrid retrieval using semantic_search plus grep_search across zip/src and
    zip/components, followed by targeted read_file inspection of router,
    page-level state, cart domain logic, checkout UI, catalog data contracts,
    and existing tests. Relationship discovery was done by tracing imports from
    the catering page into cart utilities, product list components, and drawer
    props.
  scope: >-
    Focused on the active frontend cart and checkout domain in zip/, including
    router entry points, page state ownership, cart persistence, catalog/product
    identity, checkout form behavior, and tested cart logic. Broader marketing
    pages and unrelated experimental files were excluded except where they mount
    the same drawer UI.
  confidence: high
  coverage: 90

