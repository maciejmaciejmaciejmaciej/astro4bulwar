related_conventions:
  naming_patterns_in_domain: >-
    Domain utilities use explicit nouns such as cartState, baseProductId,
    buildCheckoutDrawerItems, getCateringCartSubtotal, and handleAddToCart.
    Simple lines use deterministic IDs prefixed with simple:, while special-menu
    lines use unique generated IDs.
  structure_of_domain: >-
    The flow is split into route/page ownership, pure cart utilities in src/lib,
    normalized product data in src/data, section components for catalog entry,
    and a shared checkout drawer stored outside src in zip/components.
  error_handling_in_domain: >-
    Frontend validation is defensive but local: catalog normalization throws on
    malformed data, cart loading falls back to an empty cart on parse/migration
    failure, and add-to-cart handlers return early for invalid inputs. No remote
    request or response error handling exists in the active checkout path.
  testing_in_domain: >-
    Tests cover cart migration/aggregation logic and one special-menu rendering
    case. There are no tests for drawer submission, pricing, delivery
    availability, or any backend integration because none is implemented.
  documentation_in_domain: >-
    Business rules such as delivery pricing and payment availability currently
    appear as static marketing copy in the catering feature grid rather than as
    executable checkout configuration.

