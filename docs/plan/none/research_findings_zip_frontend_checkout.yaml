open_questions:
  - question: What exact bridge contract should represent special-menu selections when submitting the order?
    context: >-
      The frontend preserves baseProductId plus structured special-menu config,
      but there is no existing payload schema showing how that config maps to
      WooCommerce line-item metadata.
  - question: Should delivery pricing follow the drawer's fixed 15 zł logic or the feature-grid business copy of 9 zł/km plus 10 zł start fee and free delivery above 800 zł?
    context: >-
      Two different delivery-pricing models are present in the frontend at the
      same time, and only one can drive the bridge integration.
  - question: Are pickup orders supposed to use slot availability too, or only delivery orders?
    context: >-
      The current form requires date and slot only when delivery is selected,
      but the catering copy also references pickup windows that may need
      structured availability.
  - question: Should the checkout drawer be globally functional on non-catering pages or remain inert there?
    context: >-
      HomePage mounts the same drawer without supplying cart data, which affects
      whether the bridge integration belongs in a shared provider or remains
      route-specific.

gaps:
  - area: Backend bridge implementation
    description: No bridge client, endpoint definitions, or order-submit transport exists in zip/.
    impact: Prevents verification of request/response shapes for autocomplete, delivery pricing, availability, and final checkout submit.
  - area: Availability source of truth
    description: Delivery dates and time slots are hard-coded in the drawer.
    impact: The current frontend cannot show how remote availability would be normalized, cached, or invalidated.
  - area: Payment integration
    description: Payment method selection exists only as a form enum with no downstream behavior.
    impact: The current flow does not reveal whether online payments should create a payment intent, redirect URL, or WooCommerce checkout session.
  - area: Address intelligence
