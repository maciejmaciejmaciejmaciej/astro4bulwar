plan_id: none
objective: Investigate the current mobile regression in the BULWAR APP catering product list layout and identify why product items render as two columns on mobile instead of a full-width text block with price, grammage, and actions below.
focus_area: mobile_product_list_layout
created_at: 2026-03-25T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
  - The active catering page is CateringWielkanocnyPage and it renders each category through CateringProductListAlt, which in turn renders ProductItemAlt for every product.
  - The two-column mobile layout is produced inside ProductItemAlt by a mobile flex row that places the text block and the mobile-only price/weight block side by side.
  - The action row already sits below that row, so the current mobile structure is explicitly text-left plus price-right on one line, then controls underneath.
  - The same mobile pattern also exists in the legacy ProductItem component, so the issue can recur anywhere that component is still used.
  - No responsive tests currently cover ProductItemAlt or ProductItem mobile stacking behavior.

research_metadata:
  methodology: Hybrid retrieval with semantic_search and grep_search to find the active catering/mobile listing path, targeted read_file inspection for the active page, list, item, data contract, and stylesheet files, plus git history inspection for ProductItemAlt to confirm where the mobile layout structure originated.
  scope: Focused on the active catering/mobile product listing flow under zip/src, plus the legacy shared product item component reused elsewhere.
  confidence: high
  coverage: 92

