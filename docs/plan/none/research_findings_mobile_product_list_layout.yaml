related_conventions:
  naming_patterns_in_domain: Alt-suffixed list and item components are used for the Easter catering flow, while unsuffixed ProductItem remains the legacy shared row component.
  structure_of_domain: Active catering rendering is page -> category list wrapper -> item row, with normalized product contracts deciding whether content is rendered as combined text or split name plus HTML description.
  error_handling_in_domain: Data validation is performed during normalization in cateringWielkanocny.ts, where incomplete split products throw before rendering.
  testing_in_domain: Tests exist around broader catering flows, but not around responsive rendering of ProductItemAlt or ProductItem.
  documentation_in_domain: No in-repo documentation was found for intended mobile stacking behavior of product rows.

