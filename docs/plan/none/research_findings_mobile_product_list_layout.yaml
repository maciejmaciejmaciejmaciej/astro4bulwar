open_questions:
  - question: Should the same mobile stacking correction be applied to the legacy ProductItem component as well as ProductItemAlt?
    context: ProductItem repeats the same mobile side-by-side text and price pattern and is still used by TemplatePage, SalatkiNaWynosSection, and the legacy CateringProductList.
  - question: Is there a canonical pre-regression mobile reference beyond the verbal requirement?
    context: The current repository contains the two-column mobile pattern in both ProductItemAlt and ProductItem, while the active working tree only shows recent content changes rather than a committed layout fix.

gaps:
  - area: visual baseline
    description: No screenshot, visual test, or documented acceptance criteria was present to compare the current mobile rendering with the previous full-width stacked behavior.
    impact: The exact intended spacing for the restored mobile stack must be inferred from the requirement and existing class system.
  - area: automated coverage
    description: No responsive tests were found for ProductItemAlt or ProductItem.
    impact: The regression can reappear without being caught by the current test suite.
