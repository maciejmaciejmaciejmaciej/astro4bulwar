patterns_found:
  - category: structure
    pattern: Mobile item body is built as a nested row inside a one-column outer grid.
    description: The outer item container is grid-cols-1 on mobile, but the inner left column explicitly uses a horizontal flex row for text and mobile price/weight.
    examples:
      - file: zip/src/components/sections/ProductItemAlt.tsx
        location: zip/src/components/sections/ProductItemAlt.tsx:53
        snippet: <div className="py-8 border-b border-zinc-200 last:border-0 grid grid-cols-1 md:grid-cols-3 items-center gap-4 md:gap-8">
      - file: zip/src/components/sections/ProductItemAlt.tsx
        location: zip/src/components/sections/ProductItemAlt.tsx:56
        snippet: <div className="flex justify-between items-start md:block">
    prevalence: common

  - category: architecture
    pattern: Mobile price/weight is duplicated by breakpoint rather than shared in one location.
    description: ProductItemAlt renders one price/weight block for mobile inside the left content row and a separate desktop block in the right column, which creates divergent layouts across breakpoints.
    examples:
      - file: zip/src/components/sections/ProductItemAlt.tsx
        location: zip/src/components/sections/ProductItemAlt.tsx:81
        snippet: <div className="flex flex-col items-end shrink-0 md:hidden ml-4">
      - file: zip/src/components/sections/ProductItemAlt.tsx
        location: zip/src/components/sections/ProductItemAlt.tsx:102
        snippet: <div className="hidden md:flex flex-row items-center w-full mb-4">
    prevalence: common

  - category: naming
    pattern: Active catering list components use Alt suffixes to distinguish the newer Easter flow from the legacy shared list components.
    description: CateringWielkanocnyPage uses CateringProductListAlt and ProductItemAlt, while legacy sections still use ProductItem and CateringProductList.
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:5
        snippet: import { CateringProductListAlt } from "../components/sections/CateringProductListAlt";
      - file: zip/src/components/sections/CateringProductListAlt.tsx
        location: zip/src/components/sections/CateringProductListAlt.tsx:3
        snippet: import { ProductItemAlt } from "./ProductItemAlt";
    prevalence: occasional

  - category: testing
    pattern: Responsive behavior is not covered by component tests.
    description: Existing tests in the catering area cover page/header/footer/cart flows, but no tests target ProductItemAlt or ProductItem mobile stacking behavior.
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:1
        snippet: import { useEffect, useState } from "react";
      - file: zip/src/components/sections/ProductItemAlt.tsx
        location: zip/src/components/sections/ProductItemAlt.tsx:1
        snippet: import { useState } from "react";
    prevalence: occasional

