patterns_found:
  - category: architecture
    pattern: Vite SPA bootstrap through a single HTML entry and a single React mount file
    description: Global third-party scripts belong either in index.html or in a module imported from src/main.tsx, not in Next.js layout or CRA-specific files
    examples:
      - file: zip/index.html
        location: zip/index.html:1
        snippet: <!doctype html>
      - file: zip/src/main.tsx
        location: zip/src/main.tsx:1
        snippet: import {StrictMode} from 'react';
    prevalence: common
  - category: architecture
    pattern: Client-side routing under /react basename
    description: Route changes happen inside React Router and need explicit SPA pageview handling if GTM or GA4 is used
    examples:
      - file: zip/src/main.tsx
        location: zip/src/main.tsx:9
        snippet: <BrowserRouter basename="/react">
      - file: zip/src/App.tsx
        location: zip/src/App.tsx:11
        snippet: <Routes>
    prevalence: common
  - category: structure
    pattern: Manual document head mutation inside route components
    description: The app does not use react-helmet or a framework metadata API; page metadata is updated via useEffect
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:117
        snippet: document.title = cateringPageTitle;
    prevalence: occasional
  - category: dependency
    pattern: No existing analytics or consent implementation in active src
    description: GTM and Consent Mode would be a new integration surface in the active app
    examples:
      - file: zip/package.json
        location: zip/package.json:1
        snippet: "dependencies": {
    prevalence: common

