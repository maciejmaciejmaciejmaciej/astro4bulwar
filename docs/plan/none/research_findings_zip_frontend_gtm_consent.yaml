plan_id: none
objective: Quick compatibility review of a proposed Google Consent Mode v2 + GTM integration for the active BULWAR APP frontend in zip/
focus_area: zip frontend GTM and consent bootstrap
created_at: 2026-03-27
created_by: GitHub Copilot
status: completed

tldr: |
  - The active frontend is a Vite SPA in zip/, not Next.js or Create React App.
  - The correct global bootstrap points are zip/index.html and zip/src/main.tsx; the active router is mounted with basename /react.
  - A GTM + Consent Mode v2 approach is technically compatible, but SPA route tracking, consent-default timing, and Vite-specific env/file conventions must be handled repo-specifically.
  - No existing GTM, analytics, or consent-management layer was found in the active zip/src app.
  - The obvious product/legal gap is the lack of a consent UI or CMP to issue consent updates after the default denied state.

research_metadata:
  methodology: hybrid retrieval using read_file, grep_search, semantic_search, file_search, and directory inspection; focused only on active frontend entry points, routing, and existing consent or analytics signals
  scope: active frontend under zip/ with emphasis on bootstrap files, router model, and page-level metadata handling
  confidence: high
  coverage: 85

