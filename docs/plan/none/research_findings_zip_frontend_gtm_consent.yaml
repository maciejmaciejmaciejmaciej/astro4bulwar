domain_security_considerations:
  sensitive_areas:
    - area: consent-default timing
      location: zip/index.html or zip/src/main.tsx
      concern: Consent defaults must execute before GTM or Google tags initialize, otherwise data may be collected before consent state is applied
    - area: checkout and cart behavior
      location: zip/src/pages/CateringWielkanocnyPage.tsx
      concern: Ecommerce events would touch shopping and transaction flows and must avoid duplicate firing in SPA or StrictMode scenarios
  authentication_patterns_in_domain: none observed in the active frontend bootstrap files reviewed
  authorization_patterns_in_domain: none observed in the active frontend bootstrap files reviewed
  data_validation_in_domain: no consent-state or analytics payload validation layer exists yet in the active app

