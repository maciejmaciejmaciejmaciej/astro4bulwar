open_questions:
  - question: Has the jump or white flash been reproduced specifically on iOS Safari, Android Chrome, or both?
    context: The root cause is strongly consistent with mobile focus and scroll behavior, but browser-specific reproduction would determine how much the transform plus overflow combination contributes.
  - question: Are the radio controls inside the same drawer showing similar scroll movement when tapped?
    context: The same label plus sr-only pattern is reused elsewhere; if only the consent checkbox fails, its location near the bottom of the nested scroll region is likely the differentiator.

gaps:
  - area: Runtime reproduction
    description: The analysis is static and does not include live browser reproduction on physical mobile browsers.
    impact: Confidence is high on the likely cause, but exact browser rendering symptoms remain inferred from the implementation pattern.
  - area: Tailwind sr-only compiled CSS
    description: The project-level generated CSS for sr-only was not inspected directly, though Tailwind's standard behavior is assumed.
    impact: Low impact because the standard sr-only pattern is already sufficient to explain the focus target issue.
