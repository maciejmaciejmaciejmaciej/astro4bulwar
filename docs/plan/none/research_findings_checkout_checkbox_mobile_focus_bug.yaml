        snippet: '<input type="checkbox" {...form.register("salesRegulationsAccepted")} className="sr-only" />'
    prevalence: common
  - category: architecture
    pattern: Fixed animated drawer with nested scroll container and body scroll lock
    description: The checkout surface is rendered as a fixed bottom drawer animated via transform while page scrolling is disabled and drawer content scrolls internally.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:557
        snippet: 'document.body.style.overflow = "hidden";'
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:776
        snippet: 'initial={{ y: "100%" }} animate={{ y: 0 }} exit={{ y: "100%" }}'
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:792
        snippet: '<div className="flex-1 overflow-y-auto p-6">'
    prevalence: common
  - category: error_handling
    pattern: Submission readiness is derived from watched form state and Zod validation
    description: Consent is not separately controlled; it is part of the watched RHF state and directly gates submit availability.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:459
        snippet: 'const canSubmit = isCheckoutReady && values.salesRegulationsAccepted && cartLinesPayload.length > 0 && !isSubmittingOrder;'
      - file: zip/components/CheckoutDrawer.tsx
