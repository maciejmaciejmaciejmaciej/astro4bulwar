plan_id: none
objective: Reassess the checkout checkbox bug in BULWAR APP with emphasis on whether the current label plus sr-only checkbox inside the mobile drawer can trigger a jump or blank-white drawer effect via mobile focus and scroll behavior.
focus_area: checkout_checkbox_mobile_focus_bug
created_at: 2026-03-25T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
  - The submit consent control in the checkout drawer is implemented as a label-wrapped custom UI that delegates activation to a focusable native checkbox hidden with sr-only.
  - The checkbox sits inside a fixed, animated drawer with an internal overflow-y scroll container while body scrolling is disabled, which is a high-risk combination for mobile browser focus-to-reveal scroll glitches and white repaint flashes.
  - The highest-probability trigger is the native label click focusing the hidden checkbox at the bottom of the scrollable drawer, not react-hook-form itself.
  - The smallest safe fix is to stop using the hidden input as the tap target for this consent control and toggle the field explicitly with form.setValue from a button or div with checkbox semantics, while keeping react-hook-form state and validation.
  - The same hidden-input pattern is also used for radio-style selectors in the drawer, but the reported bug is most plausibly tied to the consent checkbox because it lives in the final submit section inside the mobile scroll region.

research_metadata:
  methodology: Hybrid retrieval using targeted grep_search for checkbox, drawer, focus, and scroll markers, semantic_search for surrounding implementation context, read_file for exact code inspection, and metadata collection via terminal line count.
  scope: Focused inspection of the current checkout drawer implementation in the frontend checkout UI, limited to the consent checkbox, drawer container, and nearby form wiring.
  confidence: high
  coverage: 90

