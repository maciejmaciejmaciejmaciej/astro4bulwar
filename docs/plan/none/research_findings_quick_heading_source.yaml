tldr: |
  - The active route /catering-wielkanocny renders CateringWielkanocnyPage.
  - The visible heading text 'SAŁATKI NA WYNOS' is passed as the title prop in CateringWielkanocnyPage, then rendered by CateringProductListAlt.
