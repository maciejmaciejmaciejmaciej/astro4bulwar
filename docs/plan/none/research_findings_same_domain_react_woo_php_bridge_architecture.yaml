plan_id: none
objective: Research a pragmatic architecture for hosting a React app and WooCommerce on the same domain and using a PHP bridge on the same hosting. Focus on same-domain deployment patterns, secure storage of API keys in PHP/WordPress, Google Maps distance/cost calculation through backend, WooCommerce order creation with order item meta for special products, and slot availability driven by CPT or JSON config.
focus_area: same_domain_react_woo_php_bridge_architecture
created_at: 2026-03-24
created_by: GitHub Copilot
status: completed

tldr: |
  - The current workspace already matches a pragmatic same-domain pattern where WordPress/WooCommerce stays on the main domain and the React SPA is deployed under /react/ with rewrite fallback to /react/index.html.
  - The repo and official docs both point toward a server-authoritative PHP bridge: React gathers cart and checkout intent, but PHP/WordPress owns secrets, validates fulfillment rules, calculates delivery cost, and writes the final Woo order.
  - For custom special products, direct Woo REST order creation is the simplest same-hosting path when line item meta must be written predictably; Store API remains viable but requires extra cart and checkout hooks to propagate custom line data.
  - Google Maps distance or route cost should be computed only on the backend with a server-side key and then translated into a Woo shipping fee or order meta; the frontend should receive only the calculated result and any user-display explanation.
  - Slot availability is not implemented yet in code: the current drawer hardcodes dates, slots, and a flat delivery fee, while project instructions say delivery day/time validation should come from Custom Post Types. A JSON fallback is operationally simpler but less editor-friendly than CPT-backed schedules.

research_metadata:
  methodology: Hybrid retrieval using semantic_search and grep_search across the BULWAR APP workspace, targeted read_file inspection of deployment, checkout, cart, and prior research files, terminal decoding of the UTF-16 htaccess template, and external documentation review via fetch_webpage plus WooCommerce source inspection via github_repo.
  scope: Focused analysis of same-domain hosting shape, WordPress/PHP secret boundaries, Google Maps backend usage, Woo order and line-item metadata persistence, and delivery-slot source-of-truth options as they relate to the current repository.
  confidence: high
  coverage: 91

