domain_security_considerations:
  sensitive_areas:
    - area: WooCommerce credentials and privileged order creation
      location: PHP bridge and WordPress runtime
      concern: These credentials must never be exposed to React or stored in browser-visible assets.
    - area: Google Maps web service key
      location: backend configuration and server-side HTTP client
      concern: Maps web service keys are intended to remain server-side secrets and should be API-restricted and IP-restricted when possible.
    - area: wp-config.php and environment-backed constants
      location: WordPress root configuration
      concern: This is the appropriate secret boundary, but it must not be committed or echoed into frontend bundles or debug output.
    - area: line item metadata payload
      location: bridge request handling and Woo order creation path
      concern: Human-readable meta and canonical JSON must be sanitized and size-bounded before persistence.
  authentication_patterns_in_domain: The browser should authenticate only to the same-domain bridge endpoint using ordinary same-site browser context. The bridge then authenticates to Woo using server-held credentials or in-process WordPress/Woo APIs. Google Maps server-side traffic should use a server-only key or OAuth where supported.
  authorization_patterns_in_domain: React is an untrusted client for pricing, slot validity, and special-product composition. Only the bridge or WordPress-side code should decide whether the order is allowed, what totals apply, and what metadata is persisted.
  data_validation_in_domain: Required server checks include canonical product existence, special option id validity, slot existence, slot capacity or blackout windows, minimum lead times, address normalization, delivery radius eligibility, Maps response sanity checks, free-delivery threshold logic, and final total recomputation independent of any client-submitted numbers.

testing_patterns:
  framework: mixed local TypeScript unit tests plus expected future PHP/WordPress integration testing
  coverage_areas:
    - line-based cart serialization and special-line uniqueness
    - bridge payload validation and rejection of tampered client prices
    - Maps-based delivery fee calculation and free-delivery threshold behavior
    - slot availability validation for CPT-backed and JSON-backed schedules
    - Woo order creation with line_items.meta_data and readable admin display
  test_organization: Frontend logic is currently unit-tested in colocated test files. The missing bridge layer would require separate PHP integration tests against WordPress/Woo runtime behavior.
  mock_patterns:
    - mock Google Maps route responses for deterministic fee calculations
    - fixture CPT or JSON availability data to verify slot acceptance and rejection
    - fixture Woo order creation requests to assert final line item meta keys and values

open_questions:
  - question: Should the production customer-facing entrypoint stay at /react/ permanently, or will React eventually replace the root home route while WordPress remains mounted only for wp-admin and API paths?
    context: The current repo is configured for subdirectory SPA hosting, but same-domain coexistence can also be implemented with React at root and WordPress in a subdirectory or headless-only mode.
  - question: Must online card payments run through Woo's cart-and-checkout flow, or is direct server-side order creation with manual or deferred payment sufficient for the first release?
    context: This determines whether the bridge should prefer direct REST/WC_Order creation or the more complex Store API draft-order path.
  - question: What is the exact fulfillment rule model for slots: simple open/closed windows, capacity-per-slot, blackout dates, per-zone schedules, or holiday overrides?
    context: The answer decides whether server-managed JSON is enough or whether CPT plus custom fields is the operationally better source of truth.
  - question: Does delivery pricing depend only on one computed route distance, or also on zone overrides, minimum order values, free-delivery promotions, or manual merchant exceptions?
    context: This affects whether Maps output is the final fee source or only one input into a business-rule engine.
  - question: How much of the special-product configuration must be visible in Woo admin, emails, exports, and downstream reporting?
    context: This drives whether a small set of human-readable line-item meta keys is sufficient or whether additional structured order meta should be stored.

gaps:
  - area: implemented bridge runtime
    description: No PHP bridge endpoint or WordPress plugin implementation exists in the workspace yet.
    impact: The final endpoint shape, authentication method, and exact order-writing API are still inferred from plans and current frontend contracts.
  - area: live payment gateway constraints
    description: The research did not inspect the active Woo payment plugins or their compatibility with Store API checkout versus direct order creation.
    impact: Gateway requirements may force a cart-first checkout flow even if direct order creation is cleaner for metadata.
  - area: live availability schema
    description: No actual CPT registration, meta schema, or server-side JSON availability file was present in the inspected workspace.
    impact: The slot-source recommendation can be pragmatic, but not tied to an existing model beyond the project instruction that CPTs are intended.
  - area: production rewrite topology outside /react
    description: The research confirmed the /react rewrite rules but did not inspect the full live Apache or LiteSpeed configuration for the main domain root.
    impact: Edge-case routing between WordPress pages, React routes, and any future bridge endpoints may still require host-specific verification.
