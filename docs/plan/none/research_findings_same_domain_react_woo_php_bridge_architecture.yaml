related_conventions:
  naming_patterns_in_domain: Frontend cart contracts use explicit names such as lineId, baseProductId, lineType, and summaryLines. Existing plan artifacts use bridge-ready wording and merchant-readable meta keys prefixed with bulwar_.
  structure_of_domain: Frontend application logic is in zip/src and zip/components, while WordPress and WooCommerce are external runtime dependencies on the same host. Research and planning documents in docs/plan already treat the bridge as a separate server-side boundary.
  error_handling_in_domain: Client input is validated with Zod, but authoritative errors belong on the bridge. The bridge should reject invalid slots, tampered prices, unknown option ids, out-of-range addresses, or stale fulfillment windows before any Woo order is created.
  testing_in_domain: The repo has unit tests around the cart helper and special-menu summary logic, but there are no bridge, Woo, or availability-integration tests yet.
  documentation_in_domain: Repo instructions explicitly require hidden Woo and Maps keys, CPT-based availability validation, and a secure bridge. Prior local research already documents Woo metadata behavior for special products.

