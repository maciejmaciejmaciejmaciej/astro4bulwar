patterns_found:
  - category: architecture
    pattern: Same-domain coexistence via WordPress at root and React under /react/
    description: The current repo is already configured for a subpath SPA so WooCommerce and WordPress can stay authoritative at the domain root while React handles a dedicated app experience below /react/.
    examples:
      - file: zip/vite.config.ts
        location: zip/vite.config.ts:7
        snippet: base: '/react/'
      - file: zip/temp_htaccess.txt
        location: zip/temp_htaccess.txt:3
        snippet: RewriteBase /react/
      - file: zip/temp_htaccess.txt
        location: zip/temp_htaccess.txt:7
        snippet: RewriteRule . /react/index.html [L]
    prevalence: common
  - category: architecture
    pattern: Frontend is a headless-style order composer and not the system of record
    description: The React app assembles cart lines and checkout input locally, but the repo intent and data model both assume a future server bridge will own validation and Woo writes.
    examples:
      - file: .github/copilot-instructions.md
        location: .github/copilot-instructions.md:7
        snippet: middleware bridge should receive orders from React and translate them to WooCommerce securely
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:307
        snippet: submit currently logs locally instead of creating an order
      - file: zip/src/lib/cateringCart.ts
        location: zip/src/lib/cateringCart.ts:29
        snippet: special lines already carry baseProductId plus config and summary metadata
    prevalence: common
  - category: security
    pattern: Sensitive credentials belong in PHP or environment-backed WordPress config, not in the browser bundle
    description: The workspace already has wp-config-driven PHP configuration, while Google Maps and Woo docs both require server-side protection for privileged web service credentials.
    examples:
      - file: temp_wp_config.php
        location: temp_wp_config.php:20
        snippet: WordPress bootstrap is configured through PHP constants before runtime
      - file: Google Maps security guidance
        location: security guidance:Protect web service API keys
        snippet: web service keys should remain a shared secret between developer servers and Google
      - file: WordPress wp-config.php docs
        location: wp-config.php:article summary
        snippet: wp-config.php is the root configuration file for WordPress
    prevalence: common
  - category: architecture
    pattern: Direct Woo REST order creation is the cleanest metadata path for custom configured products
    description: When the bridge must persist human-readable and machine-readable line item metadata, REST order creation is simpler than carrying custom state through Store API cart and checkout hooks.
    examples:
      - file: docs/plan/none/research_findings_woo_special_product_bridge.yaml
        location: docs/plan/none/research_findings_woo_special_product_bridge.yaml:12
        snippet: bridge-created orders are simpler and more predictable for custom metadata
      - file: WooCommerce REST orders controller
        location: class-wc-rest-orders-v2-controller.php:882
        snippet: maybe_set_item_meta_data writes line item meta_data from the payload
      - file: WooCommerce REST orders controller
        location: class-wc-rest-orders-v2-controller.php:1676
        snippet: line_items expose meta_data in schema
    prevalence: common
  - category: structure
    pattern: Fulfillment logic is currently hardcoded in React and should move behind a server-owned source of truth
    description: Dates, times, delivery fee, and operational copy are embedded in frontend files today, while repo instructions specify CPT-driven validation.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:64
        snippet: AVAILABLE_DATES is hardcoded in the drawer
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:70
        snippet: TIME_SLOTS is hardcoded in the drawer
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:369
        snippet: delivery total is a local flat fee
      - file: .github/copilot-instructions.md
        location: .github/copilot-instructions.md:10
        snippet: delivery day and time availability should be validated using Custom Post Types
    prevalence: common
  - category: architecture
    pattern: Google Maps web service usage should be proxied and reduced to business outputs
    description: The client should not call route-matrix or distance web services directly. The backend should construct requests, apply constraints, and return a narrowed result such as eligibility, distance_km, delivery_fee, and diagnostics.
    examples:
      - file: Google Maps security guidance
        location: security guidance:Secure client-side web service calls
        snippet: use a proxy server and do not let clients relay arbitrary API calls
      - file: Google Maps Routes docs
        location: Routes API:Get started
        snippet: Compute Routes and Compute Route Matrix provide the backend distance primitives
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: WordPress root site
      responsibility: Owns the main domain, authentication cookies, plugin runtime, and WooCommerce admin/store configuration.
      location: WordPress installation on same hosting
      relationship_to_domain: domain anchor
    - component: React SPA under /react/
      responsibility: Owns product browsing, configurator UX, local cart state, and checkout form UX.
      location: zip/dist deployed to /react/
      relationship_to_domain: frontend entrypoint for the app experience
    - component: PHP bridge endpoint or WordPress plugin route
      responsibility: Accepts checkout payloads from React, validates them, calculates totals, and writes into Woo.
      location: same hosting, preferably inside WordPress/plugin runtime or an adjacent PHP endpoint bootstrapping wp-load.php
      relationship_to_domain: server authority between React and WooCommerce
    - component: WooCommerce order writer
      responsibility: Creates final orders, fees, shipping lines, and line item metadata.
      location: WooCommerce REST API or WordPress-side WC_Order logic
      relationship_to_domain: persistence target for commerce records
    - component: Availability provider
      responsibility: Returns valid fulfillment dates, time slots, blackout rules, and lead times.
      location: WordPress CPT-backed data or versioned JSON config on the server
      relationship_to_domain: fulfillment rules source of truth
    - component: Maps service adapter
      responsibility: Resolves store-to-destination route distance or duration and converts that into delivery fee logic.
      location: backend PHP bridge using Google Maps web services
      relationship_to_domain: cost and eligibility calculator
  interfaces_used_by_domain:
    - interface: Bridge checkout payload
      location: React to PHP bridge
      usage_pattern: carries customer data, fulfillment choice, cart lines, base product ids, client line ids, and nested special configuration ids for server revalidation
    - interface: WooCommerce REST Orders API
      location: /wp-json/wc/v3/orders
      usage_pattern: direct server-side order creation with line_items and line_items.meta_data when custom configured products must be preserved verbatim
    - interface: WooCommerce Store API checkout
      location: /wp-json/wc/store/v1/checkout
      usage_pattern: optional cart-first flow for payment-gateway compatibility, but requires hook-based metadata propagation
    - interface: Google Maps Routes API
      location: server-side web service call
      usage_pattern: store origin plus destination address or place id returns route distance and duration for fee calculation
    - interface: Availability endpoint
      location: PHP bridge endpoint or WordPress REST endpoint
      usage_pattern: frontend requests current valid dates and slots before checkout submission and server rechecks again at order time
  data_flow_involving_domain: The browser loads the React SPA from /react/ on the same domain while WordPress and WooCommerce remain at the root. React assembles a typed cart and checkout payload containing customer fields, fulfillment intent, simple product ids, and special-product configuration ids. The PHP bridge receives that payload on the same host, looks up canonical product and availability data from WordPress or server-side JSON, optionally calls Google Maps Routes to compute delivery eligibility and cost from the Woo store address, recalculates authoritative totals, and then writes the order into WooCommerce. If the bridge uses direct Woo REST or WC_Order APIs, it writes human-readable and machine-readable line item meta immediately; if it uses Store API checkout instead, it must first attach custom cart item data and later copy that into line item meta through Woo hooks.
  key_relationships_to_domain:
    - from: React SPA /react/
      to: PHP bridge endpoint
      relationship: posts checkout intent
    - from: PHP bridge endpoint
      to: WordPress configuration
      relationship: reads secrets, environment constants, and merchant settings
    - from: PHP bridge endpoint
      to: availability provider
      relationship: validates requested date and slot
    - from: PHP bridge endpoint
      to: Google Maps Routes API
      relationship: requests route or matrix data for delivery pricing
    - from: PHP bridge endpoint
      to: WooCommerce order writer
      relationship: creates canonical order, fees, and metadata
    - from: WooCommerce order writer
      to: Woo admin, emails, exports, APIs
      relationship: exposes persisted order and line-item metadata downstream

