plan_id: none
objective: Research the current implementation of delivery and realization slot generation in the Bulwar App workspace, identify where available dates and time slots come from, what the current source of truth and data model are, and what would need to change so an operator can explicitly control selectable realization dates and time ranges. Focus on backend, bridge, and WordPress implementation first.
focus_area: delivery_realization_slots_backend
created_at: 2026-03-25
created_by: GitHub Copilot
status: completed

tldr: |
  - The active slot engine lives in the WordPress plugin wordpress-plugin/bulwar-bridge and is exposed by POST /wp-json/bulwar/v1/checkout/slots.
  - The current source of truth for selectable dates and time ranges is the server-owned JSON file wordpress-plugin/bulwar-bridge/config/slots.json, plus request-scoped window_start and days coming from the frontend.
  - Available dates are generated by iterating calendar dates in the requested window, resolving weekly day rules plus blackout and override rules, then generating interval-based slots from configured windows.
  - There is no current WordPress admin UI, settings screen, CPT, taxonomy, or options-based adapter for operators to edit dates or time ranges.
  - Occupancy from persisted WooCommerce orders is not wired into availability generation yet; remaining capacity is config-driven unless a custom resolver is injected.

research_metadata:
  methodology: Hybrid retrieval using semantic_search and grep_search to locate slot-related code, then targeted read_file passes over the bridge controller, slot availability service, JSON schedule config, order service, tests, route registration, constants, and the frontend caller that shapes the request window.
  scope: Backend-first review of the bridge plugin and only the minimal frontend caller needed to confirm how the backend request window is determined.
  confidence: high
  coverage: 90

