patterns_found:
  - category: architecture
    pattern: Server-owned slot generation behind a public REST endpoint
    description: The client does not hardcode selectable slot payloads anymore; it asks the bridge for available_dates and slots.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:26
        snippet: register_rest_route('bulwar/v1', '/checkout/slots', ...)
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php:84
        snippet: new AvailabilityService(dirname(__DIR__, 3) . '/config/slots.json', Constants::all())
    prevalence: common
  - category: structure
    pattern: Weekly base schedule plus date-scoped blackouts and overrides
    description: Each fulfillment mode defines weekday rules, then optional blackout and override rules alter specific dates.
    examples:
      - file: wordpress-plugin/bulwar-bridge/config/slots.json
        location: wordpress-plugin/bulwar-bridge/config/slots.json:5
        snippet: "modes": { "delivery": { "defaultCapacity": 1, "days": { ... }, "blackouts": [], "overrides": [] } }
      - file: wordpress-plugin/bulwar-bridge/tests/AvailabilityServiceTest.php
        location: wordpress-plugin/bulwar-bridge/tests/AvailabilityServiceTest.php:69
        snippet: 'overrides' => [[ 'date' => '2026-03-25', 'intervalMinutes' => 30, 'windows' => [['start' => '12:00', 'end' => '13:00']] ]]
    prevalence: common
  - category: structure
    pattern: Interval expansion from broad windows into discrete slots
    description: A configured window such as 10:00-18:00 is expanded into slot records of defaultIntervalMinutes or an override interval.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php
        location: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php:208
        snippet: while ($cursor < $windowEnd) { $slotEnd = $cursor->add(new DateInterval('PT' . $intervalMinutes . 'M')); }
    prevalence: common
  - category: error_handling
    pattern: Missing or invalid slot config fails closed
    description: Invalid configuration causes the endpoint to return DEPENDENCY_UNAVAILABLE rather than fallback behavior.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php
        location: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php:425
        snippet: throw new RuntimeException('Slot configuration file is missing or unreadable.')
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php:98
        snippet: return Response::error('DEPENDENCY_UNAVAILABLE', 'Slot availability configuration is unavailable.', 503, true, null, ...)
    prevalence: occasional
  - category: testing
    pattern: Occupancy is injectable in tests but not wired to Woo queries in production
    description: The service supports an occupancyResolver callback, but production controller does not provide one.
    examples:
      - file: wordpress-plugin/bulwar-bridge/tests/AvailabilityServiceTest.php
        location: wordpress-plugin/bulwar-bridge/tests/AvailabilityServiceTest.php:122
        snippet: $occupancyResolver = static function (string $fulfillmentType, string $date, string $slotLabel): int { ... }
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php:84
        snippet: new AvailabilityService(dirname(__DIR__, 3) . '/config/slots.json', Constants::all())
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: Checkout REST controller
      responsibility: Validate requests and invoke quote, slot, and order services.
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php
      relationship_to_domain: domain entry point
    - component: Slot availability service
      responsibility: Generate available dates and time slots from configuration.
      location: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php
      relationship_to_domain: core domain engine
    - component: JSON schedule config
      responsibility: Persist schedule rules used by the engine.
      location: wordpress-plugin/bulwar-bridge/config/slots.json
      relationship_to_domain: current source of truth
    - component: Woo order writer
      responsibility: Persist chosen slot timestamps into Woo order meta after token validation.
      location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
      relationship_to_domain: downstream consumer of slot outputs
    - component: React checkout drawer
      responsibility: Supplies request window and renders server-returned available_dates.
      location: zip/components/CheckoutDrawer.tsx
      relationship_to_domain: upstream caller that bounds which dates are considered
  interfaces_used_by_domain:
    - interface: POST /wp-json/bulwar/v1/checkout/slots
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      usage_pattern: Caller sends fulfillment_type, window_start, days, and for delivery also quote_token.
    - interface: Slot token contract
      location: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php
      usage_pattern: Each returned slot carries a bridge-minted token used later by order creation.
  data_flow_involving_domain: Frontend sends window_start and days to the slots endpoint. CheckoutController validates the request, optionally validates a delivery quote token, and creates AvailabilityService with the on-disk JSON config path. AvailabilityService loads the JSON file, resolves weekday rules for each date in the requested range, applies blackouts and overrides, expands configured windows into interval-sized slots, and returns available_dates containing slot labels, timestamps, remaining capacity, and slot tokens. On final checkout, OrderService validates the slot token and stores slot start and end timestamps into Woo order meta.
  key_relationships_to_domain:
    - from: zip/components/CheckoutDrawer.tsx
      to: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php
      relationship: calls
    - from: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php
      to: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php
      relationship: composes
    - from: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php
      to: wordpress-plugin/bulwar-bridge/config/slots.json
      relationship: reads
    - from: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
      to: WooCommerce order meta
      relationship: writes

related_technology_stack:
  languages_used_in_domain:
    - PHP
    - JSON
    - TypeScript
  frameworks_used_in_domain:
    - name: WordPress REST API
      usage_in_domain: Exposes public endpoints for quote, slot lookup, and order submit.
    - name: WooCommerce
      usage_in_domain: Stores final order data and slot timestamps as order meta.
  libraries_used_in_domain:
    - name: Native PHP DateTime APIs
      purpose_in_domain: Generate date ranges and slot intervals in the configured timezone.
  external_apis_used_in_domain: []

related_conventions:
  naming_patterns_in_domain: Fulfillment pools are keyed as delivery and pickup. Slot data uses snake_case in PHP and JSON payloads. Order meta is stored under _bulwar_* keys.
  structure_of_domain: Public route -> controller validation -> service -> JSON config -> slot token -> order persistence.
  error_handling_in_domain: Invalid request payloads return validation errors; invalid or missing configuration returns DEPENDENCY_UNAVAILABLE; invalid or expired tokens fail order creation with explicit machine-readable codes.
  testing_in_domain: Direct PHP tests exercise AvailabilityService with synthetic JSON configs and injected occupancy callbacks.
  documentation_in_domain: Contract documentation exists in wordpress-plugin/bulwar-bridge/docs/contracts.md and plan artifacts under docs/plan/bulwar-bridge-checkout.

related_dependencies:
  internal:
    - component: wordpress-plugin/bulwar-bridge/src/Config/Constants.php
      relationship_to_domain: Supplies timezone, slot TTL, and config version.
      direction: outbound
    - component: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
      relationship_to_domain: Consumes slot tokens and writes slot timestamps to Woo orders.
      direction: outbound
    - component: zip/components/CheckoutDrawer.tsx
      relationship_to_domain: Chooses window_start and days for slot lookup.
      direction: inbound
  external:
    - name: WordPress
      purpose_for_domain: Hosts the plugin and REST routing.
    - name: WooCommerce
      purpose_for_domain: Persists selected slot data on orders.

domain_security_considerations:
  sensitive_areas:
    - area: Slot token minting and validation
      location: wordpress-plugin/bulwar-bridge/src/Slots/AvailabilityService.php
      concern: Returned slots are protected by bridge-owned opaque tokens that bind fulfillment type, slot timestamps, config version, and for delivery a quote fingerprint.
    - area: Public slot endpoint
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      concern: Endpoint is publicly callable and must rely on validation plus token-based rechecks because no authentication is required.
  authentication_patterns_in_domain: No authenticated WordPress admin or operator interface is part of the current slot implementation.
  authorization_patterns_in_domain: Endpoint permissions are __return_true, so runtime protection is based on payload validation and token revalidation rather than user identity.
  data_validation_in_domain: CheckoutController validates fulfillment type, date format, day count, and delivery quote token presence before slot generation.

testing_patterns:
  framework: Custom plain PHP test file with assertions
  coverage_areas:
    - blackout filtering
    - override replacement of windows and intervals
    - delivery versus pickup pool separation
    - remaining capacity with injected occupancy
  test_organization: Single focused file covering AvailabilityService behavior with synthetic configs.
  mock_patterns:
    - Injected occupancyResolver callback
    - Temporary JSON config file written by the test

open_questions:
  - question: Should operator-controlled selectable dates be represented as explicit date records, or remain derived from weekday rules plus date-level overrides and blackouts?
    context: The current engine is optimized for recurring weekly rules, not for authoring arbitrary explicit date lists.
  - question: Should the request window remain frontend-driven as today plus 7 days, or move fully under backend control?
    context: Even with server-owned schedule rules, the frontend currently constrains which dates the backend evaluates.
  - question: Which Woo order statuses should consume slot capacity once persisted occupancy is wired in?
    context: The service stores slot timestamps on orders, but no production occupancy query currently uses them.

gaps:
  - area: WordPress operator editing surface
    description: No CPT, settings page, options storage, or admin UI exists for schedule authorship.
    impact: Operators cannot explicitly manage selectable dates or slot ranges from WordPress today.
  - area: Persisted occupancy integration
    description: AvailabilityService supports an injected occupancy resolver, but production does not query Woo orders to decrement capacity.
    impact: Remaining capacity in live availability does not reflect existing orders unless additional wiring is added.
  - area: Config schema for explicit date ownership
    description: The current schema can approximate explicit dates through overrides and blackouts, but it is fundamentally designed around weekday defaults.
    impact: Fine-grained operator control over a curated list of visible dates would be awkward without a source model change or an adapter layer.
