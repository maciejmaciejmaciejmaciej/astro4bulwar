			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:851
				snippet: w-full py-8 text-lg font-headline tracking-widest uppercase rounded-[4px] bg-black text-white hover:bg-zinc-800
		prevalence: common

	- category: naming
		pattern: Secondary actions use outline primary buttons or muted text links
		description: Secondary actions rely on border-primary/text-primary outline buttons or small uppercase text links in zinc tones.
		examples:
