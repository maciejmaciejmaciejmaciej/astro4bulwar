related_conventions:
	naming_patterns_in_domain: Typography roles are semantic via font-headline, font-body, and font-label; actions distinguish filled primary vs outline secondary via className overrides on the shared Button.
	structure_of_domain: Template sections commonly use page-margin, max-w-7xl wrappers, uppercase headlines, muted zinc body copy, and rounded-[4px] surfaces.
	error_handling_in_domain: Form errors render as small red inline helper text, typically text-red-500 text-xs mt-1.
	testing_in_domain: No checkout-success-specific UI tests found in the scoped files.
	documentation_in_domain: No inline design documentation in the scoped files; conventions are expressed directly in component class strings.

