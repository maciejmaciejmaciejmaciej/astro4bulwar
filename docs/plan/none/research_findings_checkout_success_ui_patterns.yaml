patterns_found:
	- category: structure
		pattern: Template shell baseline
		description: Template-aligned pages use a white surface, on-surface text, body font, and primary-fixed text selection at the root container.
		examples:
			- file: zip/src/pages/TemplatePage.tsx
				location: zip/src/pages/TemplatePage.tsx:38
				snippet: bg-white text-on-surface font-body selection:bg-primary-fixed min-h-screen pb-16
		prevalence: common

	- category: architecture
		pattern: Confirmation panels reuse checkout step boxes
		description: The closest existing success-state pattern is the bordered p-8 rounded step box that swaps to green-tinted confirmed state and adds CheckCircle2.
		examples:
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:658
				snippet: relative p-8 rounded-[4px] border-2 transition-colors duration-300
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:662
				snippet: absolute top-6 right-6 text-green-500
		prevalence: common

	- category: structure
		pattern: Summary cards use pale surfaces, thin borders, dashed separators
		description: Summary-like content is presented in light cards with rounded-[4px], zinc borders, dashed separators, and muted totals text.
		examples:
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:593
				snippet: bg-zinc-50 p-8 rounded-[4px] border border-zinc-100
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:628
				snippet: rounded-[4px] border border-dashed border-zinc-300 bg-white px-4 py-6 text-sm text-zinc-500
		prevalence: common

	- category: structure
		pattern: Selector cards use hidden radio inputs with card wrappers
		description: No checkbox primitive was found; selection UI is built from sr-only radio inputs inside clickable rounded cards with primary active state.
		examples:
			- file: zip/components/CheckoutDrawer.tsx
				location: zip/components/CheckoutDrawer.tsx:714
				snippet: flex items-center p-4 border rounded-[4px] cursor-pointer transition-all
