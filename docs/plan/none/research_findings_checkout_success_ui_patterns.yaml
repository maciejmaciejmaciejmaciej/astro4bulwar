				location: zip/components/CheckoutDrawer.tsx:718
				snippet: w-5 h-5 rounded-full border flex items-center justify-center mr-3
		prevalence: occasional

	- category: naming
		pattern: Filled primary CTAs use label typography and rounded-[4px]
		description: Prominent actions consistently use bg-primary/text-on-primary or black/white overrides with uppercase font-label or font-headline text.
		examples:
			- file: zip/src/components/sections/About28.tsx
				location: zip/src/components/sections/About28.tsx:151
				snippet: bg-primary text-on-primary px-8 py-4 font-label tracking-[0.1em] uppercase text-sm hover:opacity-80 transition-opacity rounded-[4px]
