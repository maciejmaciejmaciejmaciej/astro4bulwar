patterns_found:
  - category: architecture
    pattern: Page-builder block schemas map to pre-existing React renderers outside zip/src.
    description: Content blocks are registered in zip/src/blocks/** and can render through components stored in zip/components/**.
    examples:
      - file: zip/src/blocks/promo2/schema.ts
        location: zip/src/blocks/promo2/schema.ts:88
        snippet: componentImportPath: "components/Promo2.tsx"
      - file: zip/src/blocks/story-team-showcase/schema.ts
        location: zip/src/blocks/story-team-showcase/schema.ts:79
        snippet: renderSection creates the PROMOCJA_sezonowa element
    prevalence: common

  - category: structure
    pattern: Story/editorial blocks keep top editorial content separate from lower supporting media or menu content.
    description: Promo2 extends the story block pattern by appending a menu surface directly under the image.
    examples:
      - file: zip/components/PROMOCJA_sezonowa.tsx
        location: zip/components/PROMOCJA_sezonowa.tsx:105
        snippet: image-only ending with a rounded image block
      - file: zip/components/Promo2.tsx
        location: zip/components/Promo2.tsx:142
        snippet: rounded-top image followed by a surface-backed menu panel
    prevalence: occasional

  - category: responsive_layout
    pattern: Stable mobile menu rows in this repo avoid hard minimum leader widths and apply word breaking to the text column.
    description: BreakfastSection uses a more forgiving row composition than Promo2 for narrow viewports.
    examples:
      - file: zip/src/components/sections/BreakfastSection.tsx
        location: zip/src/components/sections/BreakfastSection.tsx:146
        snippet: max-w-[70%] min-w-0 shrink-0
      - file: zip/src/components/sections/BreakfastSection.tsx
        location: zip/src/components/sections/BreakfastSection.tsx:159
        snippet: break-words on title and description
      - file: zip/src/components/sections/BreakfastSection.tsx
        location: zip/src/components/sections/BreakfastSection.tsx:171
        snippet: menu-leader min-w-0
    prevalence: occasional

  - category: testing
    pattern: Tests currently lock in literal Tailwind class strings for layout.
    description: Promo2 tests assert the exact rigid classes that appear to cause the mobile issue.
    examples:
      - file: zip/components/Promo2.test.tsx
        location: zip/components/Promo2.test.tsx:23
        snippet: assert.match(markup, /max-w-\[65%\] min-w-0 shrink-0 basis-\[65%\] flex-col/)
      - file: zip/components/Promo2.test.tsx
        location: zip/components/Promo2.test.tsx:24
        snippet: assert.match(markup, /menu-leader min-w-\[40px\]/)
    prevalence: occasional

