  naming_patterns_in_domain: Editorial promo blocks use descriptive names like Promo2, Promo3, and story-team-showcase, with DEFAULT_* content exports colocated in the renderer.
  structure_of_domain: Page-builder schemas live under zip/src/blocks/** while some renderers remain under zip/components/**.
  error_handling_in_domain: Content validity is enforced through zod schemas before rendering; the component itself does not perform runtime fallback beyond filtering empty menu columns.
  testing_in_domain: Node test plus renderToStaticMarkup assertions are used to verify content presence and selected class tokens.
  documentation_in_domain: Block-registry markdown documents geometry, content contract, and allowed editing surface.

