tldr: |
  - The block matching the user's description is Promo2, not About28: it renders an "Our story" title and an attached lower menu panel directly below the image.
  - The runtime renderer lives in zip/components/Promo2.tsx and is wired through the page-builder schema in zip/src/blocks/promo2/schema.ts.
  - The likely mobile defect is caused by rigid row sizing in the lower menu panel: a 65% fixed text basis combined with a 40px minimum leader and a non-shrinking price label.
  - A working comparison exists in zip/src/components/sections/BreakfastSection.tsx, which uses a softer text width cap, allows the dotted leader to shrink to 0, and applies word breaking to menu text.
  - No screenshot file was present in the workspace, so the defect diagnosis is inferred from the block contract, markup, and comparison with existing responsive menu patterns.

