status: completed

tldr: |
  - The runtime source of truth is the WordPress option `bulwar_bridge_global_layout`; the bridge reads it through `Constants::globalLayoutOptionName()` and resolves `footerPageId` internally. Missing or non-positive `footerPageId` yields `fallback_missing_footer_page_id`. Sources: wordpress-plugin/bulwar-bridge/src/Config/Constants.php:20, wordpress-plugin/bulwar-bridge/src/Config/Constants.php:78, wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:42, wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:75-78.
  - No repo-side production helper was found that writes `bulwar_bridge_global_layout` with `update_option(...)`. The only write-capable generic runtime path in repo is the authenticated page-builder POST endpoint for an existing page slug. Sources: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:89-120, wordpress-plugin/bulwar-bridge/src/Http/Routes.php:58-62, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:45, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:206.
  - The repo contains test-only or proof-only footer identifiers, not a verified live one: `footerPageId = 37`, slug `shared-footer`, title `Shared Footer`, and section id `shared-footer-main` appear only in tests. Sources: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:251, wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:254, wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:259, zip/src/blocks/registry/globalLayoutContract.test.ts:123-135.
  - Existing docs define the required footer block contract and post-change verification path: one enabled `shared_footer` block in `page_builder_schema.sections[]`, then verify `GET /wp-json/bulwar/v1/layout/global` returns both meta statuses as `resolved`. Sources: docs/plan/navbar-footer-global-layout-v1/operator-reference.md:16-24, docs/plan/navbar-footer-global-layout-v1/operator-reference.md:124-127, docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md:14-35, docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md:159-166.
  - Existing operational evidence on dhosting favors a small PHP worker bootstrapping `wp-load.php` over the default `wp-cli` wrapper for writes, because the wrapper previously hit the wrong PHP version. Sources: docs/plan/astro-wordpress-page-builder/react-wordpress-poc-status.md:172-173, SCRIPTS/seed-testowa-blueprint-schema.php:1-80, SCRIPTS/seed-testowa-blueprint-schema.sh:5-20, docs/plan/bulwar-bridge-checkout/live_site_audit.js:7-8.

