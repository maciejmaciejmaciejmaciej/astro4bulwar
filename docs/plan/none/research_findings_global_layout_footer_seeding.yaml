patterns_found:
  - category: architecture
    pattern: Option-plus-page split for global layout storage
    description: Navbar data is stored directly in one WordPress option, while footer data is stored indirectly on a referenced page via `footerPageId` and `page_builder_schema.sections[]`. Sources: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:42-127, docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md:7-18.
    examples:
      - file: GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:42-127
        snippet: "get_option(Constants::globalLayoutOptionName(), []); ... $footerPageId = isset($settings['footerPageId']) ? (int) $settings['footerPageId'] : 0;"
      - file: how-navbar-footer-work.md
        location: docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md:7-18
        snippet: "The option stores navbar plus footerPageId; the footer content itself is not stored in the option."
    prevalence: common

  - category: structure
    pattern: Dedicated shared footer block contract
    description: Footer resolution requires one enabled `shared_footer` block with version 1 and `source = null`; section order is decisive. Sources: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:107-127, docs/plan/navbar-footer-global-layout-v1/operator-reference.md:16-24.
    examples:
      - file: GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:107-127
        snippet: "if (($section['blockKey'] ?? null) !== self::SHARED_FOOTER_BLOCK_KEY) continue; ... if ((int) ($section['blockVersion'] ?? 0) !== self::SHARED_FOOTER_BLOCK_VERSION)"
      - file: operator-reference.md
        location: docs/plan/navbar-footer-global-layout-v1/operator-reference.md:18-22
        snippet: "blockKey: \"shared_footer\", blockVersion: 1, source: null; keep exactly one enabled shared_footer block."
    prevalence: common

  - category: error_handling
    pattern: Fail-open bridge payload with explicit fallback statuses
    description: The bridge always emits a normalized payload and uses `meta.layout_option_status` and `meta.footer_status` to communicate whether the source resolved cleanly. Sources: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:16-31, docs/plan/navbar-footer-global-layout-v1/operator-reference.md:68-80.
    examples:
      - file: GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:16-31
        snippet: "'meta' => ['layout_option_status' => $optionStatus, 'footer_status' => $footerStatus]"
      - file: GlobalLayoutControllerTest.php
        location: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:296
        snippet: "fallback_missing_footer_page_id"
    prevalence: common

  - category: operational
    pattern: Existing generic write path is page-meta only
    description: The repo provides an authenticated REST writer for page-builder meta on existing pages, but no corresponding writer for the global layout option. Sources: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:89-120, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:45, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:206.
    examples:
      - file: PageBuilderController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:119-120
        snippet: "update_post_meta($page->ID, 'page_builder_schema', ...); update_post_meta($page->ID, 'page_builder_schema_for_ai', ...)"
      - file: page-builder-authoring-workflow.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:45
        snippet: "the WordPress POST endpoint updates an existing page; it does not create a missing page"
    prevalence: occasional

  - category: testing
    pattern: Synthetic footer identifiers used only in tests
    description: Candidate footer page id/slug/title and section id found in repo are test fixtures rather than live-verified identifiers. Sources: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:251-266, zip/src/blocks/registry/globalLayoutContract.test.ts:123-135.
    examples:
      - file: GlobalLayoutControllerTest.php
        location: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:251-266
        snippet: "footerPageId => 37; new WP_Post(37, 'page', 'publish', 'shared-footer', 'Shared Footer');"
      - file: globalLayoutContract.test.ts
        location: zip/src/blocks/registry/globalLayoutContract.test.ts:123-135
        snippet: "id: 'shared-footer-main', blockKey: SHARED_FOOTER_BLOCK_KEY"
    prevalence: rare

  - category: operational
    pattern: dhosting write workflows prefer explicit PHP runtime control
    description: Existing deployment notes and helpers avoid the default WP-CLI wrapper and favor explicit PHP plus `wp-load.php` or explicit `php82/php83 wp-cli.phar`. Sources: docs/plan/astro-wordpress-page-builder/react-wordpress-poc-status.md:172-173, SCRIPTS/seed-testowa-blueprint-schema.php:1-80, docs/plan/bulwar-bridge-checkout/live_site_audit.js:7-8.
    examples:
      - file: react-wordpress-poc-status.md
        location: docs/plan/astro-wordpress-page-builder/react-wordpress-poc-status.md:172-173
        snippet: "run direct PHP scripts through /usr/bin/php82; avoid relying on the broken wp-cli wrapper"
      - file: seed-testowa-blueprint-schema.php
        location: SCRIPTS/seed-testowa-blueprint-schema.php:1-80
        snippet: "require_once $wpRoot . '/wp-load.php'; ... update_post_meta(...)"
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: GlobalLayoutResolver
      responsibility: Resolve the public global layout payload from storage.
      location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
      relationship_to_domain: domain depends on this
    - component: Global layout REST route/controller
      responsibility: Expose public `GET /wp-json/bulwar/v1/layout/global`.
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php and wordpress-plugin/bulwar-bridge/src/Http/Controllers/GlobalLayoutController.php
      relationship_to_domain: this uses domain outputs
    - component: PageBuilderController update route
      responsibility: Authenticated writer for page-builder schema metas on an existing page.
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      relationship_to_domain: adjacent write path reusable for footer page meta only
    - component: Test-page seed helpers
      responsibility: Create one proof page and write page-builder metas on dhosting.
      location: SCRIPTS/seed-testowa-blueprint-schema.php and SCRIPTS/seed-testowa-blueprint-schema.sh
      relationship_to_domain: implementation pattern only
  interfaces_used_by_domain:
    - interface: WordPress option storage
      location: wordpress-plugin/bulwar-bridge/src/Config/Constants.php and wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
      usage_pattern: Read `bulwar_bridge_global_layout` via `get_option(...)`; no matching repo-side writer found.
    - interface: WordPress post meta storage
      location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php and wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      usage_pattern: Read and write `page_builder_schema` and `page_builder_schema_for_ai` on pages.
    - interface: Bridge REST API
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      usage_pattern: Public read route for layout and authenticated POST route for page-builder updates.
  data_flow_involving_domain: >-
    `bulwar_bridge_global_layout` option -> `GlobalLayoutResolver::readSettings()` -> internal
    `footerPageId` lookup -> footer page `page_builder_schema` -> first enabled `shared_footer`
    block -> normalized public payload -> `GET /wp-json/bulwar/v1/layout/global` consumed by React
    and Astro. Separately, the authenticated page-builder POST endpoint writes page meta for an
    existing slug but does not update the global layout option.
  key_relationships_to_domain:
    - from: Constants::globalLayoutOptionName
      to: GlobalLayoutResolver::readSettings
      relationship: calls
    - from: GlobalLayoutResolver
      to: WordPress page meta `page_builder_schema`
      relationship: reads
    - from: Routes
      to: GlobalLayoutController::show
      relationship: routes
    - from: Routes
      to: PageBuilderController::update
      relationship: routes
    - from: PageBuilderController::update
      to: page_builder_schema metas
      relationship: writes

