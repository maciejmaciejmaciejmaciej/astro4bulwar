  frameworks_used_in_domain:
    - name: WordPress
      usage_in_domain: Option storage, post meta storage, page lookup, REST routes, and capability checks power the global layout and page-builder flows.
    - name: WooCommerce
      usage_in_domain: Present in adjacent bridge workflows, but not directly used by the global layout storage path inspected here.
