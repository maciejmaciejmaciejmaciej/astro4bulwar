    - name: Zod
      purpose_in_domain: Type contract validation for public layout payload and shared footer section shape in React/Astro contract modules.
  external_apis_used_in_domain:
    - name: Bulwar Bridge REST API
      integration_point: `GET /wp-json/bulwar/v1/layout/global` and `POST /wp-json/bulwar/v1/page-builder/pages/{slug}`.

related_conventions:
  naming_patterns_in_domain: >-
    Option names are constant-backed (`BULWAR_BRIDGE_GLOBAL_LAYOUT_OPTION` ->
    `bulwar_bridge_global_layout`); internal pointer key is `footerPageId`; the dedicated footer
    section contract uses block key `shared_footer`, version `1`, and common test section id
    `shared-footer-main`.
  structure_of_domain: >-
    Runtime code lives in `wordpress-plugin/bulwar-bridge/src`, test fixtures in
    `wordpress-plugin/bulwar-bridge/tests`, operator docs under
    `docs/plan/navbar-footer-global-layout-v1`, and proof-only seeding helpers under `SCRIPTS/`.
  error_handling_in_domain: >-
    Global layout resolution prefers stable fallback payloads plus explicit meta statuses, while
    page-builder writes return structured REST errors for bad JSON, missing pages, or insufficient
    permissions. Sources: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:16-31,
    wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:97-118.
  testing_in_domain: >-
    Tests use synthetic WordPress fixtures and assert both public payload contents and fallback
    meta statuses. Source: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php.
  documentation_in_domain: >-
    Global-layout operator docs describe storage and verification; page-builder workflow docs
    describe authenticated schema writes and current tooling limits.

related_dependencies:
  internal:
    - component: wordpress-plugin/bulwar-bridge/src/Config/Constants.php
      relationship_to_domain: provides the option name consumed by the resolver
      direction: inbound
    - component: wordpress-plugin/bulwar-bridge/src/Http/Controllers/GlobalLayoutController.php
      relationship_to_domain: exposes resolver output over REST
      direction: outbound
    - component: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      relationship_to_domain: adjacent writer for footer page meta if the page already exists
      direction: bidirectional
    - component: docs/plan/navbar-footer-global-layout-v1/*.md
      relationship_to_domain: documents the storage and operator contract
      direction: inbound
  external:
    - name: WordPress core functions (`get_option`, `get_post`, `get_post_meta`, `update_post_meta`, `get_page_by_path`, `wp_insert_post`)
      purpose_for_domain: storage reads, page lookup, page creation in proof helpers, and meta writes
    - name: WP-CLI
      purpose_for_domain: optional remote operational helper for page lookup/creation and meta inspection or writes

domain_security_considerations:
  sensitive_areas:
    - area: Authenticated page meta writes
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:97-120
      concern: Writes require WordPress authentication and post-level edit capability.
    - area: Internal footer page reference
      location: docs/plan/navbar-footer-global-layout-v1/operator-reference.md:7-12
      concern: `footerPageId` is intentionally internal and should not leak into public payloads or client contracts.
  authentication_patterns_in_domain: >-
    `GET /layout/global` is public, while `POST /page-builder/pages/{slug}` requires an authenticated
    user with `edit_pages` at the route layer and `edit_post` at the controller layer. Sources:
    wordpress-plugin/bulwar-bridge/src/Http/Routes.php:58-62,
    wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:97-100.
  authorization_patterns_in_domain: >-
    The page-builder writer authorizes at both route and page levels; no authenticated REST writer
    for the global layout option was found in the inspected scope.
  data_validation_in_domain: >-
    PageBuilderController coerces both `schema` and `aiSchema` from object or JSON string and rejects
    invalid payloads; runtime contracts in React/Astro reject public payloads that expose internal
    `footerPageId` or unresolved meta statuses.

testing_patterns:
  framework: Custom PHP test harness with fixture globals plus TypeScript tests for Zod-based contracts.
  coverage_areas:
    - Global layout endpoint success path
    - Fallback meta status when `footerPageId` is missing
    - Public contract rejection of leaked `footerPageId`
    - Dedicated `shared_footer` block validation shape
  test_organization: >-
    Bridge endpoint behavior is covered in `wordpress-plugin/bulwar-bridge/tests`, while frontend
    contract parsing lives in `zip/src/blocks/registry/globalLayoutContract.test.ts` and Astro-side
    layout parsing tests live under `astro-site/src/lib`.
  mock_patterns:
    - Synthetic WordPress options/posts/post_meta arrays in PHP tests
    - Contract payload fixtures in TypeScript tests

open_questions:
  - question: What is the actual live shared footer page id and slug on `client.example`?
    context: Only synthetic identifiers (`37`, `shared-footer`, `Shared Footer`) were found in tests; no live artifact or doc in repo records the real target page.
    type: decision_blocker
    affects: [global_layout_footer_seeding]
  - question: Is there an approved authenticated operational path for updating `bulwar_bridge_global_layout` on live WordPress?
    context: Repo evidence shows reads of the option and docs saying to update it, but no script, REST route, or generic helper that writes it was found.
    type: decision_blocker
    affects: [global_layout_footer_seeding]
  - question: Is the live fix expected to use the authenticated page-builder POST endpoint, direct server-side PHP, or explicit WP-CLI on dhosting?
    context: Existing docs support all three as adjacent patterns, but only the page-builder POST path is generic in repo and it cannot create a missing page or update the option.
    type: research
    affects: [global_layout_footer_seeding]

gaps:
  - area: Global layout option writer
    description: No ready-made repo tool or endpoint was found that writes `bulwar_bridge_global_layout` or sets its `footerPageId` with `update_option(...)`.
    impact: decision_blocker
    affects: [global_layout_footer_seeding]
  - area: Live footer page identifier
    description: No doc, fixture, publish artifact, or setup note in the inspected scope records a verified live footer page slug/id or a stored live `page_builder_schema` containing `shared_footer`.
    impact: decision_blocker
    affects: [global_layout_footer_seeding]
  - area: Generic create-or-update footer page helper
    description: Existing repo helpers create or update only the proof page `testowa-blueprint`; the documented generic POST path updates existing pages only.
    impact: research_blocker
    affects: [global_layout_footer_seeding]
