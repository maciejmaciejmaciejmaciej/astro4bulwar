tldr: |
  - The active numbered mobile floating cart badge is rendered by `CateringStickyCartControls`, not the generic `StickyCartControls`.
  - `CateringWielkanocnyPage` passes the live `itemCount` and `subtotal` props into this component, and `App.tsx` mounts that page at `/catering-wielkanocny`.
  - The current badge classes are `bg-white ... text-black`, which directly contradict the requirement for a red badge with a white number.
  - The file is currently new in the working tree, so the regression is most likely from the catering-specific control being introduced with copied/default neutral badge styling rather than inheriting the existing red badge pattern used in product tiles.
  - The minimal safe fix is a class-only change on the badge span: replace `bg-white` with `bg-red-600` and `text-black` with `text-white`.

