open_questions:
	- question: Should the new special configurable product behave like a single cart line with option metadata, or as multiple standard numeric products?
		context: Current cart persistence and CheckoutDrawerCartItem contract only model id, quantity, name, price, and weight.
	- question: Where should the special product appear in the existing section order?
		context: The page currently has a single explicit insertion seam before the categories loop and otherwise renders all category sections uniformly from data.
	- question: Does the special product need to be represented in the source JSON or remain a dedicated page component?
		context: Existing normalization assumes a fixed category/product schema and cannot express richer configuration fields.

gaps:
	- area: Order submission integration
		description: The researched checkout drawer currently logs form data and alerts success; no backend payload mapping for cart items or special configuration was examined.
		impact: It is unclear how a configurable item would be serialized or transmitted beyond the current frontend summary state.
	- area: Visual placement decision
		description: The code reveals composition seams but not business intent for exact category ordering or merchandising prominence of a special product.
		impact: The cleanest technical insertion point is visible, but final placement among hero/info/category sections remains a product decision.
	- area: Source-of-truth strategy for configurable options
		description: The current catalog JSON exposes only simple products with fixed price/weight fields.
		impact: The research identifies contract limits, but not whether future options should extend JSON, remain component-local, or be modeled elsewhere.
