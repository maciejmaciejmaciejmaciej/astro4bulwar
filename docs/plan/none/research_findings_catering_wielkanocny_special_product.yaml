status: completed

tldr: |
	- The route /catering-wielkanocny is composed directly in the page component: hero, feature grid, then a flat map over normalized category data into repeated CateringProductListAlt sections.
	- Product data is loaded from JSON and normalized eagerly; valid cartable items must have numeric ids, non-empty strings, finite prices, booleans for dietary flags, and image paths under /react/images/.
	- Cart state is page-local and persisted in localStorage as Record<number, number>; rendered cart items are rebuilt from normalized category products and adapted into CheckoutDrawerCartItem.
	- CateringProductListAlt is a presentational section wrapper; ProductItemAlt owns only a local quantity picker and emits add events upward, while current cart and checkout contracts do not carry option/configuration metadata.
	- The existing clean extension seam is at page composition level in CateringWielkanocnyPage, because lower layers only understand standard product rows and numeric product ids.

