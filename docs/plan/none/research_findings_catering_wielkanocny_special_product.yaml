related_conventions:
	naming_patterns_in_domain: Data contracts use Raw* for source shapes and *Contract for normalized UI shapes; page-level handlers follow handle* naming; storage key is a file-level constant.
	structure_of_domain: One route file composes shell sections and owns cart logic, one data module validates the catalog, section components remain display-oriented, and checkout summary uses a narrowed item interface.
	error_handling_in_domain: Source data validation fails fast with explicit thrown errors; persisted cart parsing is forgiving and falls back to empty state.
	testing_in_domain: No route-specific test files were found in the researched domain.
	documentation_in_domain: No domain-local README or inline architecture notes were found; behavior is inferred from source code only.

