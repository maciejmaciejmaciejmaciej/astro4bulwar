patterns_found:
  - category: structure
    pattern: Image band and panel stack are split into two separate wrappers.
    description: The image is rendered first, then a second page-margin wrapper is pulled upward with a negative top margin to create the overlap effect.
    examples:
      - file: zip/src/components/sections/CateringProductListAlt.tsx
        location: zip/src/components/sections/CateringProductListAlt.tsx:61
        snippet: div.page-margin for the image band followed by a separate motion.div.page-margin for the text and panel stack
      - file: zip/src/components/sections/CateringProductSpecialMenuFor2.tsx
        location: zip/src/components/sections/CateringProductSpecialMenuFor2.tsx:172
        snippet: page-margin wrapper with relative z-20 -mt-[140px] pb-16 md:-mt-[220px] md:pb-24
    prevalence: common
  - category: structure
    pattern: Overlay styling without overlay positioning.
    description: Title and description receive white/drop-shadow classes associated with image overlays, but they are not absolutely positioned within the image container.
    examples:
      - file: zip/src/components/sections/CateringProductListAlt.tsx
        location: zip/src/components/sections/CateringProductListAlt.tsx:82
        snippet: bgImage ? text-white relative z-30 drop-shadow-md : ""
      - file: zip/src/components/sections/CateringProductListAlt.tsx
        location: zip/src/components/sections/CateringProductListAlt.tsx:90
        snippet: bgImage ? relative z-30 text-white/90 : text-zinc-600
    prevalence: common
  - category: layout
    pattern: Mobile overlap depth is much larger than requested.
    description: The current mobile negative margin is 140px, while the requested mobile overlap is about 40px.
    examples:
      - file: zip/src/components/sections/CateringProductListAlt.tsx
        location: zip/src/components/sections/CateringProductListAlt.tsx:78
        snippet: relative z-20 -mt-[140px] md:-mt-[220px] pb-16 md:pb-24
      - file: zip/src/components/sections/CateringProductSpecialMenuFor2.tsx
        location: zip/src/components/sections/CateringProductSpecialMenuFor2.tsx:173
        snippet: relative z-20 -mt-[140px] pb-16 md:-mt-[220px] md:pb-24
    prevalence: common
  - category: design_system
    pattern: Shared spacing token should govern horizontal inset.
    description: Mobile horizontal padding is already standardized via page-margin, so a safe fix can reuse that token instead of introducing new layout utilities.
    examples:
      - file: zip/src/index.css
        location: zip/src/index.css:45
        snippet: .page-margin { padding-left: 5rem; padding-right: 5rem; }
      - file: zip/src/index.css
        location: zip/src/index.css:50
        snippet: @media (max-width: 768px) { .page-margin { padding-left: 2rem; padding-right: 2rem; } }
    prevalence: common
  - category: architecture
    pattern: Category panels are data-driven at the page layer.
    description: The route maps normalized category contracts into a single reusable panel component, so one scoped component fix affects all category panels.
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:228
        snippet: cateringWielkanocnyCategories.map((category) => <CateringProductListAlt ... />)
    prevalence: common

