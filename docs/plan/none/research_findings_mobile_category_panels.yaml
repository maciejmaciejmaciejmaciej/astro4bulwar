plan_id: none
objective: Investigate the current mobile regression in BULWAR APP for image/text product category panels, identify the likely root cause, and isolate the smallest safe fix that preserves the existing design system.
focus_area: zip/src mobile category image panels
created_at: 2026-03-25T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - The active category panels are rendered by zip/src/components/sections/CateringProductListAlt.tsx and are fed from zip/src/pages/CateringWielkanocnyPage.tsx.
  - On mobile, the component still uses the legacy overlap value -mt-[140px], while the title and description are not positioned inside the image band; they remain in the same flow stack as the white product panel.
  - Because the overlay copy is flow content rather than an absolutely positioned image overlay, it cannot stay vertically centered around half the image height and the product panel overlaps the image far more than the requested ~40px.
  - The smallest safe fix is to keep the existing card, typography, and spacing tokens, move the mobile overlay copy into the image container using page-margin padding, and reduce only the mobile overlap from -mt-[140px] to about -mt-10 while preserving md:-mt-[220px].
  - The same mobile overlap pattern also exists in CateringProductSpecialMenuFor2.tsx, but the mapped category panels themselves are isolated to CateringProductListAlt.tsx.

research_metadata:
  methodology: Hybrid retrieval using semantic search for the affected UI, regex grep for exact overlap and overlay classes, targeted file reads of the active route and section components, and metadata verification against the workspace CSS utilities.
  scope: Focused inspection of the active Easter catering route, the category panel renderer, the shared spacing utility, and the adjacent special-product section that uses the same overlap pattern.
  confidence: high
  coverage: 88

