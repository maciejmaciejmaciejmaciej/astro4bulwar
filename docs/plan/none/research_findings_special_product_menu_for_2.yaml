domain_security_considerations:
  sensitive_areas:
    - area: configurable line price and allowed combinations
      location: frontend to bridge boundary
      concern: Any price or option labels sent by the client are user-controlled and must not be trusted as canonical commerce data
    - area: identical base product with multiple configurations
      location: cart serialization and line identity
      concern: If the bridge or frontend keys by product ID alone, one customer's configuration can overwrite or merge with another unintentionally
    - area: checkout plus payment flow
      location: Woo Store API or bridge-created order
      concern: Payment should only process against server-revalidated cart or order data, never against frontend-computed totals
  authentication_patterns_in_domain: Project instructions require a secure bridge to hide Woo credentials from the React frontend. Store API flows additionally require Nonce or Cart Token for cart and checkout endpoints.
  authorization_patterns_in_domain: The relevant domain appears to be anonymous customer checkout; security depends on server validation rather than user-role authorization.
  data_validation_in_domain: Existing frontend validation uses Zod for customer data. For the configurable menu, authoritative validation must additionally confirm base product ID, option IDs, option availability, menu size, allowed duplicates or substitutions, and final price on the bridge or Woo side.

open_questions:
  - question: Are soup and main selections chosen from existing individually purchasable Woo products, or from option-only IDs that should never appear as separate cart lines?
    context: This determines whether subchoices map to product IDs, custom taxonomies, or a bridge-owned option catalogue.
  - question: Can both people choose the same soup or main dish, or must choices be unique within the menu?
    context: Duplicate rules directly affect validation and how the draft state is checked before add-to-cart.
  - question: Does the menu price stay fixed regardless of selection, or do some soups or mains introduce surcharges?
    context: Fixed pricing fits the simple-product model cleanly; per-option surcharges increase reliance on canonical server price calculation and richer order metadata.
  - question: Should the special menu consume stock from the base simple product only, from the selected component dishes, or from no stock-tracked source at all?
    context: One simple product with descriptive meta is operationally different from component-based stock deduction.
  - question: Should the Woo admin, emails, and exports display one human-readable summary meta field, several flattened meta rows, or a hidden JSON blob plus display rows?
    context: This affects merchant usability and reporting while still fitting the one-product architecture.
  - question: Is cart editing expected after add-to-cart, or is the intended UX remove-and-recreate only?
    context: The current cart surfaces support quantity changes but not nested configuration editing, and that changes required line identity and UI complexity.

gaps:
  - area: business rules for configurable menu composition
    description: The workspace does not define whether duplicates are allowed, whether some selections are unavailable by day, or whether any option affects price.
    impact: These missing rules block a complete validation contract for the frontend draft schema and bridge authority checks.
  - area: bridge implementation details
    description: The repo documents the bridge architecture but does not yet implement the submission endpoint, cart synchronization, or order-writing path.
    impact: Final payload shape can be narrowed to likely structures, but the exact transport contract is still uncommitted in code.
  - area: admin-facing order meta format
    description: No convention exists yet in the workspace for how configurable line selections should appear in Woo admin, emails, or exports.
    impact: A technically valid line-item-meta solution could still create poor merchant usability if the display format is not decided early.
  - area: state model for multiple configured lines of the same base product
    description: Current frontend state assumes each product ID maps to one quantity bucket and cannot represent two separate configurations of the same base item.
    impact: Reusing the existing cart shape would cause line merging or overwrite bugs for configurable specials.
