plan_id: none
objective: translate the requested configurable special product UX for a 'menu for 2 people' into repo-specific implementation concerns covering state shape, validation rules, cart payload shape, and alignment with the simple Woo product plus order item meta bridge architecture
focus_area: special_product_menu_for_2
created_at: 2026-03-24
created_by: GitHub Copilot
status: completed

tldr: |
  - The current catering flow is quantity-only: page state is a Record<number, number>, checkout rows are display-only, and the checkout form validates customer data but not product configuration, so the 'menu for 2' UX is a net-new configurator flow rather than an extension of existing cart logic.
  - A single simple Woo product remains compatible with this repo only if the bridge is authoritative for option IDs, pricing, and final metadata persistence; the frontend can collect the two-person configuration, but it cannot be the source of truth for line price or allowed combinations.
  - The current cart shape cannot represent two distinct configurations of the same base product because it keys by product ID only; configurable specials require a line-level identifier plus nested configuration data.
  - Woo supports persisting custom line-item details, but not as a raw client-side passthrough in the Store API checkout flow; the bridge must either inject cart_item_data during add-to-cart and copy it into order item meta later, or create the order directly with line_items.meta_data.
  - The main risks are cart-line collisions, client-side price tampering, admin/reporting ambiguity from one base product, and unclear business rules about duplicate choices, substitutions, and stock consumption.

research_metadata:
  methodology: hybrid retrieval using semantic_search and grep_search across the workspace, targeted read_file inspection of the current catering cart and checkout flow, and external WooCommerce documentation plus source inspection via fetch_webpage and github_repo for Store API and order-meta extension points
  scope: focused analysis of the Easter catering route, shared cart surfaces, product row interaction model, current Woo product import conventions, and WooCommerce order metadata paths relevant to a configurable special product sold as one simple product
  confidence: high
  coverage: 93

