related_conventions:
  naming_patterns_in_domain: Page-level state uses descriptive names like cartQuantities, cartItems, itemCount, and subtotal. Normalized data contracts expose explicit fields like combinedText, priceLabel, and imageUrl. Current cart callbacks are action-oriented and narrow, such as onAddToCart and onSetCartQuantity.
  structure_of_domain: The route owns commerce state, section components stay presentational plus lightweight row interaction, normalized catalog data lives under zip/src/data, and shared cart surfaces are fed via props. No global store or dedicated commerce module exists yet.
  error_handling_in_domain: Frontend validation is Zod-based for customer and fulfillment data, defensive parsing is used for localStorage restoration, and invalid cart mutations are ignored early by runtime guards. Server-side Woo validation for composed selections is not present in the workspace.
  testing_in_domain: No domain-specific tests for cart or checkout logic were found in the active frontend path.
  documentation_in_domain: Architecture intent is documented in .github/copilot-instructions.md, and prior repo research already covers Woo bridge and configurable-product metadata paths under docs/plan/none.

