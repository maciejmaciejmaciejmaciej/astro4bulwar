      relationship_to_domain: not reusable as-is for configurator state management; it is only a visual content primitive
    - component: Woo bridge layer
      responsibility: Intended server-side boundary between React and WooCommerce
      location: .github/copilot-instructions.md
      relationship_to_domain: bridge must be the authority for canonical payload validation, price resolution, and order/meta persistence
  interfaces_used_by_domain:
    - interface: CheckoutDrawerCartItem
      location: zip/components/CheckoutDrawer.tsx:59
      usage_pattern: current checkout display contract for cart rows
    - interface: ProductItemAltProps.onAddToCart
      location: zip/src/components/sections/ProductItemAlt.tsx:12
      usage_pattern: current add-to-cart event contract productId plus quantity
    - interface: Store API cart add-item request
      location: cart.md:Add Item
      usage_pattern: id and quantity are standard, while extra selection data must be mapped server-side into cart_item_data
    - interface: REST orders line_items.meta_data
      location: class-wc-rest-orders-v2-controller.php:908
      usage_pattern: direct bridge-created order path for explicit line item meta persistence
  data_flow_involving_domain: The current frontend builds catalog rows from normalized data, increments a quantity bucket per product ID, and passes flattened display items into the checkout drawer. A configurable 'menu for 2' changes this shape fundamentally: the frontend would first collect a draft configuration for person 1 soup and main plus person 2 soup and main, then convert that draft into a cart line with a unique line identity, base Woo product identity, and selected option identifiers. That serialized line would be sent to the bridge, which must revalidate allowed combinations and compute the canonical line price. From there the bridge either adds the base simple product to the Woo cart while attaching cart_item_data that is later copied into order item meta, or it creates the Woo order directly and writes line_items.meta_data itself.
  key_relationships_to_domain:
    - from: zip/src/components/sections/ProductItemAlt.tsx
      to: zip/src/pages/CateringWielkanocnyPage.tsx
      relationship: emits add-to-cart intent upward as productId plus quantity
    - from: zip/src/pages/CateringWielkanocnyPage.tsx
      to: zip/components/CheckoutDrawer.tsx
      relationship: supplies flattened cart rows and derived totals
    - from: cart.md POST /cart/add-item
      to: CartAddItem.php woocommerce_store_api_add_to_cart_data
      relationship: request can be extended server-side into cart_item_data
    - from: CartAddItem.php cart_item_data
      to: class-wc-checkout.php create_order_line_items
      relationship: server cart values flow into order-item creation
    - from: class-wc-checkout.php create_order_line_items
      to: class-wc-checkout.php woocommerce_checkout_create_order_line_item
      relationship: order item can be enriched with custom meta before save
    - from: bridge direct order payload
      to: class-wc-rest-orders-v2-controller.php line_items.meta_data
      relationship: explicit line-item metadata can be written without relying on Store API cart hooks

