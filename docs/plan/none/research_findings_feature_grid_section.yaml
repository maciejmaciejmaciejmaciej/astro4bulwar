content_strategy_assessment:
  status: completed
  relevant_files:
    - zip/src/components/sections/FeatureGridSection.tsx
    - zip/src/pages/CateringWielkanocnyPage.tsx
    - zip/src/data/cateringWielkanocnyHero.tsx
    - docs/plan/hero24-reusable/plan.yaml
  current_props_data_shape:
    component: FeatureGridSection
    props:
      items: Array<{ icon: LucideIcon; title: string; description: string }> | undefined
      className: string | undefined
    current_runtime_source: in-file defaultItems fallback because the page renders bare <FeatureGridSection />
    adjacent_overlapping_source: cateringWielkanocnyHero.tsx infoItems contains current pickup/delivery/payment metadata above the grid
  exact_constraints:
    - Each card requires an icon component, a single title string, and a single description string.
    - Description is rendered as one paragraph, so there is no native multi-field layout for bullets, labels, or per-line metadata.
    - The wrapper uses max-w-4xl with md:grid-cols-2 and lg:grid-cols-4, so 8 cards naturally become 2 rows on large screens.
    - Rendering two separate FeatureGridSection blocks would duplicate section-level vertical spacing because the section wrapper includes py-32.
    - No current prop supports per-card accent styling, secondary text, CTA links, or highlighted pricing rows.
  option_evaluation:
    four_boxes:
      fit: viable only if the text is condensed into four short thematic summaries
      risk: content compression may hide detail or force overly dense paragraphs
      change_level: lowest
    two_sections_of_four:
      fit: technically possible at page-composition level
      risk: introduces duplicated section spacing and a stronger visual break than the current single-block design
      change_level: medium
    single_section_eight_boxes:
      fit: structurally supported by the existing component because card count is data-driven
      risk: taller page and more visual scanning, but no new section semantics or API needed
      change_level: low
  recommended_minimal_change_content_strategy: Use one FeatureGridSection data set and choose the card count based on editorial compression tolerance: if the text can be responsibly collapsed into four concise themes, keep four cards because it is closest to the live design; if the text needs to remain substantially intact, keep the same component and expand the items array to eight cards rather than duplicating the section, because the current grid already supports more cards without altering the component contract or page rhythm as heavily as two separate sections.
