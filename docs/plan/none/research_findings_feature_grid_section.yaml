plan_id: none
objective: Identify the exact component and data source for the section immediately below the Catering Wielkanocny hero, currently the 4-box info/table style section, and determine the safest way to distribute pickup/delivery/pricing text into that existing component.
focus_area: zip/src FeatureGridSection usage on CateringWielkanocnyPage
created_at: 2026-03-24
created_by: GitHub Copilot
status: completed

tldr: |
  - The section directly below the Catering Wielkanocny hero is FeatureGridSection, rendered in CateringWielkanocnyPage immediately after CateringWielkanocnyHero.
  - Its current data source is not an external file; the page uses bare <FeatureGridSection />, so content comes from the in-file defaultItems array inside FeatureGridSection.tsx.
  - The component contract already supports any number of cards because it maps over items; four cards are the current default, but eight cards would render without changing the public API.
  - Existing pickup/delivery/payment metadata already lives in cateringWielkanocnyHero.tsx, which means operational text is currently split between hero data and the section below it.
  - The safest low-risk content strategy depends on whether the supplied text can be editorially condensed: 4 cards is the smallest change, while 8 cards in the same section is the safest way to preserve fuller copy without changing layout semantics.

