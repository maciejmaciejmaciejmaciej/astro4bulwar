plan_id: none
objective: validate the MVP architecture for configurable catering specials using one simple WooCommerce product plus configuration data carried through a bridge into WooCommerce order metadata or line item metadata
focus_area: woo_special_product_bridge
created_at: 2026-03-24
created_by: GitHub Copilot
status: completed

tldr: |
  - The current BULWAR APP frontend already models checkout as custom cart rows plus a Zod-validated form, and there is no implemented bridge yet; this makes a bridge-owned pricing and order-writing model compatible with the repo's present architecture.
  - WooCommerce Store API supports server-side injection of cart item data during add-to-cart and supports additional checkout fields on the order, but it does not provide a simple client-driven arbitrary line-item-meta passthrough during checkout.
  - A single simple Woo product is a sound MVP path only if the bridge remains authoritative for allowed configurations, price calculation, stock rules, and metadata persistence; otherwise order integrity and reporting drift quickly.
  - If Store API cart and checkout are used, custom Woo hooks are required to carry configuration from request to cart item data and from cart item data to order line item meta; if the bridge creates orders directly via server-side Woo APIs or REST orders endpoints, this is simpler and more predictable.
  - Non-negotiable caveats are payment-gateway compatibility, server-side validation of every submitted option, and the operational tradeoff that analytics, stock, coupons, and merchant workflows will see one base product unless extra reporting/meta conventions are added.

research_metadata:
  methodology: hybrid retrieval using semantic_search and grep_search in the BULWAR APP workspace, targeted read_file inspection of checkout/cart data flow, and external WooCommerce documentation/code discovery via fetch_webpage and github_repo against woocommerce/woocommerce
  scope: focused analysis of the current React checkout shell, catering cart composition, WooCommerce Store API cart and checkout behavior, and Woo order/meta persistence mechanisms relevant to configurable special products
  confidence: high
  coverage: 88

