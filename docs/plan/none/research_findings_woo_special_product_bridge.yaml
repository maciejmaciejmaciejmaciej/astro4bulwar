affected_behavior_summary:
  mvp_viability: Using one simple Woo product as the purchasable SKU and storing configuration outside native variations is technically viable for an MVP.
  viability_conditions: It works well only when the bridge owns option validation, price calculation, and metadata persistence; Woo is then treated primarily as order ledger and payment/order management backend.
  failure_mode_if_ignored: If client selections are trusted directly or expected to survive Store API checkout without hooks, the order will either lose configuration detail or persist inconsistent price and fulfillment data.

related_conventions:
  naming_patterns_in_domain: Frontend cart and checkout contracts use explicit typed interfaces, while Woo additional fields use namespace or field identifiers and Woo-managed meta prefixes
  structure_of_domain: Current repo keeps catalog data and cart logic in zip/src and zip/components; bridge logic is planned but absent; Woo extensibility points live in filters/actions around Store API and checkout internals
  error_handling_in_domain: Frontend uses schema validation and safe parsing patterns; Woo Store API expects extension hooks to throw exceptions to block invalid add-to-cart or checkout operations
  testing_in_domain: No bridge tests exist in the repo; Woo upstream docs and tests show additional field and checkout request persistence behavior
  documentation_in_domain: Project instructions state the bridge should hide Woo credentials and validate delivery constraints; Woo docs clearly separate Store API additional_fields from direct order line item meta

related_dependencies:
  internal:
    - component: zip/src/data/cateringWielkanocny.ts
      relationship_to_domain: provides client-visible price and product mapping that the bridge must not trust blindly
      direction: outbound
    - component: zip/components/CheckoutDrawer.tsx
      relationship_to_domain: provides customer/delivery form data to the future bridge
      direction: outbound
    - component: planned bridge middleware
      relationship_to_domain: receives all frontend order data and produces the canonical Woo write operations
      direction: bidirectional
  external:
    - name: WooCommerce core checkout flow
      purpose_for_domain: converts cart items into order line items and exposes hooks for custom line item meta
    - name: WooCommerce Store API
      purpose_for_domain: manages draft-order checkout but requires custom hooks for non-standard cart/order data
    - name: WooCommerce REST Orders API
      purpose_for_domain: simpler direct path for bridge-owned order creation with explicit line_items.meta_data

domain_security_considerations:
  sensitive_areas:
    - area: price authority
      location: bridge and Woo order creation path
      concern: client-side submitted prices or option totals must never be trusted; the bridge must recompute canonical totals from server-side rules
    - area: configuration payload integrity
      location: bridge request handling and Woo hooks
      concern: option ids, quantities, modifiers, and free-text inputs must be validated, sanitized, and bounded before being stored or displayed
    - area: payment method handoff
      location: Store API checkout or payment gateway integration
      concern: chosen payment method and payment_data must be compatible with the chosen order-creation path and gateway expectations
    - area: order item display surfaces
      location: Woo admin, emails, order details, and APIs
      concern: stored meta values may be rendered to staff and customers, so output-safe, human-readable, sanitized values are required
  authentication_patterns_in_domain: Store API checkout and cart mutations require a Nonce token or Cart Token; direct REST orders creation requires authenticated server credentials and should only be performed from the bridge
  authorization_patterns_in_domain: The frontend must never hold privileged Woo credentials; only the bridge or WordPress-side extension code should create orders or write protected metadata
  data_validation_in_domain: Required validation includes allowed configuration combinations, quantity limits, fulfillment windows, delivery eligibility, server-side price recomputation, string sanitization, and guarding against oversized or malformed metadata

testing_patterns:
  framework: mixed evidence from repo TypeScript usage and WooCommerce upstream PHP tests/docs
  coverage_areas:
    - server-side recomputation of price from submitted configuration
    - invalid option combinations rejected before order creation
    - cart item data preserved into order line item meta when using Store API hooks
    - additional checkout fields persisted and readable from order meta
    - payment method compatibility with the selected order creation flow
    - admin, email, and API visibility of stored meta
  test_organization: bridge contract tests plus WordPress integration tests are the relevant pattern; current repo has no implemented bridge test suite
  mock_patterns:
    - mock frontend payloads with tampered price and invalid option ids
    - exercise Store API request hooks with WP_REST_Request fixtures
    - assert resulting WC_Order and WC_Order_Item_Product metadata values

open_questions:
  - question: Will the bridge create Woo orders directly, or must it strictly drive Woo Store API cart and checkout endpoints?
    context: This determines whether line item meta can be written directly in the bridge or must be propagated through Store API cart and checkout hooks.
  - question: Does the special catering product need gateway-driven online payment through standard Woo checkout, or is cash/transfer/manual capture sufficient for MVP?
    context: Gateway requirements strongly influence whether a draft-order Store API checkout path is preferable to direct order creation.
  - question: Are configurable options purely descriptive, or can they change price, tax class, stock consumption, preparation routing, or fulfillment window?
    context: Once options affect price or operations, the bridge must own a full rules engine rather than just storing labels.
  - question: How much reporting granularity is required in Woo admin and downstream analytics?
    context: One base product plus meta is operationally simple but weak for native SKU-level reporting, stock accounting, and category-based merchandising.
  - question: Are free-text customer configuration inputs required?
    context: Free text substantially raises sanitization, display, and staff-fulfillment complexity relative to strict enum-based options.

gaps:
  - area: bridge implementation
    description: The repository contains no actual bridge code, so all bridge behavior remains architectural rather than verified in-project
    impact: medium; feasibility is clear, but exact payload contract and server responsibilities are still unimplemented
  - area: live Woo configuration
    description: The workspace does not expose active payment gateways, shipping setup, tax classes, or plugin landscape on the target WordPress instance
    impact: medium; gateway and extension compatibility could materially change the preferred integration path
  - area: operational requirements for configurable specials
    description: No finalized rule set exists in the repo for option combinations, pricing modifiers, stock logic, or merchant-side display requirements
    impact: high; these rules decide whether simple-product-plus-meta remains a clean MVP or becomes operationally brittle
