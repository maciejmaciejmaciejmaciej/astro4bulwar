patterns_found:
  - category: architecture
    pattern: Frontend is a custom catalog and checkout shell, not a Woo-native product configurator
    description: The current React app keeps product catalog, cart state, pricing display, and checkout form outside Woo, with no current server sync.
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:101
        snippet: buildCartItems derives checkout rows entirely from local product data and local quantities
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:149
        snippet: onSubmit only logs form data and does not talk to Woo or a bridge
    prevalence: common
  - category: structure
    pattern: Client-side validation exists, but authoritative business validation is not implemented
    description: The repo already validates customer fields locally, but all availability, pricing, and product option integrity still need a server-side authority.
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:13
        snippet: checkoutSchema validates personal and delivery data with Zod
      - file: zip/src/data/cateringWielkanocny.ts
        location: zip/src/data/cateringWielkanocny.ts:38
        snippet: normalizeString/normalizeNumber/normalizeBoolean enforce catalog data shape locally
    prevalence: common
  - category: architecture
    pattern: Store API is cart-and-checkout centric and expects server-side extension hooks for extra data
    description: Woo Store API permits extra request data only through extensibility hooks and registered checkout fields, not by arbitrary free-form line item metadata in the checkout payload.
    examples:
      - file: cart.md
        location: cart.md:Add Item
        snippet: use woocommerce_store_api_add_to_cart_data to inject custom request data into cart_item_data
      - file: CheckoutTrait.php
        location: CheckoutTrait.php:201
        snippet: woocommerce_store_api_checkout_update_order_from_request exposes request plus order for extension persistence
      - file: additional-checkout-fields.md
        location: additional-checkout-fields.md:46
        snippet: order information fields are saved as order meta under managed prefixes
    prevalence: common
  - category: architecture
    pattern: Woo order line item meta is first-class, but it is written server-side during order creation
    description: Core Woo line items save internal line item props plus any custom metadata added via hooks or direct REST order payloads.
    examples:
      - file: class-wc-checkout.php
        location: class-wc-checkout.php:546
        snippet: woocommerce_checkout_create_order_line_item fires before line item save
      - file: class-wc-rest-orders-v2-controller.php
        location: class-wc-rest-orders-v2-controller.php:908
        snippet: REST orders controller updates line item meta_data when provided in line item payloads
    prevalence: common
  - category: naming
    pattern: Additional checkout fields are namespace-scoped and meta-prefixed
    description: Store API additional_fields are managed through namespace/id keys and persisted under Woo-controlled prefixes rather than arbitrary merchant-chosen raw meta keys.
    examples:
      - file: additional-checkout-fields.md
        location: additional-checkout-fields.md:148
        snippet: _wc_other/my-plugin-namespace/my-field
      - file: CheckoutSchema.php
        location: CheckoutSchema.php:293
        snippet: get_additional_fields_schema builds schema from registered fields only
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: React catering page cart state
      responsibility: Holds selected products and quantities before checkout
      location: zip/src/pages/CateringWielkanocnyPage.tsx
      relationship_to_domain: domain produces the payload the bridge would have to canonicalize
    - component: Checkout drawer form
      responsibility: Collects customer, payment, and delivery information
      location: zip/components/CheckoutDrawer.tsx
      relationship_to_domain: domain would extend this payload with configurable special-product options or identifiers
    - component: Bridge service
      responsibility: Translate frontend cart and checkout payload into Woo-compatible cart/order operations
      location: planned, not implemented in repo
      relationship_to_domain: domain depends on this as the trust boundary and persistence layer
    - component: Woo Store API cart and checkout
      responsibility: Maintain session cart, draft order, checkout processing, and payment handoff
      location: WooCommerce Store API
      relationship_to_domain: optional integration path if the bridge chooses cart-and-checkout flow instead of direct order creation
    - component: Woo order creation internals
      responsibility: Create order line items from cart and persist line item and order metadata
      location: class-wc-checkout.php and StoreApi OrderController/CheckoutTrait
      relationship_to_domain: receives validated configuration and writes the final order representation
  interfaces_used_by_domain:
    - interface: CheckoutDrawerCartItem
      location: zip/components/CheckoutDrawer.tsx
      usage_pattern: current client-facing line item shape for UI and total calculation
    - interface: CateringProductContract
      location: zip/src/data/cateringWielkanocny.ts
      usage_pattern: current client-side source for product ids and displayed prices
    - interface: Store API cart add-item payload
      location: cart.md:Add Item
      usage_pattern: accepts product id, quantity, variation, and extension-supplied cart_item_data only through hooks
    - interface: Store API checkout payload
      location: checkout.md:Process Order and Payment
      usage_pattern: accepts customer addresses, payment_method, payment_data, and extension/additional_fields data, not arbitrary line item meta arrays
    - interface: REST orders line_items.meta_data
      location: class-wc-rest-orders-v2-controller.php:908
      usage_pattern: supports direct server-side creation of order items with metadata when bypassing Store API checkout
  data_flow_involving_domain: Frontend catalog data and cart selections are assembled locally into checkout rows, then would be posted to a future bridge. The bridge must resolve those selections against server-side product/configuration rules, calculate the canonical line price, and either (a) inject cart_item_data into Store API cart items and later copy it into order line item meta during checkout hooks, or (b) create the Woo order directly and write line item meta_data itself. In both cases Woo stores the final order and exposes order meta and line item meta to admin, emails, and API consumers.
  key_relationships_to_domain:
    - from: zip/src/pages/CateringWielkanocnyPage.tsx
      to: zip/components/CheckoutDrawer.tsx
      relationship: composes
    - from: zip/src/pages/CateringWielkanocnyPage.tsx
      to: zip/src/data/cateringWielkanocny.ts
      relationship: imports
    - from: Store API cart add-item
      to: woocommerce_store_api_add_to_cart_data
      relationship: calls extension hook before cart insertion
    - from: Store API order synchronization
      to: class-wc-checkout.php create_order_line_items
      relationship: delegates line item creation from cart
    - from: class-wc-checkout.php create_order_line_items
      to: woocommerce_checkout_create_order_line_item
      relationship: calls hook for line item meta customization
    - from: Store API checkout request
      to: woocommerce_store_api_checkout_update_order_from_request
      relationship: calls extension hook for order-level persistence from request data

