related_conventions:
  naming_patterns_in_domain: Data uses Polish business keys in JSON like nazwa_kategorii and pozycje, while app-side TS modules use English prop names like image, title, products, and bgImage.
  structure_of_domain: Shared reusable content lives in zip/src/data as exported constants; page-specific experimental data may live inline in the page component.
  error_handling_in_domain: No explicit error handling is present around static data or static image usage; components assume provided strings are valid.
  testing_in_domain: No test files were found for the Easter catering page or its data mapping.
  documentation_in_domain: Conventions are inferred from code rather than local documentation.

