patterns_found:
  - category: structure
    pattern: Single src/data module exporting typed static arrays
    description: The app currently keeps reusable data in TypeScript modules under src/data and imports them into page components.
    examples:
      - file: zip/src/data/ofertaData.ts
        location: zip/src/data/ofertaData.ts:1
        snippet: import { OfertaItem } from '../components/sections/OfertaSection'; export const portfolioItems: OfertaItem[] = [...]
      - file: zip/src/pages/HomePage.tsx
        location: zip/src/pages/HomePage.tsx:8
        snippet: import { portfolioItems } from "../data/ofertaData";
    prevalence: common
  - category: architecture
    pattern: Page-local inline data for unfinished or page-specific sections
    description: The Easter catering page currently keeps section product data inline instead of in a dedicated src/data module.
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:10
        snippet: const salatkiData = [ ... ]
    prevalence: occasional
  - category: structure
    pattern: Public image assets referenced as string paths under /react/images/
    description: Components use literal string paths for static assets rather than imported image modules.
    examples:
      - file: zip/src/pages/HomePage.tsx
        location: zip/src/pages/HomePage.tsx:19
        snippet: <Navbar logoSrc="/react/images/logo.png" />
      - file: zip/src/components/sections/GallerySection.tsx
        location: zip/src/components/sections/GallerySection.tsx:10
        snippet: const DEFAULT_IMAGES = ["/react/images/gallery/12-1024x680-1-640x640.webp", ...]
      - file: zip/src/components/sections/CateringWielkanocnyHero.tsx
        location: zip/src/components/sections/CateringWielkanocnyHero.tsx:129
        snippet: src="/react/images/zupy-catering.jpg"
    prevalence: common
  - category: architecture
    pattern: Background images injected through component props
    description: Category/section background imagery is passed as a URL string prop and consumed via inline CSS backgroundImage.
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:59
        snippet: <CateringProductListAlt title="SAŁATKI NA WYNOS" products={salatkiData} bgImage="https://picsum.photos/seed/salad/1920/1080" />
      - file: zip/src/components/sections/CateringProductListAlt.tsx
        location: zip/src/components/sections/CateringProductListAlt.tsx:36
        snippet: style={{ backgroundImage: `url('${bgImage}')` }}
    prevalence: common
  - category: naming
    pattern: Public image filenames approximate category names, sometimes with spelling or labeling mismatches
    description: Existing asset names largely map to category labels but not always exactly.
    examples:
      - file: zip/public/images
        location: zip/public/images
        snippet: zypy.webp vs category name Zupy
      - file: zip/public/images
        location: zip/public/images
        snippet: wypieki.webp vs category name Desery
      - file: zip/public/images
        location: zip/public/images
        snippet: dla dzieci.webp vs category name Menu dziecięce
    prevalence: occasional

