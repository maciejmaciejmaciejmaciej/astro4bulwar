open_questions:
  - question: Which public image should represent the Przystawki category?
    context: Existing public image filenames map clearly to most categories, but no exact przystawki-named file was found.
  - question: Whether category Desery should intentionally map to wypieki assets?
    context: The filename suggests baked goods rather than the broader category label used in JSON.
  - question: Whether the current /react/images references for zupy-catering.jpg and related Easter teaser files are missing locally or expected to come from deployment-only assets?
    context: The code references several Easter images that were not found in the workspace file listing.

gaps:
  - area: Deployment asset parity
    description: Several /react/images/*.jpg files referenced in code were not present in the inspected public/images directory.
    impact: Limits certainty about which existing local assets are actually available in the current deployed build.
  - area: Category-to-image business mapping
    description: No dedicated mapping table or existing config was found for assigning per-category image_url values.
    impact: The workspace shows available assets and current component patterns, but not the intended final editorial mapping for every category.
