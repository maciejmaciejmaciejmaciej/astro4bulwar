tldr: |
  - Główny JSON źródłowy dla kategorii wielkanocnych istnieje poza aplikacją w source_data.json oraz w wersji rozszerzonej z id i pustym image_url w result_with_ids.json.
  - Jedyny obecny wzorzec pliku danych w zip/src/data to ofertaData.ts, eksportujący tablicę TS i importowany bezpośrednio do komponentu strony.
  - Publiczne obrazy kategorii znajdują się w zip/public/images i obejmują m.in. pieczywo, dodatki, sosy, swiateczny obiad, wypieki, dla dzieci oraz plik z literówką zypy dla kategorii Zupy.
  - Bieżący frontend używa stringowych ścieżek assetów publicznych w formie /react/images/... zgodnych z vite base '/react/'.
  - Na stronie cateringowej tło kategorii jest podawane przez prop bgImage jako pojedynczy string, więc najbezpieczniejsze mapowanie image_url to przypisanie gotowych publicznych ścieżek per kategoria bez zmiany komponentowego wzorca.

research_metadata:
