      <div key={`${image.src}-${index}`} className="relative aspect-square overflow-hidden rounded-[4px] bg-zinc-100">
  current_layout_explanation: |
    The second hero image is currently the first and only entry of secondaryImages from zip/src/data/cateringWielkanocnyHero.tsx.
    In the lower half of the hero, desktop layout becomes a two-column grid with text on the left and the secondary image stack on the right.
    Because the image wrapper uses aspect-square, the rendered box stays 1:1 and fills the width of the right grid column, which makes it taller than a 16:9 rectangle at the same width.
    The image itself uses h-full w-full object-cover, so the wrapper's aspect ratio fully determines the visible crop box.
  safest_minimal_change_implementation_path: |
    Minimal class-only path:
    1. In zip/src/components/sections/CateringWielkanocnyHero.tsx line 154, replace aspect-square with aspect-[16/9].
    2. If explicit desktop top-edge alignment must be guaranteed rather than left implicit by normal block flow, add lg:items-start to the parent lower grid class at line 129.

    Effect of this path:
    - The secondary image keeps the same column width, border radius, overflow, and object-cover behavior.
    - Height drops automatically because a 16:9 box is shorter than a square at equal width.
    - Top alignment remains visually consistent, and lg:items-start makes that intent explicit on desktop without restructuring markup or changing data contracts.
