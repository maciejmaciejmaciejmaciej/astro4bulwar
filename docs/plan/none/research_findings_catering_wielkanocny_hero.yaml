plan_id: none
objective: Inspect the Catering Wielkanocny hero component on /catering-wielkanocny and identify exactly how the second image in the hero is rendered, including the desktop grid structure, current aspect ratio, and what minimal change would make that second image render as a 16:9 horizontal rectangle with a lower height while aligning its top edge on desktop with the top edge of the left text container in the lower half of the hero.
focus_area: zip/src/components/sections/CateringWielkanocnyHero.tsx
created_at: 2026-03-24
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - The /catering-wielkanocny route resolves to CateringWielkanocnyPage, which renders CateringWielkanocnyHero with data from zip/src/data/cateringWielkanocnyHero.tsx.
  - The lower half of the hero uses a two-column desktop grid; the left column contains offer text and the right column renders secondaryImages via a map.
  - The current second image wrapper is square because it uses aspect-square, so its rendered desktop box is 1:1 at the full width of the right grid column.
  - The smallest code-only change that achieves a lower-height horizontal image is to change that wrapper from aspect-square to a 16:9 aspect class; adding lg:items-start on the parent grid is the minimal alignment guard if explicit desktop top-edge alignment is required.
  - Only one secondary image is currently provided in data: /react/images/wypieki.webp.

