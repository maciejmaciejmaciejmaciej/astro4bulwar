repo_specific_sync_findings:
  exact_current_frontend_source_of_truth:
    category_and_product_content:
      file: zip/src/data/cateringWielkanocny.json
      shape:
        root: array of RawCateringCategory
        category_fields:
          - id: number
          - nazwa_kategorii: string
          - opis_kategorii: string
          - image_url: string starting with /react/images/
          - pozycje: RawCateringProduct[]
        product_fields:
          required_common:
            - id: number
            - gramatura: string
            - cena: number
            - vegan: boolean
            - vegetarian: boolean
          content_variants:
            - combined: zespolona_nazwa_z_opisem
            - split: nazwa_produktu plus opis_produktu or opis_poduktu
    typed_normalizer:
      file: zip/src/data/cateringWielkanocny.ts
      exported_shapes:
        - cateringWielkanocnySource: raw JSON array
        - cateringWielkanocnyCategories: normalized array for UI and cart
    image_source:
      file: zip/public/images
      notes:
        - frontend validator requires image_url to point into /react/images/
        - current filenames are literal business assets, including the typo-based zypy.webp used by category Zupy
    active_consumer:
      file: zip/src/pages/CateringWielkanocnyPage.tsx
      notes:
        - maps cateringWielkanocnyCategories directly into rendered category sections
        - cart and bridge payload depend on category product ids

  exact_existing_import_sync_scripts_and_limitations:
    - file: SCRIPTS/run_upload.js
      purpose: Bulk-create Woo categories and simple products from an inline array, then write source_data.json and result_with_ids.json locally.
      limitations:
        - does not read zip/src/data/cateringWielkanocny.json
        - duplicates catalog content inline, so drift is guaranteed
        - creates products with WC_Product_Simple instead of upserting existing ones
        - has no stable per-product slug or external sync key for updates
        - does not write ids back into zip/src/data/cateringWielkanocny.json
        - does not populate image_url for frontend use
        - assumes every product can be represented by zespolona_nazwa_z_opisem, so it does not preserve current split-name products
        - uses hardcoded SSH key path and uploaded PHP file execution
    - file: SCRIPTS/upload_products.js
      purpose: Intended duplicate of run_upload.js.
      limitations:
        - current file contents are malformed, with broken variable interpolation and mojibake
        - not a trustworthy maintained sync path in its present state
    - file: SCRIPTS/add_special_product.php
      purpose: Creates the separate shell product for the special menu-for-2 flow.
      limitations:
        - only handles one fixed special product
        - not connected to the category JSON sync path
        - not relevant to regular category product syncing except as evidence that canonical Woo ids matter

  recommended_minimal_input_contract_for_one_category_sync_payload:
    rationale: This matches the active raw frontend shape as closely as possible while allowing the sync script to create missing Woo ids.
    payload_shape:
      id: optional number
      nazwa_kategorii: string
      opis_kategorii: string
      image_url: string
      pozycje:
        - id: optional number
          gramatura: string
          cena: number
          vegan: boolean
          vegetarian: boolean
          one_of:
            - zespolona_nazwa_z_opisem: string
            - nazwa_produktu: string
              opis_produktu: string
    repo_specific_notes:
      - keep id as the canonical Woo term or product id field because the frontend already depends on that convention
      - keep image_url in the payload because the active frontend JSON requires it and the normalizer validates it
      - do not introduce a separate woo_product_id field unless the whole frontend and bridge contract are changed

  recommended_output_update_targets:
    - target: zip/src/data/cateringWielkanocny.json
      reason: active frontend catalog source of truth that must receive canonical ids and image_url values
    - target: Woo product_cat term matching the category
      reason: category page and Woo admin taxonomy should stay aligned
    - target: Woo simple products belonging to that term
      reason: bridge checkout validates and prices against real Woo product ids
    - target: optional sync artifact file only if needed for auditing
      reason: result_with_ids.json exists today but is not consumed by the app; it should be treated as optional logging, not a source of truth
    - target: no change to zip/src/data/cateringWielkanocny.ts unless contract changes
      reason: current typed normalizer already matches the active frontend raw shape

  concrete_implementation_recommendation_for_one_script:
    minimal_repo_aligned_approach: Use one local Node script that accepts a single-category payload, loads zip/src/data/cateringWielkanocny.json, replaces or inserts exactly one category in memory, performs Woo upsert for the matching term and products, receives canonical ids back from Woo, and writes the final canonical category object back into zip/src/data/cateringWielkanocny.json.
    why_this_fits_this_repo:
      - existing sync utilities already live in SCRIPTS and already use Node fs plus SSH plus remote WordPress execution
      - the active frontend already expects ids in the same shape that Woo returns
      - bridge checkout already treats those ids as canonical, so one script should own id assignment and write-back
    practical_upsert_rules_needed_by_that_script:
      - category match key: existing category id when present, otherwise nazwa_kategorii as fallback
      - product match key: existing product id when present, otherwise normalized content signature within the category as a fallback only
      - write back newly created Woo ids into the same category payload before saving frontend JSON
      - preserve untouched categories in zip/src/data/cateringWielkanocny.json
      - preserve split-product records in their current raw form instead of flattening them into combined text
    constraints_from_current_repo:
      - output ids must remain numeric and canonical Woo ids
      - image_url must remain a /react/images/... string compatible with current public assets
      - special shell product id 53 from cateringSpecialMenuFor2.ts is outside the regular category sync scope

  likely_file_path_for_new_script:
    file: SCRIPTS/sync_catering_category.js
    basis:
      - existing import utilities already live in SCRIPTS
      - existing repo tooling there is plain JavaScript, not TypeScript
      - the script needs local fs access plus current SSH-based server interaction, which matches the existing SCRIPTS pattern

open_questions:
  - question: What stable fallback key should be used for product upserts when a payload omits id?
    context: The current regular catalog has canonical numeric ids, but the legacy import scripts do not maintain slugs or external sync keys, and multiple products can share similar names with different weights.
  - question: Should the sync process delete Woo products removed from a category payload, or only create and update?
    context: Current scripts only create new terms and products; no deletion or archival rule exists in the repo.
  - question: Is wp-cli available and preferred on the target dhosting environment for this workflow?
    context: Existing scripts use uploaded PHP plus php83 over SSH, while a future single script could potentially be cleaner with wp-cli if the executable path is known and stable.

gaps:
  - area: Stable Woo-side external identifiers for upsert
    description: The current repo exposes canonical ids but no separate immutable sync key for categories or regular products.
    impact: Medium impact on implementation because update-vs-create decisions become ambiguous when ids are absent.
  - area: Existing script reliability
    description: upload_products.js is visibly malformed, and run_upload.js is bulk-only and disconnected from the active frontend source file.
    impact: Medium impact on reuse because the future single-category script should not inherit the broken or drift-prone workflow unchanged.
  - area: Deletion policy
    description: No current code or docs define whether missing products in a payload should be deleted, trashed, hidden, or left untouched in Woo.
    impact: Low to medium impact on the first implementation if the script is limited to upsert-only behavior.
