plan_id: sync-catering-category-20260325
objective: Research the current BULWAR APP codebase to support implementing one script that synchronizes a single catering category payload into both the frontend data file and WooCommerce.
focus_area: catering_category_sync
created_at: 2026-03-25
created_by: GitHub Copilot
status: completed

tldr: |
  - The active frontend catalog source of truth is zip/src/data/cateringWielkanocny.json, validated and normalized by zip/src/data/cateringWielkanocny.ts, then consumed by zip/src/pages/CateringWielkanocnyPage.tsx.
  - Frontend product ids are not cosmetic ids; they are treated as canonical Woo product ids in the cart and bridge checkout payload, so any sync process must preserve or write back Woo ids.
  - Existing Woo import scripts live in SCRIPTS, but they duplicate the catalog inline, create products blindly, do not update the active frontend JSON, and ignore current frontend-only requirements such as image_url and split-name products.
  - The smallest repo-aligned single-category payload is the current raw frontend category shape plus optional id omission for new records; the smallest safe output target set is the frontend JSON plus Woo product_cat and simple products.
  - The most practical single-script approach in this repo is a local Node script in SCRIPTS that updates zip/src/data/cateringWielkanocny.json and then upserts the matching Woo term/products, writing canonical ids back into the same JSON file.

research_metadata:
  methodology: Hybrid retrieval using semantic_search and grep_search, followed by targeted read_file inspection of frontend data modules, cart payload code, existing Woo import scripts, and bridge contracts.
  scope: Focused inspection of the active catering catalog path, the current Woo import utilities, and the bridge/cart coupling points that constrain a future one-category sync script.
  confidence: high
  coverage: 88

