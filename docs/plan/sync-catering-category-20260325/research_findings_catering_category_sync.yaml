related_conventions:
  naming_patterns_in_domain: Frontend catalog data keeps Polish business field names at rest and maps them into English UI-facing property names in TypeScript.
  structure_of_domain: Static catalog content lives under zip/src/data; page composition stays in zip/src/pages; cart and bridge payload logic stays in zip/src/lib; ad hoc import utilities live in SCRIPTS.
  error_handling_in_domain: The typed frontend loader throws on bad content shape, especially around required strings, booleans, numbers, and image_url prefix rules. The legacy upload scripts do not perform comparable local validation before creating Woo records.
  testing_in_domain: Automated tests exist for the cart line model in zip/src/lib/cateringCart.test.ts, including migrated product ids and stable simple-line aggregation, but there are no dedicated tests for the import scripts.
  documentation_in_domain: The most authoritative cross-boundary contract is the bridge documentation in wordpress-plugin/bulwar-bridge/docs/contracts.md.

related_dependencies:
  internal:
    - component: zip/src/pages/CateringWielkanocnyPage.tsx
      relationship_to_domain: consumes normalized categories and sends ids into cart and checkout payloads
      direction: inbound
    - component: zip/src/lib/cateringCart.ts
      relationship_to_domain: treats product ids from the catalog as canonical checkout ids
      direction: inbound
    - component: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php
      relationship_to_domain: validates product ids against Woo products
      direction: inbound
    - component: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
      relationship_to_domain: turns canonical product ids into Woo order items
      direction: inbound
  external:
    - name: WooCommerce product_cat taxonomy and WC_Product_Simple
      purpose_for_domain: Persist category and product records that the frontend ids must match
    - name: Public image assets under zip/public/images
      purpose_for_domain: Provide category image_url values compatible with the frontend validator and page background-image usage

domain_security_considerations:
  sensitive_areas:
    - area: Woo product creation and id authority
      location: SCRIPTS/run_upload.js and wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
      concern: The sync path must preserve canonical Woo ids because the bridge trusts those ids for pricing and order creation.
    - area: SSH credentials and remote execution
      location: SCRIPTS/run_upload.js
      concern: Existing scripts rely on a hardcoded SSH key path and remote code execution pattern.
  authentication_patterns_in_domain: Current import scripts authenticate through SSH to the dhosting host and run PHP in a WordPress context.
  authorization_patterns_in_domain: Frontend checkout does not own Woo credentials; the bridge and server-side WordPress context remain the trusted writers.
  data_validation_in_domain: Frontend catalog validation is strict around required types and image_url prefix. Bridge validation is strict around canonical Woo product ids.

