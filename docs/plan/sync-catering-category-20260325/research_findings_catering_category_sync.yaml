patterns_found:
  - category: structure
    pattern: Frontend uses a two-step raw JSON plus typed normalizer pipeline
    description: The active page does not read root-level staging files. It imports normalized data built from zip/src/data/cateringWielkanocny.json through zip/src/data/cateringWielkanocny.ts.
    examples:
      - file: zip/src/data/cateringWielkanocny.ts
        location: zip/src/data/cateringWielkanocny.ts:1
        snippet: import cateringWielkanocnyJson from "./cateringWielkanocny.json";
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:12
        snippet: import { cateringWielkanocnyCategories } from "../data/cateringWielkanocny";
    prevalence: common

  - category: naming
    pattern: Raw content stays in Polish business keys while normalized frontend contracts switch to English UI keys
    description: The JSON layer uses nazwa_kategorii, opis_kategorii, image_url, pozycje, gramatura, cena, while the typed layer exposes title, description, imageUrl, products, weight, and price.
    examples:
      - file: zip/src/data/cateringWielkanocny.ts
        location: zip/src/data/cateringWielkanocny.ts:17
        snippet: export interface RawCateringCategory { id: number; nazwa_kategorii: string; opis_kategorii: string; image_url: string; pozycje: RawCateringProduct[]; }
      - file: zip/src/data/cateringWielkanocny.ts
        location: zip/src/data/cateringWielkanocny.ts:50
        snippet: export interface CateringCategoryContract { id: number; title: string; description?: string; imageUrl: string; products: CateringProductContract[]; }
    prevalence: common

  - category: architecture
    pattern: Product id is a cross-boundary canonical identifier, not a frontend-only key
    description: The same numeric id powers page rendering, cart persistence, bridge payload generation, Woo price lookup, and final order creation.
    examples:
      - file: zip/src/lib/cateringCart.ts
        location: zip/src/lib/cateringCart.ts:64
        snippet: product_id: number;
      - file: wordpress-plugin/bulwar-bridge/docs/contracts.md
        location: wordpress-plugin/bulwar-bridge/docs/contracts.md:121
        snippet: product_id must always be the canonical Woo product ID
      - file: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
        location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:92
        snippet: throw new RuntimeException('UNKNOWN_PRODUCT');
    prevalence: common

  - category: structure
    pattern: Existing Woo import workflow is separate from the active frontend data source
    description: The existing scripts generate source_data.json and result_with_ids.json in the repo root instead of mutating the active catalog file under zip/src/data.
    examples:
      - file: SCRIPTS/run_upload.js
        location: SCRIPTS/run_upload.js:342
        snippet: fs.writeFileSync('source_data.json', JSON.stringify(data, null, 2));
      - file: SCRIPTS/run_upload.js
        location: SCRIPTS/run_upload.js:413
        snippet: fs.writeFileSync('result_with_ids.json', result);
    prevalence: common

  - category: error_handling
    pattern: Frontend data loader validates content shape strictly, while legacy sync scripts mostly assume success
    description: The normalizer throws on invalid fields and invalid image_url prefixes, but the legacy upload script mostly creates new records and only logs top-level command errors.
    examples:
      - file: zip/src/data/cateringWielkanocny.ts
        location: zip/src/data/cateringWielkanocny.ts:87
        snippet: if (!imageUrl.startsWith(PUBLIC_IMAGE_PREFIX)) { throw new Error(...) }
      - file: SCRIPTS/run_upload.js
        location: SCRIPTS/run_upload.js:419
        snippet: console.error("Error occurred:", e.message);
    prevalence: occasional

