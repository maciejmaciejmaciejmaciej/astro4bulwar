plan_id: sync-catering-category-20260325
objective: >-
  Create one practical script for BULWAR APP that synchronizes a single catering
  category payload into both zip/src/data/cateringWielkanocny.json and the WooCommerce
  catalog on the v2 WordPress instance, while preserving the current frontend contract
  where category image lives at category level and product/category ids remain canonical
  Woo ids.
created_at: 2026-03-25
created_by: GitHub Copilot
status: pending_approval
research_confidence: high

tldr: |
  Build one local Node entrypoint at SCRIPTS/sync_catering_category.js.
  Feed it one source-of-truth category payload matching the current raw frontend JSON shape, with optional id fields for create flows and preserved category-level image_url.
  The script should validate the payload, upsert the matching Woo product_cat term and simple products on v2, then write the canonical returned ids back into zip/src/data/cateringWielkanocny.json.
  Recommendation: use SSH plus a WordPress-bootstrap PHP worker for Woo writes, not WP-CLI, because the repo already relies on that execution model, Woo API access is direct in PHP, and WP-CLI availability/path on dhosting is still unverified.

open_questions:
  - Confirm the exact v2 WordPress root path and PHP executable to be used by the remote worker so the implementation can avoid hardcoded drift.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The sync path creates new Woo products instead of updating existing ones because payload ids are missing or fallback matching is weak.
      likelihood: medium
      impact: high
      mitigation: Treat existing numeric ids as the primary match key, use category name plus deterministic content signature only as a fallback, and write new ids back immediately to the frontend JSON source.
    - scenario: The frontend JSON is updated locally but Woo upsert fails remotely, leaving the repo source ahead of production.
      likelihood: medium
      impact: high
      mitigation: Only persist the final canonical category object to zip/src/data/cateringWielkanocny.json after the remote worker returns success with canonical term and product ids.
  assumptions:
    - zip/src/data/cateringWielkanocny.json remains the active frontend source of truth for regular catering categories.
    - Product and category id fields must continue to store canonical Woo ids because checkout and bridge logic depend on them.
    - V1 scope is upsert-only for one category; deletion or archival of missing Woo products is out of scope.
    - The current category-level image_url contract must remain unchanged.

implementation_specification:
  code_structure: >-
    Add one local orchestration script at SCRIPTS/sync_catering_category.js. The script accepts a path to one single-category payload file, validates that payload against the current raw frontend contract, sends it over SSH to a small PHP worker running in WordPress context on v2, receives the canonical Woo ids for the category and products, merges that canonical category back into zip/src/data/cateringWielkanocny.json, and preserves all untouched categories. Keep the remote PHP worker minimal and focused on Woo term/product upsert plus JSON response output.
  affected_areas:
    - SCRIPTS/sync_catering_category.js
    - SCRIPTS remote Woo upsert worker script or generated temporary PHP worker
    - zip/src/data/cateringWielkanocny.json
    - Optional operator payload file for one category sync
  component_details:
    - component: Single-category payload contract
      responsibility: Define the one source-of-truth input shape used for both frontend JSON persistence and Woo upsert.
      interfaces:
        - "Input file shape: { id?: number, nazwa_kategorii: string, opis_kategorii: string, image_url: string, pozycje: Array<{ id?: number, gramatura: string, cena: number, vegan: boolean, vegetarian: boolean } & ({ zespolona_nazwa_z_opisem: string } | { nazwa_produktu: string, opis_produktu: string })> }"
    - component: Local sync orchestrator at SCRIPTS/sync_catering_category.js
      responsibility: Validate input, load zip/src/data/cateringWielkanocny.json, call the remote Woo upsert worker, and write back the canonical category object with returned ids.
      interfaces:
        - "CLI: node SCRIPTS/sync_catering_category.js --input <path-to-category-payload.json>"
        - "Output: updated zip/src/data/cateringWielkanocny.json plus a concise execution summary"
    - component: Remote Woo upsert worker
      responsibility: Bootstrap WordPress and WooCommerce on v2, upsert one product_cat term, create or update simple Woo products inside that term, and return canonical ids in the same raw category shape.
      interfaces:
        - "Request: one raw category object serialized from the local script"
        - "Response: one canonical raw category object with Woo term/product ids populated"
  dependencies:
    - component: Local sync orchestrator at SCRIPTS/sync_catering_category.js
      relationship: depends on the single-category payload contract and remote worker response contract
    - component: Remote Woo upsert worker
      relationship: depends on WordPress bootstrap, WooCommerce APIs, and the canonical raw category contract
  integration_points:
    - zip/src/data/cateringWielkanocny.json as the only frontend source-of-truth file for regular categories
    - v2 WordPress instance over SSH with a PHP worker bootstrapping WordPress and WooCommerce
    - Existing frontend normalizer in zip/src/data/cateringWielkanocny.ts, which must not require contract changes

contracts:
  - from_task: T1
    to_task: T2
    interface: Single-category input payload schema, upsert-only scope, id matching rules, and recommended script path
    format: JSON file plus implementation notes
  - from_task: T1
    to_task: T3
    interface: Remote Woo write strategy and canonical response shape for one synced category
    format: SSH-executed PHP worker returning JSON
  - from_task: T2
    to_task: T4
    interface: Local execution flow, validation behavior, and JSON write-back rules
    format: CLI workflow and updated JSON file
  - from_task: T3
    to_task: T4
    interface: Canonical Woo term/product ids returned in the raw category payload
    format: JSON object matching the frontend raw category contract

