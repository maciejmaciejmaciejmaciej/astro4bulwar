  dependencies:
    - component: CateringWielkanocnyPage
      relationship: composes CateringProductListAlt and drops Hero24 from route composition
    - component: CateringProductListAlt
      relationship: mirrors the existing width convention observed in CateringSection
  integration_points:
    - React Router route /catering-wielkanocny
    - Existing Tailwind utility classes defined and already used in zip/src
    - Frontend build in zip/package.json

