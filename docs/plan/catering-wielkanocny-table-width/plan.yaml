tldr: |
  Reduce the /catering-wielkanocny page to the requested table-like product-list section and align that section's desktop width with the width pattern already used by the homepage CateringSection. Keep the existing global page shell, reuse only existing utilities/classes, and treat CateringSection as the width reference rather than inventing a new layout rule.
