      likelihood: medium
      impact: medium
      mitigation: Mirror the established page-margin plus inner max-width pattern from CateringSection and verify on desktop before approval.
    - scenario: Removing extra route sections leaves unused imports, spacing gaps, or dead component usage in the page file.
      likelihood: medium
      impact: low
      mitigation: Clean page composition and imports together, then run the frontend build.
  assumptions:
    - The requested change removes Hero24 and other non-table sections from the main route composition, while keeping the existing global shell such as Navbar, breadcrumbs, Footer, and cart controls.
    - The active table-like block is CateringProductListAlt, with CateringSection serving only as the width reference.
    - Width alignment should reuse existing page-margin and max-w utility classes already present in the codebase.

