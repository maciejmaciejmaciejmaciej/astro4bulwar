      interfaces:
        - Renders the existing CateringProductListAlt props contract for title, products, and optional bgImage.
    - component: CateringProductListAlt
      responsibility: Provide the retained table-like content block and own the inner width shell that must be widened to match the established desktop pattern.
      interfaces:
