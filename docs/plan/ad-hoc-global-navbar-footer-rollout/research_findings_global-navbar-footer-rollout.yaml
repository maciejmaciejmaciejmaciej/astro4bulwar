related_architecture:
  components_relevant_to_domain:
    - component: WordPress bridge plugin bootstrap
      responsibility: Loads bridge classes and registers WordPress hooks for constants, page-builder meta, routes, and Woo meta display filters.
      location: wordpress-plugin/bulwar-bridge/bulwar-bridge.php
      relationship_to_domain: domain owns the only current backend entrypoint for page-builder data
    - component: PageBuilderController
      responsibility: Reads and writes page-builder schema post meta for WordPress pages.
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      relationship_to_domain: domain is the current authoritative source for frontend page-builder payloads
    - component: React page-builder fetch/hydration layer
      responsibility: Fetches bridge schema and resolves WordPress/Woo-backed block sources before rendering.
      location: zip/src/blocks/registry/
      relationship_to_domain: domain would be the natural insertion point for any shared global layout payload on the React side
    - component: React route shell
      responsibility: Wraps routed pages with navbar, footer, sticky cart controls, and checkout drawer.
      location: zip/src/layouts/RootLayout.tsx
      relationship_to_domain: domain currently duplicates ownership with page-level shells
    - component: Astro build-time page-builder pipeline
      responsibility: Fetches page-builder schema and resolves menu blocks during static generation.
      location: astro-site/src/lib/
      relationship_to_domain: domain would need any global layout payload normalized before BaseLayout renders
    - component: Astro shared layout shell
      responsibility: Wraps Astro pages with static navbar/footer chrome.
      location: astro-site/src/layouts/BaseLayout.astro
      relationship_to_domain: this uses domain outputs indirectly but currently receives no global layout data
  interfaces_used_by_domain:
    - interface: Response success/error envelope
      location: wordpress-plugin/bulwar-bridge/src/Support/Response.php
      usage_pattern: All bridge routes return `{ success, data|error, meta }` envelopes.
    - interface: React PageBuilderSchema
      location: zip/src/blocks/registry/pageBuilderSchema.ts
      usage_pattern: Bridge schema responses are normalized then validated against the local block registry.
    - interface: Astro PageBuilderSchema
      location: astro-site/src/lib/types.ts
      usage_pattern: Bridge schema responses are normalized then validated against Astro-local, narrower block unions.
    - interface: CateringPageFooterProps
      location: zip/src/components/sections/CateringPageFooter.tsx
      usage_pattern: Existing prop-driven footer variant already consumes arrays of social and legal links.
  data_flow_involving_domain: WordPress page slug -> bridge `PageBuilderController::show()` -> response envelope with normalized `schema` and optional `aiSchema` -> React `fetchWordPressPageBuilderSchema()` or Astro `fetchWordPressPageBuilderSchema()` -> optional Woo/WordPress source hydration (`resolvePageBuilderSchemaSources()` in React, `resolveMenuBlock()` in Astro) -> route/layout components render chrome plus sections.
  key_relationships_to_domain:
