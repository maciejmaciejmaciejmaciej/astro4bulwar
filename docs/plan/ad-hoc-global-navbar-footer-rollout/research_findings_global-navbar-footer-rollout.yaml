      purpose_for_domain: Supplies menu/product data for source-backed page-builder sections.
    - name: WordPress core post meta and options APIs
      purpose_for_domain: Persist page-builder schema and resolve store-origin fallback settings.

domain_security_considerations:
  sensitive_areas:
    - area: Page-builder mutation endpoint
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:45
      concern: Only the POST route is permission-gated; any future global navbar/footer write endpoint would need equivalent capability checks.
    - area: Public page-builder read route
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:19
      concern: Public reads are allowed only for published pages; draft/private pages require edit permission.
    - area: Hardcoded external links and React asset URLs
      location: zip/src/components/sections/Footer.tsx:41
      concern: Current chrome sources content from code, not from sanitized CMS fields, so any move to CMS data would need sanitization rules for URLs and labels.
  authentication_patterns_in_domain: Public page-builder GET uses `permission_callback => '__return_true'` and then enforces publish/edit checks inside the controller; page-builder POST uses `current_user_can('edit_pages')`; checkout routes are public by design and rely on payload/token validation.
  authorization_patterns_in_domain: `PageBuilderController::update()` also checks `current_user_can('edit_post', $page->ID)` before writing post meta.
  data_validation_in_domain: Bridge validates JSON payload shape and normalizes schema/meta before returning; React and Astro re-validate payloads locally with Zod before rendering.

testing_patterns:
  framework: PHP unit-style tests in the bridge plus React/Node test files in `zip/src/**.test.ts(x)`.
  coverage_areas:
    - Bridge availability generation and Make webhook behavior.
    - React registry invariants and page-builder source hydration.
    - Prop-driven catering footer/header rendering.
  test_organization: Backend tests live under `wordpress-plugin/bulwar-bridge/tests/`; React tests live adjacent to source files under `zip/src/`.
  mock_patterns:
    - Fetch mocks for WordPress and Woo Store API URLs in `resolvePageBuilderSources.test.ts`.
    - Injected `httpPost` and logger callbacks in `MakeWebhookNotifier` for testability.

open_questions:
  - question: What WordPress data source should become the authority for shared navbar/footer content?
    context: Current bridge code only persists page-scoped page-builder post meta and a few checkout-related constants/options; no global layout entity or route exists.
    type: decision_blocker
    affects: [global-navbar-footer-rollout]
  - question: Should the eventual shared payload align to the richer React navbar structure or the narrower Astro navbar structure?
    context: React `Navbar2` has multi-column overlay sections plus company/legal footer links, while Astro `Navbar.astro` exposes only `logoSrc` and a flat hardcoded link tree.
    type: decision_blocker
    affects: [global-navbar-footer-rollout]
  - question: Should React home keep page-level shell ownership or be normalized under `RootLayout` like other routed pages?
    context: `HomePage.tsx` duplicates the same shell pieces that `RootLayout.tsx` already renders for route children.
    type: research
    affects: [global-navbar-footer-rollout]

gaps:
  - area: Global layout backend contract
    description: No existing bridge route, storage schema, or controller handles site-wide navbar/footer payloads; only page-level page-builder data is modeled today.
    impact: decision_blocker
    affects: [global-navbar-footer-rollout]
  - area: Astro layout payload compatibility
    description: Astro `types.ts` only accepts gallery and one menu block type, and Astro `Navbar.astro`/`Footer.astro` lack structured props beyond `logoSrc`.
    impact: research_blocker
    affects: [global-navbar-footer-rollout]
  - area: Shell ownership consistency in React
    description: The same main chrome is owned by both `RootLayout` and standalone pages, which obscures the single insertion point for a future shared layout payload.
    impact: research_blocker
    affects: [global-navbar-footer-rollout]
