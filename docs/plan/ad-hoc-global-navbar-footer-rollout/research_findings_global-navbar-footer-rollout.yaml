plan_id: ad-hoc-global-navbar-footer-rollout
objective: Prepare read-only implementation notes for a global navbar/footer rollout across the Bulwar WordPress bridge, React app, and Astro site.
focus_area: global-navbar-footer-rollout
created_at: 2026-04-18T00:00:00Z
created_by: github-copilot-gpt-5.4
status: completed

tldr: |
  - The WordPress bridge currently exposes only page-level page-builder data at `GET/POST /wp-json/bulwar/v1/page-builder/pages/{slug}` and persists that data only in page post meta keys `page_builder_schema` and `page_builder_schema_for_ai` ([wordpress-plugin/bulwar-bridge/src/Http/Routes.php:39](wordpress-plugin/bulwar-bridge/src/Http/Routes.php#L39), [wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:33](wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php#L33), [wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:86](wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php#L86)).
  - React resolves WordPress-driven page-builder content in two phases: schema fetch via `fetchWordPressPageBuilderSchema()` and source hydration via `resolvePageBuilderSchemaSources()`; `TestowaBlueprintPage` is the clearest live example of that chain ([zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts:61](zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts#L61), [zip/src/blocks/registry/resolvePageBuilderSources.ts:38](zip/src/blocks/registry/resolvePageBuilderSources.ts#L38), [zip/src/pages/TestowaBlueprintPage.tsx:22](zip/src/pages/TestowaBlueprintPage.tsx#L22)).
  - Astro uses a parallel build-time pipeline, but its schema/types currently cover only gallery and one menu block, and its layout chrome is still fully hardcoded in `BaseLayout.astro`, `Navbar.astro`, and `Footer.astro` ([astro-site/src/lib/wordpress.ts:50](astro-site/src/lib/wordpress.ts#L50), [astro-site/src/lib/pageBuilder.ts:5](astro-site/src/lib/pageBuilder.ts#L5), [astro-site/src/lib/types.ts:58](astro-site/src/lib/types.ts#L58), [astro-site/src/layouts/BaseLayout.astro:26](astro-site/src/layouts/BaseLayout.astro#L26)).
  - The main React navbar/footer pair is not data-driven: `NavbarBigSpaceBetweenElements.tsx` embeds `NAV_ITEMS`, `FOOTER_LINKS`, `COMPANY_LINKS`, and local open-state internally, while `Footer.tsx` hardcodes all contact/legal/social content ([zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx:6](zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx#L6), [zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx:66](zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx#L66), [zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx:85](zip/src/components/sections/NavbarBigSpaceBetweenElements.tsx#L85), [zip/src/components/sections/Footer.tsx:1](zip/src/components/sections/Footer.tsx#L1)).
  - The current rollout gotchas are concrete: React has duplicate shell ownership between `RootLayout` and `HomePage`, Astro has a separate hardcoded chrome implementation, and the only existing prop-driven layout pieces are the catering header/footer variants ([zip/src/layouts/RootLayout.tsx:13](zip/src/layouts/RootLayout.tsx#L13), [zip/src/pages/HomePage.tsx:71](zip/src/pages/HomePage.tsx#L71), [astro-site/src/components/Navbar.astro:6](astro-site/src/components/Navbar.astro#L6), [zip/src/components/sections/CateringPageHeader.tsx:1](zip/src/components/sections/CateringPageHeader.tsx#L1), [zip/src/components/sections/CateringPageFooter.tsx:6](zip/src/components/sections/CateringPageFooter.tsx#L6)).

