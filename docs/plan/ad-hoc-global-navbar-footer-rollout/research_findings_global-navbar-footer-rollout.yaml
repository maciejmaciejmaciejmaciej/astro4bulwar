related_technology_stack:
  languages_used_in_domain:
    - PHP 8 style strict-types code in the WordPress bridge ([wordpress-plugin/bulwar-bridge/src/Plugin.php:1](wordpress-plugin/bulwar-bridge/src/Plugin.php#L1))
    - TypeScript/TSX in the React app ([zip/package.json](zip/package.json))
    - TypeScript and Astro component syntax in the Astro site ([astro-site/package.json](astro-site/package.json))
  frameworks_used_in_domain:
    - name: WordPress REST API
      usage_in_domain: Bridge endpoints are registered with `register_rest_route()` and use `WP_REST_Request` and `WP_REST_Response`.
    - name: WooCommerce
      usage_in_domain: Checkout services read Woo products, create Woo orders, and use Woo store options/meta.
    - name: React 19
      usage_in_domain: React runtime pages and shell components render the current global chrome and page-builder sections.
    - name: React Router 7.13.1
      usage_in_domain: `RootLayout` provides the route shell around `Outlet` pages.
    - name: Astro 5.14.2
      usage_in_domain: Astro statically builds page-builder pages using build-time fetches from WordPress and Woo endpoints.
  libraries_used_in_domain:
    - name: zod 4.3.6
      purpose_in_domain: Validates page-builder payloads and source contracts in both React and Astro.
    - name: framer-motion 12.38.0
      purpose_in_domain: Powers the animated overlay menu in the React navbar.
    - name: clsx 2.1.1
      purpose_in_domain: Composes conditional class names in the React navbar.
    - name: lucide-react 0.546.0
      purpose_in_domain: Supplies overlay arrow icons in the React navbar.
  external_apis_used_in_domain:
    - name: WordPress REST API
      integration_point: React and Astro fetch `/wp-json/bulwar/v1/page-builder/pages/{slug}` and React also fetches `/wp-json/wp/v2/posts`.
    - name: Woo Store API
      integration_point: React `wooStoreApi.ts` and Astro `woo.ts` fetch product/category data from `/wp-json/wc/store/v1/...`.

related_conventions:
  naming_patterns_in_domain: Bridge classes are grouped by responsibility (`Http/Controllers`, `Checkout`, `Slots`, `Support`, `Config`), React page-builder helpers use verb-prefixed names such as `fetchWordPressPageBuilderSchema` and `resolvePageBuilderSchemaSources`, and shell components use descriptive names like `NavbarBigSpaceBetweenElements`, `CateringPageHeader`, and `BaseLayout`.
  structure_of_domain: Backend concerns are centralized in the bridge plugin; React keeps page-builder fetch/hydration under `zip/src/blocks/registry/`; Astro keeps analogous helpers under `astro-site/src/lib/`; shared shells live in `zip/src/layouts/` and `astro-site/src/layouts/`.
  error_handling_in_domain: Bridge endpoints standardize errors through `Response::error(...)`; React/Astro fetch helpers throw `Error` with API or HTTP message text; `TestowaBlueprintPage` catches and surfaces fetch/hydration errors into local state.
  testing_in_domain: Bridge has unit tests for availability and webhook behavior under `wordpress-plugin/bulwar-bridge/tests/`; React has registry/source resolver tests and component tests for catering footer/header variants.
  documentation_in_domain: Bridge behavior is documented in `wordpress-plugin/bulwar-bridge/docs/contracts.md`; no equivalent checked-in docs were found for a global navbar/footer payload contract.

