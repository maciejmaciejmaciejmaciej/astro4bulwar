patterns_found:
  - category: architecture
    pattern: TemplatePage2 preview sections follow a simple label plus component sequence.
    description: Existing previews are imported from zip/src/components/sections and rendered in order with a small heading block before each section.
    examples:
      - file: zip/src/pages/TemplatePage2.tsx
        location: zip/src/pages/TemplatePage2.tsx:1
        snippet: import Template2Cta / Hero45 / Hero214 / Feature314 and render each beneath a small uppercase label.
    prevalence: common
  - category: structure
    pattern: Raw for_blocks files assume the @ alias resolves to root-level zip/components and zip/lib.
    description: Because zip/tsconfig.json maps @/* to ./*, imports like @/components/ui/button resolve to zip/components/ui/button.tsx, not zip/src/components.
    examples:
      - file: zip/tsconfig.json
        location: zip/tsconfig.json:17
        snippet: '"@/*": ["./*"]'
      - file: for_blocks/about3.tsx
        location: for_blocks/about3.tsx:1
        snippet: imports from @/components/kibo-ui/marquee and @/components/ui/button.
    prevalence: common
  - category: architecture
    pattern: Translation flow already exists from raw block geometry into project section components.
    description: zip/src/components/sections/About28.tsx preserves the rough two-column geometry of the raw About28 block while swapping typography, spacing, and CTA styling to project tokens.
    examples:
      - file: for_blocks/about28.tsx
        location: for_blocks/about28.tsx:25
        snippet: raw About28 exports mirrored text-image layout.
      - file: zip/src/components/sections/About28.tsx
        location: zip/src/components/sections/About28.tsx:26
        snippet: translated About28 keeps mirrored layout but uses project labels, headline styles, and CTA treatment.
    prevalence: occasional
  - category: dependencies
    pattern: Current Button wrapper is compatible with existing repo link-button patterns.
    description: The repo already contains sections using render plus nativeButton=false and asChild, so these API shapes are not unique to the raw blocks under review.
    examples:
      - file: zip/src/components/sections/About28.tsx
        location: zip/src/components/sections/About28.tsx:151
        snippet: Button render={<a href={ctaButton.href} />} nativeButton={false}
      - file: zip/src/components/sections/Feature314.tsx
        location: zip/src/components/sections/Feature314.tsx:75
        snippet: Button render={<a href={button.url} />} nativeButton={false}
      - file: zip/src/components/sections/AboutSection.tsx
        location: zip/src/components/sections/AboutSection.tsx:96
        snippet: Button asChild with Link wrapper.
    prevalence: common
  - category: dependencies
    pattern: The major integration risk is missing local wrappers and missing package/assets, not core React or Tailwind compatibility.
    description: Several raw blocks import local UI wrappers that do not exist under zip/components/ui and one raw block expects local public images that are absent from zip/public.
    examples:
      - file: for_blocks/hero166.tsx
        location: for_blocks/hero166.tsx:3
        snippet: imports @/components/ui/aspect-ratio and references /images/hero166/*.jpg
      - file: for_blocks/logos10.tsx
        location: for_blocks/logos10.tsx:5
        snippet: imports @/components/ui/carousel and embla-carousel-auto-scroll
      - file: for_blocks/testimonial7.tsx
        location: for_blocks/testimonial7.tsx:5
        snippet: imports avatar, badge, card, carousel, and embla-carousel-auto-scroll
      - file: for_blocks/about3.tsx
        location: for_blocks/about3.tsx:1
        snippet: imports @/components/kibo-ui/marquee subcomponents absent from the repo.
    prevalence: common

