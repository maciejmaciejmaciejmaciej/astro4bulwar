related_conventions:
  naming_patterns_in_domain: Raw block component names are PascalCase numeric imports such as About28 or Feature285; translated sections in zip/src/components/sections preserve PascalCase exports and are imported directly into preview pages.
  structure_of_domain: Preview pages import sections from zip/src/components/sections, while low-level reusable UI primitives resolve from root-level zip/components/ui via the @ alias.
  error_handling_in_domain: Dynamic imports in carousel-based blocks catch plugin load failures and degrade to empty plugin arrays; no broader error-boundary pattern was found in the requested files.
  testing_in_domain: TemplatePage2 uses a node:test plus renderToStaticMarkup smoke test that asserts preview labels and content ordering.
  documentation_in_domain: The governing workflow is documented in .github/instructions/design-system.instructions.md, which explicitly defines TemplatePage as reference and TemplatePage2 as preview sandbox.

