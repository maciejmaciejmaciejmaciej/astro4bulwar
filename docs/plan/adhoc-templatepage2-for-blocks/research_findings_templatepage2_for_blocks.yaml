plan_id: adhoc-templatepage2-for-blocks
objective: Determine what is needed to add every TSX block from for_blocks/ to zip/src/pages/TemplatePage2.tsx as preview sections, following the repo's established translation-only workflow.
focus_area: for_blocks to TemplatePage2 preview readiness
created_at: 2026-04-21
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - TemplatePage2 is the sanctioned preview sandbox, while TemplatePage remains the visual reference and translation-only workflow source of truth. Sources: zip/src/pages/TemplatePage2.tsx, .github/instructions/design-system.instructions.md.
  - The requested for_blocks preview set now lands as About1, Feature285, Logos10, and Testimonial7 integrated into TemplatePage2 plus About28 satisfied by reuse of the existing translated sibling in zip/src/components/sections/About28.tsx.
  - The carousel path is now implemented through a shared local primitive in zip/components/ui/carousel.tsx, which is consumed by both zip/src/components/sections/Logos10.tsx and zip/src/components/sections/Testimonial7.tsx and rendered on TemplatePage2. About3 remains clear-for-follow-up because the remaining gap is a source-compatible marquee composition and fade-wrapper surface; Hero166 is still blocked by the missing zip/public/images/hero166/cooking-1.jpg through cooking-8.jpg asset bundle. Sources: for_blocks/*.tsx, zip/components/ui/carousel.tsx, zip/src/components/sections/Logos10.tsx, zip/src/components/sections/Testimonial7.tsx, zip/src/pages/TemplatePage2.tsx, zip/public/.
  - Button usage itself is not a blocker for this task: the repo already typechecks sections using render plus nativeButton={false} and asChild patterns against the current Button wrapper. Sources: zip/components/ui/button.tsx, zip/src/components/sections/About28.tsx, zip/src/components/sections/Feature314.tsx, zip/src/components/sections/AboutSection.tsx.
  - Validation recorded here is preview integration validation only for TemplatePage2, not reusable production-block approval. The passing command set for this completion is TemplatePage2 test plus zip frontend lint.

execution_outcomes:
  scope_note: This outcome record is intentionally limited to the requested for_blocks preview set. Previously added TemplatePage2 previews such as CTA, Hero45, Hero214, and Feature314 remain on the page but are out of scope for this document update.
  remaining_scope_note: Interactive carousel behavior for Logos10 and Testimonial7 is still only browser-verified if manually checked; this document records no automated browser test coverage for that interaction path.
  final_templatepage2_for_blocks_inventory:
    - block: About1
      source: for_blocks/about1.tsx
      status: integrated
      implementation_note: Added as a translated preview section in TemplatePage2.
    - block: About28
      source: for_blocks/about28.tsx
      status: reused-existing
      implementation_note: Reuses the existing translated sibling in zip/src/components/sections/About28.tsx instead of duplicating the raw block translation.
    - block: Feature285
      source: for_blocks/feature285.tsx
      status: integrated
      implementation_note: Added as a translated preview section in TemplatePage2.
    - block: Logos10
      source: for_blocks/logos10.tsx
      status: integrated
      implementation_note: Added as a translated preview section in TemplatePage2 using the shared local carousel primitive in zip/components/ui/carousel.tsx.
    - block: Testimonial7
      source: for_blocks/testimonial7.tsx
      status: integrated
      implementation_note: Added as a translated preview section in TemplatePage2 using the shared local carousel primitive in zip/components/ui/carousel.tsx.
  gate_outcomes:
    - block: About3
      status: clear-for-follow-up
      blocker_summary: Missing source-compatible marquee composition and fade-wrapper surface.
    - block: Hero166
      status: blocked
      blocker_summary: Missing zip/public/images/hero166/cooking-1.jpg through cooking-8.jpg asset bundle.
  validation:
    scope: Preview integration only for TemplatePage2. This does not grant production approval, reusable block-registry readiness, or page-builder readiness.
    commands:
      - command: npx tsx --test src/pages/TemplatePage2.test.tsx
        working_directory: zip/
        result: passed
      - command: npm run lint
        working_directory: zip/
        result: passed

