plan_id: adhoc-templatepage2-for-blocks
objective: Integrate the immediately feasible root for_blocks TSX entries into zip/src/pages/TemplatePage2.tsx as preview sections and explicitly document the gates required for blocks that cannot yet be translated 1:1.
created_at: '2026-04-21T00:00:00Z'
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 9
  risk_score: medium

tldr: |
  The core completion path now covers only the immediately ready preview set: translate About1, reuse the existing About28 sibling, translate Feature285, and integrate that set into TemplatePage2 with preview-scoped validation. This keeps the plan aligned to the sandbox role of TemplatePage2 instead of overstating production-block readiness (sources: zip/src/pages/TemplatePage2.tsx, zip/src/pages/TemplatePage2.test.tsx, zip/src/components/sections/About28.tsx, docs/plan/adhoc-templatepage2-for-blocks/research_findings_templatepage2_for_blocks.yaml, .github/instructions/design-system.instructions.md).
  About3 moves behind a dedicated feasibility gate first because its source marquee API does not exist locally in the same shape, so the plan must decide whether a small local bridge is acceptable before scheduling translation work. Hero166 and the carousel pair remain explicit gate outcomes rather than completion blockers (sources: for_blocks/about3.tsx, zip/components/ui/marquee.tsx, for_blocks/hero166.tsx, for_blocks/logos10.tsx, for_blocks/testimonial7.tsx, docs/plan/adhoc-templatepage2-for-blocks/research_findings_templatepage2_for_blocks.yaml, .github/instructions/design-system.instructions.md).
  Package addition is treated as an explicit decision gate, not as a standing repo prohibition. The carousel path therefore ends in an approval-or-block verdict that can feed a later extension plan without deadlocking this one (sources: zip/package.json, for_blocks/logos10.tsx, for_blocks/testimonial7.tsx, docs/plan/adhoc-templatepage2-for-blocks/research_findings_templatepage2_for_blocks.yaml).

open_questions:
  - Can the exact Hero166 image bundle be supplied into zip/public/images/hero166 so the block can move past gate review without changing appearance? (sources: for_blocks/hero166.tsx, docs/plan/adhoc-templatepage2-for-blocks/research_findings_templatepage2_for_blocks.yaml)
  - If the user wants the carousel pair moved from gated to implementable later, is package addition approval available for a shared carousel foundation that preserves the source interaction model? (sources: zip/package.json, for_blocks/logos10.tsx, for_blocks/testimonial7.tsx)

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Gated follow-up blocks are still wired into the critical path, so the plan cannot complete when one of the missing primitives, assets, or package decisions stays unresolved.
      likelihood: medium
      impact: critical
      mitigation: |
        Keep completion anchored to core preview integration plus gate outcomes only. Treat About3, Hero166, Logos10, and Testimonial7 as documented follow-up gates unless a later extension plan is explicitly authorized after those gates clear (sources: zip/src/pages/TemplatePage2.tsx, docs/plan/adhoc-templatepage2-for-blocks/research_findings_templatepage2_for_blocks.yaml).
    - scenario: Preview-level validation is misread as full reusable production-block approval.
      likelihood: medium
      impact: high
      mitigation: |
        State the validation scope explicitly in the integration and documentation tasks: lint, TemplatePage2 render/order checks, and route sanity are sufficient for preview integration only, not for final block-registry or production page-builder approval (sources: zip/src/pages/TemplatePage2.tsx, zip/src/pages/TemplatePage2.test.tsx, .github/instructions/design-system.instructions.md).
    - scenario: The carousel pair is treated as blocked by repo policy even though the actual constraint is that package addition requires an explicit decision.
      likelihood: medium
      impact: medium
      mitigation: |
        Frame the carousel path as a package-decision gate with an approval-or-block output, and document the exact missing foundation instead of claiming an existing no-new-dependencies policy (sources: zip/package.json, for_blocks/logos10.tsx, for_blocks/testimonial7.tsx).
  assumptions:
    - The existing translated About28 section in zip/src/components/sections/About28.tsx is the canonical sibling to reuse for the About28 preview instead of translating the raw block again (sources: zip/src/components/sections/About28.tsx, docs/plan/adhoc-templatepage2-for-blocks/research_findings_templatepage2_for_blocks.yaml).
    - TemplatePage2 remains the correct preview sandbox for newly translated blocks, while TemplatePage remains the canonical design reference (sources: zip/src/pages/TemplatePage2.tsx, .github/instructions/design-system.instructions.md).
    - For this workflow, lint plus TemplatePage2 render/order validation and route sanity is sufficient to claim preview integration completion, but not full reusable production-block completion (sources: zip/src/pages/TemplatePage2.test.tsx, .github/instructions/design-system.instructions.md).

implementation_specification:
  code_structure: |
    Keep translated preview sections under zip/src/components/sections and keep TemplatePage2 as the only preview host updated by this plan. The critical path should modify only the immediately feasible previews, while gate tasks produce explicit outcomes for About3, Hero166, Logos10, and Testimonial7 without forcing their implementation into the same completion path (sources: zip/src/pages/TemplatePage2.tsx, zip/src/pages/TemplatePage2.test.tsx, zip/src/components/sections/About28.tsx, docs/plan/adhoc-templatepage2-for-blocks/research_findings_templatepage2_for_blocks.yaml).
    Treat About3, Hero166, and the carousel pair as follow-up extension candidates. Their gate outputs should name the exact missing API surface, asset inventory, or package decision needed for a later implementation plan instead of leaving ambiguous blockers in code review comments (sources: for_blocks/about3.tsx, zip/components/ui/marquee.tsx, for_blocks/hero166.tsx, for_blocks/logos10.tsx, for_blocks/testimonial7.tsx).
  affected_areas:
    - zip/src/components/sections/
    - zip/src/pages/TemplatePage2.tsx
    - zip/src/pages/TemplatePage2.test.tsx
    - docs/plan/adhoc-templatepage2-for-blocks/
  component_details:
    - component: TemplatePage2 preview manifest
      responsibility: Define the ordered preview inventory and classify each requested raw block as immediate translation, reuse, or gated follow-up.
      interfaces:
        - Ordered preview manifest for About1, About3, About28, Feature285, Hero166, Logos10, and Testimonial7.
        - Readiness state per block: ready-now, reuse-existing, or gated-follow-up.
    - component: Immediate-ready preview sections
      responsibility: Deliver translation-only preview sections for About1 and Feature285 and reuse the existing About28 sibling without redesign.
      interfaces:
        - One section component export per translated block under zip/src/components/sections.
        - Reuse path for About28 pointing at the existing translated section.
    - component: About3 marquee feasibility gate
      responsibility: Decide whether the missing source marquee API can be bridged locally with a small wrapper or whether About3 should remain a documented follow-up blocker.
      interfaces:
        - Feasibility verdict for About3: clear-for-follow-up or blocked.
        - Exact missing marquee API surface and allowed wrapper boundary.
    - component: Hero166 asset gate
      responsibility: Verify whether source-equivalent image assets exist locally or can be supplied so Hero166 can move into a later implementation plan.
      interfaces:
        - Asset inventory required for /images/hero166.
        - Blocked-or-cleared verdict for later implementation planning.
    - component: Carousel package decision gate
      responsibility: Decide whether a later plan may add a shared carousel foundation for Logos10 and Testimonial7 or must leave both blocks gated.
      interfaces:
        - Package-decision verdict covering the shared carousel foundation.
        - Shared missing-foundation summary for both carousel blocks.
    - component: Core preview integration and validation
      responsibility: Wire the immediately ready previews into TemplatePage2 and keep validation explicitly scoped to preview integration.
      interfaces:
        - TemplatePage2 import list and render order for About1, About28, and Feature285.
        - Preview validation summary covering lint, render/order assertions, and route sanity.
  dependencies:
    - component: zip/src/components/sections/About28.tsx
      relationship: Supplies the existing translated sibling reused in the core preview path.
    - component: zip/components/ui/button.tsx
      relationship: Remains the shared CTA primitive for the immediate-ready translations and confirms no button-specific blocker exists for core integration.
    - component: zip/components/ui/marquee.tsx
      relationship: Informs whether About3 can be bridged locally without introducing a larger missing-API translation problem.
    - component: zip/package.json
      relationship: Defines the current frontend dependency inventory used by the carousel package-decision gate.
    - component: zip/public/
      relationship: Confirms whether the Hero166 image bundle is present locally.
  integration_points:
    - zip/src/pages/TemplatePage2.tsx
    - zip/src/pages/TemplatePage2.test.tsx
    - docs/plan/adhoc-templatepage2-for-blocks/

