plan_id: "pb-astro-ready-workflows-2026-04-21"
objective: >-
  Przygotowac i wdrozyc dwa osobne, ale polaczone workflow dla page-buildera:
  Workflow 1 zamienia nowy blok shadcn w Astro-ready business block z pelnym
  statusem ready w registry, a Workflow 2 sklada strone z gotowych blokow i przy
  wykryciu bloku missing lub not-ready automatycznie uruchamia subflow Workflow 1,
  po czym wraca do page composition i finalizuje publishable artifacts.
created_at: "2026-04-21T00:00:00Z"
created_by: "gem-planner"
status: "pending"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 11
  risk_score: "high"

tldr: |
  Plan rozdziela problem na dwa workflow, ale spina je jednym shared readiness gate.
  Najmniejsza bezpieczna architektura to:
  1) wprowadzic neutralny shared registry manifest z capability/status zamiast opierac readiness na rozproszonych plikach,
  2) dopiac Astro do tego samego kontraktu, tak aby ready oznaczalo realnie renderowalny blok w React, AI i Astro,
  3) zbudowac Workflow 1 jako promotion flow: shadcn -> business block -> testy -> docs -> Astro -> registry status ready,
  4) zbudowac Workflow 2 jako composer sterowany registry, ktory przy missing/not-ready bloku uruchamia Workflow 1 jako subflow i dopiero po statusie ready wraca do skladania strony.
  Sources: docs/plan/astro-wordpress-page-builder/block-registry-spec.md,
  docs/plan/astro-wordpress-page-builder/implementation-plan.md,
  docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md,
  docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md,
  docs/block-registry/registry.machine.json,
  zip/src/blocks/registry/index.ts,
  zip/src/blocks/registry/types.ts,
  SCRIPTS/page-builder-runtime/runtimeWorkflow.ts,
  SCRIPTS/page-builder-runtime/cli.ts,
  astro-site/src/pages/[slug].astro.

open_questions:
  - >-
    Czy pierwsza wersja auto-subflow ma dzialac synchronicznie w jednym procesie
    CLI/agent runtime, czy od razu jako job orchestration z kolejka i resume po
    osobnej sesji? Minimalny plan zaklada sync child-flow z checkpointem w draft.workflow.
  - >-
    Czy blockKey dla nowego bloku jest nadawany jawnie na wejsciu Workflow 1,
    czy ma byc wyprowadzany z nazwy/importu shadcn? Minimalny plan zaklada
    explicit blockKey, zeby nie psuc stabilnosci registry.

pre_mortem:
  overall_risk_level: "high"
  critical_failure_modes:
    - scenario: >-
        Workflow 1 oznaczy blok jako ready mimo braku realnego Astro renderera,
        testow albo docs, przez co Workflow 2 zacznie skladac strony na falszywie
        zielonym statusie.
      likelihood: "medium"
      impact: "critical"
      mitigation: >-
        Shared registry musi przechowywac capability matrix i status promotion,
        a status ready moze byc zapisany dopiero po przejsciu gate dla React,
        Astro, AI, docs i testow. Gate nie moze opierac sie na recznej fladze.
    - scenario: >-
        Workflow 2 wejdzie w petle retry, bo fallback subflow bedzie odpalal
        Workflow 1 bez limitu albo bez terminalnego stanu blocked/failed dla
        konkretnego block requestu.
      likelihood: "medium"
      impact: "high"
      mitigation: >-
        Dodac workflow state z resume token, retry budget i terminalnym stanem
        refinement_failed dla konkretnego block requestu; page composition ma
        wracac tylko po statusie ready albo konczyc sie kontrolowanym blocked.
    - scenario: >-
        Powstanie drugi competing source of truth: React registry, Astro lookup,
        AI descriptors i docs beda utrzymywane osobno, a readiness zacznie sie
        rozjezdzac miedzy runtime'ami.
      likelihood: "high"
      impact: "high"
      mitigation: >-
        Utrzymac jeden shared registry manifest wyprowadzany z kontraktu registry
        w repo i walidowac parity z docs/block-registry/registry.machine.json oraz
        konsumentami Astro/Workflow zamiast recznego kopiowania statusow.
  assumptions:
    - >-
      Registry w repo pozostaje source of truth dla definicji blokow i kontraktow,
      a WordPress przechowuje tylko page instances/content. Sources:
      docs/plan/astro-wordpress-page-builder/block-registry-spec.md,
      docs/plan/astro-wordpress-page-builder/implementation-plan.md,
      docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md.
    - >-
      Raw imported shadcn blocks nie moga trafic do registry bez refaktoryzacji do
      reusable business block i kontroli TemplatePage/index.css. Sources:
      docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md,
      c:/Users/macie/Documents/BULWAR APP/.github/copilot-instructions.md,
      zip/src/pages/TemplatePage.tsx.
    - >-
      Aktualny runtime CLI i compile gate juz istnieja i sa najlepszym miejscem do
      dopiecia page composition oraz auto-resume zamiast budowy nowego, rownoleglego
      toru. Sources: SCRIPTS/page-builder-runtime/cli.ts,
      SCRIPTS/page-builder-runtime/runtimeWorkflow.ts,
      SCRIPTS/make-page-draft-compile-gate.js,
      docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md.

implementation_specification:
  code_structure: |
    Docelowy system powinien miec trzy warstwy. Warstwa 1 to shared registry
    contract w repo, ktory trzyma definicje blokow, capability matrix i status
    promotion oraz emituje machine-readable manifest dla workflow i docs.
    Warstwa 2 to Workflow 1, czyli refinement pipeline, ktory bierze nowy blok
    shadcn, adaptuje go do design systemu, dopina React runtime, Astro renderer,
    AI descriptor, testy i docs, a na koncu promuje status do ready tylko przez
    gate. Warstwa 3 to Workflow 2, czyli page composition orchestrator reuse'ujacy
    istniejacy runtime draft/compile/publish flow i konsumujacy wyłącznie shared
    registry status; przy missing/not-ready blocku ma odpalic subflow Workflow 1,
    zapisac checkpoint w draft.workflow i wznowic kompozycje po statusie ready.
  affected_areas:
    - "zip/src/blocks/registry/**"
    - "docs/block-registry/**"
    - "SCRIPTS/page-builder-runtime/**"
    - "SCRIPTS/generate-page-builder-ai-schema.js"
    - "SCRIPTS/create-default-page-draft-from-template.ts"
    - "astro-site/src/**"
    - "docs/plan/astro-wordpress-page-builder/*.md"
  component_details:
    - component: "shared registry readiness manifest"
      responsibility: >-
        Przechowywac dla kazdego blockKey capability matrix: react runtime,
        astro renderer, ai descriptor, docs path, tests coverage oraz status
        promotion typu draft|refining|ready|blocked. Ma byc jedynym gate input
        dla obu workflow.
      interfaces:
        - "listBlocksWithReadiness()"
        - "getBlockReadiness(blockKey)"
        - "assertBlockReady(blockKey)"
        - "emitMachineRegistryManifest()"
    - component: "workflow1 block refinement orchestrator"
      responsibility: >-
        Przeprowadzac promotion flow dla nowego bloku od importu/adaptacji do
        gotowego business blocka, dopinac Astro/testy/docs i zapisywac ready
        dopiero po przejsciu gate.
      interfaces:
        - "runBlockRefinementWorkflow({ blockKey, sourceComponent, designReference, targetStatus })"
        - "prepareBusinessBlockArtifacts(...)"
        - "promoteBlockStatus(blockKey, 'ready')"
    - component: "workflow2 page composition orchestrator"
      responsibility: >-
        Skladac draft/render schema z approved blocks, wykrywac missing/not-ready
        blocki przez shared registry, uruchamiac auto-subflow Workflow 1 i po
        sukcesie wracac do kompozycji oraz istniejacego compile/publish runtime.
      interfaces:
        - "runPageCompositionWorkflow({ pageSlug, blockRequests, autoRefineMissing })"
        - "requestBlockRefinement(blockRequest)"
        - "resumePageComposition(checkpointId)"
    - component: "astro registry projection"
      responsibility: >-
        Zapewniac, ze Astro konsumuje ten sam kontrakt block capability zamiast
        recznych if/switch branchy w [slug].astro; gotowosc Astro ma byc czescia
        statusu ready, a nie osobna wiedza w pliku strony.
      interfaces:
        - "resolveAstroRenderer(blockKey)"
        - "renderAstroSection(section)"
        - "validateAstroBlockParity(blockKey)"
  dependencies:
    - component: "workflow1 block refinement orchestrator"
      relationship: "Konsumuje shared registry readiness manifest do status promotion i listy wymaganych capability artefacts."
    - component: "workflow2 page composition orchestrator"
      relationship: "Konsumuje shared registry readiness manifest oraz runtime draft/compile/publish flow z SCRIPTS/page-builder-runtime/."
    - component: "astro registry projection"
      relationship: "Konsumuje shared registry capability data i zastępuje reczne dopinanie blokow po blockKey w astro-site/src/pages/[slug].astro."
    - component: "shared registry readiness manifest"
      relationship: "Jest emitowany/parity-checkowany z code registry i docs/block-registry/registry.machine.json, bez recznego utrzymywania wielu statusow."
  integration_points:
    - "zip/src/blocks/registry/index.ts"
    - "zip/src/blocks/registry/types.ts"
    - "zip/src/blocks/registry/firebasePageDraft.ts"
    - "docs/block-registry/registry.machine.json"
    - "SCRIPTS/generate-page-builder-ai-schema.js"
    - "SCRIPTS/page-builder-runtime/runtimeWorkflow.ts"
    - "SCRIPTS/page-builder-runtime/cli.ts"
    - "astro-site/src/pages/[slug].astro"
    - "astro-site/src/lib/types.ts"

