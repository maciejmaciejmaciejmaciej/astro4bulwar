      - path: astro-site/src/pages/[slug].astro
        role: Finalny renderer build-time dla buildable slugs.

shared_registry_vs_astro_drift:
  summary: >
    Shared registry jest szerszy i bardziej dojrzaly niz Astro runtime. Dzisiaj
    blok moze byc implemented w zip i w AI generatorze, a nadal nie byc accepted
    ani rendered przez Astro.
  drifts:
    - area: Block coverage
      description: Shared registry w zip rejestruje 23 blockKey, a Astro intake union i renderer obsluguja tylko 4 blockKey.
      evidence:
        - zip/src/blocks/registry/index.ts:89
        - astro-site/src/lib/types.ts:158
        - astro-site/src/pages/[slug].astro:206
    - area: Render dispatch model
      description: React dispatchuje przez runtime.renderSection na definicji bloku, Astro utrzymuje reczny if-chain, wiec kazdy nowy Astro-ready blok wymaga duplikacji zmian.
      evidence:
        - zip/src/blocks/registry/renderPageBuilderSections.tsx:4
        - docs/plan/astro-wordpress-page-builder/block-registry-spec.md:233
        - astro-site/src/pages/[slug].astro:206
    - area: Readiness state location
      description: Shared registry type nie ma pola ready/astroReady/status; status istnieje tylko w docs markdown i czesciowo w registry.machine.json.
      evidence:
        - zip/src/blocks/registry/types.ts:21
        - docs/block-registry/about-1.md:5
        - docs/block-registry/menu-category-photo-parallax-full-width.md:5
        - docs/block-registry/registry.machine.json:3
    - area: Machine registry completeness
      description: docs/block-registry/registry.machine.json zawiera 11 block entries, podczas gdy docs/block-registry/*.md i zip shared registry obejmuja 23 bloki.
      evidence:
        - docs/block-registry/registry.machine.json:7
        - docs/block-registry/index.md:32
        - zip/src/blocks/registry/index.ts:89
    - area: Documentation freshness
      description: Astro README nadal opisuje current build-time route jako /testowa-blueprint, mimo ze routing jest dynamiczny z listing endpoint.
      evidence:
        - astro-site/README.md:9
        - astro-site/src/pages/[slug].astro:24

minimal_change_surface:
  summary: >
    Najmniejszy obecnie sprzezony zestaw miejsc, ktore musialyby zostac zmienione,
    aby Workflow 1 mial output ready w shared registry, a Workflow 2 mogl bazowac
    na tym jednym gate i odroznic bloki Astro-ready od pozostalych.
  code:
    - path: zip/src/blocks/registry/types.ts
      reason: Tu zyje wspolny typ definicji bloku; brak w nim pola readiness/status/astro support.
    - path: zip/src/blocks/registry/index.ts
      reason: To runtime source of truth dla listBlocks/getBlock/createDefaultBlockInstance; readiness gate musialby byc widoczny tutaj.
    - path: zip/src/blocks/registry/registry-invariants.test.tsx
      reason: Pilnuje pokrycia calosci registry i AI generatora; zmiana kontraktu registry bedzie tu bezposrednio odczuwalna.
    - path: SCRIPTS/generate-page-builder-ai-schema.js
      reason: Generator korzysta ze shared descriptors i generic fallback, ale nie rozroznia gotowosci bloku do compose/Astro.
    - path: SCRIPTS/make-page-draft-compile-gate.js
      reason: To obecna bramka compile; tu najblizej technicznego enforcementu workflow 2.
    - path: SCRIPTS/page-builder-runtime/cli.ts
      reason: To obecny orchestrator publish flow; brak tu subflow block refinement.
    - path: astro-site/src/lib/types.ts
      reason: Astro acceptance surface wymaga synchronizacji z nowym gotowosciowym source of truth.
    - path: astro-site/src/pages/[slug].astro
      reason: Manualny renderer blokow wymaga synchronizacji z nowymi Astro-ready blokami.
    - path: astro-site/src/lib/pageBuilder.ts
      reason: Tu siedzi reczny source-resolution branch dla menu block i potencjalny capability routing Astro.
  docs:
    - path: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
      reason: Kanoniczny operator flow 2 musi opisywac gate i fallback behavior.
    - path: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md
      reason: To jedyne miejsce opisujace lifecycle Workflow 1 i target subflow architecture.
    - path: docs/plan/astro-wordpress-page-builder/block-registry-spec.md
      reason: Kontrakt shared registry musi odzwierciedlac nowe pole readiness/status.
    - path: docs/block-registry/registry.machine.json
      reason: Machine-readable gate ma byc shared source of truth, a dzis index jest czesciowy.
    - path: docs/block-registry/index.md
      reason: Definiuje semantyke approved/seed i cala rola folderu jako source of truth.
    - path: docs/block-registry/*.md
      reason: Statusy blokow sa dzis rozproszone per markdown i musza pozostac spójne z gate'em.
    - path: astro-site/README.md
      reason: README Astro jest przestarzaly wzgledem dynamicznego listing-based build.

