related_conventions:
  naming_patterns_in_domain: >
    Business blocks uzywaja stabilnych blockKey typu kebab-case albo legacy
    underscore_case, a page instances zawsze maja stabilne id w formie
    <blockKey>-NN.
  structure_of_domain: >
    Shared contracts i runtime dla blokow zyja w zip/src/blocks, dokumentacja
    kontraktow w docs/block-registry, operacyjne flow w docs/plan/astro-wordpress-page-builder,
    a Astro utrzymuje osobny parser/renderer w astro-site/src.
  error_handling_in_domain: >
    Preferowane sa jawne gates i fail-fast: unknown block key, version mismatch,
    invalid listing payload i unresolved source mappings koncza workflow bledu,
    zamiast cichego fallbacku produkcyjnego.
  testing_in_domain: >
    React registry ma szerokie invariant coverage dla wszystkich zarejestrowanych
    blokow i AI generatora; Astro testuje listing endpoint i waski parser coverage
    dla aktualnie wspieranych blokow.
  documentation_in_domain: >
    README i page-builder-authoring-workflow sa operator entry points; blueprint
    opisuje target-state; block docs niosa statusy i kontrakty pojedynczych blokow.

related_dependencies:
  internal:
    - component: zip/src/blocks/registry/ai/descriptors.cjs
      relationship_to_domain: Shared AI descriptor layer for page_builder_schema_for_ai generation.
      direction: bidirectional
    - component: docs/block-registry/*.md
      relationship_to_domain: Human-readable contract/status layer for each block.
      direction: bidirectional
    - component: docs/block-registry/registry.machine.json
      relationship_to_domain: Machine-readable status/index layer, currently partial.
      direction: bidirectional
    - component: astro-site/src/lib/types.ts
      relationship_to_domain: Astro acceptance surface for page_builder_schema.
      direction: inbound
    - component: astro-site/src/pages/[slug].astro
      relationship_to_domain: Astro render coverage surface for supported blocks.
      direction: inbound
  external:
    - name: WordPress REST API
      purpose_for_domain: Listing buildable pages, reading page_builder payloads, publishing dual meta fields.
    - name: WooCommerce Store API
      purpose_for_domain: Resolving source-backed menu data during Astro build and runtime flows.

testing_patterns:
  framework: node:test plus React SSR assertions and targeted Astro fetch/schema tests
  coverage_areas:
    - Full registered block coverage in zip registry invariants
    - Block Registry Showcase route coverage against listBlocks()
    - AI schema generator output coverage across registered blocks and generic fallback
    - Compile gate source-mapping behavior
    - Astro buildable-pages listing parsing
    - Astro schema parsing for currently supported block subset
  test_organization: >
    Registry i pagebuilder tests sa kolokowane obok zip runtime, generator i
    compile gate maja osobne testy w SCRIPTS, a Astro testy sa w astro-site/src/lib.
  mock_patterns:
    - Global fetch mocks for WordPress listing endpoint in Astro tests
    - Temp-file based command execution tests for AI generator
    - SSR static markup checks for Block Registry Showcase and registry runtime renderers

workflow_definition_surfaces:
  workflow_1_block_refinement_today:
    summary: >
      Dzisiaj Workflow 1 jest zdefiniowany przez target-state blueprint,
      design-system instructions, block-registry spec, TemplatePage validation
      rule i pojedyncze block docs ze statusami; brak jednego operacyjnego runbooka
      rownego authoring workflow dla stron.
    files:
      - path: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md
        role: Najblizsza definicja procesu block refinement i lifecycle bloku.
        locations:
          - '83'
          - '547'
      - path: docs/plan/astro-wordpress-page-builder/block-registry-spec.md
        role: Kontrakt dodawania bloku do shared registry i AI descriptor flow.
        locations:
          - '230'
          - '233'
      - path: docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md
        role: Reguly adaptacji imported blocks i TemplatePage validation.
        locations:
          - '134'
          - '173'
      - path: zip/src/pages/TemplatePage.tsx
        role: Wizualna powierzchnia walidacji/refinement wedlug docs i blueprint.
      - path: docs/block-registry/*.md
        role: Per-block status, kontrakt i informacja czy blok jest seed/implemented/approved seed.
      - path: docs/block-registry/registry.machine.json
        role: Czesiowy machine index statusow blokow.

  workflow_2_page_composition_today:
    summary: >
      Dzisiaj Workflow 2 jest realnym repo-first flow: draft bootstrap lub reczna
      kompozycja -> render schema -> AI schema -> runtime compile/publish -> Astro build/deploy.
      Wymaganie approved blocks only jest udokumentowane, ale fallback do auto-refinement nie istnieje.
    files:
      - path: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
        role: Kanoniczny workflow operatora dla skladania i publikacji strony.
      - path: docs/plan/astro-wordpress-page-builder/README.md
        role: Krotki indeks entry pointow i rozroznienie current vs target-state.
      - path: docs/plan/astro-wordpress-page-builder/blueprint-dsl-spec.md
        role: Authoring format dla strony z registered blocks.
      - path: SCRIPTS/create-default-page-draft-from-template.ts
        role: Bootstrap default-first dla nowej strony.
      - path: SCRIPTS/generate-page-draft-from-scrape.ts
        role: Bootstrap structure-only z scrape do Firebase draft.
      - path: SCRIPTS/generate-page-builder-ai-schema.js
        role: Render schema -> AI schema.
      - path: SCRIPTS/make-page-draft-compile-gate.js
