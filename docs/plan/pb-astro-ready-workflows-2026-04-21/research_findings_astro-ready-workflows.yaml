  - question: Czy Workflow 2 ma skladac strony wyłącznie z blokow Astro-ready, czy dalej z blokow zip-implemented z osobna polityka render targetu?
    context: Shared registry ma 23 bloki, Astro wspiera 4; bez tej decyzji gate ready pozostaje niejednoznaczny.
    type: decision_blocker
    affects: [pb-astro-ready-workflows-2026-04-21]
  - question: Czy blueprint references do docs/agent-workflows sa celowo przyszlosciowe, czy dokument jest juz nieaktualny wzgledem repo?
    context: Brak tych plikow utrudnia traktowanie Workflow 1 jako operacyjnego runbooka.
    type: research
    affects: [pb-astro-ready-workflows-2026-04-21]

