    impact: high
    evidence:
      - zip/src/blocks/registry/registry-invariants.test.tsx:24
      - zip/src/pages/BlockRegistryShowcasePage.tsx:21
      - zip/src/pages/BlockRegistryShowcasePage.test.tsx:9
  - risk: Wprowadzenie readiness gate bez synchronizacji docs/block-registry i registry.machine.json utrwali trzeci rozny status source-of-truth.
    impact: high
    evidence:
      - docs/block-registry/index.md:21
      - docs/block-registry/registry.machine.json:3
      - docs/block-registry/menu-category-photo-parallax-full-width.md:5
  - risk: Ograniczenie compose do Astro-ready blokow bez explicit policy moze zablokowac istniejacy runtime zip/AI-generator dla blokow implemented, ale jeszcze nieobslugiwanych przez Astro.
    impact: high
    evidence:
      - zip/src/blocks/registry/index.ts:89
      - astro-site/src/lib/types.ts:158
      - SCRIPTS/generate-page-builder-ai-schema.test.js:1
  - risk: Kazda zmiana readiness dla source-backed blokow moze naruszyc obecne gates unresolved source mappings i routing edycji source-backed content.
    impact: high
    evidence:
      - SCRIPTS/make-page-draft-compile-gate.js:158
      - zip/src/blocks/registry/ai/descriptors.cjs
      - docs/block-registry/menu-category-photo-parallax-full-width.md:57
  - risk: Synchronizacja Astro z shared registry bez zmiany manualnych if-branchy pozostawi ukryte luki render coverage przy nowych blokach.
    impact: medium
    evidence:
      - astro-site/src/pages/[slug].astro:206
