patterns_found:
  - category: architecture
    pattern: React shared registry jest runtime-driven, Astro jest manual-branch-driven.
    description: >
      Zip pagebuilder dispatchuje render przez runtime.renderSection trzymany na
      definicji bloku, podczas gdy Astro utrzymuje osobne zod union i osobny
      manualny renderer w [slug].astro.
    examples:
      - file: zip/src/blocks/registry/renderPageBuilderSections.tsx
        location: zip/src/blocks/registry/renderPageBuilderSections.tsx:4
        snippet: const block = getBlock(section.blockKey); return block.runtime.renderSection(section);
      - file: astro-site/src/pages/[slug].astro
        location: astro-site/src/pages/[slug].astro:206
        snippet: if (section.blockKey === 'about-1') { ... } if (section.blockKey === 'our-services') { ... }
      - file: astro-site/src/lib/types.ts
        location: astro-site/src/lib/types.ts:158
        snippet: sections: z.array(z.union([aboutBlockSchema, ourServicesBlockSchema, galleryBlockSchema, menuBlockSchema]))
    prevalence: common

  - category: structure
    pattern: Ready/approved status zyje w docs, nie w shared registry type.
    description: >
      Statusy seed, approved seed i implemented sa obecne w markdown docs i
      registry.machine.json, ale nie w PageBuilderBlockDefinition ani w parserach
      draft/render schema.
    examples:
      - file: docs/block-registry/menu-category-photo-parallax-full-width.md
        location: docs/block-registry/menu-category-photo-parallax-full-width.md:5
        snippet: - registry status: seed
      - file: docs/block-registry/just_pralax_img_horizontal.md
        location: docs/block-registry/just_pralax_img_horizontal.md:5
        snippet: - registry status: approved seed
      - file: zip/src/blocks/registry/types.ts
        location: zip/src/blocks/registry/types.ts:21
        snippet: export interface PageBuilderBlockDefinition { blockKey; version; name; description; schema; ... }
    prevalence: common

  - category: architecture
    pattern: Workflow skladania strony jest juz operacyjny repo-first + runtime CLI.
    description: >
      Nowa strona moze byc bootstrapowana z template draftu albo scrape draftu,
      skompilowana do dual meta i opublikowana przez runtime CLI z verify-readback.
    examples:
      - file: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:88
        snippet: Default-First Bootstrap When Final Content Is Not Ready Yet
      - file: SCRIPTS/create-default-page-draft-from-template.ts
        location: SCRIPTS/create-default-page-draft-from-template.ts:70
        snippet: createDefaultPageDraftFromTemplate(...)
      - file: SCRIPTS/page-builder-runtime/cli.ts
        location: SCRIPTS/page-builder-runtime/cli.ts:237
        snippet: runPageBuilderRuntimeCli(...)
    prevalence: common

  - category: error_handling
    pattern: System ma twarde fail-fast gates dla block identity i source mappings, ale nie dla Astro readiness.
    description: >
      Unknown block key, version mismatch i unresolved source mapping blokuja
      parse/compile, natomiast brak wspolnego Astro support gate oznacza, ze
      block moze byc legalny dla zip/runtime, ale nieobslugiwany przez Astro.
    examples:
      - file: zip/src/blocks/registry/pageBuilderSchema.ts
        location: zip/src/blocks/registry/pageBuilderSchema.ts:84
        snippet: throw new Error(`Unknown block key: ${section.blockKey}`)
      - file: SCRIPTS/make-page-draft-compile-gate.js
        location: SCRIPTS/make-page-draft-compile-gate.js:158
        snippet: throw new Error(`Compile blocked: unresolved source mappings remain ...`)
      - file: docs/plan/astro-wordpress-page-builder/page-builder-schema-spec.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-schema-spec.md:563
        snippet: silent fallback is not allowed for production build
    prevalence: common

  - category: documentation
    pattern: Dokumentacja workflow 1 jest target-state, a nie gotowym operacyjnym runbookiem.
    description: >
      Blueprint opisuje skill-based refinement workflow i lifecycle bloku, ale
      odwoluje sie tez do nieistniejacych docs/agent-workflows, wiec operator nie
      ma jednego wykonywalnego runbooka refinement podobnego do authoring workflow.
    examples:
      - file: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md
        location: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md:499
        snippet: Skill: shadcn-block-refinement
      - file: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md
        location: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md:425
        snippet: docs/agent-workflows/block-refinement-workflow.md
      - file: docs/agent-workflows/**/*.md
        location: workspace search
        snippet: no files found
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: Shared React block registry
      responsibility: Rejestruje business blocks, ich schema/defaultData/runtime renderer i udostepnia list/get/default instance API.
      location: zip/src/blocks/registry/
      relationship_to_domain: domain depends on this
    - component: Block docs repository
      responsibility: Przechowuje human-readable status i kontrakty blokow oraz czesciowy machine index.
      location: docs/block-registry/
      relationship_to_domain: domain depends on this
    - component: AI schema generator
      responsibility: Translacja render schema do page_builder_schema_for_ai przez shared descriptors.
      location: SCRIPTS/generate-page-builder-ai-schema.js
      relationship_to_domain: this uses domain outputs
    - component: Draft compile gate
      responsibility: Draft -> dual meta compile oraz source-mapping gate.
      location: SCRIPTS/make-page-draft-compile-gate.js
      relationship_to_domain: this uses domain outputs
    - component: Runtime CLI
      responsibility: ensure page exists, compile, publish and optional verify-readback.
      location: SCRIPTS/page-builder-runtime/
      relationship_to_domain: this uses domain outputs
    - component: Astro parser and renderer
      responsibility: Pobiera buildable strony z WordPress i renderuje sekcje statycznie.
      location: astro-site/src/
      relationship_to_domain: domain depends on this
  interfaces_used_by_domain:
    - interface: PageBuilderBlockDefinition
      location: zip/src/blocks/registry/types.ts
      usage_pattern: Shared code-side contract for registered blocks.
    - interface: PageBuilderSchema
      location: zip/src/blocks/registry/pageBuilderSchema.ts and astro-site/src/lib/types.ts
      usage_pattern: Dual validators exist independently in zip and Astro.
    - interface: FirebasePageDraft
      location: zip/src/blocks/registry/firebasePageDraft.ts
      usage_pattern: Draft working-state for composition/publish workflow.
  data_flow_involving_domain: >
    Block refinement results trafiaja do shared registry i docs/block-registry,
    z czego page composition tworzy page_builder_schema, generator tworzy
    page_builder_schema_for_ai, runtime publikuje oba payloady do WordPress, a
    Astro pobiera listing slugow i render schema podczas builda.
  key_relationships_to_domain:
    - from: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
      to: SCRIPTS/page-builder-runtime/cli.ts
      relationship: composes
    - from: zip/src/blocks/registry/index.ts
      to: zip/src/blocks/registry/pageBuilderSchema.ts
      relationship: imports
    - from: SCRIPTS/generate-page-builder-ai-schema.js
      to: zip/src/blocks/registry/ai/descriptors.cjs
      relationship: imports
    - from: astro-site/src/pages/[slug].astro
      to: astro-site/src/lib/types.ts
      relationship: imports
    - from: astro-site/src/pages/[slug].astro
      to: astro-site/src/lib/pageBuilder.ts
      relationship: imports

