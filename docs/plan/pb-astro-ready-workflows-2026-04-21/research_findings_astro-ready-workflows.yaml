plan_id: pb-astro-ready-workflows-2026-04-21
objective: >
  Zbadac obecny stan dwoch docelowych workflow dla page-buildera Astro:
  1) refinement bloku od surowego komponentu shadcn do gotowego bloku registry
  z gotowoscia do Astro, 2) skladanie strony wyłącznie z gotowych blokow z
  automatycznym fallbackiem do subflow refinement, gdy blok nie jest gotowy.
focus_area: astro-ready-workflows
created_at: '2026-04-21T00:00:00Z'
created_by: gem-researcher
status: completed

tldr: |
  - Dzisiejszy Workflow 1 istnieje glownie jako rozproszony kontrakt dokumentacyjny: design rules, block-registry spec, block docs i TemplatePage validation, ale nie jako jeden operacyjny workflow z maszynowym statusem ready.
  - Dzisiejszy Workflow 2 ma realny operator flow repo-first i runtime CLI dla draft -> compile -> publish -> Astro deploy, ale nie ma automatycznego subflow, ktory przy skladaniu strony sam uruchamia refinement niegotowego bloku.
  - Shared registry w zip ma 23 zarejestrowane bloki i testy pelnego pokrycia React/AI-generatora, podczas gdy Astro parser i renderer obsluguja tylko 4 blockKey, wiec readiness gate nie moze dzis opierac sie wylacznie na samym istnieniu bloku w shared registry.
  - Status gotowosci jest rozjechany miedzy docs/block-registry/*.md, docs/block-registry/registry.machine.json i samym typem registry w zip, ktory nie przechowuje pola ready ani astroReady.
  - Najmniejszy realny surface zmian dla docelowego modelu obejmuje jeden wspolny status readiness w zip registry, synchronizacje docs machine index, Astro capability map/parser/renderer oraz dokument operatora i blueprint skill/workflow references.

research_metadata:
  methodology: >
    Hybrydowy research read-only: przeglad pamieci repo/session, grep_search,
    semantic_search, file_search, targeted read_file, list_dir oraz punktowe
    line-count checks przez terminal dla kluczowych plikow.
  scope: >
    Dokumentacja page-builder i block-registry, shared registry React w zip,
    generator AI schema, compile gate, runtime CLI oraz Astro parser/renderer i
    testy kontraktowe w obszarze workflow refinement + composition.
  confidence: high
  coverage: 88
  decision_blockers: 2
  research_blockers: 1

