plan_id: adhoc-radius-contract-refactor
objective: Identify which suspected React runtime components rendered by zip/src/pages/TemplatePage.tsx still contain hardcoded rounded-* classes instead of using the central radius contract in zip/src/index.css.
focus_area: zip-template-radius-contract
created_at: 2026-04-22
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
	- TemplatePage renders Feature18, Project5c, OccasionalMenuPdfDownloadSection, and MenuTwoColumnsWithWithHeadingWithImgFullwidthParalaxSection through page-builder block definitions in zip/src/blocks/**/schema.ts.
	- Feature20 is not part of /template; it is only imported and rendered by zip/src/pages/TemplatePage2.tsx.
	- The central radius contract is defined in zip/src/index.css as theme-radius-surface and theme-radius-media -> var(--radius-lg), plus theme-radius-control -> var(--radius-md).
	- All four live suspect components still contain hardcoded rounded-* classes; most map cleanly to surface, media, or control semantics, while the parallax section uses intentionally asymmetric docking radii and the download card uses an oversized rounded-[24px] special shape.

research_metadata:
	methodology: hybrid retrieval using file_search, grep_search, targeted read_file, and instruction/memory review; runtime mapping verified from TemplatePage section ids -> block schema runtime renderers -> component files
	scope: Limited to zip/src/pages/TemplatePage.tsx, the central radius contract in zip/src/index.css, the five user-suspected components, and the four block schema files that connect those components to TemplatePage
	confidence: high
	coverage: 95
	decision_blockers: 0
	research_blockers: 0

