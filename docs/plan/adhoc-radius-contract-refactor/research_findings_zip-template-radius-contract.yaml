patterns_found:
	- category: architecture
		pattern: TemplatePage uses block schema ids and renderPageBuilderSections instead of direct section imports for most previewed sections.
		description: The runtime path is TemplatePage preview schema -> block definition runtime renderSection -> section component.
		examples:
			- file: zip/src/pages/TemplatePage.tsx
				location: zip/src/pages/TemplatePage.tsx:162
				snippet: id: "template-universal-multilink-01"
			- file: zip/src/blocks/universal_multilink_block/schema.ts
				location: zip/src/blocks/universal_multilink_block/schema.ts:74
				snippet: componentName: "Feature18"
			- file: zip/src/blocks/registry/renderPageBuilderSections.tsx
				location: zip/src/blocks/registry/renderPageBuilderSections.tsx:12
				snippet: return schema.sections.map((section) => renderSection(section));
		prevalence: common
	- category: structure
		pattern: The central radius contract exists as semantic utility classes backed by shared radius tokens.
		description: zip/src/index.css exposes theme-radius-surface, theme-radius-media, and theme-radius-control, with token values derived from --radius-md and --radius-lg.
		examples:
			- file: zip/src/index.css
				location: zip/src/index.css:77
				snippet: .theme-radius-surface { border-radius: var(--radius-lg); }
			- file: zip/src/index.css
				location: zip/src/index.css:83
				snippet: .theme-radius-control { border-radius: var(--radius-md); }
		prevalence: common
	- category: naming
		pattern: Remaining hardcoded radii in suspect components are mostly numeric arbitrary values rather than semantic contract classes.
		description: The live suspects use rounded-[4px], rounded-[8px], rounded-[24px], or side-specific rounded utilities instead of the contract classes.
		examples:
			- file: zip/src/components/sections/Feature18.tsx
				location: zip/src/components/sections/Feature18.tsx:99
				snippet: rounded-[4px]
			- file: zip/src/components/sections/OccasionalMenuPdfDownloadSection.tsx
				location: zip/src/components/sections/OccasionalMenuPdfDownloadSection.tsx:110
				snippet: rounded-[24px]
			- file: zip/src/components/sections/MenuTwoColumnsWithWithHeadingWithImgFullwidthParalaxSection.tsx
				location: zip/src/components/sections/MenuTwoColumnsWithWithHeadingWithImgFullwidthParalaxSection.tsx:63
				snippet: rounded-t-none rounded-b-[4px]
		prevalence: occasional
	- category: structure
		pattern: Some live radii are intentionally asymmetric or oversized special cases rather than standard card/control shapes.
		description: The docked parallax hero uses split top/bottom radii across two adjacent elements, and the download card uses a much larger 24px radius than the contract defaults.
		examples:
			- file: zip/src/components/sections/MenuTwoColumnsWithWithHeadingWithImgFullwidthParalaxSection.tsx
				location: zip/src/components/sections/MenuTwoColumnsWithWithHeadingWithImgFullwidthParalaxSection.tsx:39
				snippet: rounded-t-[4px] rounded-b-none
			- file: zip/src/components/sections/OccasionalMenuPdfDownloadSection.tsx
				location: zip/src/components/sections/OccasionalMenuPdfDownloadSection.tsx:110
				snippet: rounded-[24px]
		prevalence: rare

