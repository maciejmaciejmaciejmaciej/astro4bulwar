related_conventions:
	naming_patterns_in_domain: Block schemas use blockKey plus componentName/componentImportPath runtime metadata; visual utilities in index.css use semantic names such as theme-radius-surface rather than numeric radii.
	structure_of_domain: TemplatePage is a registry-driven preview surface; blocks own schemas in zip/src/blocks/*/schema.ts and React implementations live in zip/src/components/sections/.
	error_handling_in_domain: TemplatePage catches source-resolution failures and shows a sourceError fallback, but the radius audit itself is static class inspection.
	testing_in_domain: TemplatePage2 and page-builder registry have tests, but no focused automated radius-contract audit exists in the inspected scope.
	documentation_in_domain: The design-system instruction file names TemplatePage as the canonical visual reference and index.css as the style source of truth.

related_dependencies:
	internal:
		- component: zip/src/index.css
			relationship_to_domain: Defines the target radius contract the suspect components should align to.
			direction: outbound
		- component: zip/src/blocks/registry/renderPageBuilderSections.tsx
			relationship_to_domain: Performs runtime rendering for the TemplatePage preview schema.
			direction: outbound
		- component: zip/src/components/sections/PageBuilderMenuSection.tsx
			relationship_to_domain: Receives panelClassName from the parallax section and therefore participates in the final docked shape.
			direction: outbound
	external:
		- name: react
			purpose_for_domain: Component runtime and createElement-based block rendering.
		- name: tailwindcss
			purpose_for_domain: Utility-class-based styling, including rounded-* helpers.

