domain_security_considerations:
  sensitive_areas:
    - area: footerPageId storage detail
      location: wordpress-plugin/bulwar-bridge/src/Config/Constants.php and the global layout option payload
      concern: The repo explicitly keeps footerPageId internal and out of the public runtime payload.
  authentication_patterns_in_domain: The public GET /wp-json/bulwar/v1/layout/global endpoint is intentionally public; shared footer page identity remains internal through footerPageId rather than being exposed to clients.
  authorization_patterns_in_domain: This investigation found only the public read path for global layout; write/edit authorization for the shared footer page itself is delegated to WordPress page editing and is not defined in these contract files.
  data_validation_in_domain: PHP normalizes footer data and falls back on invalid storage, while React and Astro Zod contracts enforce a stricter public payload and shared_footer section shape and reject leaked footerPageId in the public contract.

testing_patterns:
  framework: Custom PHP test harness for WordPress bridge behavior plus TypeScript contract tests using node:test and zod parsing.
  coverage_areas:
    - Shared footer resolution from footerPageId and page_builder_schema in the bridge.
    - Rejection of footerPageId in the public client-facing payload.
    - Acceptance of the dedicated shared_footer section shape.
    - Trimmed non-empty brand-name validation in the public footer contract.
  test_organization: Backend tests live in wordpress-plugin/bulwar-bridge/tests/, while React contract tests live adjacent to the contract source in zip/src/blocks/registry/.
  mock_patterns:
    - WordPress globals emulate options, posts, and post meta in GlobalLayoutControllerTest.php.
    - Shared footer sample data is reused as the strict block fixture in globalLayoutContract.test.ts.

open_questions:
  - question: Which actual live WordPress page should be assigned as the shared footer source today?
    context: The resolver contract is footerPageId-based, but the repo does not include a checked-in production page id, page slug, or page manifest for the live shared footer page; only the test fixture uses shared-footer as a post_name.
    type: decision_blocker
    affects: [shared-footer]
  - question: Should operators treat the PHP resolver's permissive normalization as acceptable authoring input, or should they always author against the stricter repo-side Zod contract?
    context: PHP will normalize partial/blank footer subfields, but docs and contract modules describe the stricter full footer object as the safe authoring shape.
    type: nice_to_know
    affects: [shared-footer]

