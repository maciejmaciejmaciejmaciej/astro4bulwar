plan_id: ad-hoc-shared-footer-investigation
objective: Read-only investigation to locate the intended shared_footer page content/source in the repo and extract the minimal valid payload shape.
focus_area: shared-footer
created_at: 2026-04-20
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - The repo contains an explicit shared footer authoring contract in docs and mirrored schema modules: the footer lives in a WordPress page's page_builder_schema.sections[] as one enabled shared_footer block, with the public footer shape defined in docs/plan/navbar-footer-global-layout-v1/global-layout-contract.md:35 and mirrored in zip/src/blocks/registry/globalLayoutContract.ts:84 plus astro-site/src/lib/globalLayoutContract.ts:84.
  - Runtime resolution is footerPageId-based, not slug-based: the bridge reads option bulwar_bridge_global_layout, casts footerPageId, loads that page, reads page_builder_schema, and resolves the first enabled shared_footer block in section order (wordpress-plugin/bulwar-bridge/src/Config/Constants.php:20, wordpress-plugin/bulwar-bridge/src/Config/Constants.php:78, wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:73).
  - No checked-in production/shared footer slug was found. The only repo slug is the test fixture post_name shared-footer in wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:254, which is test-only evidence rather than a documented live page contract.
  - The strictest safe payload for creating or fixing the live footer page is a page_builder_schema object with version: 1 and one enabled sections[] entry whose blockKey is shared_footer, blockVersion is 1, source is null, and data matches the globalLayout.footer shape exactly.

research_metadata:
  methodology: hybrid retrieval using memory review, file_search, grep_search, targeted read_file passes, one relationship discovery pass with vscode_listCodeUsages, and metadata collection from package.json plus file line counts
  scope: focused investigation of the WordPress bridge footer resolver, shared footer contract docs, React/Astro contract modules, and tests that demonstrate the intended shared_footer storage shape
  confidence: high
  coverage: 93
  decision_blockers: 1
  research_blockers: 1

