patterns_found:
  - category: structure
    pattern: Shared footer is authored as a dedicated page-builder section, not as a standalone option object.
    description: Footer content is stored inside a referenced WordPress page's page_builder_schema.sections[] array, and the bridge extracts only the dedicated shared_footer block from that page.
    examples:
      - file: docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md
        location: docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md:15
        snippet: The footer lives in the referenced WordPress page's page_builder_schema.sections[].
      - file: docs/plan/navbar-footer-global-layout-v1/global-layout-contract.md
        location: docs/plan/navbar-footer-global-layout-v1/global-layout-contract.md:37
        snippet: The shared footer stays in the shared footer page page_builder_schema.sections[].
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:94
        snippet: $sections = isset($decoded['sections']) && is_array($decoded['sections']) ? $decoded['sections'] : [];
    prevalence: common

  - category: architecture
    pattern: Live footer lookup is ID-addressed through footerPageId; slug is not part of the runtime contract.
    description: The resolver casts footerPageId from the global layout option and loads the page directly by post ID. No runtime resolver code reads a page slug or page title to locate the shared footer source.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:75
        snippet: $footerPageId = isset($settings['footerPageId']) ? (int) $settings['footerPageId'] : 0;
      - file: wordpress-plugin/bulwar-bridge/src/Config/Constants.php
        location: wordpress-plugin/bulwar-bridge/src/Config/Constants.php:20
        snippet: 'BULWAR_BRIDGE_GLOBAL_LAYOUT_OPTION' => 'bulwar_bridge_global_layout'
      - file: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php
        location: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:254
        snippet: new \WP_Post(37, 'page', 'publish', 'shared-footer', 'Shared Footer')
    prevalence: common

  - category: validation
    pattern: First enabled shared_footer block wins, and invalid first enabled matches fail immediately.
    description: The resolver skips disabled shared_footer sections, but once it finds the first enabled shared_footer section it requires blockVersion 1, source null, and data as an array; later shared_footer sections are ignored.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:107
        snippet: if (($section['blockKey'] ?? null) !== self::SHARED_FOOTER_BLOCK_KEY) { continue; }
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:117
        snippet: if ((int) ($section['blockVersion'] ?? 0) !== self::SHARED_FOOTER_BLOCK_VERSION) { return [self::defaultFooter(), 'fallback_footer_block_invalid']; }
      - file: docs/plan/navbar-footer-global-layout-v1/operator-reference.md
        location: docs/plan/navbar-footer-global-layout-v1/operator-reference.md:21
        snippet: Resolution is first-match/first-failure in section order for shared_footer blocks.
    prevalence: common

  - category: testing
    pattern: The repo's strictest safe payload is locked in Zod contracts and tests, while the PHP resolver itself is slightly more permissive.
    description: The React and Astro contract modules require a full footer object shape and a strict shared_footer block object, whereas the PHP resolver will normalize missing or blank footer subfields to defaults as long as data is an array. The docs align with the stricter safe authoring shape.
    examples:
      - file: zip/src/blocks/registry/globalLayoutContract.ts
        location: zip/src/blocks/registry/globalLayoutContract.ts:86
        snippet: export const sharedFooterSectionBlockSchema = z.object({
      - file: zip/src/blocks/registry/globalLayoutContract.test.ts
        location: zip/src/blocks/registry/globalLayoutContract.test.ts:123
        snippet: test("parseSharedFooterSectionBlock validates the dedicated shared footer block shape", () => {
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:140
        snippet: return [self::normalizeFooter($section['data']), 'resolved'];
    prevalence: occasional

  - category: documentation
    pattern: There is a contract and operator workflow for shared_footer, but no checked-in live page manifest or production footer-page slug.
    description: The repo documents how the shared footer must be authored and resolved, and tests it, but it does not provide a concrete production page slug or checked-in page JSON fixture for the actual live shared footer page.
    examples:
      - file: docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md
