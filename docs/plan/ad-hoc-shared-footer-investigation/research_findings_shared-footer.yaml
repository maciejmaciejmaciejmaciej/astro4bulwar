related_conventions:
  naming_patterns_in_domain: The internal page-builder block is always named shared_footer, its version is fixed at 1, and the storage pointer is always named footerPageId.
  structure_of_domain: Footer content is authored in one page_builder_schema.sections[] block on a referenced WordPress page, while the public runtime contract exposes only normalized navbar/footer data and meta statuses.
  error_handling_in_domain: The bridge never throws the raw footer schema outward; it falls back to defaultFooter() and reports fallback_* states in meta.footer_status when footerPageId, page lookup, schema parsing, or block validation fails.
  testing_in_domain: PHP tests simulate WordPress option/post/meta storage and validate shared footer resolution; TypeScript tests validate strict contract parsing and enforce that footerPageId stays out of public payloads.
  documentation_in_domain: Shared footer storage and authoring behavior are documented under docs/plan/navbar-footer-global-layout-v1 in how-navbar-footer-work.md, operator-reference.md, and global-layout-contract.md.

