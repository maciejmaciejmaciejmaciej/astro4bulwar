patterns_found:
  - category: architecture
    pattern: Slug-based page-builder REST access is update-only for existing pages.
    description: The bridge exposes GET and POST by slug, but the POST path delegates to a resolver that only fetches an existing page and does not create one when absent.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:46-53
        snippet: register_rest_route('bulwar/v1', '/page-builder/pages/(?P<slug>[a-zA-Z0-9\-_]+)', ...)
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:130-141
        snippet: $page = get_page_by_path(sanitize_title_for_query($slug), OBJECT, 'page'); if (! $page instanceof WP_Post) { return Response::error('PAGE_NOT_FOUND', ...); }
    prevalence: common

  - category: structure
    pattern: Dual-meta write is the canonical page-builder persistence model.
    description: The workflow and controller always treat `page_builder_schema` and `page_builder_schema_for_ai` as a pair for normal writes.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:86-97
        snippet: update_post_meta(... 'page_builder_schema' ...); update_post_meta(... 'page_builder_schema_for_ai' ...);
      - file: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:164-193
        snippet: Required request body shape contains both `schema` and `aiSchema`.
    prevalence: common

  - category: workflow
    pattern: Repo-side creation support is test-page specific, not generic.
    description: The only create-or-update helpers in repo hardcode `testowa-blueprint` and do not accept an arbitrary slug/title pair.
    examples:
      - file: SCRIPTS/seed-testowa-blueprint-schema.php
        location: SCRIPTS/seed-testowa-blueprint-schema.php:51-69
        snippet: get_page_by_path('testowa-blueprint' ...); wp_insert_post(['post_title' => 'Testowa Blueprint', 'post_name' => 'testowa-blueprint', ...])
      - file: SCRIPTS/seed-testowa-blueprint-schema.sh
        location: SCRIPTS/seed-testowa-blueprint-schema.sh:9-15
        snippet: post list --name=testowa-blueprint ... post create ... --post_name=testowa-blueprint
    prevalence: occasional

  - category: workflow
    pattern: Schema generation is generic, WordPress page creation is not.
    description: There is already a generic generator for the AI schema from a render schema, but page existence must be handled separately.
    examples:
      - file: SCRIPTS/generate-page-builder-ai-schema.js
        location: SCRIPTS/generate-page-builder-ai-schema.js:5-9
        snippet: node SCRIPTS/generate-page-builder-ai-schema.js --input path/to/page_builder_schema.json --output path/to/page_builder_schema_for_ai.json
      - file: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:152-162
        snippet: The current generic POST endpoint updates an existing page by slug... Today there is no generic repo-side script...
    prevalence: common

  - category: architecture
    pattern: Verification routes remain proof-specific.
    description: The post-write verification surface in Astro and React is still wired around the single test slug rather than generic slug discovery.
    examples:
      - file: astro-site/src/lib/config.ts
        location: astro-site/src/lib/config.ts:3
        snippet: export const TEST_PAGE_SLUGS = ['testowa-blueprint'] as const;
      - file: zip/src/App.tsx
        location: zip/src/App.tsx:24
        snippet: <Route path="/testowa-blueprint" element={<TestowaBlueprintPage />} />
    prevalence: occasional

