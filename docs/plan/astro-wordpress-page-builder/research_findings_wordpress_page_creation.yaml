related_conventions:
  naming_patterns_in_domain: Slug-oriented artifacts are named as `<slug>.page_builder_schema.json` and `<slug>.page_builder_schema_for_ai.json`; proof-specific code uses the literal `testowa-blueprint` in script names and route wiring [sources: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:52-62, SCRIPTS/seed-testowa-blueprint-schema.php:51-69, zip/src/pages/TestowaBlueprintPage.tsx:8].
  structure_of_domain: Repo-side JSON artifacts are prepared first, then WordPress meta is updated via bridge endpoint or proof-specific seed helper, then Astro/React proof reads back by slug [sources: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:68-203].
  error_handling_in_domain: REST handlers return structured `Response::error(...)` codes such as `PAGE_SLUG_REQUIRED`, `PAGE_NOT_FOUND`, and `VALIDATION_ERROR`; permission checks use `edit_post` and `edit_pages` [sources: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:29-42, wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:62-84, wordpress-plugin/bulwar-bridge/src/Http/Routes.php:55-57].
  testing_in_domain: Current visible tests in `wordpress-plugin/bulwar-bridge/tests` cover global layout and other bridge areas; no dedicated page-builder controller test file was found in the examined scope.
  documentation_in_domain: The canonical workflow and current limitations are documented in `page-builder-authoring-workflow.md` and the POC status document [sources: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:20-203, docs/plan/astro-wordpress-page-builder/react-wordpress-poc-status.md:70-117].

