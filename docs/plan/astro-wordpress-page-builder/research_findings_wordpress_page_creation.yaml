  scope: Focused on WordPress page-builder page creation and write flow across bridge plugin, seed scripts, authoring documentation, and the Astro/React proof paths directly coupled to slug-based publishing.
  confidence: high
  coverage: 92
  decision_blockers: 1
  research_blockers: 0

