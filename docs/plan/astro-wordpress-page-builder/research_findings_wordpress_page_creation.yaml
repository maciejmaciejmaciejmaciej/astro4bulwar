domain_security_considerations:
  sensitive_areas:
    - area: page-builder write endpoint permissions
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:52-58
      concern: POST writes are protected by `current_user_can('edit_pages')` at route level.
    - area: per-page authorization on updates
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:62-65
      concern: Controller additionally requires `current_user_can('edit_post', $page->ID)` before meta updates.
  authentication_patterns_in_domain: Public GET is open; POST requires an authenticated WordPress user with page editing capability [sources: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:47-58, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:168-182].
  authorization_patterns_in_domain: Authorization is enforced twice, once at route registration and once per resolved page in the controller [sources: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:55-57, wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:62-65].
  data_validation_in_domain: The controller coerces both `schema` and `aiSchema` from object or JSON string input and rejects empty or invalid payloads with `VALIDATION_ERROR` [source: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:72-84, wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:146-160].

open_questions:
  - question: Which surface is intended to own creation of a missing WordPress page for future agent flows: the bridge REST API, a repo-side script, or an external operator step?
    context: The current workflow explicitly requires ensuring page existence first, but the repo contains only the proof-specific `testowa-blueprint` create-or-update helpers and an update-only generic POST endpoint.
    type: decision_blocker
    affects:
      - standalone
  - question: Should the generic future flow also update route discovery for Astro and React, or is WordPress page creation the only required scope?
    context: Astro and React proof layers are both still pinned to `testowa-blueprint`, so a created page may still not appear in proof surfaces without extra wiring.
    type: research
    affects:
      - standalone

gaps:
