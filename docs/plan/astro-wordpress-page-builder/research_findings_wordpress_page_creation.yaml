plan_id: astro-wordpress-page-builder
objective: Sprawdzić, jak dziś można utworzyć page w WordPress dla page buildera i czy istnieje generyczny mechanizm tworzenia strony po slug.
focus_area: wordpress-page-creation
created_at: 2026-04-18
created_by: GitHub Copilot GPT-5.4
status: completed
historical_snapshot: true
current_state_reference: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
historical_note: >-
  This research snapshot reflects the repo state inspected on 2026-04-18.
  Statements about TEST_PAGE_SLUGS-only Astro generation and the absence of a
  generic repo-side create-or-update flow are now outdated. Treat this file as
  audit evidence, not as the current operator workflow.

tldr: |
  - Wtyczka bridge ma publiczny odczyt i autoryzowany zapis page buildera po slugu, ale zapis działa tylko dla istniejącej strony, bo kontroler zawsze rozwiązuje stronę przez `get_page_by_path(...)` i zwraca `PAGE_NOT_FOUND`, gdy jej brak [wordpress-plugin/bulwar-bridge/src/Http/Routes.php:46-53, wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:56-99, wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:130-141].
  - Dziś istnieją tylko testowe helpery create-or-update dla jednego sluga `testowa-blueprint`: PHP seed i shell seed zapisujące `page_builder_schema` oraz opcjonalnie `page_builder_schema_for_ai` [SCRIPTS/seed-testowa-blueprint-schema.php:51-80, SCRIPTS/seed-testowa-blueprint-schema.sh:9-20].
  - Repo-side generator AI payloadu już istnieje i generuje `page_builder_schema_for_ai` z `page_builder_schema`, ale nie tworzy strony WordPress [SCRIPTS/generate-page-builder-ai-schema.js:5-9, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:68-92].
  - Dokument workflow wprost stwierdza, że obecny `POST` endpoint tylko aktualizuje istniejącą stronę i że dziś nie ma generycznego repo-side skryptu tworzącego dowolną stronę po slugu wraz z obiema metami [docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:37, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:152-168].
  - Nawet po zapisaniu meta pełny proof pozostaje częściowo testowy: Astro buduje tylko slugi z `TEST_PAGE_SLUGS = ['testowa-blueprint']`, a React proof route jest przypięty do `testowa-blueprint` [astro-site/src/lib/config.ts:3, astro-site/src/pages/[slug].astro:15-16, zip/src/App.tsx:24, zip/src/pages/TestowaBlueprintPage.tsx:8].

