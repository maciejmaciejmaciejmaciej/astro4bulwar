related_conventions:
  naming_patterns_in_domain: >-
    Helpery uzywaja verb-led nazw w camelCase po stronie TS (`parsePageBuilderSchema`,
    `createPageBuilderSchemaFromBlueprint`, `resolvePageBuilderSchemaSources`) i
    kebab-case nazw plikow dla CLI / repo scripts po stronie SCRIPTS
    (`generate-page-builder-ai-schema.js`).
  structure_of_domain: >-
    Registry core ma osobne pliki dla wspolnych schema, parsera render schema,
    blueprint helpera i resolvera source. Kazdy business block ma wlasny folder
    `zip/src/blocks/<blockKey>/schema.ts`. Repo-side skrypty publikacyjne i
    generator AI zyja w SCRIPTS jako plain JS.
  error_handling_in_domain: >-
    TS registry rzuca twarde bledy dla unknown blockKey, version mismatch,
    invalid data i invalid source. Generator AI rzuca blad dla unsupported
    blockKey. Dokument draftu wymaga controlled failure, gdy workflow ma
    unresolved source mapping.
  testing_in_domain: >-
