plan_id: astro-wordpress-page-builder
objective: >-
  Okreslic najlepsze miejsca implementacji dla draftu Firebase strony,
  bootstrapu createPageDraftFromScrape oraz szkieletu modulu Make.com Code
  compile, na podstawie istniejacego registry blokow, utili page buildera,
  skryptow repo i aktualnych konwencji nazewniczych.
focus_area: firebase_draft_impl_locations
created_at: 2026-04-18
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - Najlepszy fit dla TypeScriptowego kontraktu draftu Firebase to nowy plik w zip/src/blocks/registry, bo w tej warstwie zyja juz Zodowe kontrakty, parsery i helpery tworzenia instancji blokow.
  - createPageDraftFromScrape najlepiej dodac jako osobny helper w tej samej warstwie registry zamiast w scraperze albo SCRIPTS, bo ma skladac draft z registry defaults i jawnych source bindings, a nie wykonywac IO ani publikacje.
  - Szkielet modulu Make.com Code powinien trafic do nowego pliku JavaScript w SCRIPTS, bo obecny generator AI dziala juz jako osobna granica runtime CommonJS i nie importuje TypeScriptowego registry bez bundlera.
  - Obecny kod nie zawiera implementacji Firebase draft ani compile step; te elementy istnieja tylko w dokumentacji target-state, wiec rekomendacja musi zachowac rozdzial: draft/schema po stronie TS registry, compile skeleton po stronie plain JS.
  - Najwazniejsze ograniczenie: menu Woo-backed nie moze byc bootstrapowane z body scrape; draft i compile musza zachowac workflow.requiresSourceMapping, unresolvedSourceBlockIds oraz blokade compile do czasu jawnego source mappingu.

research_metadata:
  methodology: >-
    Hybrid retrieval: przeglad instrukcji domenowych, grep_search dla symboli i
    kontraktow, semantic_search dla wzorcow, targeted read_file na kluczowych
    plikach registry, blokach source-backed, skryptach SCRIPTS i dokumentach
    target-state, plus terminalowy pomiar dlugosci plikow.
  scope: >-
    Zbadano warstwe zip/src/blocks/registry, wybrane foldery blokow menu,
    generator page_builder_schema_for_ai w SCRIPTS, testy invariantow registry,
    workflow repo-first oraz dokumentacje Firebase draft / scrape bootstrap.
    Analiza byla zawężona do lokalizacji implementacyjnych, zaleznosci i
    ograniczen, bez wdrazania zmian.
  confidence: high
  coverage: 90
  decision_blockers: 0
  research_blockers: 0

