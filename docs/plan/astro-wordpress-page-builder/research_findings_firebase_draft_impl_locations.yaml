implementation_locations:
  - item: TypeScript type/schema dla Firebase page draft z workflow.requiresSourceMapping, unresolvedSourceBlockIds i sourceMappingNotes
    recommended_path: zip/src/blocks/registry/firebasePageDraft.ts
    action: create_new_file
    rationale: >-
      Najblizsze istniejące analogie to pageBuilderSchema.ts, blueprint.ts,
      common.ts i types.ts. Wszystkie kontrakty page buildera sa tu juz
      modelowane przez Zod i compose'owane z shared registry. Dodanie draft
      contract do pageBuilderSchema.ts mieszaloby working draft store z
      kanonicznym WordPress render schema, co przeczy dokumentacji target-state.
    dependencies_to_reuse:
      - zip/src/blocks/registry/types.ts: PageBuilderSectionInstance jako baza dla entries w draft.blocks
      - zip/src/blocks/registry/pageBuilderSchema.ts: PageBuilderSchema dla compiled.page_builder_schema
      - zip/src/blocks/registry/common.ts: wooCategorySourceSchema / sharedWooSourceSchema dla workflow gates i placeholder bindings
      - zip/src/blocks/registry/index.ts: validateBlockData, validateBlockSource, getBlock
    constraints_from_current_code:
      - pageBuilderSchema.ts jest kanonicznym kontraktem render meta dla WordPress, nie working draft store
      - w kodzie nie ma jeszcze TS typu dla page_builder_schema_for_ai; compiled.page_builder_schema_for_ai wymaga osobnego local type/schema albo tymczasowo unknown
      - dokumentacja target-state wymaga zachowania blocksOrder + blocks map + stable ids, zamiast root array write modelu

  - item: Bootstrap function createPageDraftFromScrape
    recommended_path: zip/src/blocks/registry/createPageDraftFromScrape.ts
    action: create_new_file_and_extend_registry_exports_if_needed
    rationale: >-
      Konwencja helperow registry jest verb-led i rozdziela parser, blueprint
      build oraz source resolution na osobne pliki. createPageDraftFromScrape ma
      budowac strukture draftu z registry defaults i source bindings, wiec jest
      blizej createPageBuilderSchemaFromBlueprint niz skryptow CLI albo samego
      scrape parsera.
    dependencies_to_reuse:
      - zip/src/blocks/registry/index.ts: createDefaultBlockInstance, getBlock, validateBlockData, validateBlockSource
      - zip/src/blocks/registry/blueprint.ts: wzorzec deep merge dla recipe/data overrides
      - zip/src/blocks/menu_two_columns_with_with_heading_no_img/schema.ts: sourceSchema i defaultData dla standalone Woo menu block
      - zip/src/blocks/menu-category-photo-parallax-full-width/schema.ts: sourceSchema i defaultData dla hero menu block
      - zip/src/blocks/registry/firebasePageDraft.ts: parse/validate final draft output
    constraints_from_current_code:
      - bootstrap ma byc structure-only; dokumentacja zabrania kopiowania body content, nazw dan, opisow i cen ze scrape do menuColumns
      - current code nie ma Firebase SDK ani persystencji draftu, wiec helper powinien zwracac draft object, a nie wykonywac zapis do Firestore
      - wejscie ma byc znormalizowanym scrapeDocument; zip/SRIPTS/wp-seo-scraper jest osobna warstwa ekstrakcji i nie powinien byc miejscem dla page-builder compile logic

  - item: JavaScript skeleton dla Make.com Code compile module
    recommended_path: SCRIPTS/make-code-compile-page-draft.js
    action: create_new_file
    rationale: >-
      Obecny generator AI schema juz zyje w SCRIPTS jako plain JS/CommonJS i jest
      uruchamiany jako osobny proces. Make Code compile skeleton ma te sama
      granice runtime: nie powinien byc wsadzany do TS registry ani do scrapera,
      ale powinien pozostac repo-side artefaktem JS obok generatora AI.
    dependencies_to_reuse:
      - SCRIPTS/generate-page-builder-ai-schema.js: descriptor-driven AI_BLOCK_REGISTRY, buildAiBlock/buildAiSchema pattern
      - docs/plan/astro-wordpress-page-builder/scrape-bootstrap-firebase-draft-mapping.md: input/output contract i fail-safe rules modulu
      - zip/src/blocks/registry/registry-invariants.test.tsx: oczekiwanie, ze AI generator coverage pozostaje aligned z registered blocks
    constraints_from_current_code:
      - generator AI nie eksportuje biblioteki; dzisiaj jest monolitycznym CLI, wiec wspol-reuzycie bedzie wymagalo albo extraction helpera JS, albo tymczasowego duplikowania minimalnych descriptor functions
      - plain JS layer nie ma bezposredniego, bezpiecznego importu TS/TSX registry bez dodatkowego bundlingu lub transpile step
      - compile step nie istnieje w wykonywalnym kodzie; dokumentacja wymaga, aby modul failowal kontrolowanie przy workflow.requiresSourceMapping=true albo placeholder sourceValue typu TODO_WOO_CATEGORY_SLUG

domain_security_considerations:
  sensitive_areas:
    - area: Woo source bindings for restaurant menu blocks
      location: docs/plan/astro-wordpress-page-builder/scrape-bootstrap-firebase-draft-mapping.md:347
      concern: Compile i bootstrap nie moga traktowac scrape body jako kanonicznego zrodla produktow, cen i opisow.
    - area: Dual WordPress payload generation
      location: docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:213
      concern: Compile musi produkowac oba payloady razem; partial publish lub jednostronny update narusza kontrakt page buildera.
  authentication_patterns_in_domain: >-
    W badanym zakresie nie ma jeszcze implementacji Firebase auth ani Make auth.
    Obecny zapis do WordPressa jest opisany jako osobny, authenticated publish
    step po compile.
  authorization_patterns_in_domain: >-
    Make Code compile module wedlug dokumentacji ma byc walidatorem i
    translacja, nie edytorem katalogu produktow Woo ani publisherem.
  data_validation_in_domain: >-
    Aktualny kod stawia na Zod parsing po stronie TS registry i explicite
    failuje dla unknown blockKey/source. Ta sama rygorystyczna walidacja powinna
    byc utrzymana w nowym draft contract file przed wygenerowaniem compiled
    payloadow.

testing_patterns:
  framework: node:test plus repo TypeScript tests executed via tsx/node
  coverage_areas:
    - registry invariants dla wszystkich registered blocks
    - AI schema generator coverage aligned z registered blocks
    - source resolution dla Woo-backed menu blocks i WordPress-backed oferta posts
  test_organization: >-
    TS registry ma testy obok utili w zip/src/blocks/registry, a generator AI ma
    osobny zestaw testow w SCRIPTS. To sugeruje trzymanie nowych testow draft
    contractu przy TS registry oraz compile skeleton tests przy SCRIPTS.
  mock_patterns:
    - spawnSync/execFileSync dla uruchamiania JS CLI generatora jako osobnego procesu
    - parsePageBuilderSchema na syntetycznych payloadach do weryfikacji registry contracts

