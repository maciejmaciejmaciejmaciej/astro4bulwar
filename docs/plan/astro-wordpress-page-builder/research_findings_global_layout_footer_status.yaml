plan_id: astro-wordpress-page-builder
objective: Determine whether the Astro build error footer_status=fallback_missing_footer_page_id means the WordPress global layout/footer is not configured, and map the exact resolver cause.
focus_area: global_layout_footer_status
created_at: 2026-04-21
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - Astro fails because it rejects any global-layout payload whose meta statuses are not both resolved, including footer_status=fallback_missing_footer_page_id. Source: astro-site/src/lib/wordpress.ts:270-274.
  - In the bridge resolver, fallback_missing_footer_page_id is emitted only when bulwar_bridge_global_layout resolves but footerPageId is absent or casts to <= 0; page lookup and shared_footer block validation are not reached in that branch. Source: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:75-78.
  - footerPageId is an internal pointer to a shared WordPress page whose page_builder_schema must contain an enabled shared_footer block with blockVersion 1 and source null. Sources: astro-site/src/lib/globalLayoutContract.ts:81, 88-89; docs/plan/navbar-footer-global-layout-v1/operator-reference.md:11-22.
  - Clean endpoint resolution requires both a parseable global-layout option and a valid referenced footer page/schema; different fallback codes distinguish missing reference vs missing page vs missing/invalid block. Source: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:42-136.

research_metadata:
  methodology: Hybrid retrieval using grep_search for exact status strings and contract markers, targeted read_file inspection of resolver/controller/config/docs/tests, and repo memory review for previously recorded live endpoint observations.
  scope: Focused on the WordPress bridge global-layout resolver path, the Astro consumer gate, the shared contract, and the operator docs for footer storage semantics.
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 0

