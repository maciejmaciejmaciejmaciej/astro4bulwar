related_conventions:
  naming_patterns_in_domain: Footer resolution states use stable snake_case fallback strings prefixed with fallback_, while the internal pointer key is camelCase footerPageId.
  structure_of_domain: One bridge option stores navbar plus footerPageId; the actual footer content is authored in one shared WordPress page_builder_schema block and resolved server-side.
  error_handling_in_domain: The bridge returns success envelopes with fallback meta instead of HTTP failure for footer resolution problems, and Astro upgrades any non-resolved meta into a thrown build/runtime error.
  testing_in_domain: Bridge behavior is covered by a small PHP harness file; Astro meta-status gating is covered by TypeScript tests that mock fetch responses.
  documentation_in_domain: Operator and explainer docs explicitly separate internal storage details from the public runtime contract and document the exact shared_footer authoring rule.

related_dependencies:
  internal:
    - component: wordpress-plugin/bulwar-bridge/src/Config/Constants.php
      relationship_to_domain: Supplies the option name used by the resolver.
      direction: inbound
    - component: wordpress-plugin/bulwar-bridge/src/Support/Response.php
      relationship_to_domain: Wraps resolver output into the public REST envelope.
      direction: outbound
    - component: astro-site/src/lib/globalLayoutContract.ts
      relationship_to_domain: Parses the public response and mirrors internal storage assumptions for tooling/docs.
      direction: bidirectional
  external:
    - name: WordPress option and post-meta storage
      purpose_for_domain: Stores the internal global-layout option and the referenced footer page schema.

domain_security_considerations:
  sensitive_areas:
    - area: Public endpoint exposure
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:40-44
      concern: The route is intentionally public, so footerPageId stays internal and is excluded from the public payload.
    - area: Internal storage detail isolation
      location: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:278
      concern: Tests assert footerPageId must not leak into public runtime responses.
  authentication_patterns_in_domain: The global layout route uses __return_true and is publicly readable.
  authorization_patterns_in_domain: No authorization gate is applied to GET /layout/global; protection relies on limiting the payload to normalized public layout data.
  data_validation_in_domain: The bridge validates only the shared_footer structural rules needed for resolution, and Astro validates the returned contract plus meta status using zod.

testing_patterns:
  framework: PHP custom test harness plus TypeScript tests using mocked fetch responses
  coverage_areas:
    - Resolver/controller success path with a valid referenced footer page
    - Explicit missing footerPageId fallback meta
    - Astro rejection of unresolved footer_status values
  test_organization: One bridge test file focused on endpoint behavior and one Astro test file focused on contract/error handling.
  mock_patterns:
    - Stub WordPress functions get_option, get_post, get_post_meta, and register_rest_route in the bridge PHP test harness.
    - Replace globalThis.fetch in Astro tests to return controlled JSON envelopes.

