patterns_found:
  - category: architecture
    pattern: Public route delegates all footer resolution to one bridge resolver.
    description: GET /layout/global is intentionally thin: controller forwards to GlobalLayoutResolver and returns a normalized envelope with meta statuses.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:40-44
        snippet: register_rest_route('bulwar/v1', '/layout/global', ['methods' => 'GET', 'callback' => [GlobalLayoutController::class, 'show']
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/GlobalLayoutController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/GlobalLayoutController.php:15-20
        snippet: $resolved = GlobalLayoutResolver::resolve(); return Response::success(['globalLayout' => $resolved['globalLayout']], 200, $resolved['meta']);
    prevalence: common
  - category: structure
    pattern: Footer data is stored indirectly through an internal page reference rather than directly in the public layout payload.
    description: The bridge option stores footerPageId, and the actual footer content lives in a referenced page's page_builder_schema.sections.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:75-90
        snippet: $footerPageId = isset($settings['footerPageId']) ? (int) $settings['footerPageId'] : 0; ... $rawSchema = get_post_meta($footerPage->ID, 'page_builder_schema', true);
      - file: docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md
        location: docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md:8-12
        snippet: The option stores navbar and footerPageId, while footer content itself is not stored in the option.
    prevalence: common
  - category: error_handling
    pattern: Resolver emits precise fallback footer statuses for each resolution phase.
    description: Missing footer reference, missing page, missing schema, invalid schema, invalid block, disabled block, and missing block each map to a distinct footer_status string.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:77-78
        snippet: if ($footerPageId <= 0) { return [self::defaultFooter(), 'fallback_missing_footer_page_id']; }
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:84-136
        snippet: return [self::defaultFooter(), 'fallback_footer_page_not_found'|'fallback_footer_schema_missing'|'fallback_footer_schema_invalid'|'fallback_footer_block_invalid'|'fallback_footer_block_disabled'|'fallback_footer_block_missing'];
    prevalence: common
  - category: public_contract
    pattern: Astro treats any non-resolved meta status as a hard failure.
    description: Even with a success envelope and normalized fallback footer payload, Astro rejects unresolved meta and aborts the build unless an override enables fallback.
    examples:
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:270-274
        snippet: if (parsedPayload.meta.layout_option_status !== RESOLVED_GLOBAL_LAYOUT_STATUS || parsedPayload.meta.footer_status !== RESOLVED_GLOBAL_LAYOUT_STATUS) { throw new Error(...); }
      - file: astro-site/src/lib/globalLayout.test.ts
        location: astro-site/src/lib/globalLayout.test.ts:124-136
        snippet: footer_status: 'fallback_missing_footer_page_id' ... assert.rejects(... /layout_option_status=resolved, footer_status=fallback_missing_footer_page_id/)
    prevalence: common
  - category: testing
    pattern: Tests cover the resolved path and the missing-footer-reference path explicitly.
    description: The PHP bridge test harness verifies both the valid shared footer page case and the missing footerPageId case.
    examples:
      - file: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php
        location: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:245-279
        snippet: setGlobalLayoutOption(['navbar' => buildNavbarFixture(), 'footerPageId' => 37]);
      - file: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php
        location: wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:282-296
        snippet: setGlobalLayoutOption(['navbar' => buildNavbarFixture()]); ... assertSameValue('fallback_missing_footer_page_id', $data['meta']['footer_status']);
    prevalence: occasional

