plan_id: "astro-wordpress-page-builder"
objective: >
  Wdrozyc faze 1 SEO w astro-site przez typowany kontrakt SEO, normalizacje
  payloadu WordPress, przekazanie rozwiazanego SEO z [slug].astro i pelny
  rendering head w BaseLayout.astro.
created_at: "2026-04-18T00:00:00Z"
created_by: "gem-planner"
status: "pending"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 4
  risk_score: "medium"

tldr: |
  Najmniejszy spojny zakres dla fazy 1 SEO to zamkniecie calego przeplywu
  danych w czterech krokach: zdefiniowac jawny kontrakt seo w
  astro-site/src/lib/types.ts, znormalizowac surowy payload WordPress do tego
  kontraktu w astro-site/src/lib/wordpress.ts, zlozyc jeden rozwiazany obiekt
  SEO w astro-site/src/pages/[slug].astro i wyrenderowac komplet tagow head w
  astro-site/src/layouts/BaseLayout.astro.
  To odpowiada obecnym lukom repo: seo jest nadal luznym recordem,
  [slug].astro sklada tylko title, a BaseLayout renderuje tylko podstawowy
  head. Sources: astro-site/src/lib/types.ts, astro-site/src/lib/wordpress.ts,
  astro-site/src/pages/[slug].astro, astro-site/src/layouts/BaseLayout.astro.

open_questions:
  - >
    Czy fallback canonical ma respektowac aktualne base /astro/, czy ma juz
    wskazywac docelowy publiczny URL bez prefiksu stagingowego? To wplywa na
    logike resolvera w [slug].astro i walidacje finalnego HTML. Sources:
    astro-site/astro.config.mjs,
    docs/plan/astro-wordpress-page-builder/seo-ai-visibility-roadmap.md.

pre_mortem:
  overall_risk_level: "medium"
  critical_failure_modes:
    - scenario: >
        Typed seoSchema okaze sie zbyt restrykcyjny wobec obecnych payloadow
        WordPress i build zacznie padac na danych, ktore dzis przechodza jako
        luźny record.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        Najpierw utrzymac normalizacje przed pageBuilderSchema.parse(), a
        dopiero potem zaostrzyc typy. Pola opcjonalne zostawic opcjonalne w
        fazie 1 i walidowac tylko shape potrzebny do head.
    - scenario: >
        Canonical i og url zostana wyliczone z nieprawidlowego hosta lub z
        prefiksem /astro/, co da zle URL-e w wygenerowanym HTML.
      likelihood: "medium"
      impact: "critical"
      mitigation: >
        Zrobic jeden resolver URL-i w [slug].astro z jasna kolejnoscia
        canonicalUrl, canonicalPath, fallback z configu i sprawdzic wynik na
        build output. Sources: astro-site/astro.config.mjs,
        astro-site/src/pages/[slug].astro.
    - scenario: >
        Head bedzie skladany czesciowo w [slug].astro, a czesciowo w
        BaseLayout.astro, przez co pojawia sie duplikaty lub niespojne
        fallbacki dla title i description.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        Wymusic jeden rozwiazany obiekt SEO przekazywany do BaseLayout i usunac
        sciezke title only jako osobny kontrakt. Sources:
        astro-site/src/pages/[slug].astro,
        astro-site/src/layouts/BaseLayout.astro.
  assumptions:
    - >
      page_builder_schema.seo pozostaje opcjonalne w fazie 1, ale gdy
      wystepuje, powinno byc walidowane przez jawny schema zamiast przez luzny
      record. Sources: astro-site/src/lib/types.ts,
      astro-site/src/lib/wordpress.ts.
    - >
      Wspolny layout jest poprawnym miejscem do renderowania head, bo Astro
      rekomenduje wspolny layout lub komponent Head dla metadanych stron.
      Source: Astro docs search result stored in workspaceStorage content.json.
    - >
      Ladowanie globalnego layoutu i fallbacki navbar oraz footer pozostaja
      poza zakresem tego planu i nie powinny byc modyfikowane przez prace SEO.
      Sources: astro-site/src/pages/[slug].astro,
      astro-site/src/lib/wordpress.ts,
      /memories/repo/global-layout-endpoint-notes.md.

implementation_specification:
  code_structure: |
    Zachowac pojedynczy pipeline SEO wewnatrz astro-site: surowy payload
    WordPress, normalizacja w wordpress.ts, walidacja w types.ts,
    rozwiazanie fallbackow i URL-i w [slug].astro, a na koniec render tagow w
    BaseLayout.astro. Nie rozpraszac logiki meta-tagow po komponentach sekcji
    ani nie utrzymywac rownolegle dwoch kontraktow, czyli title i seo.
  affected_areas:
    - "astro-site/src/lib/types.ts"
    - "astro-site/src/lib/wordpress.ts"
    - "astro-site/src/pages/[slug].astro"
    - "astro-site/src/layouts/BaseLayout.astro"
    - "docs/plan/astro-wordpress-page-builder/seo-ai-visibility-roadmap.md"
  component_details:
    - component: "seoSchema i typ layoutowego SEO"
      responsibility: >
        Zdefiniowac stabilny kontrakt danych SEO dla page_builder_schema oraz
        typ obiektu wejsciowego do renderowania head.
      interfaces:
        - "seoSchema waliduje co najmniej title, description, canonicalUrl albo canonicalPath, robots, og i twitter."
        - "Typ layoutowy opisuje komplet juz rozwiazanych wartosci przekazywanych do BaseLayout.astro."
    - component: "normalizacja SEO z WordPress"
      responsibility: >
        Przeksztalcic rozne warianty surowego payloadu seo do ksztaltu
        akceptowanego przez seoSchema bez zmiany innych obszarow
        page_builder_schema.
      interfaces:
        - "normalizeSchema() albo pomocniczy normalizeSeo() zwraca shape zgodny z pageBuilderSchema.parse()."
    - component: "page-level SEO resolver"
      responsibility: >
        Zlozyc finalny obiekt SEO dla konkretnego sluga z priorytetem dla
        danych z payloadu i bezpiecznymi fallbackami z danych strony oraz
        configu Astro.
      interfaces:
        - "[slug].astro przekazuje jeden obiekt seo do BaseLayout.astro zamiast samego title."
    - component: "renderer head w BaseLayout"
      responsibility: >
        Wyrenderowac komplet tagow HTML head wymaganych w fazie 1 bez zmiany
        istniejacego shella strony, fontow i layoutu globalnego.
      interfaces:
        - "BaseLayout.astro renderuje title, meta description, canonical, robots, podstawowe Open Graph i podstawowe Twitter tags."
  dependencies:
    - component: "pageBuilderSchema"
      relationship: >
        Jest kontraktem wejsciowym dla danych pobieranych z WordPress i musi
        zaczac konsumowac typed seoSchema.
    - component: "fetchWordPressPageBuilderSchema"
      relationship: >
        To miejsce, w ktorym normalizacja musi przygotowac dane do parse bez
        rozbijania istniejacego przeplywu pobierania strony.
    - component: "BaseLayout props"
      relationship: >
        To finalny konsument rozwiazanego obiektu SEO z [slug].astro.
  integration_points:
    - "astro-site/src/lib/types.ts"
    - "astro-site/src/lib/wordpress.ts"
    - "astro-site/src/pages/[slug].astro"
    - "astro-site/src/layouts/BaseLayout.astro"

contracts:
  - from_task: "define_typed_seo_contract"
    to_task: "normalize_wordpress_seo"
    interface: >
      Jawny schema i typy SEO dla page_builder_schema oraz layoutowego obiektu
      head.
    format: "Zod schema plus inferred TypeScript types"
  - from_task: "normalize_wordpress_seo"
    to_task: "wire_slug_page_seo"
    interface: >
      fetchWordPressPageBuilderSchema() zwraca page.seo zgodne z typed
      kontraktem albo undefined.
    format: "Znormalizowany obiekt parsed przez pageBuilderSchema"
  - from_task: "wire_slug_page_seo"
    to_task: "render_base_layout_head"
    interface: >
      Jeden rozwiazany obiekt SEO z absolutnymi URL-ami i fallbackami dla
      brakujacych pol.
    format: "Layout props object"

