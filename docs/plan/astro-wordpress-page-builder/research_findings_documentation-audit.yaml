related_conventions:
  naming_patterns_in_domain: blockKey values use stable kebab-case business names such as gallery-masonry-style1 and menu-category-photo-parallax-full-width; page artifacts follow slug.page_builder_schema.json and slug.page_builder_schema_for_ai.json naming; block instance ids use stable suffixes like <blockKey>-01.
  structure_of_domain: The docs separate architecture blueprint, contract specs, workflow docs, and example payloads; per-page artifacts live alongside planning docs under docs/plan/astro-wordpress-page-builder.
  error_handling_in_domain: The schema spec requires build-time failure for invalid schema or unsupported source, and the operator workflow requires verifying updated_meta_keys and GET responses after POST.
  testing_in_domain: The implementation plan requires validation tests for block schemas, example payloads, page render, Woo resolvers, and failure cases; testowa-blueprint JSON files serve as concrete example payloads.
  documentation_in_domain: Documents frequently self-label as current source of truth, canonical, recommended, or not final, which acts as an internal status marker for document authority.

related_dependencies:
  internal:
  - component: docs/block-registry/
    relationship_to_domain: Human-readable block docs are referenced as the repository-side source for block descriptions and AI guidance generation.
    direction: outbound
  - component: SCRIPTS/generate-page-builder-ai-schema.js
    relationship_to_domain: The authoring workflow depends on this generator to derive page_builder_schema_for_ai from render schema JSON.
    direction: outbound
  - component: SCRIPTS/deploy-astro-static.ps1
    relationship_to_domain: Local fallback deployment uses this script as the canonical manual path.
    direction: outbound
  - component: wordpress-plugin/bulwar-bridge
    relationship_to_domain: Documentation depends on the bridge exposing GET/POST page-builder endpoints and WordPress meta registration.
    direction: outbound
  external:
  - name: WordPress post meta and REST surface
    purpose_for_domain: Stores and transports page instances.
  - name: WooCommerce catalog data
    purpose_for_domain: Supplies category/product-backed block content.
  - name: GitHub repository secrets for deployment
    purpose_for_domain: Required for CI deployment over SSH.

domain_security_considerations:
  sensitive_areas:
  - area: Authenticated schema write path
    location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:126
    concern: The POST workflow requires an authenticated WordPress user with edit_pages and updates both meta fields together.
  - area: Deployment credentials
    location: docs/plan/astro-wordpress-page-builder/github-actions-astro-deploy.md:21
    concern: SSH host, user, and private key are required as repository secrets.
  - area: Publish approval gate
    location: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md:287
    concern: The Make-driven redeploy flow is documented as requiring explicit approval before deployment.
  authentication_patterns_in_domain: WordPress write operations are authenticated; GitHub Actions deploy uses SSH key-based authentication; local deploy assumes a local SSH key in the repository root.
  authorization_patterns_in_domain: page-builder-authoring-workflow.md specifies edit_pages capability for POST updates and agentic-page-builder-blueprint.md constrains Make agents to structured payload editing rather than arbitrary WordPress content mutation.
  data_validation_in_domain: The registry owns block schema validation, page_builder_schema is validated against registry definitions, and the Make output is expected to remain strict and schema-bound.

testing_patterns:
  framework: Unspecified in the documentation; testing expectations are described as coverage areas rather than tied to one named framework.
  coverage_areas:
  - block schema validation tests
  - example payload tests for each registered block
  - page schema render test
  - Woo resolver tests
  - failure tests for invalid page schemas
  test_organization: Test expectations are summarized in implementation-plan.md under Testing Rules rather than in a dedicated testing strategy document.
  mock_patterns:
  - Example payload JSON files act as reproducible fixtures for schema and workflow validation.

open_questions:
- question: What exact WordPress status or flag should represent changed by AI, waiting for redeploy?
  context: The agent workflow requires a redeploy-needed state, but the exact representation remains explicitly open.
  type: decision_blocker
  affects:
  - documentation-audit
- question: Should page_builder_schema_for_ai always mirror every block, or can some render-only blocks be excluded?
  context: The AI schema mapping rule is central to agent editing and payload generation, but scope parity remains open.
  type: decision_blocker
  affects:
  - documentation-audit
- question: Should page manifests be stored only in repo docs, or also be available through the WordPress bridge API?
  context: The agent blueprint introduces page manifests for reproducibility, but storage location is not settled.
  type: decision_blocker
  affects:
  - documentation-audit
- question: Should the Make scenario be generated per page slug, per page template, or per page family?
  context: Scenario granularity affects operational scaling and template reuse.
  type: decision_blocker
  affects:
  - documentation-audit
- question: Which exact folder should be the canonical working folder for raw imported shadcn blocks?
  context: The refinement process is documented, but the raw import staging area is left open.
  type: decision_blocker
  affects:
  - documentation-audit

