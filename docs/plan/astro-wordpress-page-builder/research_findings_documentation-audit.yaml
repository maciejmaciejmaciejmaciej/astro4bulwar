  impact: research_blocker
  affects:
  - documentation-audit
- area: MVP storage wording drift
  description: implementation-plan.md still frames the MVP as one WordPress meta field at line 226, while newer operator and agent docs describe a live dual-meta-field workflow.
  impact: decision_blocker
  affects:
  - documentation-audit
- area: Firebase versus direct WordPress operator flow
  description: firebase-page-draft-mvp.md introduces Firebase as the working-state store, but page-builder-authoring-workflow.md documents a direct repo JSON to WordPress POST workflow as the current repeatable path; the authoritative relationship between these two models is not explicitly locked.
  impact: decision_blocker
  affects:
  - documentation-audit
- area: Generic page creation flow
  description: The current POST endpoint only updates existing pages, and the only seed helper referenced as implemented is still specific to testowa-blueprint.
