plan_id: astro-wordpress-page-builder
objective: Audit existing Astro + WordPress page-builder documentation and workflow notes.
focus_area: documentation-audit
created_at: 2026-04-15
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - The documentation is intentionally split into a top-level plan, low-level specs, an operator workflow, and an agent workflow; the clearest top-level anchors are implementation-plan.md, page-builder-authoring-workflow.md, and agentic-page-builder-blueprint.md.
  - The currently documented runtime model is dual-meta-field WordPress storage with page_builder_schema for rendering and page_builder_schema_for_ai for constrained AI editing, backed by repo-side block definitions and block docs.
  - The documents consistently describe three connected processes: reusable block refinement in VS Code, page assembly and publication, and production content editing in Make.com.
  - Several items are explicitly still open or transitional: about-1 mapping, Firebase compile mapping details, per-page creation automation, Astro slug discovery, and Make scenario granularity.
  - docs/prd.yaml appears unrelated to this domain and should not be treated as a source for the Astro + WordPress page-builder workflow.

research_metadata:
  methodology: Hybrid retrieval using file_search to enumerate scope, read_file for targeted reading, grep_search for source-of-truth/canonical/open-question markers, and PowerShell line counting for exact file lengths.
  scope: Requested planning and documentation artifacts under docs/plan/astro-wordpress-page-builder plus docs/prd.yaml and agentic-page-builder-blueprint.md for the Make.com workflow layer.
  confidence: high
  coverage: 96
  decision_blockers: 5
  research_blockers: 1

