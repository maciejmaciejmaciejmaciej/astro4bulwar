  - documentation-audit
- area: Block catalog completeness
  description: about-1 remains part of the MVP planning set but is still unresolved across implementation-plan.md, block-registry-spec.md, blueprint-dsl-spec.md, and mvp-block-data-contracts.md.
  impact: decision_blocker
  affects:
  - documentation-audit
