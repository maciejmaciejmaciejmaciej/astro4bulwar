patterns_found:
  - category: architecture
    pattern: Parallel implementations for the same domain
    description: >-
      The repo currently contains three separate page-builder layers: a React
      runtime registry and renderer in `zip`, a smaller Astro build-time POC in
      `astro-site`, and WordPress transport/storage in `bulwar-bridge`.
    examples:
      - file: zip/src/blocks/registry/index.ts
        location: zip/src/blocks/registry/index.ts:15
        snippet: export const blockRegistry = { ...two block definitions... }
      - file: astro-site/src/lib/types.ts
        location: astro-site/src/lib/types.ts:45
        snippet: sections: z.array(z.union([galleryBlockSchema, menuBlockSchema]))
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:86
        snippet: update_post_meta($page->ID, 'page_builder_schema', ...)
    prevalence: common

  - category: structure
    pattern: Scope is hard-limited to one test page and two block types
    description: >-
      The executable workflow repeatedly anchors on `testowa-blueprint` and only
      supports `gallery-masonry-style1` plus `menu-category-photo-parallax-full-width`.
    examples:
      - file: astro-site/src/lib/config.ts
        location: astro-site/src/lib/config.ts:3
        snippet: export const TEST_PAGE_SLUGS = ['testowa-blueprint'] as const;
      - file: zip/src/pages/TestowaBlueprintPage.tsx
        location: zip/src/pages/TestowaBlueprintPage.tsx:12
        snippet: const PAGE_BUILDER_SLUG = "testowa-blueprint";
      - file: SCRIPTS/generate-page-builder-ai-schema.js
        location: SCRIPTS/generate-page-builder-ai-schema.js:228
        snippet: throw new Error(`Unsupported blockKey in AI schema generator: ...`)
    prevalence: common

  - category: data_contract
    pattern: Real contracts are enforced in React and Astro code with Zod, but not in WordPress write path
    description: >-
      Frontend runtimes validate schemas against code definitions, while the
      WordPress update endpoint only checks JSON shape and persists it.
    examples:
      - file: zip/src/blocks/registry/pageBuilderSchema.ts
        location: zip/src/blocks/registry/pageBuilderSchema.ts:47
        snippet: export const parsePageBuilderSchema = (value: unknown): PageBuilderSchema => {
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:50
        snippet: return pageBuilderSchema.parse(normalizeSchema(payload.data.schema));
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:147
        snippet: private static function coerceSchemaPayload($value, string $field)
    prevalence: common

  - category: source_resolution
    pattern: Woo source resolution exists only for the menu block
    description: >-
      Both React and Astro implement source resolution for the menu category
      block using Woo Store API, while gallery and other planned blocks have no
      resolver code.
    examples:
      - file: astro-site/src/lib/pageBuilder.ts
        location: astro-site/src/lib/pageBuilder.ts:13
        snippet: if (section.blockKey === 'menu-category-photo-parallax-full-width') { ... }
      - file: zip/src/blocks/registry/resolvePageBuilderSources.ts
        location: zip/src/blocks/registry/resolvePageBuilderSources.ts:17
        snippet: case "menu-category-photo-parallax-full-width":
      - file: docs/block-registry/registry.machine.json
        location: docs/block-registry/registry.machine.json:271
        snippet: "sourceType": "wordpress_media_gallery", "status": "planned"
    prevalence: occasional

  - category: deployment
    pattern: Build-and-upload static Astro deployment with backup rotation exists
    description: >-
      Astro static output can be built locally or in CI and deployed to dhosting
      with backup snapshots and permissions repair.
    examples:
      - file: .github/workflows/deploy-astro-dhosting.yml
        location: .github/workflows/deploy-astro-dhosting.yml:41
        snippet: working-directory: ${{ env.ASTRO_ROOT }}; run: npm run build
      - file: SCRIPTS/deploy-astro-static.ps1
        location: SCRIPTS/deploy-astro-static.ps1:34
        snippet: scp ... astro-dist-deploy.zip ...; unzip ...; chmod 755/644
    prevalence: occasional

  - category: docs_vs_code
    pattern: Seed registry documentation is partially out of sync with code contracts
    description: >-
      The gallery registry docs still describe an array of string image URLs,
      while the implemented block schemas and sample page payload use `{ src, alt }`
      image objects plus extra presentation fields.
    examples:
      - file: docs/block-registry/gallery-masonry-style1.md
        location: docs/block-registry/gallery-masonry-style1.md:53
        snippet: - `images[]` is an ordered string array of image URLs
      - file: zip/src/blocks/gallery-masonry-style1/schema.ts
        location: zip/src/blocks/gallery-masonry-style1/schema.ts:10
        snippet: images: z.array(imageAssetSchema).default([])
      - file: docs/plan/astro-wordpress-page-builder/testowa-blueprint.page_builder_schema.json
        location: docs/plan/astro-wordpress-page-builder/testowa-blueprint.page_builder_schema.json:12
        snippet: "images": [ { "src": ..., "alt": ... } ]
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: WordPress bridge REST transport
      responsibility: Stores and serves page-builder schemas from page post meta.
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      relationship_to_domain: domain depends on this
    - component: React page-builder registry runtime
      responsibility: Validates schemas, builds schemas from blueprints, resolves sources, and renders sections in React.
      location: zip/src/blocks/registry/
      relationship_to_domain: domain depends on this
    - component: Astro build-time renderer
      responsibility: Fetches WordPress schema, resolves Woo sources during build, and emits static HTML for known slugs.
      location: astro-site/src/
      relationship_to_domain: domain depends on this
    - component: Repo-side AI schema generator
      responsibility: Generates AI-editable page payloads from render-oriented schema JSON.
      location: SCRIPTS/generate-page-builder-ai-schema.js
      relationship_to_domain: domain depends on this
    - component: Block registry docs seed
      responsibility: Documents seed block contracts and intended registry rules.
      location: docs/block-registry/
      relationship_to_domain: this uses domain outputs
  interfaces_used_by_domain:
    - interface: WordPress REST endpoint `/wp-json/bulwar/v1/page-builder/pages/{slug}`
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      usage_pattern: React runtime and Astro build both fetch render schema from the same route.
    - interface: Woo Store API `/wp-json/wc/store/v1/products` and `/products/categories`
      location: astro-site/src/lib/woo.ts
      usage_pattern: Used to resolve Woo-backed menu content from category or explicit product ids.
  data_flow_involving_domain: >-
    Repo-side JSON or runtime-generated schemas are seeded into WordPress page
    meta; the WordPress bridge exposes them over REST; React runtime or Astro
    build fetch the render schema; Woo source resolution enriches menu data;
    sections are rendered either client-side in React or build-time in Astro.
    Separately, `generate-page-builder-ai-schema.js` can derive an AI-oriented
    payload from the render schema, and the plugin can persist both meta fields.
  key_relationships_to_domain:
    - from: SCRIPTS/seed-testowa-blueprint-schema.php
      to: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      relationship: writes data later served by
    - from: astro-site/src/lib/pageBuilder.ts
      to: astro-site/src/lib/wordpress.ts
      relationship: calls
    - from: astro-site/src/lib/pageBuilder.ts
      to: astro-site/src/lib/woo.ts
      relationship: calls
    - from: zip/src/pages/TestowaBlueprintPage.tsx
      to: zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts
      relationship: calls
    - from: zip/src/blocks/registry/pageBuilderSchema.ts
      to: zip/src/blocks/registry/index.ts
      relationship: imports

related_technology_stack:
  languages_used_in_domain:
    - TypeScript
    - Astro
    - JavaScript
    - PHP
    - YAML
    - JSON
    - Markdown
  frameworks_used_in_domain:
    - name: Astro 5.14.2
      usage_in_domain: Static build-time page rendering for the Astro POC.
    - name: React 19.0.0
      usage_in_domain: Runtime proof route and code-side block registry under `zip`.
    - name: Vite 6.2.0
      usage_in_domain: Build/dev runtime for the React side where the registry code currently lives.
    - name: WordPress REST API
      usage_in_domain: Public and authenticated transport for page-builder schema reads and writes.
    - name: WooCommerce Store API
      usage_in_domain: Source resolution for menu blocks from live Woo data.
  libraries_used_in_domain:
    - name: zod 4.3.6
      purpose_in_domain: Schema validation in both Astro and React page-builder code.
    - name: framer-motion 12.38.0
      purpose_in_domain: Mentioned by current gallery block implementation/registry notes for motion behavior on the React side.
  external_apis_used_in_domain:
    - name: WordPress page-builder REST endpoint
      integration_point: astro-site/src/lib/wordpress.ts and zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts
    - name: Woo Store API
      integration_point: astro-site/src/lib/woo.ts and zip/src/blocks/registry/wooStoreApi.ts

