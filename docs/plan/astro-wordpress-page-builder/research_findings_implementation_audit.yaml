  naming_patterns_in_domain: >-
    Stable kebab-case `blockKey` names, meta field names `page_builder_schema`
    and `page_builder_schema_for_ai`, and page ids/slugs centered on the test
    page name `testowa-blueprint`.
  structure_of_domain: >-
    WordPress transport/storage in `wordpress-plugin/bulwar-bridge`, Astro POC
    in `astro-site`, React registry/runtime in `zip/src/blocks/registry`,
    seed/deploy/generator tooling in `SCRIPTS`, and human/machine registry docs
    under `docs/block-registry`.
  error_handling_in_domain: >-
    Frontend runtimes throw on schema/API failures; WordPress controller returns
    structured error envelopes; generator scripts throw on unsupported block keys
    or invalid CLI input.
  testing_in_domain: >-
    No page-builder-specific automated tests were found in the audited areas.
    Existing plugin tests cover checkout-related services, not page-builder flow.
  documentation_in_domain: >-
    Documentation is extensive and more ambitious than the current executable
    code. Several documents explicitly mark the current state as POC or seed.

related_dependencies:
  internal:
    - component: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      relationship_to_domain: Source of truth for REST read/write transport and meta registration.
      direction: inbound
    - component: zip/src/blocks/registry/
      relationship_to_domain: Current code-side registry, parser, blueprint expansion, and source resolution.
      direction: bidirectional
    - component: astro-site/src/lib/
      relationship_to_domain: Astro-specific duplicate of page-builder typing and source resolution.
      direction: bidirectional
    - component: docs/block-registry/
      relationship_to_domain: Human and machine seed registry used as documentation, not as runtime input.
      direction: outbound
  external:
    - name: WordPress
      purpose_for_domain: Stores page schemas in post meta and serves the custom REST endpoint.
    - name: WooCommerce
      purpose_for_domain: Resolves live product/category content for menu blocks.
    - name: GitHub Actions
      purpose_for_domain: Builds and deploys Astro static output to dhosting.

domain_security_considerations:
  sensitive_areas:
    - area: Public page-builder read endpoint
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      concern: Published page schemas are intentionally public over REST, so any sensitive content embedded in schema JSON would be exposed.
    - area: Page-builder write endpoint
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      concern: POST is capability-gated, but payload validation is limited to JSON/object coercion rather than registry-level schema enforcement.
    - area: Hardcoded production origin
      location: astro-site/src/lib/config.ts
      concern: Astro POC is tied directly to the live WordPress origin rather than environment-driven configuration.
  authentication_patterns_in_domain: >-
    GET page-builder route is public; non-published pages require `edit_post`; POST
    updates require `current_user_can('edit_pages')` through the route permission callback.
  authorization_patterns_in_domain: >-
    The bridge authorizes updates at the WordPress capability level, but does not
    authorize by block or field granularity.
  data_validation_in_domain: >-
    Strong validation exists in React/Astro code via Zod. WordPress write-path
    validation does not currently enforce block registry membership, section-id
    uniqueness, version alignment, or AI/render mapping rules.

testing_patterns:
  framework: ad hoc PHP script tests for plugin services; no page-builder-specific test harness found
  coverage_areas:
    - Checkout Make webhook notifier
    - Slot availability service
    - Page-builder flow has no dedicated automated tests in the audited repo areas
  test_organization: >-
    Plugin tests live under `wordpress-plugin/bulwar-bridge/tests`, but none of the
    surfaced test files target `PageBuilderController`, schema parsing, AI schema
    generation, or Astro build-time rendering.
  mock_patterns:
    - Service-level constructor injection for HTTP/logging in checkout notifier tests

audit_sections:
  "Co faktycznie istnieje w repo": |
    - WordPress plugin rejestruje oba meta pola `page_builder_schema` i `page_builder_schema_for_ai` oraz wystawia endpoint GET/POST `/wp-json/bulwar/v1/page-builder/pages/{slug}`.
    - Istnieje realny runtime rejestru blokow w React pod `zip/src/blocks/registry/`: lookup po `blockKey`, walidacja Zod, parser render-schema, konwersja blueprint -> schema i resolver Woo.
    - Istnieje proof route React `zip/src/pages/TestowaBlueprintPage.tsx`, ktora pobiera render schema z WordPressa, rozwiazuje Woo source i renderuje sekcje.
    - Istnieje Astro build-time POC: `astro-site/src/pages/[slug].astro` + `astro-site/src/lib/*` pobieraja schema z WordPressa podczas builda i renderuja statyczny HTML.
    - Istnieje build-time resolver Woo dla menu z `woo_category` i `woo_products` zarowno po stronie React runtime, jak i Astro.
    - Istnieje repo-side generator `SCRIPTS/generate-page-builder-ai-schema.js`, ktory buduje `page_builder_schema_for_ai` z opisu renderowego i zachowuje ids blokow.
    - Istnieja artefakty seedowania jednej strony: JSON render schema, JSON AI schema, skrypt PHP seedujacy WordPress oraz shell helper do tego samego celu.
    - Istnieje CI deploy Astro do dhosting z buildem, backupem i naprawa uprawnien, a w repo jest tez lokalny PowerShell deploy/rollback.
    - Istnieje repo-side seed registry blokow w `docs/block-registry/registry.machine.json` oraz dwa seedowe opisy blokow.

  "Co jest tylko proof of concept": |
    - Cala sciezka renderowania jest zawiezona na jednej stronie testowej `testowa-blueprint`; slug jest zahardkodowany w Astro configu, w React proof route i w seed scriptach.
    - Obslugiwane sa tylko dwa `blockKey`: `gallery-masonry-style1` i `menu-category-photo-parallax-full-width`.
    - `astro-site/README.md` samo nazywa ten obszar "first Astro build-time proof of concept", a `react-wordpress-poc-status.md` opisuje stan jako execution log POC, nie finalna architekture.
    - Seed registry w docs ma status `seed`, a nie zatwierdzony runtime registry dla calego systemu.
    - Seedowanie strony do WordPressa jest jednostkowe i reczne: skrypty operuja na konkretnych plikach `testowa-blueprint.*.json` i konkretnym slug-u, a nie na ogolnym mechanizmie publikacji wielu stron.
    - AI schema generator nie jest ogolny dla przyszlych blokow; przerywa wykonanie na nieznanym `blockKey`.
    - Astro generuje tylko to, co trafi do `TEST_PAGE_SLUGS`, czyli obecnie jeden route.

  "Czego nie widac w implementacji": |
    - Nie widac zadnego wykonywalnego kodu Firebase / Firestore dla draftow stron ani zadnego MCP-backed workflow zapisujacego draft do Firebase.
    - Nie widac compile pipeline, ktory czyta draft Firebase i generuje oba WordPress payloady; taki compile step istnieje tylko w dokumentach.
    - Nie widac runtime'u, ktory konsumuje `docs/block-registry/registry.machine.json` jako zrodlo prawdy; aktualny kod React importuje definicje blokow recznie, a Astro ma osobny, zdublowany kontrakt.
    - Nie widac automatycznego triggera rebuild/deploy Astro po zmianie page-builder danych w WordPressie; jest tylko sam workflow deploy dla zmian w repo.
    - Nie widac konsumenta `page_builder_schema_for_ai` po stronie Astro ani React runtime; plugin potrafi je zapisac/zwrocic, generator potrafi je stworzyc, ale renderer korzysta tylko z render schema.
    - Nie widac server-side walidacji page-builder payloadow wzgledem rejestru blokow przy POST do WordPressa.
    - Nie widac dedykowanych testow automatycznych dla page-builder endpointu, parserow, generatora AI schema ani build-time renderu Astro.

  "Najwazniejsze rozjazdy docs vs kod": |
    - Docs seed registry dla galerii opisuje `images[]` jako tablice string URL, ale realny kod blokow i realny przykladowy page schema uzywaja obiektow `{ src, alt }`; dodatkowo kod ma pola `layoutStyle` i `motionPreset`, ktorych docs seed nie modeluje.
    - Dokumentacja page-builder workflow zaklada repo-side registry jako zrodlo prawdy, ale w kodzie nie ma runtime'u czytajacego `docs/block-registry/registry.machine.json`; zamiast tego istnieje osobny rejestr TypeScript w `zip/src/blocks/registry/index.ts` i osobny kontrakt Astro w `astro-site/src/lib/types.ts`.
    - Docs Firebase draft MVP opisuje `needsCompile`, `needsPublish` i obowiazkowy compile step; w repo nie ma odpowiadajacej implementacji kodowej ani integracji z Firebase.
    - Dokumenty mowia o walidacji obu payloadow wzgledem rejestru i kontraktow, ale WordPress write path w `PageBuilderController` sprawdza tylko, czy dostal obiekt / poprawny JSON, po czym zapisuje meta bez walidacji blokow.
    - Dokumentacja wskazuje kierunek wielostronicowego systemu page-builder, ale wykonywalny kod nadal operuje na pojedynczym demo-route i pojedynczym demo-page seed.

  "Dowody": |
    - `astro-site/src/lib/config.ts:3` ogranicza Astro do `TEST_PAGE_SLUGS = ['testowa-blueprint']`.
    - `astro-site/src/pages/[slug].astro:39` i `:53` renderuje tylko dwa blockKey.
    - `wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:15-16` rejestruje oba meta pola, a `:86-87` zapisuje oba do WordPressa.
    - `zip/src/blocks/registry/index.ts:15` definiuje runtime block registry w kodzie, a `zip/src/blocks/registry/pageBuilderSchema.ts:47` waliduje page schema wzgledem tego rejestru.
    - `zip/src/pages/TestowaBlueprintPage.tsx:12` i `:22-23` pokazuje proof route pobierajacy `testowa-blueprint` z WordPressa i rozwiazujacy Woo source.
    - `SCRIPTS/generate-page-builder-ai-schema.js:220-228` wspiera tylko dwa blockKey i rzuca blad dla reszty.
    - `SCRIPTS/seed-testowa-blueprint-schema.php:51-80` seeduje tylko strone `testowa-blueprint` i zapisuje oba meta pola.
    - `.github/workflows/deploy-astro-dhosting.yml:41-68` buduje Astro i publikuje statyczny output na dhosting.
    - `docs/block-registry/registry.machine.json:3` ma `registryStatus: seed`, a `:271` oznacza `wordpress_media_gallery` jako `planned`.
    - `docs/block-registry/gallery-masonry-style1.md:53` opisuje galerie jako string-array, podczas gdy `zip/src/blocks/gallery-masonry-style1/schema.ts:10` wymaga `images: z.array(imageAssetSchema)`.
    - `docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:5-24` opisuje Firebase draft i compile step, ale wyszukiwanie po katalogach kodu nie pokazalo odpowiadajacej implementacji.

open_questions:
  - question: Ktora warstwa ma byc kanonicznym runtime registry: `zip/src/blocks/registry`, `docs/block-registry`, czy przyszly shared package dla Astro i React?
    context: Obecny stan ma przynajmniej dwa rozne kodowe kontrakty i jeden kontrakt dokumentacyjny.
    type: research
    affects: [implementation_audit]
  - question: Czy istnieje poza repo jakikolwiek live-only mechanizm compile/publish lub Firebase project obslugujacy drafty stron?
    context: Dokumenty opisują taki model, ale w repo nie ma jego implementacji.
    type: research
    affects: [implementation_audit]
  - question: Czy `page_builder_schema_for_ai` ma miec repo-side konsumenta przed produkcyjnym wdrozeniem, czy ma byc jedynie payloadem operatorskim?
    context: Generator i transport istnieja, ale rendererzy go nie uzywaja.
    type: nice_to_know
    affects: [implementation_audit]

gaps:
  - area: Firebase draft system
    description: Repo nie zawiera wykonywalnego kodu dla draft storage, compile orchestration ani publish flow opisanego w `firebase-page-draft-mvp.md`.
    impact: research_blocker
    affects: [implementation_audit]
  - area: Unified registry source of truth
    description: Brak jednego wspolnego runtime source of truth dla kontraktow blokow; docs, React i Astro utrzymuja je osobno.
    impact: research_blocker
    affects: [implementation_audit]
  - area: Automated validation and tests for page-builder writes
    description: WordPress write path nie waliduje payloadow wzgledem registry, a dedykowanych testow page-builder nie znaleziono.
    impact: research_blocker
    affects: [implementation_audit]
