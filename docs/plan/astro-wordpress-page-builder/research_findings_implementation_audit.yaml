plan_id: astro-wordpress-page-builder
objective: >-
  Audit the actual implementation state for the Astro/WordPress reusable-block
  and page-builder workflow, distinguishing concrete code and artifacts from
  plans and narrow proofs of concept.
focus_area: implementation_audit
created_at: 2026-04-15
created_by: GitHub Copilot (GPT-5.4)
status: completed
historical_snapshot: true
current_state_reference: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
historical_note: >-
  This implementation audit captures the state observed on 2026-04-15.
  It predates the current runtime-assisted publish flow and automatic Astro
  build-time slug discovery. Use it as historical audit evidence only.

tldr: |
  - Repo zawiera realny, dzialajacy lancuch POC: WordPress meta + endpoint, React runtime page-builder, Astro build-time fetch, seed JSON oraz deploy Astro.
  - Implementacja produkcyjna jest jednak bardzo waska: dwa blockKey, jeden testowy slug `testowa-blueprint`, reczne seedowanie i reczny/CI deploy statycznego outputu.
  - AI-oriented schema istnieje jako generator i transport do WordPressa, ale nie ma repo-side konsumenta runtime ani pelnego compile/publish workflow.
  - Firebase draft model, compile step, repo-side runtime korzystajacy z docs/block-registry oraz automatyczny rebuild po zmianach WordPress nie sa widoczne w wykonywalnym kodzie.
  - Najmocniejszy rozjazd docs vs kod: kontrakt galerii w docs seed registry opisuje `images[]` jako stringi, podczas gdy rzeczywiste schematy i payloady uzywaja obiektow `{ src, alt }` i dodatkowych pol prezentacyjnych.

research_metadata:
  methodology: >-
    Hybrid retrieval over the workspace: instruction/PRD review, `file_search`
    for scoped inventory, `grep_search` for exact symbols and workflow terms,
    `semantic_search` for pattern discovery, targeted `read_file` on runtime,
    plugin, script, workflow, registry, and documentation files, plus a small
    terminal pass for verified line counts.
  scope: >-
    Examined the requested domains `astro-site`, `wordpress-plugin/bulwar-bridge`,
    `SCRIPTS`, `.github/workflows`, `docs/block-registry`, and also the live
    React registry/runtime under `zip/src/blocks/registry` because it is the
    only code-side block registry implementation currently present.
  confidence: high
  coverage: 88
  decision_blockers: 0
  research_blockers: 0

