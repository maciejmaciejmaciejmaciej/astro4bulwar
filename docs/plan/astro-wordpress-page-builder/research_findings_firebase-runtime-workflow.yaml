related_conventions:
	naming_patterns_in_domain: Nazwy plikow rozdzielaja etapy `createPageDraftFromScrape`, `firebasePageDraft`, `make-page-draft-compile-gate`, `fetchWordPressPageBuilderSchema`, co odzwierciedla pipeline bootstrap -> compile -> publish bez wspolnego runtime orchestratora.
	structure_of_domain: Kontrakty i runtime helpers sa trzymane w `zip/src/blocks/registry`, CLI i translacje publishable sa w `SCRIPTS`, a WordPress HTTP surface w `wordpress-plugin/bulwar-bridge/src/Http`.
	error_handling_in_domain: Zod i explicit `throw new Error(...)` sa uzywane po stronie TypeScript/JavaScript, a WordPress bridge zwraca ustandaryzowane Response envelope z kodami bledow.
	testing_in_domain: Testy runtime sa pisane przez `node:test` i `assert/strict`; czesc testow istnieje jako behavior spec bez implementacji produkcyjnej.
	documentation_in_domain: Dokumentacja jednoznacznie rozroznia current repo-first workflow od target-state Firebase workflow w `page-builder-authoring-workflow.md:13` i `scrape-bootstrap-firebase-draft-mapping.md:13`.

