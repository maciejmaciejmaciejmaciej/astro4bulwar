domain_security_considerations:
	sensitive_areas:
	- area: Authenticated page create/update client
		location: zip/src/blocks/registry/wordpressPageBuilderClient.test.ts:20
		concern: Test kontraktowy wymaga `username` i `applicationPassword` dla Basic Auth; umieszczenie takiego klienta w publicznym runtime `zip/` eksponowaloby tajne dane, jesli bylby wykonywany w przegladarce.
	- area: WordPress page-builder POST endpoint
		location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:56
		concern: Endpoint zapisuje oba meta payloads i jest chroniony przez `current_user_can('edit_pages')`; wymaga zaufanego nadawcy i kontrolowanego transportu danych.
	authentication_patterns_in_domain: Publiczny GET page-builder jest otwarty, natomiast POST bridge wymaga `edit_pages`; test przyszlego klienta WordPress zaklada Basic Auth z application password do core REST pages endpoint.
	authorization_patterns_in_domain: `show` zwraca niepubliczne strony tylko dla uzytkownika z `edit_post`, a `update` oraz meta registration opieraja sie o uprawnienia `edit_pages` lub `edit_post`.
	data_validation_in_domain: Draft i render schema sa walidowane Zod-em; backend bridge akceptuje `schema` i `aiSchema` jako array/object lub JSON string, po czym zapisuje je jako JSON w post meta.

testing_patterns:
	framework: node:test plus assert/strict for JS/TS and custom PHP test harnesses for WordPress bridge
	coverage_areas:
	- Firebase draft contract and source mapping workflow
	- Scrape bootstrap CLI behavior for menu pages
	- Compile gate blocking and dual payload emission
	- Expected Firestore store API
	- Expected WordPress page ensure/create-update API
	- Expected runtime workflow orchestration and readback
	test_organization: Runtime contract tests sa colocated w `zip/src/blocks/registry`, a script tests sa w `SCRIPTS/`; backend PHP ma osobny harness w `wordpress-plugin/bulwar-bridge/tests/`.
	mock_patterns:
	- FirestoreLike in-memory mock with collection/doc/set/get methods in `firebasePageDraftStore.test.ts`
	- Fetch mocking with recorded requests in `wordpressPageBuilderClient.test.ts`
	- In-memory store and fake WordPress client in `pageBuilderRuntimeWorkflow.test.ts`

