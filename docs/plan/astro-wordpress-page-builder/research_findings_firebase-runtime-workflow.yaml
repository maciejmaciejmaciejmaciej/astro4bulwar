plan_id: astro-wordpress-page-builder
objective: Analiza aktualnego stanu repo BULWAR APP pod wdrozenie runtime workflow Firebase draft -> compile -> WordPress page create/save.
focus_area: firebase-runtime-workflow
created_at: 2026-04-19T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
	- Repo ma juz zaimplementowany kontrakt draftu Firebase, bootstrap draftu ze scrape oraz osobny compile gate w skryptach repo, ale nie ma jeszcze repo-side runtime layer spinajacej store draftu, compile i publikacje do WordPress.
	- Testy [firebasePageDraftStore.test.ts](zip/src/blocks/registry/firebasePageDraftStore.test.ts), [wordpressPageBuilderClient.test.ts](zip/src/blocks/registry/wordpressPageBuilderClient.test.ts) i [pageBuilderRuntimeWorkflow.test.ts](zip/src/blocks/registry/pageBuilderRuntimeWorkflow.test.ts) sa pelnymi testami kontraktowymi, lecz importuja moduly, dla ktorych nie istnieja odpowiadajace pliki implementacyjne.
	- WordPress bridge udostepnia juz GET i POST dla page builder meta po slugu, ale POST aktualizuje tylko istniejaca strone odnaleziona przez slug i nie tworzy brakujacej strony samodzielnie.
	- W zip nie ma zaleznosci Firebase ani zmiennych env dla Firebase; aktualna konfiguracja frontendu zna tylko `VITE_WORDPRESS_BASE_URL`, co potwierdza brak gotowego runtime store dla Firestore.
	- Najwieksze ryzyka integracyjne dotycza miejsca uruchomienia klienta WordPress z haslem aplikacyjnym, rozjazdu logiki compile miedzy `SCRIPTS/` i `zip/src/`, oraz braku jednego typed contractu do odczytu i weryfikacji obu payloadow WordPress po publikacji.

research_metadata:
	methodology: Hybrid retrieval: `grep_search` i `semantic_search` do odkrycia wzorcow oraz brakujacych modulow, `read_file` do analizy wskazanych plikow, `file_search` do potwierdzenia istnienia lub braku implementacji, `run_in_terminal` do zebrania metryk plikow i potwierdzenia brakujacych plikow runtime, `memory` do odczytu wczesniejszych ustalen repo.
	scope: Analiza ograniczona do runtime page-builder workflow miedzy `zip/src/blocks/registry`, `SCRIPTS/`, `wordpress-plugin/bulwar-bridge/` i dokumentacja workflow w `docs/plan/astro-wordpress-page-builder/`.
	confidence: high
	coverage: 91
	decision_blockers: 2
	research_blockers: 1

