- question: Czy compile logic ma pozostac w `SCRIPTS/make-page-draft-compile-gate.js`, czy ma miec wspolna, importowalna implementacje dla runtime workflow w `zip/src/blocks/registry`?
	context: Obecny compile gate istnieje tylko jako CommonJS script, podczas gdy test runtime workflow oczekuje TypeScript/registry module integration.
	type: decision_blocker
	affects:
