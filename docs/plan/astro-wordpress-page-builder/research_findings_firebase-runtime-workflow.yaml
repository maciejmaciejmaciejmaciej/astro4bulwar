- question: Czy readback runtime ma weryfikowac tylko render schema, czy oba payloady `schema` i `aiSchema`?
	context: Backend GET zwraca oba dokumenty, ale aktualny helper `fetchWordPressPageBuilderSchema` czyta tylko `data.schema`.
	type: research
	affects:
