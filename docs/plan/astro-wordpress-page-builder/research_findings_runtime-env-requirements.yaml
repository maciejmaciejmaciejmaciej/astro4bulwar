  methodology: hybrid retrieval via memory notes, file_search, grep_search, targeted read_file ranges, and direct runtime invocation with run_in_terminal for --draft-file and --draft-doc-id publish behavior verification
  scope: focused on SCRIPTS/page-builder-runtime/cli.ts, runtimeWorkflow.ts, liveFirestoreDraftStore.ts, wordpressPageBuilderClient.ts, runtime tests, and current docs under docs/plan/astro-wordpress-page-builder/
  confidence: high
  coverage: 90
  decision_blockers: 0
  research_blockers: 0

