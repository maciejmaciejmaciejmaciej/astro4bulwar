patterns_found:
  - category: structure
    pattern: Non-dry-run runtime always depends on both a draft store and a WordPress client.
    description: The CLI provisions both adapters before invoking the workflow, and the workflow hard-fails if either adapter is missing.
    examples:
      - file: SCRIPTS/page-builder-runtime/cli.ts
        location: SCRIPTS/page-builder-runtime/cli.ts:199
        snippet: if (options.draftDocId || !options.dryRun) { firestoreEnv = parsePageBuilderFirestoreEnv(deps.env); draftStore = await deps.createDraftStore(firestoreEnv); }
      - file: SCRIPTS/page-builder-runtime/cli.ts
        location: SCRIPTS/page-builder-runtime/cli.ts:216
        snippet: const wordpressClient = options.dryRun ? undefined : deps.createWordPressClient(parsePageBuilderWordPressEnv(deps.env));
      - file: SCRIPTS/page-builder-runtime/runtimeWorkflow.ts
        location: SCRIPTS/page-builder-runtime/runtimeWorkflow.ts:169
        snippet: if (!draftStore) { throw new Error("draftStore is required when dryRun is disabled."); }
    prevalence: common
  - category: architecture
    pattern: Publish workflow persists the runtime draft as part of orchestration, even when the initial draft comes from a file.
    description: The runtime treats file-loaded drafts as working-state entities and writes them into Firestore before ensure/create-or-update, after site-context enrichment, after compile, and after final publish.
    examples:
      - file: SCRIPTS/page-builder-runtime/runtimeWorkflow.ts
        location: SCRIPTS/page-builder-runtime/runtimeWorkflow.ts:177
        snippet: const initialPersist = await draftStore.upsertDraft(initialDraft, { docId: initialDraft.pageSlug });
      - file: SCRIPTS/page-builder-runtime/runtimeWorkflow.ts
        location: SCRIPTS/page-builder-runtime/runtimeWorkflow.ts:195
        snippet: await draftStore.upsertDraft(draftWithWordPressPostId, { docId: draftWithWordPressPostId.pageSlug });
      - file: SCRIPTS/page-builder-runtime/runtimeWorkflow.ts
        location: SCRIPTS/page-builder-runtime/runtimeWorkflow.ts:242
        snippet: await draftStore.upsertDraft(finalizedDraft, { docId: finalizedDraft.pageSlug });
    prevalence: common
  - category: testing
    pattern: Tests explicitly distinguish dry-run file mode from live publish modes.
    description: CLI and workflow tests confirm that dry-run from file avoids live clients, while non-dry-run exercises persistence and publish behavior.
    examples:
      - file: SCRIPTS/page-builder-runtime/cli.test.ts
        location: SCRIPTS/page-builder-runtime/cli.test.ts:64
        snippet: test("CLI dry-run from file stays in node-only orchestration and skips live clients", async () => {
      - file: SCRIPTS/page-builder-runtime/runtimeWorkflow.test.ts
        location: SCRIPTS/page-builder-runtime/runtimeWorkflow.test.ts:184
        snippet: test("node-only runtime workflow dry-run compiles without touching Firestore or WordPress", async () => {
      - file: SCRIPTS/page-builder-runtime/runtimeWorkflow.test.ts
        location: SCRIPTS/page-builder-runtime/runtimeWorkflow.test.ts:82
        snippet: test("node-only runtime workflow persists, compiles, publishes and verifies readback", async () => {
    prevalence: occasional
  - category: documentation
    pattern: Current docs position repo-first as workflow truth and Firebase as optional or future-facing.
    description: Operator-facing docs point to repo-first as the canonical day-to-day flow, while the implementation plan keeps Firebase as an optional runtime decision rather than a settled production requirement.
    examples:
      - file: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:14
        snippet: That note does not replace this repo-first canonical flow.
      - file: docs/plan/astro-wordpress-page-builder/implementation-plan.md
        location: docs/plan/astro-wordpress-page-builder/implementation-plan.md:14
        snippet: The Firebase draft model ... remains an optional runtime variant, not the canonical workflow document.
      - file: docs/plan/astro-wordpress-page-builder/implementation-plan.md
        location: docs/plan/astro-wordpress-page-builder/implementation-plan.md:204
        snippet: Stage 6: Decide Whether Firebase Becomes A Real Runtime Layer
    prevalence: common
  - category: error_handling
    pattern: Missing env vars fail fast with the exact variable name.
    description: Both Firestore and WordPress env parsers enforce non-empty values and throw deterministic missing-variable errors.
    examples:
      - file: SCRIPTS/page-builder-runtime/liveFirestoreDraftStore.ts
        location: SCRIPTS/page-builder-runtime/liveFirestoreDraftStore.ts:64
        snippet: projectId: requireNonEmptyEnv(env.PAGE_BUILDER_FIREBASE_PROJECT_ID, "PAGE_BUILDER_FIREBASE_PROJECT_ID")
      - file: SCRIPTS/page-builder-runtime/wordpressPageBuilderClient.ts
        location: SCRIPTS/page-builder-runtime/wordpressPageBuilderClient.ts:239
        snippet: baseUrl: requireNonEmptyEnv(env.PAGE_BUILDER_WORDPRESS_BASE_URL, "PAGE_BUILDER_WORDPRESS_BASE_URL")
      - file: terminal runtime invocation
        location: 2026-04-21 local run
