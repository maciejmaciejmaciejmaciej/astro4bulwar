domain_security_considerations:
  sensitive_areas:
    - area: Firebase service account secrets
      location: SCRIPTS/page-builder-runtime/liveFirestoreDraftStore.ts:64
      concern: Non-dry-run runtime requires project id, client email, and private key even for file-based publish.
    - area: WordPress application password credentials
      location: SCRIPTS/page-builder-runtime/wordpressPageBuilderClient.ts:234
      concern: Non-dry-run runtime requires authenticated WordPress write access for page ensure and publish.
  authentication_patterns_in_domain: WordPress writes use Basic auth with username plus application password; Firestore uses firebase-admin service account credentials.
  authorization_patterns_in_domain: WordPress publish path assumes a user capable of editing pages and posting to the custom Bulwar endpoint.
  data_validation_in_domain: Draft input is normalized through parseFirebasePageDraft before compile or publish; env inputs are validated as non-empty strings.

