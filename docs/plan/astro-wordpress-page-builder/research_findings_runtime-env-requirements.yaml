plan_id: astro-wordpress-page-builder
objective: Assess whether the agent warning about missing runtime env vars is a real blocker and determine the best next-step recommendation without implementation.
focus_area: runtime-env-requirements
created_at: 2026-04-21
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - Current non-dry-run runtime publish requires both Firebase and WordPress env vars for both input modes because the CLI instantiates Firestore whenever dry-run is disabled and the workflow persists the draft multiple times before and after publish.
  - For --draft-file, Firebase is not needed for dry-run, but it is still required today for publish because cli.ts enters the Firestore branch before WordPress client creation.
  - The implementation-plan and related docs describe Firebase as an optional runtime variant and repo-first as the canonical workflow, so current file-based runtime publish is stricter than the documented repo-first operator truth.
  - Focused runtime evidence came from cli.ts, runtimeWorkflow.ts, env parsers, targeted tests, current docs, and direct terminal runs showing publish fails first on PAGE_BUILDER_FIREBASE_PROJECT_ID when env vars are absent.

