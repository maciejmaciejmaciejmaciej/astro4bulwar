related_conventions:
  naming_patterns_in_domain: PAGE_BUILDER_* env vars are scoped by backend target; dry-run and publish are modeled as explicit CLI modes; runtime adapters use parse*Env and create* factory naming.
  structure_of_domain: Node-only runtime code is isolated under SCRIPTS/page-builder-runtime while shared draft contracts remain under zip/src/blocks/registry.
  error_handling_in_domain: Env validation is fail-fast; workflow guards throw when required adapters are absent; site-context fetch degrades to draft values instead of aborting publish.
  testing_in_domain: Focused node:test suites cover mode gating, env parsing, orchestration ordering, and WordPress client parsing behavior.
  documentation_in_domain: README routes operators to page-builder-authoring-workflow as the current truth and implementation-plan as the longer-term architectural truth.

related_dependencies:
  internal:
    - component: SCRIPTS/make-page-draft-compile-gate.js
      relationship_to_domain: compile step for page_builder_schema and page_builder_schema_for_ai
      direction: outbound
    - component: zip/src/blocks/registry/firebasePageDraft.ts
      relationship_to_domain: draft parsing and normalization contract
      direction: outbound
    - component: zip/src/blocks/registry/firebasePageDraftStore.ts
      relationship_to_domain: shared draft store interface and Firestore-like adapter shape
      direction: outbound
  external:
