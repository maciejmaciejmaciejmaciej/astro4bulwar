patterns_found:
  - category: architecture
    pattern: The /react footer is a shared shell presenter owned by RootLayout rather than by HomePage.
    description: The React index route does not render its own footer. App mounts the index route under RootLayout, and RootLayout conditionally mounts Footer with globalLayout.footer.
    examples:
      - file: zip/src/App.tsx
        location: zip/src/App.tsx:19-24
        snippet: <Route element={<RootLayout />}><Route index element={<HomePage />} /></Route>
      - file: zip/src/layouts/RootLayout.tsx
        location: zip/src/layouts/RootLayout.tsx:151-155
        snippet: {globalLayout ? <Footer footer={globalLayout.footer} /> : null}
    prevalence: common
  - category: routing
    pattern: Catering footer variants are explicitly excluded from the shared /react shell.
    description: Catering routes are defined as top-level siblings, not children of RootLayout, so their CateringPageFooter component does not affect the /react index route.
    examples:
      - file: zip/src/App.tsx
        location: zip/src/App.tsx:25-28
        snippet: <Route path={CATERING_WIELKANOCNY_PATH} element={<CateringWielkanocnyPage />} />
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:252-256
        snippet: <CateringPageFooter logoSrc="/react/images/logo.png" socialLinks={cateringPageSocialLinks} legalLinks={cateringPageLegalLinks} />
    prevalence: common
  - category: structure
    pattern: Footer authoring and public runtime consumption are separated by a dedicated shared_footer contract.
    description: Runtime clients consume only globalLayout.footer, while WordPress storage resolves that object from a page_builder_schema section whose blockKey is shared_footer and whose blockVersion is 1.
    examples:
      - file: zip/src/blocks/registry/globalLayoutContract.ts
        location: zip/src/blocks/registry/globalLayoutContract.ts:50-89
        snippet: globalLayoutFooterSchema ... sharedFooterSectionBlockSchema
      - file: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
        location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:87-118
        snippet: if (($section['blockKey'] ?? null) !== self::SHARED_FOOTER_BLOCK_KEY) { continue; }
    prevalence: common
  - category: error_handling
    pattern: React fails closed when footer meta is unresolved and does not synthesize placeholder footer chrome.
    description: fetchWordPressGlobalLayout throws on unresolved meta statuses, RootLayout renders Footer only when globalLayout exists, and tests assert that no placeholder business footer appears before resolution.
    examples:
      - file: zip/src/lib/fetchWordPressGlobalLayout.ts
        location: zip/src/lib/fetchWordPressGlobalLayout.ts:133-147
        snippet: if (parsedPayload.meta.layout_option_status !== RESOLVED_GLOBAL_LAYOUT_STATUS || parsedPayload.meta.footer_status !== RESOLVED_GLOBAL_LAYOUT_STATUS) { throw ... }
      - file: zip/src/layouts/RootLayout.test.tsx
        location: zip/src/layouts/RootLayout.test.tsx:76-90
        snippet: assert.doesNotMatch(markup, /Stary Rynek 37/)
    prevalence: common
  - category: content
    pattern: Hardcoded footer content currently exists in more than one repo-owned model and the models are not identical.
    description: The checked-in shared_footer JSON is a minimal concrete payload, the React test fixture is almost the same but keeps quotes around BulwaR, and the Astro fallback model carries the richer social/legal set that matches the live page scrape more closely.
    examples:
      - file: SCRIPTS/shared-footer.page_builder_schema.json
        location: SCRIPTS/shared-footer.page_builder_schema.json:14-57
        snippet: socialLinks contains only Instagram; legalLinks contains only Polityka prywatnosci
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:147-160
        snippet: socialLinks contains Facebook, Instagram, Tripadvisor; legalLinks contains Polityka prywatnosci and Regulamin
    prevalence: occasional

