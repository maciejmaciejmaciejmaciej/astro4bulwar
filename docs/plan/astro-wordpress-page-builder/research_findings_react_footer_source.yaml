related_conventions:
  naming_patterns_in_domain: Public client-facing footer data uses camelCase fields under globalLayout.footer, while the internal page-builder block key is shared_footer and the storage pointer key is footerPageId.
  structure_of_domain: The public React footer is presentational only; storage and normalization live in the WordPress bridge and the checked-in shared footer page_builder_schema artifact.
  error_handling_in_domain: The bridge always returns a normalized footer plus meta.footer_status, while React accepts the payload only when both meta statuses equal resolved and otherwise leaves shared chrome absent unless a cached valid snapshot exists.
  testing_in_domain: TypeScript tests validate the React contract, RootLayout routing behavior, and checked-in shared footer JSON compatibility; PHP tests validate endpoint resolution from footerPageId and shared_footer blocks.
  documentation_in_domain: docs/plan/navbar-footer-global-layout-v1/global-layout-contract.md and how-navbar-footer-work.md document both the public footer fields and the internal shared_footer authoring workflow.

related_dependencies:
  internal:
    - component: zip/src/layouts/RootLayout.tsx
      relationship_to_domain: supplies the shared footer presenter to /react routes
      direction: inbound
    - component: zip/src/lib/fetchWordPressGlobalLayout.ts
      relationship_to_domain: supplies validated footer data
      direction: inbound
    - component: zip/src/blocks/registry/globalLayoutContract.ts
      relationship_to_domain: defines footer and shared_footer shapes
      direction: bidirectional
    - component: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php
