plan_id: astro-wordpress-page-builder
objective: Read-only research to identify which React component renders the footer visible on /react/, extract the current footer content model hardcoded in repo sources, confirm whether a shared_footer block/schema already exists, and map the current footer content into the shared footer/public global layout contract.
focus_area: react_footer_source
created_at: 2026-04-21
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - The /react homepage footer render chain is BrowserRouter basename=/react -> App routes -> RootLayout -> Footer. The concrete renderer is zip/src/components/sections/Footer.tsx, mounted only by zip/src/layouts/RootLayout.tsx for shared-shell routes including the index route. Sources: zip/src/main.tsx:6-11, zip/src/App.tsx:18-28, zip/src/layouts/RootLayout.tsx:81-159, zip/src/components/sections/Footer.tsx:16-66.
  - Catering uses a separate footer component and separate routes, but those routes are outside RootLayout and do not power the /react index route. Sources: zip/src/App.tsx:24-28, zip/src/pages/CateringWielkanocnyPage.tsx:252-256, zip/src/components/sections/CateringPageFooter.tsx:12-110.
  - The repo already contains a dedicated shared_footer storage contract and a checked-in shared footer page_builder_schema payload. The public footer shape and the shared_footer block shape are defined in zip/src/blocks/registry/globalLayoutContract.ts and mirrored in docs plus Astro. Sources: zip/src/blocks/registry/globalLayoutContract.ts:3-97, SCRIPTS/shared-footer.page_builder_schema.json:1-61, docs/plan/navbar-footer-global-layout-v1/global-layout-contract.md:13-43.
  - There are multiple hardcoded footer content models in repo sources. The checked-in shared footer JSON is minimal and only includes Instagram plus Polityka prywatnosci, while astro-site/src/lib/wordpress.ts keeps a richer fallback footer with Facebook, Instagram, Tripadvisor, both legal links, and the same address/contact/hours. Sources: SCRIPTS/shared-footer.page_builder_schema.json:8-57, astro-site/src/lib/wordpress.ts:128-160.
  - The live endpoint queried on 2026-04-21 returned footer_status=fallback_missing_footer_page_id and an empty fallback footer, but a live page fetch still observed a populated footer with the richer social/legal set. That mismatch is not explainable from repo code alone and remains an open runtime question. Sources: https://client.example/wp-json/bulwar/v1/layout/global, zip/src/lib/fetchWordPressGlobalLayout.ts:126-147, zip/src/layouts/RootLayout.tsx:96-155.

research_metadata:
  methodology: Hybrid repo research using memory review, targeted semantic_search, grep_search, symbol usage discovery, targeted file reads, and one live fetch of the public page plus the public global layout endpoint.
  scope: Focused on the React /react route shell, shared footer contract files, live bridge footer resolution, checked-in shared footer payloads, and excluding catering-specific footer variants except to prove they are not used for the shared /react index route.
  confidence: high
  coverage: 86
  decision_blockers: 0
  research_blockers: 1

