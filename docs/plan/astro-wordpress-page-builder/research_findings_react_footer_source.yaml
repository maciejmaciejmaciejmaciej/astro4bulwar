    - name: zod
      purpose_for_domain: runtime validation of public footer and shared_footer contracts

domain_security_considerations:
  sensitive_areas:
    - area: footerPageId storage detail
      location: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:75-81
      concern: The page identifier is intentionally internal and must not leak to public React/Astro consumers.
    - area: public contract boundary
      location: zip/src/blocks/registry/globalLayoutContract.ts:60-69 and zip/src/blocks/registry/globalLayoutContract.test.ts:110-121
      concern: Public contract parsing rejects payloads that expose footerPageId.
  authentication_patterns_in_domain: The global layout endpoint is intentionally public, so protection relies on limiting the response to normalized public navbar/footer data and keeping footerPageId internal.
  authorization_patterns_in_domain: No client authorization is required for footer reads; authority is enforced server-side by resolving storage internals before emitting the public payload.
  data_validation_in_domain: PHP normalizes footer groups and links, and React Zod parsing plus meta-status checks reject unresolved or malformed client payloads before Footer renders.

