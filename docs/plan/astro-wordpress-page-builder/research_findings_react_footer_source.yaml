    - Bridge resolution from footerPageId to a shared_footer page_builder_schema block
  test_organization: React tests live beside the relevant TS/TSX modules, while bridge resolver tests live under wordpress-plugin/bulwar-bridge/tests.
  mock_patterns:
    - MemoryRouter-based shell rendering with explicit initialGlobalLayout fixtures
    - PHP global option/post/meta arrays simulating WordPress storage

