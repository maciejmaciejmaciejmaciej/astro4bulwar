      - zip/src/blocks/registry/globalLayoutContract.ts defines SHARED_FOOTER_BLOCK_KEY=shared_footer and the dedicated block schema. Source: zip/src/blocks/registry/globalLayoutContract.ts:3-4, 80-89.
      - SCRIPTS/shared-footer.page_builder_schema.json contains one enabled shared_footer section with id shared-footer-main. Source: SCRIPTS/shared-footer.page_builder_schema.json:4-58.
      - The WordPress bridge resolver explicitly scans page_builder_schema.sections[] for shared_footer. Source: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php:87-118.
      - Contract/operator docs describe the same storage model. Source: docs/plan/navbar-footer-global-layout-v1/global-layout-contract.md:35-43 and docs/plan/navbar-footer-global-layout-v1/how-navbar-footer-work.md:14-35.
  current_to_shared_footer_public_global_layout_mapping:
    note: This mapping is already implied by the locked v1 public contract and shared_footer block contract; the same field names are expected in both shared_footer.data and success.data.globalLayout.footer.
    mapping:
      - current footer wordmark text Bulwar or BulwaR wordmark intent -> brand.name
      - home target for footer brand click -> brand.href
      - logo asset if the footer ever switches from text wordmark to image; currently null in repo-owned shared footer models -> brand.logoSrc and brand.logoAlt
      - section heading Adres -> address.heading
      - business/location lines such as Restauracja BulwaR or Restauracja "BulwaR", Stary Rynek 37, Poznan -> address.lines[]
      - section heading Kontakt -> contact.heading
      - clickable phone and email items -> contact.items[] with label and href
      - section heading Godziny -> hours.heading
      - opening-hours lines -> hours.lines[]
      - social destinations such as Facebook, Instagram, Tripadvisor -> socialLinks[] with label and href
      - legal destinations such as Polityka prywatnosci and Regulamin -> legalLinks[] with label and href
      - footer copyright string -> copyright
    contract_alignment:
      - shared_footer.data must match globalLayout.footer shape exactly. Source: docs/plan/navbar-footer-global-layout-v1/global-layout-contract.md:35-43.
      - Footer.tsx renders merged socialLinks plus legalLinks in one link row, so both arrays remain distinct in data even though presentation merges them. Source: zip/src/components/sections/Footer.tsx:52-62.
      - RootLayout consumes only globalLayout.footer, not raw page_builder_schema sections. Source: zip/src/layouts/RootLayout.tsx:151-155.

