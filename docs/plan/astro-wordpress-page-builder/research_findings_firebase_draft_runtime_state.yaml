    - name: WordPress REST API
      usage_in_domain: Odczyt i zapis page-builder payloadow.
  libraries_used_in_domain:
    - name: zod
      purpose_in_domain: Walidacja kontraktu draftu i zrodla.
    - name: tsx
      purpose_in_domain: Uruchamianie testow i TypeScript CLI scripts.
  external_apis_used_in_domain:
    - name: Bulwar page-builder REST endpoint
      integration_point: GET/POST `bulwar/v1/page-builder/pages/{slug}`.

related_conventions:
  naming_patterns_in_domain: >-
    Moduly runtime i helpery uzywaja nazw verb-led: `createPageDraftFromScrape`,
    `fetchWordPressPageBuilderSchema`, `compilePageDraft`, `parseFirebasePageDraft`.
    Brakujace runtime pliki sa juz nazwane spójnie przez testy: `firebasePageDraftStore`,
    `wordpressPageBuilderClient`, `pageBuilderRuntimeWorkflow`.
  structure_of_domain: >-
    Warstwa kontraktow i helperow zyje w `zip/src/blocks/registry`, skrypty CLI w `SCRIPTS`,
    a backend transport w `wordpress-plugin/bulwar-bridge`.
  error_handling_in_domain: >-
    Draft i compile rzucaja twarde bledy dla niepoprawnych blokow lub niezamknietych placeholderow.
    WordPress REST kontroler zwraca `Response::error` dla `PAGE_NOT_FOUND`, `VALIDATION_ERROR` i podobnych przypadkow.
  testing_in_domain: >-
    Testy sa pisane w `node:test`. Dzialaja testy CLI skryptow, ale testy oczekiwanych runtime modulow nie przechodza bez implementacji. Dodatkowo jeden test kontraktu draftu aktualnie wpada na rezolucji aliasu.
  documentation_in_domain: >-
    W badaniu priorytet mial aktualny kod i testy; dokumentacja target-state istnieje, ale nie byla traktowana jako dowod wykonujacej sie implementacji.

related_dependencies:
  internal:
    - component: zip/src/blocks/registry/index.ts
      relationship_to_domain: Zrodlo registry walidacji dla `parseFirebasePageDraft`.
      direction: outbound
    - component: SCRIPTS/generate-page-builder-ai-schema.js
      relationship_to_domain: Compile gate buduje z jego pomoca `page_builder_schema_for_ai`.
      direction: outbound
    - component: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      relationship_to_domain: Backend read/write dla koncowych payloadow.
      direction: outbound
  external:
    - name: WordPress capabilities system
      purpose_for_domain: POST wymaga `edit_pages` lub `edit_post`.

domain_security_considerations:
  sensitive_areas:
    - area: page-builder write endpoint
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:52
      concern: Publish do WordPress jest autoryzowany i nie zadziala bez praw `edit_pages`.
    - area: draft pages visibility
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:22
      concern: Nieopublikowana strona nie jest publicznie zwracana anonimowemu uzytkownikowi.
    - area: unresolved Woo source mappings
      location: SCRIPTS/make-page-draft-compile-gate.js:188
      concern: Compile celowo blokuje publish, gdy placeholdery Woo nie zostaly rozwiazane.
  authentication_patterns_in_domain: >-
    GET endpoint jest publiczny, ale draft pages sa filtrowane przez `current_user_can('edit_post', $page->ID)`.
    POST endpoint i meta registration wymagaja `current_user_can('edit_pages')`.
  authorization_patterns_in_domain: >-
    Backend autoryzuje zapis na poziomie WordPress capabilities; nie ma w aktualnym repo klienta przechowujacego te credentiale dla agentowego publish runtime.
  data_validation_in_domain: >-
    Draft data jest rygorystycznie walidowane po stronie TypeScript przez registry i Zod.
    WordPress REST update waliduje oba pola jako non-empty object albo valid JSON string.

testing_patterns:
  framework: node:test
  coverage_areas:
    - bootstrap scrape -> draft
    - workflow placeholder detection in draft contract
    - compile gate success/failure around approved Woo mappings
    - expected runtime tests for store/client/workflow APIs
  test_organization: >-
    Testy TypeScript leza obok plikow registry w `zip/src/blocks/registry`, a testy CLI obok skryptow w `SCRIPTS`.
  mock_patterns:
    - in-memory Firestore shape in `firebasePageDraftStore.test.ts`
    - fake fetch responses in `wordpressPageBuilderClient.test.ts`
