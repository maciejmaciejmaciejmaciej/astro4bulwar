plan_id: astro-wordpress-page-builder
objective: >-
  Sprawdzic aktualny stan implementacji agentowego flow tworzenia draftu strony
  w Firebase oraz powiazanych krokow WordPress page creation, runtime workflow,
  compile i publish na podstawie aktualnego kodu i testow repo.
focus_area: firebase_draft_runtime_state
created_at: 2026-04-19T00:00:00Z
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - Repo ma dzis realny kontrakt draftu Firebase i realny bootstrap draftu ze scrape, ale nie ma runtime plikow `firebasePageDraftStore.ts`, `wordpressPageBuilderClient.ts` ani `pageBuilderRuntimeWorkflow.ts`; istnieja tylko testy oczekujace tych modulow.
  - Compile/publish preparation jest czesciowo zaimplementowane jako lokalny skrypt `SCRIPTS/make-page-draft-compile-gate.js`, ktory po zatwierdzonych mapowaniach Woo generuje jednoczesnie `page_builder_schema` i `page_builder_schema_for_ai`.
  - WordPress plugin ma prawdziwy endpoint GET/POST dla page buildera i zapisuje oba meta pola razem, ale POST dziala tylko dla istniejacej strony rozwiazanej po slugu; nie tworzy brakujacej strony.
  - Ostatnio uruchomione testy runtime nie przechodza dlatego, ze importuja nieistniejace moduly runtime, co wyglada na nieukonczona implementacje, a nie brak fixture ani konfiguracji tych konkretnych testow.
  - Niezaleznie od tego osobny test kontraktu draftu (`firebasePageDraft.test.ts`) wpada obecnie w blad aliasu `@/components`, co wyglada na problem rezolucji aliasow w runnerze `tsx`, a nie na blad samej logiki draftu.

