    Hybrid retrieval: memory review, file_search, grep_search, targeted read_file,
    exact test execution via run_in_terminal, and targeted line-count collection
    for examined files.
  scope: >-
    Focused on `zip/src/blocks/registry`, related `SCRIPTS`, and WordPress page-builder
    transport in `wordpress-plugin/bulwar-bridge`, with emphasis on the files named
    in the request and direct dependencies they use.
  confidence: high
  coverage: 90
  decision_blockers: 2
  research_blockers: 1

