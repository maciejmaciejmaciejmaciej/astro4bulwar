patterns_found:
  - category: architecture
    pattern: Repo-first pozostaje jedynym wspieranym workflow operacyjnym, a Firebase draft jest target-state only.
    description: Dokumentacja rozdziela obecny wspierany flow od przyszlego runtime draftowego; kod runtime Firebase nie wystepuje w zaleznosciach ani wykonywalnych adapterach.
    examples:
      - file: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:13
        snippet: Until a full Firebase runtime, compile flow, and publish flow exist, treat this repo-first workflow as the only supported day-to-day path.
      - file: docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md
        location: docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:51
        snippet: VS Code agent creates the page draft document in Firebase.
      - file: zip/package.json
