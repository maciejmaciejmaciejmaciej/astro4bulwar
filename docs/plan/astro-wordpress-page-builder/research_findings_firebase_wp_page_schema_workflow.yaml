open_questions:
  - question: Czy istnieje poza repo zatwierdzony projekt Firebase, kolekcja i model auth dla page draftow?
    context: Kod i zaleznosci nie pokazuja zadnego SDK ani adaptera persystencji dla draftu Firebase, mimo ze dokument target-state zaklada create draft jako pierwszy krok.
    type: decision_blocker
    affects:
      - firebase_wp_page_schema_workflow
  - question: Czy preferowanym rozwiazaniem ma byc nowy WordPress endpoint create-or-ensure page, czy repo-side helper korzystajacy z wp-load.php / WP-CLI poza REST API?
    context: Obecny POST endpoint tylko aktualizuje istniejaca strone, a jedyne helpery tworzenia strony sa testowe i specyficzne dla testowa-blueprint.
    type: decision_blocker
    affects:
      - firebase_wp_page_schema_workflow
  - question: Jak agent ma pobierac credentiale do autoryzowanego POST na WordPress i ewentualnego runtime Firebase bez przecieku sekretow do repo?
    context: Dokument i plugin potwierdzaja wymog auth, ale w badanym zakresie nie ma repo-side klienta publish z konfiguracja sekretow.
    type: research
    affects:
      - firebase_wp_page_schema_workflow
  - question: Czy proof consumers React i Astro maja pozostac test-page-specific, czy maja zostac zgeneralizowane juz w tym samym kroku workflow?
    context: Obecne proof routes sa hardcode'owane do jednego slugu, co ogranicza koncowa weryfikacje E2E dla nowych stron.
    type: nice_to_know
    affects:
      - firebase_wp_page_schema_workflow

gaps:
  - area: Firebase runtime implementation
    description: Brak wykonywalnego klienta Firebase/Firestore, auth, persystencji draftu i jakiegokolwiek adaptera write/read dla working draft store.
    impact: decision_blocker
    affects:
      - firebase_wp_page_schema_workflow
  - area: Generic WordPress page creation helper
    description: Brak generycznego create-or-ensure path dla dowolnego slugu; istnieja tylko helpery dla testowa-blueprint.
    impact: decision_blocker
    affects:
      - firebase_wp_page_schema_workflow
  - area: Publish orchestration
    description: Brak repo-side klienta laczacego compile output z autoryzowanym POST endpointem dla obu meta pol w jednym agentowym kroku.
    impact: research_blocker
    affects:
      - firebase_wp_page_schema_workflow
  - area: Plugin endpoint tests
    description: W plugin tests brak dedykowanego testu PageBuilderController dla GET/POST path, validacji obu payloadow i 404/403 cases.
    impact: research_blocker
    affects:
      - firebase_wp_page_schema_workflow
  - area: Full local E2E environment
    description: W tym srodowisku nie ma php w PATH, nie ma lokalnego WordPress runtime i nie ma credentiali ani runtime Firebase, wiec prawdziwe live-like E2E nie jest mozliwe.
    impact: research_blocker
    affects:
      - firebase_wp_page_schema_workflow