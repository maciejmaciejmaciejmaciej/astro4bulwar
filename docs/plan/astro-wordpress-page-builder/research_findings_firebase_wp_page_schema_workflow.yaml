plan_id: astro-wordpress-page-builder
objective: >-
  Zbadac repo BULWAR APP pod katem wdrozenia pelnego kroku workflow,
  w ktorym VS Code agent tworzy draft strony w Firebase, zapewnia istnienie
  strony WordPress, a nastepnie generowana jest struktura page schema.
