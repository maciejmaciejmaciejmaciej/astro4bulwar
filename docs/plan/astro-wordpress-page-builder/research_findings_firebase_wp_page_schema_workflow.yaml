    prevalence: common
  - category: architecture
    pattern: Compile gate generuje oba WordPress payloady razem i blokuje unresolved Woo mappings.
    description: Lokalny JS compile step traktuje oba meta payloady jako nierozlaczna pare i podnosi needsPublish po sukcesie.
    examples:
      - file: SCRIPTS/make-page-draft-compile-gate.js
        location: SCRIPTS/make-page-draft-compile-gate.js:178
        snippet: compilePageDraft applies approvedSourceMappings, blocks unresolved placeholders, emits page_builder_schema and page_builder_schema_for_ai.
      - file: SCRIPTS/make-page-draft-compile-gate.test.js
        location: SCRIPTS/make-page-draft-compile-gate.test.js:60
        snippet: compile gate blocks compilation when Woo source placeholders remain.
      - file: SCRIPTS/make-page-draft-compile-gate.test.js
        location: SCRIPTS/make-page-draft-compile-gate.test.js:76
        snippet: compile gate emits both schemas together after approved source mappings are applied.
    prevalence: occasional
  - category: architecture
    pattern: WordPress plugin ma dual-meta read/write API, ale tworzenie strony pozostaje poza endpointem POST.
    description: REST controller rozwiazuje strone po slugu i zwraca 404, jezeli strona nie istnieje; helper creation jest osobny i testowy.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:46
        snippet: register_rest_route('bulwar/v1', '/page-builder/pages/(?P<slug>[a-zA-Z0-9\-_]+)', GET)
