related_conventions:
  naming_patterns_in_domain: >-
    Payloady repo-side uzywaja nazw page_builder_schema i page_builder_schema_for_ai;
    pliki per page maja suffixy .page_builder_schema.json,
    .page_builder_schema_for_ai.json oraz .firebase-draft.json.
  structure_of_domain: >-
    Domain dzieli sie na registry contracts w zip/src/blocks/registry,
    CLI/tooling w SCRIPTS, WordPress REST runtime w wordpress-plugin/bulwar-bridge,
    oraz dokumenty workflow w docs/plan/astro-wordpress-page-builder.
  error_handling_in_domain: >-
    TypeScript side rzuca bledy walidacyjne przy unknown block key, version mismatch,
    broken blocksOrder lub unresolved source placeholders; PHP side zwraca REST
    Response::error dla invalid JSON, missing page, missing schema i forbidden update.
  testing_in_domain: >-
    Script i registry contracts sa testowane glownie przez node:test; plugin ma
    izolowane testy PHP z recznymi stubami funkcji WordPress zamiast live WP.
  documentation_in_domain: >-
    Workflow dokumentuje target-state Firebase osobno od obecnej kanonicznej sciezki
    repo-first; dokumenty explicitnie oznaczaja ograniczenia test-page-specific.

related_dependencies:
  internal:
    - component: zip/src/blocks/registry/index
      relationship_to_domain: Zrodlo registry definitions dla validateBlockData, validateBlockSource i createDefaultBlockInstance.
      direction: outbound
    - component: SCRIPTS/generate-page-builder-ai-schema.js
      relationship_to_domain: Compile gate zalezy od generatora aiSchema.
      direction: outbound
    - component: zip/src/blocks/registry/pageBuilderSchema parser and render pipeline
      relationship_to_domain: React i registry tests waliduja oraz renderuja koncowy schema output.
      direction: bidirectional
    - component: astro-site/src/lib/wordpress.ts and astro-site/src/pages/[slug].astro
      relationship_to_domain: Astro czyta WordPress page-builder output jako source renderu.
      direction: inbound
  external:
    - name: WordPress capability system
      purpose_for_domain: POST endpoint i meta registration wymagaja edit_pages/edit_post.
    - name: WP-CLI / WordPress runtime
      purpose_for_domain: Seed helper shell/PHP zalezy od dzialajacego WordPressa i dostepu do wp-load.php lub wp-cli.

domain_security_considerations:
  sensitive_areas:
    - area: WordPress write endpoint
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:52
      concern: Aktualizacja obu meta pol jest autoryzowana tylko dla uzytkownika z edit_pages; bez credentiali publish nie przejdzie.
    - area: Draft page visibility
      location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:27
      concern: Nieopublikowane strony sa ukryte dla anonimowego GET, chyba ze current user moze edit_post.
    - area: Source mapping integrity
      location: SCRIPTS/make-page-draft-compile-gate.js:188
      concern: Placeholdery Woo source musza zostac zamkniete przed compile, inaczej agent moglby opublikowac niepelny schema.
  authentication_patterns_in_domain: >-
    Publiczny GET uzywa permission_callback __return_true, ale kontroler dodatkowo
    filtruje draft pages po current_user_can('edit_post', pageId). POST i register_post_meta
    wymagaja current_user_can('edit_pages').
  authorization_patterns_in_domain: >-
    Publish do WordPress jest mozliwy tylko dla istniejacej strony i uprawnionego
    uzytkownika; seed scripts omijaja REST autoryzacje przez bezposredni runtime WP.
  data_validation_in_domain: >-
    Draft data i source sa walidowane przez Zod plus registry definitions; REST update
    akceptuje object albo JSON string i sprawdza dekodowalnosc obu pol schema i aiSchema.

testing_patterns:
  framework: node:test plus isolated PHP script tests with WordPress function stubs
  coverage_areas:
    - createPageDraftFromScrape structure-only bootstrap for restaurant menu pages
    - firebase draft workflow placeholder detection and blocksOrder integrity
    - compile gate success/failure around approved Woo source mappings
    - AI schema generator coverage for block descriptors and instance descriptions
    - registry parse/render invariants for page_builder_schema consumers
  test_organization: >-
    Script tests live next to SCRIPTS/*.js, registry tests live under
    zip/src/blocks/registry/*.test.ts or *.test.tsx, and plugin isolation tests
    live under wordpress-plugin/bulwar-bridge/tests.
  mock_patterns:
    - spawnSync shell execution for TS CLI scripts in Node tests
    - In-memory draft fixtures for compile gate
    - Hand-rolled WordPress global stubs and fake WP_Post objects in PHP tests

user_requested_findings:
  minimal_end_to_end_scope:
    - item: >-
        Najmniejszy wykonalny zakres domykajacy opisany workflow sklada sie z
        czterech brakujacych ogniw: persystencji draftu Firebase, generycznego
        ensure/create helpera dla strony WordPress po slugu, publish klienta
        zapisujacego oba meta pola przez POST endpoint, oraz orkiestracji tych krokow
        w jednym agentowym flow. Obecne repo ma juz tylko czesci srodkowe:
        kontrakt draftu, bootstrap draftu i compile do obu payloadow.
      sources:
        - zip/src/blocks/registry/firebasePageDraft.ts:40
        - zip/src/blocks/registry/createPageDraftFromScrape.ts:135
        - SCRIPTS/make-page-draft-compile-gate.js:178
        - docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:37
        - docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:162
    - item: >-
        Zakres minimalny nie wymaga zmiany kontraktu draftu ani compile gate jako idei;
        wymaga raczej domkniecia runtime i publish path, bo target-state dokument juz
        rozdziela create draft, compile i publish jako osobne kroki.
      sources:
        - docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:51
        - docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:54
        - docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:55
  files_likely_to_change_or_add:
    - path: zip/src/blocks/registry/firebasePageDraft.ts
      why: Istniejacy kontrakt draftu jest naturalnym miejscem dla ewentualnych pol runtime, np. firebase document metadata lub session metadata.
      sources:
        - zip/src/blocks/registry/firebasePageDraft.ts:40
    - path: zip/src/blocks/registry/createPageDraftFromScrape.ts
      why: To jest obecne wejscie bootstrapu i pozostaje miejscem utrzymania structure-only rules oraz pageKind recipes.
      sources:
        - zip/src/blocks/registry/createPageDraftFromScrape.ts:135
        - docs/plan/astro-wordpress-page-builder/scrape-bootstrap-firebase-draft-mapping.md:20
    - path: SCRIPTS/generate-page-draft-from-scrape.ts
      why: To juz generuje repo artifact draftu; najblizszy kandydat na adapter do runtime create draft albo fixture export.
      sources:
        - SCRIPTS/generate-page-draft-from-scrape.ts:342
    - path: SCRIPTS/make-page-draft-compile-gate.js
      why: To jest obecny repo-side compile gate i najblizsze miejsce dla kontraktu input/output uzywanego przez agenta lub Make.
      sources:
        - SCRIPTS/make-page-draft-compile-gate.js:178
    - path: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
      why: Tu istnieje write path dla obu meta pol; jezeli repo ma dostac generyczny create-or-update endpoint, to tu lub obok musi zajsc zmiana runtime.
      sources:
        - wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:52
        - wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:132
    - path: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      why: Kazdy nowy create-or-ensure endpoint wymagalby nowej rejestracji REST route.
      sources:
        - wordpress-plugin/bulwar-bridge/src/Http/Routes.php:52
    - path: SCRIPTS/seed-testowa-blueprint-schema.php
      why: To jest jedyny istniejacy helper create page; jego logika wskazuje najblizszy wzorzec dla generycznego helpera po slugu.
      sources:
