historical_note: >-
  This file is a dated workflow audit snapshot. Parts of the tldr and evidence
  still describe the pre-runtime and pre-Astro-discovery state. For the
  current supported flow, use the canonical authoring workflow document.

tldr: |
  - Repo ma juz kontrakt draftu Firebase, bootstrap ze scrape i lokalny compile gate do obu payloadow WordPress, ale nie ma wykonywalnej persystencji Firebase ani generycznego publish/create flow; dokument kanoniczny nadal mowi, ze repo-first jest jedyna wspierana sciezka operacyjna (zip/src/blocks/registry/firebasePageDraft.ts:40, zip/src/blocks/registry/createPageDraftFromScrape.ts:135, SCRIPTS/make-page-draft-compile-gate.js:178, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:13).
  - WordPress plugin ma gotowe endpointy GET i POST dla page buildera oraz zapis obu meta pol razem, ale POST aktualizuje tylko istniejaca strone i nie tworzy brakujacej strony po slugu (wordpress-plugin/bulwar-bridge/src/Http/Routes.php:46, wordpress-plugin/bulwar-bridge/src/Http/Routes.php:52, wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:52, docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:37).
  - Jedyny helper tworzacy strone WordPress jest testowy i twardo przypiety do slugu `testowa-blueprint`; React i Astro proof tez pozostaja hardcode'owane do tego slugu (SCRIPTS/seed-testowa-blueprint-schema.php:51, SCRIPTS/seed-testowa-blueprint-schema.sh:12, zip/src/pages/TestowaBlueprintPage.tsx:8, astro-site/src/lib/config.ts:3).
  - Lokalnie bez credentiali da sie sensownie testowac bootstrap draftu, compile gate i duza czesc kontraktow registry/AI schema, ale nie da sie zamknac prawdziwego E2E z live Firebase i autoryzowanym WordPress publish bez dodatkowego runtime i sekretow; w tym srodowisku nawet test PHP pluginu nie ruszyl, bo `php` nie jest w PATH (SCRIPTS/generate-page-draft-from-scrape.test.js:21, SCRIPTS/make-page-draft-compile-gate.test.js:60, SCRIPTS/generate-page-builder-ai-schema.test.js:10, docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:51).

