  - category: architecture
    pattern: Bootstrap ze scrape jest structure-only i dla menu tworzy Woo-backed placeholders zamiast kanonicznych menu rows.
    description: Kod i testy utrzymuja WooCommerce jako source of truth dla produktow i kategorii.
