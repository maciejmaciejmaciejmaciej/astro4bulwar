  component_details:
    - component: Minimal SEO contract
      responsibility: Define the smallest page_builder_schema.seo payload that can drive page-level head metadata without overcommitting the schema.
      interfaces:
        - A compact field list for page_builder_schema.seo with field purpose and why each field is needed for migration safety.
    - component: Migration checklist
      responsibility: Turn the contract and clone documentation into a short, ordered checklist for moving from old WordPress URLs and metadata to the Astro/WordPress static setup without losing SEO signals.
      interfaces:
        - A Polish checklist ordered by pre-migration, cutover, and post-launch verification.
    - component: astro-site gap audit
      responsibility: Compare the current Astro implementation to the minimal contract and surface only the first concrete missing pieces.
      interfaces:
        - A short list of specific gaps tied to current files and current behavior.
  dependencies:
    - component: page_builder_schema
      relationship: Supplies the existing page-level shape that the answer must extend minimally through the seo object.
    - component: BaseLayout and [slug] route
      relationship: Show which SEO fields are currently consumed versus ignored in the Astro render path.
    - component: clone setup docs
      relationship: Provide migration-safe checks for canonical URLs, stale links, and rollout verification.
  integration_points:
