  The answer should stay intentionally minimal: only fields and steps needed to avoid obvious SEO loss during migration, not a full production SEO program (sources: astro-site/src/lib/types.ts, docs/plan/standalone-20260418/research_findings_astro-seo-ai-crawlers.yaml).

