implementation_specification:
  code_structure: |
    Produce one concise Polish response with exactly three deliverables in order: (1) minimal SEO contract for page_builder_schema, (2) migration checklist that preserves SEO across old WordPress to new Astro/WordPress rollout, and (3) the first concrete gaps in astro-site measured against that contract.
    Each deliverable should cite the repo files it is derived from, and the third deliverable should name only immediate, observable gaps from the current Astro code path.
  affected_areas:
    - astro-site/src/lib/types.ts
    - astro-site/src/layouts/BaseLayout.astro
