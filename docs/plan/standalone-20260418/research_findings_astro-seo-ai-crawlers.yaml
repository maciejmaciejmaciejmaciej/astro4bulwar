plan_id: standalone-20260418
objective: Research best practices for optimizing a static Astro website for classic SEO and AI answer engines / LLM crawlers, tailored to a content-site generated from structured data.
focus_area: astro-seo-ai-crawlers
created_at: 2026-04-18
created_by: GitHub Copilot
status: completed

tldr: |
  - The highest-leverage SEO work for this Astro site is still fundamentals: indexable HTML, crawlable internal links, unique titles/descriptions, canonical handling for duplicates, sitemap, robots, and strong page-level content quality. Sources: Google Search technical requirements, SEO Starter Guide, links guidance.
  - Astro already provides an inherent advantage for SEO here because the site builds static HTML at build time (`output: 'static'`) and fetches structured page data before render, reducing dependence on client-side rendering. Sources: astro-site/astro.config.mjs, astro-site/src/pages/[slug].astro, Astro docs sitemap guidance.
  - For Google AI features, there are no extra technical requirements beyond normal indexed search eligibility; Google explicitly says no special AI files or schema are required. Sources: Google Search docs on AI features and robots/snippet controls.
  - For non-Google AI retrieval, crawler access matters: OpenAI uses `OAI-SearchBot` for ChatGPT search results and Anthropic uses `Claude-SearchBot` for search optimization; blocking those bots reduces visibility in those systems. Sources: OpenAI crawler docs, Anthropic crawler help article.
  - In the current Astro code, the shared layout only renders a minimal `<head>` with charset, viewport, and title; no canonical, meta description, robots, Open Graph, sitemap, robots.txt, or JSON-LD implementation was found in `astro-site/`. Sources: astro-site/src/layouts/BaseLayout.astro, grep search over astro-site.

research_metadata:
  methodology: Hybrid retrieval over the repo using memory view, file_search, grep_search, semantic_search, list_dir, and targeted read_file calls, plus official-doc verification through Astro docs search and fetched Google/OpenAI/Anthropic pages.
  scope: Focused on the Astro proof-of-concept app and official search / AI crawler guidance relevant to static, content-heavy pages generated from structured data.
  confidence: high
  coverage: 88
  decision_blockers: 0
  research_blockers: 0

