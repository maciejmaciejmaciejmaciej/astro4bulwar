    context: Canonical URL logic, sitemap URLs, and duplicate-content handling depend on the final public URL structure.
    type: decision_blocker
    affects:
      - standalone-20260418
  - question: Is the optional `seo` payload intended to hold title, description, canonical, OG, robots, and schema data per page?
    context: The model supports an SEO object, but the render path does not yet show its contract or output behavior.
    type: research
    affects:
      - standalone-20260418
  - question: Which AI retrieval systems does the business actually want to allow: Google, OpenAI search, Anthropic search, model-training bots, or only traditional search crawlers?
    context: OpenAI and Anthropic separate search visibility bots from training bots, so robots.txt policy can be selective.
    type: research
    affects:
      - standalone-20260418

