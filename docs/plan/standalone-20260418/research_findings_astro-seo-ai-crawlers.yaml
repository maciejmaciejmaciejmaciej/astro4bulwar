related_conventions:
  naming_patterns_in_domain: Files are organized by concern (`layouts`, `pages`, `lib`, `components`) and use descriptive PascalCase component names with config/constants in uppercase.
  structure_of_domain: A shared base layout wraps a slug-based page route; page content is data-driven from a validated schema rather than authored directly in page files.
  error_handling_in_domain: Build-time fetch failures throw errors unless a local fallback is explicitly allowed for global layout retrieval.
  testing_in_domain: Limited evidence in this focus area; one test file exists for global layout behavior (`astro-site/src/lib/globalLayout.test.ts`) but no SEO-specific tests were found.
  documentation_in_domain: The Astro README documents the POC scope and confirms the goal is static HTML generated from WordPress-backed schemas.

related_dependencies:
  internal:
    - component: astro-site/src/lib/pageBuilder.ts
      relationship_to_domain: Resolves structured page data before rendering.
      direction: outbound
    - component: astro-site/src/lib/wordpress.ts
      relationship_to_domain: Fetches page-builder and global layout data.
      direction: outbound
    - component: astro-site/src/lib/woo.ts
      relationship_to_domain: Enriches menu sections with product data.
      direction: outbound
    - component: astro-site/src/components/*
      relationship_to_domain: Render final section HTML used by crawlers.
      direction: outbound
  external:
    - name: Google Search systems
      purpose_for_domain: Crawling, indexing, search display, AI Overviews / AI Mode inclusion.
    - name: OpenAI OAI-SearchBot
      purpose_for_domain: ChatGPT search result inclusion.
    - name: Anthropic Claude-SearchBot
      purpose_for_domain: Claude search optimization and retrieval visibility.

related_security_conventions:
  note: Not applicable as a primary focus area; this research centered on crawlability, metadata, and content discoverability rather than auth or sensitive workflows.

domain_security_considerations:
  sensitive_areas:
    - area: Public crawler access control
      location: robots.txt / head metadata / CDN rules
      concern: Overblocking crawlers or resources can suppress indexing and AI visibility.
  authentication_patterns_in_domain: Public pages must remain accessible without login for search indexing; Google states logged-in or blocked content will not be indexed.
  authorization_patterns_in_domain: Not a primary concern in the analyzed Astro files.
  data_validation_in_domain: Structured page input is validated with Zod before rendering, reducing malformed content payload risk.

open_questions:
