patterns_found:
  - category: architecture
    pattern: Static HTML is generated from structured content at build time.
    description: The Astro route builds pages from validated structured data before rendering, which avoids SPA-style reliance on client JavaScript for primary content discovery.
    examples:
      - file: astro-site/astro.config.mjs
        location: astro-site/astro.config.mjs:5
        snippet: output: 'static'
      - file: astro-site/src/pages/[slug].astro
        location: astro-site/src/pages/[slug].astro:48
        snippet: buildStaticPage(slug)
    prevalence: common

  - category: structure
    pattern: Shared HTML head is intentionally minimal.
    description: The current shared layout sets document basics but does not yet expose the common SEO metadata expected for production content pages.
    examples:
      - file: astro-site/src/layouts/BaseLayout.astro
        location: astro-site/src/layouts/BaseLayout.astro:19
        snippet: <meta charset="UTF-8" />
      - file: astro-site/src/layouts/BaseLayout.astro
        location: astro-site/src/layouts/BaseLayout.astro:21
        snippet: <title>{title}</title>
    prevalence: common

  - category: metadata
    pattern: SEO data exists in the content model but is not yet wired into page output.
    description: The page schema reserves an optional `seo` object, which indicates the project already anticipates page-specific metadata, but the rendered Astro page only passes `title` into the layout.
    examples:
      - file: astro-site/src/lib/types.ts
        location: astro-site/src/lib/types.ts:89
        snippet: seo: z.record(z.string(), z.unknown()).optional()
      - file: astro-site/src/pages/[slug].astro
        location: astro-site/src/pages/[slug].astro:64
        snippet: <BaseLayout title={title} globalLayout={globalLayout}>
    prevalence: occasional

  - category: routing
    pattern: Static route coverage is currently narrow.
    description: The proof of concept currently emits one configured test slug, so crawl-scale behavior and broad internal-link topology are not yet visible in this Astro folder.
    examples:
      - file: astro-site/src/pages/[slug].astro
        location: astro-site/src/pages/[slug].astro:16
        snippet: return TEST_PAGE_SLUGS.map((slug) => ({ params: { slug } }))
      - file: astro-site/src/lib/config.ts
        location: astro-site/src/lib/config.ts:2
        snippet: export const TEST_PAGE_SLUGS = ['testowa-blueprint'] as const;
    prevalence: common

  - category: external_guidance
    pattern: Official search guidance treats AI visibility mostly as an extension of standard crawlability and indexing.
    description: Google states there are no additional technical requirements or special AI markup for AI Overviews / AI Mode; OpenAI and Anthropic expose distinct crawler tokens for search visibility versus model training.
    examples:
      - file: Google Search docs
        location: https://developers.google.com/search/docs/appearance/ai-features
        snippet: There are no additional technical requirements. You don't need to create new machine readable files, AI text files, or markup to appear in these features.
      - file: OpenAI crawler docs
        location: https://developers.openai.com/api/docs/bots
        snippet: OAI-SearchBot is used to surface websites in search results in ChatGPT’s search features.
      - file: Anthropic crawler docs
        location: https://support.claude.com/en/articles/8896518-does-anthropic-crawl-data-from-the-web
        snippet: Claude-SearchBot navigates the web to improve search result quality for users.
    prevalence: common

