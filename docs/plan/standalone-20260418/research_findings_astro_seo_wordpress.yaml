domain_security_considerations:
  sensitive_areas:
    - area: Cross-instance content/source bleed
      location: astro-site/astro.config.mjs:6 and astro-site/src/lib/config.ts:1-3
      concern: Hardcoded old origin and test slug can make a new public instance fetch or point back to the old instance, causing wrong content and off-canonical URLs.
    - area: Fallback public layout content
      location: astro-site/src/lib/wordpress.ts:31-141
      concern: Default fallback data contains old-brand legal URLs and /react logo paths, which can leak stale public references into generated pages when fallback is allowed.
  authentication_patterns_in_domain: Public GET endpoints for page-builder pages and global layout are intentionally open, while page updates require edit_pages capability. Sources: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:40-57 and PageBuilderController.php:55-100.
  authorization_patterns_in_domain: Unpublished pages are hidden unless the requester can edit the post. Source: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:27-31.
  data_validation_in_domain: Astro validates fetched schema through Zod, and the bridge normalizes page slug/title/status against the actual WP post before returning it. Sources: astro-site/src/lib/wordpress.ts:173-209, PageBuilderController.php:170-179.

testing_patterns:
  framework: Node/Astro built-in test style plus PHP unit-style controller tests in the bridge
  coverage_areas:
    - Global layout payload parsing and normalization in Astro
    - Global layout controller behavior in the WordPress bridge
  test_organization: Astro tests live under astro-site/src/lib; bridge tests live under wordpress-plugin/bulwar-bridge/tests.
  mock_patterns:
    - Fetch mocking for Astro global layout requests
    - Controller-level response assertions for bridge payloads

open_questions:
  - question: Will Astro remain published under /astro in production, or is it intended to replace the root WordPress presentation layer later?
    context: Current docs explicitly preserve WordPress on / and Astro on /astro, which strongly affects canonical strategy and duplicate-content exposure. Sources: docs/setup/klonowanie-astro-wordpress-woocommerce.md:19-20,256-268.
    type: decision_blocker
    affects: [seo-surface, migration-canonicals]
  - question: Is the optional seo object in page_builder_schema intended to become the authoritative source for title, description, canonical, robots, and social metadata?
    context: The contract already permits seo, but the active Astro layout does not consume it. Sources: astro-site/src/lib/types.ts:89, astro-site/src/layouts/BaseLayout.astro:19-24.
    type: decision_blocker
    affects: [head-metadata, ai-answer-surface]
  - question: Is there an approved source of truth for the full list of publishable page-builder slugs, or is TEST_PAGE_SLUGS only a temporary POC gate?
    context: Current static generation is hand-maintained and limited to testowa-blueprint. Sources: astro-site/src/lib/config.ts:3, astro-site/README.md:11-13.
    type: research
    affects: [indexation-coverage]

gaps:
  - area: Head metadata implementation
    description: No canonical tag, meta description, robots directives, OG/Twitter tags, or JSON-LD were found in the Astro layout within the inspected scope, despite the schema allowing an seo object. Sources: astro-site/src/layouts/BaseLayout.astro:19-24, astro-site/src/lib/types.ts:89.
    impact: decision_blocker
    affects: [seo-surface, ai-answer-surface]
  - area: Sitemap and robots delivery
    description: No sitemap.xml or robots.txt implementation was found in the inspected Astro scope, and no generation logic surfaced during targeted searches. Sources: astro-site search pass over astro-site/** for sitemap|robots returned no implementation matches.
    impact: research_blocker
    affects: [indexation-coverage]
  - area: Full block coverage for page-builder pages
    description: Astro currently validates and renders only two block types, so a large subset of WordPress-authored pages could be partially empty or blank if additional block keys are used. Sources: astro-site/src/lib/types.ts:46-87, astro-site/src/pages/[slug].astro:61-98.
    impact: research_blocker
    affects: [content-completeness, crawl-quality]
  - area: Old-origin and old-slug cleanup completeness
    description: Active code and setup docs still reference https://client.example and testowa-blueprint, meaning migration correctness depends on systematic parameter replacement rather than current code neutrality. Sources: astro-site/astro.config.mjs:6, astro-site/src/lib/config.ts:1-3, astro-site/src/components/StickyCartControls.astro:54, docs/setup/klonowanie-astro-wordpress-woocommerce.md:244-248.
    impact: decision_blocker
    affects: [migration-canonicals, public-link-integrity]

