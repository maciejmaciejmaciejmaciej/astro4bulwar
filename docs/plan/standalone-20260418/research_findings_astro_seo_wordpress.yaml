related_conventions:
  naming_patterns_in_domain: The repo consistently uses explicit content-source names such as page_builder_schema, page_builder_schema_for_ai, globalLayout, TEST_PAGE_SLUGS, and WORDPRESS_BASE_URL. Sources: PageBuilderController.php:15-16, astro-site/src/lib/config.ts:1-3.
  structure_of_domain: The Astro layer is split into config, data fetch/normalization helpers, a narrow page-builder resolver, and a single dynamic [slug] page wrapped by a shared BaseLayout. Sources: astro-site/src/lib/config.ts, astro-site/src/lib/wordpress.ts, astro-site/src/lib/pageBuilder.ts, astro-site/src/pages/[slug].astro, astro-site/src/layouts/BaseLayout.astro.
  error_handling_in_domain: Bridge endpoints return Response::error(...) envelopes, while Astro fetch helpers throw runtime errors when schema/global-layout requests fail or when global-layout meta is unresolved. Sources: PageBuilderController.php:29-42, astro-site/src/lib/wordpress.ts:205-236.
  testing_in_domain: The inspected domain shows tests for global layout parsing in Astro and controller tests in the bridge, but no SEO-oriented tests for head tags, canonical generation, or sitemap/robots behavior were found in the inspected scope. Sources: astro-site/src/lib/globalLayout.test.ts, wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php.
  documentation_in_domain: Deployment and migration documentation is strong and repeatedly emphasizes preserving the / + /react + /astro topology and removing old-domain/test-slug references. Sources: docs/setup/klonowanie-astro-wordpress-woocommerce.md, docs/setup/repo-do-klonowania-plan-parametryzacji.md, docs/setup/sekwencyjny-przewodnik-klonowania.md:120-301.

