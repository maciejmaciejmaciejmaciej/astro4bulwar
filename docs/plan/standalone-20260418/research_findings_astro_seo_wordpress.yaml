plan_id: standalone-20260418
objective: Explain how this Astro + WordPress repository is currently structured for static page-builder pages and what that means for SEO and AI answer engines/search models.
focus_area: astro_seo_wordpress
created_at: 2026-04-18T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - Astro is currently a static overlay published under /astro, with build-time fetches from WordPress page meta via the bridge endpoint, not a full site replacement yet. Sources: astro-site/astro.config.mjs:4-6, astro-site/README.md:7-13, wordpress-plugin/bulwar-bridge/src/Http/Routes.php:46-52.
  - Crawlability benefits already exist because Astro outputs HTML at build time, but the current head layer only renders title and viewport, so canonical, meta description, robots, OG/Twitter, and JSON-LD are effectively absent from the Astro shell. Sources: astro-site/src/layouts/BaseLayout.astro:20-21, astro-site/src/lib/types.ts:89.
  - The page-builder contract already allows seo/meta/build payloads, but the Astro route and layout do not consume them, and static generation is limited to TEST_PAGE_SLUGS with only testowa-blueprint configured. Sources: astro-site/src/lib/types.ts:87-89, astro-site/src/lib/config.ts:1-3, astro-site/src/pages/[slug].astro:15-16.
  - Migration risk is repo-specific: hardcoded old origin values, a hardcoded test slug, /react asset and checkout links, and the retained /astro mount point can all leave duplicate or off-canonical public surfaces after rollout. Sources: astro-site/astro.config.mjs:6, astro-site/src/lib/config.ts:1-3, astro-site/src/components/StickyCartControls.astro:53-54, docs/setup/klonowanie-astro-wordpress-woocommerce.md:49-50,244-248.

research_metadata:
