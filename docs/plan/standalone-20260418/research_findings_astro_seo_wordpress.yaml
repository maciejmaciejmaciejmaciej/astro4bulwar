patterns_found:
  - category: architecture
    pattern: WordPress meta -> bridge endpoint -> Astro build-time fetch -> static HTML output
    description: The repo uses WordPress page meta as the authoring source, exposes it through the bulwar bridge, and freezes the result into static Astro pages during build. Sources: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:33-52, astro-site/src/lib/wordpress.ts:201-209, astro-site/README.md:7-13.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:33-52
        snippet: $rawSchema = get_post_meta($page->ID, 'page_builder_schema', true); ... 'schema' => self::normalizeSchema($decoded, $page)
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:201-209
        snippet: fetchWordPressPageBuilderSchema(...) -> pageBuilderSchema.parse(normalizeSchema(payload.data.schema))
      - file: astro-site/README.md
        location: astro-site/README.md:7-13
        snippet: Astro fetches page_builder_schema from WordPress during build ... Astro outputs static HTML pages
    prevalence: common

  - category: structure
    pattern: Static route generation is manually enumerated by TEST_PAGE_SLUGS
    description: Astro does not discover published pages from WordPress; it only builds the slugs listed in config. Sources: astro-site/src/lib/config.ts:3, astro-site/src/pages/[slug].astro:15-16.
    examples:
      - file: astro-site/src/lib/config.ts
        location: astro-site/src/lib/config.ts:3
        snippet: export const TEST_PAGE_SLUGS = ['testowa-blueprint'] as const;
      - file: astro-site/src/pages/[slug].astro
        location: astro-site/src/pages/[slug].astro:15-16
        snippet: return TEST_PAGE_SLUGS.map((slug) => ({ params: { slug } }));
    prevalence: common

  - category: seo
    pattern: SEO contract exists in data model but is not rendered into the HTML head
    description: The schema allows seo payloads, but the BaseLayout head only emits title and viewport. Sources: astro-site/src/lib/types.ts:89, astro-site/src/layouts/BaseLayout.astro:19-24.
    examples:
      - file: astro-site/src/lib/types.ts
        location: astro-site/src/lib/types.ts:89
        snippet: seo: z.record(z.string(), z.unknown()).optional()
      - file: astro-site/src/layouts/BaseLayout.astro
        location: astro-site/src/layouts/BaseLayout.astro:20-21
        snippet: <meta name="viewport" ... /> and <title>{title}</title>
    prevalence: common

  - category: architecture
    pattern: Astro currently supports only a narrow subset of page-builder blocks
    description: The Zod contract and route renderer only cover gallery and one Woo-backed menu section, so many page-builder shapes would not render even if the schema exists in WordPress. Sources: astro-site/src/lib/types.ts:46-87, astro-site/src/pages/[slug].astro:61-98, astro-site/src/lib/pageBuilder.ts:13-14.
    examples:
      - file: astro-site/src/lib/types.ts
        location: astro-site/src/lib/types.ts:46-87
        snippet: sections: z.array(z.union([galleryBlockSchema, menuBlockSchema]))
      - file: astro-site/src/pages/[slug].astro
        location: astro-site/src/pages/[slug].astro:61-98
        snippet: if blockKey === 'gallery-masonry-style1' ... if blockKey === 'menu-category-photo-parallax-full-width' ... else null
    prevalence: common

  - category: migration
    pattern: Old-instance references are retained in active Astro runtime/config fallback paths
    description: The repo still carries old-domain URLs, the test slug, and /react handoff links inside active Astro code and default fallback data. Sources: astro-site/astro.config.mjs:6, astro-site/src/lib/config.ts:1-3, astro-site/src/lib/wordpress.ts:31-141, astro-site/src/components/StickyCartControls.astro:54.
    examples:
      - file: astro-site/astro.config.mjs
        location: astro-site/astro.config.mjs:6
        snippet: site: 'https://client.example'
      - file: astro-site/src/lib/config.ts
        location: astro-site/src/lib/config.ts:1-3
        snippet: WORDPRESS_BASE_URL = 'https://client.example'; TEST_PAGE_SLUGS = ['testowa-blueprint']
      - file: astro-site/src/components/StickyCartControls.astro
        location: astro-site/src/components/StickyCartControls.astro:54
        snippet: <a class="cart-drawer__action" href="/react/<page-slug>">Otwórz checkout React</a>
    prevalence: common

  - category: content
    pattern: Woo menu text is normalized into plain-text static snippets at build time
    description: Product descriptions are stripped from HTML and converted into short text descriptions inside static menu columns, which helps renderable content but removes richer semantics from Woo content. Sources: astro-site/src/lib/woo.ts:58,75,115.
    examples:
      - file: astro-site/src/lib/woo.ts
        location: astro-site/src/lib/woo.ts:58
        snippet: description: stripHtml(product.short_description || product.description) || undefined
    prevalence: occasional

