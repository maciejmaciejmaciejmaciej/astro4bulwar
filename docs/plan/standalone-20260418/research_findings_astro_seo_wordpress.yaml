  scope: Medium-depth repo-specific research limited to astro-site, wordpress-plugin/bulwar-bridge, and setup/docs related to the Astro page-builder deployment model.
  confidence: high
  coverage: 86
  decision_blockers: 2
  research_blockers: 0

