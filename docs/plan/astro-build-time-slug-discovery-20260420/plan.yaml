plan_id: "astro-build-time-slug-discovery-20260420"
objective: >
  Replace manual Astro TEST_PAGE_SLUGS with a build-time slug discovery flow
  sourced from WordPress page-builder, with minimal and safe changes that keep
  the current topology: WordPress on /, React on /react, Astro on /astro.
created_at: "2026-04-20T00:00:00Z"
created_by: "gem-planner"
status: "pending"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 3
  risk_score: "medium"

tldr: |
  The smallest safe replacement for TEST_PAGE_SLUGS is a new public WordPress
  list endpoint next to the existing per-slug page-builder route, plus one
  Astro build-time helper that fetches that list and feeds getStaticPaths().
  The list should return only already-buildable public pages instead of full
  schemas, so Astro still uses the existing GET /page-builder/pages/{slug}
  contract for page content. This keeps topology unchanged, removes manual slug
  editing from astro-site/src/lib/config.ts, and avoids over-engineering such
  as repo manifests or authenticated preview discovery in phase 1. Sources:
  astro-site/src/lib/config.ts, astro-site/src/pages/[slug].astro,
  astro-site/src/lib/wordpress.ts,
  wordpress-plugin/bulwar-bridge/src/Http/Routes.php,
  wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php,
  docs/plan/astro-wordpress-page-builder/seo-ai-visibility-roadmap.md.

open_questions:
  - >
    Whether pages marked with page_builder_schema.seo.noindex should be omitted
    from the Astro build entirely or still built for non-indexed public use.
    This plan recommends omitting them from the buildable list for the first
    pass to keep sitemap/indexation behavior simple.

pre_mortem:
  overall_risk_level: "medium"
  critical_failure_modes:
    - scenario: >
        The new list endpoint returns slugs for pages that still fail the
        existing per-slug schema fetch because page_builder_schema is missing or
        invalid JSON.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        Reuse the same page_builder_schema presence and decode checks already
        performed in PageBuilderController::show() before a page is included in
        the list, and cover that behavior with a focused controller test.
        Sources: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php.
    - scenario: >
        Draft, private, test, or explicitly noindex pages leak into Astro
        static generation and later into production crawl surfaces.
      likelihood: "medium"
      impact: "critical"
      mitigation: >
        Make the list endpoint fail closed: include only published WordPress
        pages with valid page_builder_schema and without explicit seo.noindex,
        and keep getStaticPaths() dependent on that endpoint only. Sources:
        PageBuilderController.php mapPostStatus(), astro-site/src/pages/[slug].astro,
        docs/setup/checklista-migracji-seo-wordpress-do-astro.md.
    - scenario: >
        The change grows into a second source of truth for publication state,
        for example by introducing a separate manifest or manual Astro-only flag
        while WordPress already stores the page instance and schema.
      likelihood: "medium"
      impact: "medium"
      mitigation: >
        Keep WordPress page status plus page_builder_schema as the only phase-1
        source of truth; reserve schema.build for later refinement only if a
        real need appears. Sources: astro-site/src/lib/types.ts,
        wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php,
        /memories/repo/page-builder-wordpress-page-creation.md.
  assumptions:
    - >
      The current per-slug page-builder GET endpoint remains the canonical data
      source for actual page rendering, and the new list endpoint should expose
      only lightweight discovery data. Sources: astro-site/src/lib/wordpress.ts,
      wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php.
    - >
      Topology must stay unchanged: WordPress on /, React on /react, Astro on
      /astro. Source: /memories/repo/astro-wp-clone-workflow.md.
    - >
      Manual TEST_PAGE_SLUGS is currently a temporary proof-of-concept gate and
      not the intended long-term source of publishable pages. Sources:
      astro-site/src/lib/config.ts,
      docs/plan/astro-wordpress-page-builder/seo-ai-visibility-roadmap.md.

implementation_specification:
  code_structure: |
    Keep the content flow split into two layers: a lightweight public discovery
    endpoint in bulwar-bridge for buildable slugs, and the existing per-slug
    schema endpoint for full page payloads. In Astro, move static path
    generation into a dedicated fetch helper in src/lib/wordpress.ts or a small
    adjacent helper, and make [slug].astro consume that helper inside
    getStaticPaths(). Remove TEST_PAGE_SLUGS from config.ts rather than keeping
    two parallel discovery mechanisms.
  affected_areas:
    - "wordpress-plugin/bulwar-bridge/src/Http/Routes.php"
    - "wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php"
    - "wordpress-plugin/bulwar-bridge/tests/**"
    - "astro-site/src/lib/config.ts"
    - "astro-site/src/lib/wordpress.ts"
    - "astro-site/src/pages/[slug].astro"
    - "docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md"
  component_details:
    - component: "Public buildable-pages endpoint"
      responsibility: >
        Expose a public REST list for Astro build discovery without returning
        full page schemas.
      interfaces:
        - "GET /wp-json/bulwar/v1/page-builder/pages returns success.data.pages[]."
        - "Each item includes at least slug, pageId, title, status, and optional canonical/noindex summary fields if needed for filtering/debugging."
    - component: "Buildable page filter"
      responsibility: >
        Decide which WordPress pages are allowed into Astro static generation
        using only public-safe, already-existing signals.
      interfaces:
        - "Phase-1 rule: page post_status must be publish, page_builder_schema must exist and decode to an array, normalized schema.page.status must resolve to published, and seo.noindex must not be true."
    - component: "Astro slug discovery helper"
      responsibility: >
        Fetch the buildable page list at build time and convert it to static
        params for [slug].astro.
      interfaces:
        - "fetchWordPressBuildablePages(): Promise<Array<{ slug: string } & Record<string, unknown>>>"
        - "getStaticPaths() maps discovery results to { params: { slug } }."
    - component: "Operator documentation update"
      responsibility: >
        Replace the old operator step that says to edit TEST_PAGE_SLUGS when a
        new page should be statically generated.
      interfaces:
        - "Docs describe that publishable WordPress/page-builder state now drives Astro build discovery automatically."
  dependencies:
    - component: "PageBuilderController"
      relationship: >
        Already normalizes per-page schema and can host the new public list logic
        without creating a separate controller for one small route.
    - component: "Response helper"
      relationship: >
        Provides the existing success/error payload envelope that the new list
        endpoint should reuse for consistency.
    - component: "[slug].astro"
      relationship: >
        Continues to render full page data from GET /page-builder/pages/{slug},
        but stops enumerating slugs locally.
  integration_points:
    - "GET /wp-json/bulwar/v1/page-builder/pages"
    - "GET /wp-json/bulwar/v1/page-builder/pages/{slug}"
    - "astro-site build-time getStaticPaths()"

contracts:
  - from_task: "add_wordpress_buildable_pages_endpoint"
    to_task: "switch_astro_to_build_time_slug_discovery"
    interface: >
      Public REST payload with the buildable page list used by Astro during
      static path generation.
    format: |
      {
        "success": true,
        "data": {
          "pages": [
            {
              "pageId": 122,
              "slug": "testowa-blueprint",
              "title": "Testowa Blueprint",
              "status": "published"
            }
          ]
        },
        "meta": {
          "request_id": "...",
          "timestamp": "...",
          "total": 1
        }
      }
  - from_task: "switch_astro_to_build_time_slug_discovery"
    to_task: "document_new_slug_discovery_workflow"
    interface: >
      Astro no longer requires manual TEST_PAGE_SLUGS editing; statically built
      pages are discovered from WordPress/page-builder state.
    format: "Operator-facing workflow note"

