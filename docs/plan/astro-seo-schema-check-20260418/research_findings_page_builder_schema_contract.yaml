  structure_of_domain: >-
    Types and parser are separated: types.ts owns the Zod contract, wordpress.ts owns
    payload normalization/fetching, pageBuilder.ts resolves section-level runtime data,
    and docs/plan/astro-wordpress-page-builder holds schema/spec examples.
  error_handling_in_domain: >-
    Parser normalization still protects meta/build/per-section meta objects, but SEO now
    relies on typed validation rather than generic object coercion.
  testing_in_domain: >-
    Dedicated unit tests now target top-level SEO contract behavior in astro-site/src/lib/types.test.ts.
  documentation_in_domain: >-
    The page-builder docs pack in docs/plan/astro-wordpress-page-builder is currently
    untracked in git and behaves as a draft documentation layer rather than a committed spec baseline.

