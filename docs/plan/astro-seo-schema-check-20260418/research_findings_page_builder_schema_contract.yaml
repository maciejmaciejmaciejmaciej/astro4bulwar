plan_id: astro-seo-schema-check-20260418
objective: >-
  Determine whether the user page schema changed as part of the recent Astro SEO
  implementation, focusing on astro-site runtime schema/parser files and related
  page-builder documentation artifacts.
focus_area: page_builder_schema_contract
created_at: 2026-04-18
created_by: GitHub Copilot
status: completed

tldr: |
  - The current workspace diff changes the Astro runtime contract for top-level `page_builder_schema.seo` from a loose object to a typed optional SEO object in astro-site/src/lib/types.ts.
  - The WordPress fetch/parser path in astro-site/src/lib/wordpress.ts also became stricter: `seo` is no longer coerced through `normalizeRecord`, so malformed non-object SEO payloads that previously degraded to `{}` now fail validation.
  - Core page-builder structure did not change: `version`, `page`, `sections`, `meta`, and `build` remain in the same positions, and no new required top-level field was added.
  - The concrete example render schema and AI schema files under docs/plan/astro-wordpress-page-builder were added as new docs artifacts, but the example render schema still does not contain a `seo` key.
  - Based on repo examples, existing WordPress `page_builder_schema` content likely does not need broad migration unless live pages already store legacy arbitrary SEO payloads under `seo`.

research_metadata:
  methodology: >-
    Medium-complexity hybrid retrieval: workspace file search for Astro schema and
    docs artifacts, targeted reads of types/parser/spec files, grep for SEO and
    page_builder_schema usage, git status/diff/log inspection for working-tree and
    history context, and focused checks for example schema payload contents.
  scope: >-
    Focused on astro-site/src/lib/types.ts, astro-site/src/lib/wordpress.ts,
    astro-site/src/lib/pageBuilder.ts, astro-site/src/lib/types.test.ts, and the
    docs/plan/astro-wordpress-page-builder schema/spec/example files relevant to
    page_builder_schema and page_builder_schema_for_ai.
  confidence: high
  coverage: 93
  decision_blockers: 0
  research_blockers: 1

files_analyzed:
