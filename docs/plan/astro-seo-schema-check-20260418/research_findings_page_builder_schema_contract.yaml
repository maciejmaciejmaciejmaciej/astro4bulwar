patterns_found:
  - category: structure
    pattern: Top-level SEO contract tightened from loose object to typed optional object
    description: The Astro-side page_builder_schema contract now constrains `seo` to a known nested object shape instead of accepting any record of unknown keys.
    examples:
      - file: astro-site/src/lib/types.ts
        location: astro-site/src/lib/types.ts:115
        snippet: seo: pageSeoSchema.optional()
      - file: docs/plan/astro-wordpress-page-builder/plan.yaml
        location: docs/plan/astro-wordpress-page-builder/plan.yaml:170
        snippet: Zastapic luzne pole seo w pageBuilderSchema jawnym seoSchema
    prevalence: common
  - category: error_handling
    pattern: Parser no longer silently coerces malformed seo into an empty object
    description: The WordPress fetch layer previously normalized any non-object seo value to `{}`; current code passes raw seo through, so malformed payloads fail typed parsing instead of being tolerated.
    examples:
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:184
        snippet: seo: schema.seo ?? undefined
      - file: astro-site/src/lib/types.test.ts
        location: astro-site/src/lib/types.test.ts:45
        snippet: pageBuilderSchema still rejects malformed structured SEO values
    prevalence: common
  - category: structure
    pattern: Core render schema shape remains stable
    description: Version, page, sections, meta, and build continue to exist in the same top-level structure and no new required page field was introduced by the SEO change.
    examples:
      - file: astro-site/src/lib/types.ts
        location: astro-site/src/lib/types.ts:104
        snippet: export const pageBuilderSchema = z.object({ version, page, sections, meta, seo, build })
      - file: docs/plan/astro-wordpress-page-builder/testowa-blueprint.page_builder_schema.json
        location: docs/plan/astro-wordpress-page-builder/testowa-blueprint.page_builder_schema.json:1
        snippet: { "version": 1, "page": { ... }, "sections": [ ... ] }
    prevalence: common
  - category: documentation
    pattern: Docs pack added around page_builder_schema, but example payloads did not start using seo
    description: New schema/spec/example docs were added in the Astro page-builder plan directory, yet the concrete example render schema still omits a top-level seo object.
    examples:
      - file: docs/plan/astro-wordpress-page-builder/page-builder-schema-spec.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-schema-spec.md:67
        snippet: `seo` documented as optional top-level field
      - file: docs/plan/astro-wordpress-page-builder/testowa-blueprint.page_builder_schema.json
        location: docs/plan/astro-wordpress-page-builder/testowa-blueprint.page_builder_schema.json:1
        snippet: example payload contains no `seo`
    prevalence: occasional
  - category: testing
    pattern: SEO contract now has dedicated schema tests
    description: A new test file covers blank-string normalization and malformed SEO rejection for pageBuilderSchema.
    examples:
      - file: astro-site/src/lib/types.test.ts
        location: astro-site/src/lib/types.test.ts:16
        snippet: pageBuilderSchema normalizes blank optional SEO strings to undefined
      - file: astro-site/src/lib/types.test.ts
        location: astro-site/src/lib/types.test.ts:45
        snippet: pageBuilderSchema still rejects malformed structured SEO values
    prevalence: occasional

