    path: astro-site/src/lib/types.ts
    purpose: Defines the Astro-side Zod contract for page_builder_schema and exported schema types.
    key_elements:
      - element: pageSeoSchema
        type: pattern
        location: astro-site/src/lib/types.ts:96
        description: Introduces a typed optional SEO object with title, description, canonical, robots, og, and noindex.
      - element: pageBuilderSchema.seo
        type: pattern
        location: astro-site/src/lib/types.ts:115
        description: Changes top-level seo from a loose record to pageSeoSchema.optional().
      - element: optionalSeoStringSchema
        type: pattern
        location: astro-site/src/lib/types.ts:79
        description: Normalizes blank SEO strings to undefined before validation.
      - element: ResolvedPageSeo
        type: type
        location: astro-site/src/lib/types.ts:127
        description: Adds a typed resolved SEO shape for downstream layout/page rendering.
    language: TypeScript
    lines: 131
  - file: wordpress.ts
    path: astro-site/src/lib/wordpress.ts
    purpose: Fetches page_builder_schema from WordPress and normalizes payloads before Zod parsing.
    key_elements:
      - element: normalizeSchema
        type: function
        location: astro-site/src/lib/wordpress.ts:169
        description: Still normalizes top-level meta/build and section meta, but now passes seo through as-is instead of coercing it into a generic object.
      - element: seo normalization branch
        type: pattern
        location: astro-site/src/lib/wordpress.ts:184
        description: Uses schema.seo ?? undefined instead of normalizeRecord(schema.seo), making malformed non-object SEO payloads visible to Zod validation.
      - element: fetchWordPressPageBuilderSchema
        type: function
        location: astro-site/src/lib/wordpress.ts:198
        description: Parses the normalized schema through pageBuilderSchema.parse().
    language: TypeScript
    lines: 213
  - file: pageBuilder.ts
    path: astro-site/src/lib/pageBuilder.ts
    purpose: Builds the static Astro page object from the parsed WordPress schema.
    key_elements:
      - element: buildStaticPage
        type: function
        location: astro-site/src/lib/pageBuilder.ts:5
        description: Resolves section data only; it does not reshape top-level page seo or other page metadata.
    language: TypeScript
    lines: 19
  - file: types.test.ts
    path: astro-site/src/lib/types.test.ts
    purpose: Regression coverage for the new typed SEO contract.
    key_elements:
