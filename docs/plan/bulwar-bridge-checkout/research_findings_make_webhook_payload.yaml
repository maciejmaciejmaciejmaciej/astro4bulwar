  data_flow_involving_domain: >-
    React submits canonical checkout JSON to the same-domain PHP bridge; the
    bridge validates, creates the Woo order, and returns an authoritative order
    response. A Make integration would be an additional outbound step from the
    bridge after order creation, using a separately formatted sanitized payload.
