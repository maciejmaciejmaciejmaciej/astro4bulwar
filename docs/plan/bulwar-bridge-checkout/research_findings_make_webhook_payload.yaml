domain_security_considerations:
  sensitive_areas:
    - area: customer identity and contact fields
      location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:47
      concern: Email and phone are available during order creation and would be easy to leak if the webhook payload is built from the full request body.
    - area: delivery address fields
      location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:58
      concern: Delivery address is present for delivery orders and should be excluded if the stated requirement is no personal data.
    - area: special item configuration JSON
      location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:129
      concern: Raw configuration JSON may contain more detail than downstream automation needs and should not be forwarded unless intentionally whitelisted.
  authentication_patterns_in_domain: >-
    Current bridge traffic is same-domain inbound REST. A Make integration would
    add a new outbound trust boundary based on a secret webhook URL or similar
    server-side configuration.
  authorization_patterns_in_domain: >-
    There is no existing outbound authorization layer in the plugin; access
    control would be implicit in possession of the configured Make webhook URL.
  data_validation_in_domain: >-
    Privacy-safe payload construction should be whitelist-based and derived from
    the saved order object or a dedicated sanitized formatter, not by forwarding
    arbitrary request fields or full HTML built from unsanitized input.

testing_patterns:
  framework: mixed frontend unit tests plus no current PHP transport tests
  coverage_areas:
    - readable summary generation for special menu lines in TypeScript
    - no outbound HTTP posting or retry policy tests in PHP
  test_organization: >-
    Frontend summary helpers are unit-tested in zip/src/data and zip/src/lib.
    The bridge runtime currently lacks a webhook sender abstraction and related
    PHP tests.
  mock_patterns:
    - summary helper tests assert stable readable strings for special menu selections
    - no observed mock for wp_remote_post or transport failure cases

open_questions:
  - question: Should the Make scenario ever branch on line items, totals, or fulfillment type, or is the payload intended only for human-readable notification output?
    context: A pure HTML string is sufficient for display, but weak for future scenario logic or filtering.
  - question: Is Make delivery business-critical for order acceptance, or can the order succeed even when webhook delivery fails?
    context: The current bridge order endpoint is synchronous; coupling Make delivery into that path changes failure handling and user-visible behavior.
  - question: Does “no personal data” exclude coarse delivery metadata such as fulfillment type and slot time, or only direct identifiers like name, phone, email, and full address?
    context: Slot timing is operationally useful and not directly identifying, but privacy scope should be explicit before freezing the outbound schema.

gaps:
  - area: outbound transport implementation
    description: No webhook sender, webhook configuration constant, or delivery status persistence exists in the plugin today.
    impact: Operational complexity depends on whether Make delivery is best-effort or must be retried and audited.
  - area: sanitized formatter policy
    description: The repo has readable summary builders, but no server-side sanitizer dedicated to privacy-safe outbound notification payloads.
    impact: Without a dedicated formatter, the simplest implementation risks leaking PII or over-sharing internal order detail.
  - area: Make-side payload parsing contract
    description: No repo artifact defines whether downstream Make scenarios will consume only rendered HTML or also structured fields.
    impact: Choosing HTML-only now may make later scenario branching or data mapping more brittle.