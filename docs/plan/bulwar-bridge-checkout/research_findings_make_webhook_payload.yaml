plan_id: bulwar-bridge-checkout
objective: >-
  Assess whether a Make.com webhook integration can be implemented simply in the
  BULWAR bridge by sending a minimal outbound payload containing order_id and a
  preformatted long HTML order summary string, while respecting repository
  constraints around trust boundaries, privacy, and operational handling.
focus_area: make_webhook_payload
created_at: 2026-03-25T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
  - In this repo context, sending a small outbound JSON payload from WordPress/PHP to a Make webhook is a simple extension because the bridge already centralizes authoritative order creation and response/error taxonomy.
  - Sending only { order_id, text_long_string } is technically feasible, but it is operationally weaker than sending order_id plus a sanitized structured summary object and an optional html_summary string for display.
  - Raw HTML inside a long JSON string is generally safe for Make webhook ingestion as text, but it increases fragility for downstream parsing, escaping, and future scenario branching.
  - Privacy is the main constraint: the existing bridge order payload contains customer PII, so any outbound Make payload must be built from a separate sanitized formatter rather than forwarding customer or address fields by default.
  - There is no existing outbound webhook sender in the plugin, so retry, idempotency, and failure policy for Make delivery would need to be explicitly added.

research_metadata:
  methodology: >-
    Hybrid retrieval using semantic_search and grep_search across the bridge,
    checkout plan artifacts, and frontend cart-summary helpers; targeted
    read_file inspection of the PHP bridge contracts and order creation path;
    plus Make Developer Hub documentation lookup for webhook transport and
    queue/log behavior.
  scope: >-
    Focused on the WordPress/PHP bridge runtime, checkout contract shape,
    existing human-readable order summary generation in the frontend, live Woo
    deployment constraints, and Make webhook ingestion characteristics relevant
    to a single outbound order summary notification.
  confidence: high
  coverage: 91

