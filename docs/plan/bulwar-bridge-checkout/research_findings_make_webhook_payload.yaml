patterns_found:
  - category: architecture
    pattern: Bridge is the single authoritative integration seam
    description: >-
      The repo already concentrates order validation, Woo creation, and response
      shaping inside the PHP bridge, so an outbound Make webhook belongs there
      instead of the React frontend.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
        location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:14
        snippet: create(array $body): array
      - file: docs/plan/bulwar-bridge-checkout/plan.yaml
        location: docs/plan/bulwar-bridge-checkout/plan.yaml:48
        snippet: React should stay a thin client and submit to the bridge
    prevalence: common
  - category: structure
    pattern: Machine payload and readable summaries are already separate concerns
    description: >-
      The frontend builds canonical cart lines for checkout and separate summary
      lines for display, which supports a sanitized outbound notification layer.
    examples:
      - file: zip/src/lib/cateringCart.ts
        location: zip/src/lib/cateringCart.ts:368
        snippet: buildCheckoutDrawerItems returns summaryLines for display
      - file: zip/src/lib/cateringCart.ts
        location: zip/src/lib/cateringCart.ts:401
        snippet: buildBridgeCheckoutCartLines returns configuration but not display summary
    prevalence: common
  - category: structure
    pattern: No outbound webhook transport exists yet
    description: >-
      Searches across the bridge found inbound REST route registration and order
      creation only; no wp_remote_post or webhook URL handling is currently implemented.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Plugin.php
        location: wordpress-plugin/bulwar-bridge/src/Plugin.php:12
        snippet: add_action('rest_api_init', [Routes::class, 'register']);
      - file: wordpress-plugin/bulwar-bridge/src/Config/Constants.php
        location: wordpress-plugin/bulwar-bridge/src/Config/Constants.php:24
        snippet: current constants include pricing and slot config values only
    prevalence: common
  - category: error_handling
    pattern: Retryability is explicit in the bridge contract
    description: >-
      The bridge already marks errors as retryable or not, which is consistent
      with defining a clear Make delivery policy instead of treating all
      outbound failures the same way.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Support/Response.php
        location: wordpress-plugin/bulwar-bridge/src/Support/Response.php:18
        snippet: retryable is part of the error payload
      - file: wordpress-plugin/bulwar-bridge/docs/contracts.md
        location: wordpress-plugin/bulwar-bridge/docs/contracts.md:63
        snippet: QUOTE_EXPIRED response shows retryable true
    prevalence: common
  - category: security
    pattern: Customer PII exists in the authoritative order flow
    description: >-
      The server-side order creation path writes customer name, email, phone,
      and sometimes delivery address, so a privacy-safe Make payload must be
      assembled from a narrower formatter.
    examples:
      - file: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
        location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:47
        snippet: set_billing_email and set_billing_phone
      - file: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
        location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:58
        snippet: set_shipping_address_1 and set_shipping_city for delivery
    prevalence: common

