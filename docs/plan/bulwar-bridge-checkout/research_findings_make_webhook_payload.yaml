related_conventions:
  naming_patterns_in_domain: >-
    Repo contracts use explicit snake_case JSON keys such as order_id,
    idempotency_key, request_id, and *_minor totals. Private Woo meta uses the
    _bulwar_ prefix and display-oriented order item meta uses bulwar_ keys.
  structure_of_domain: >-
    Validation happens in controllers, authoritative persistence happens in
    services, and display summaries are already modeled separately from
    canonical payloads on the frontend.
  error_handling_in_domain: >-
    Domain failures are surfaced as explicit codes with retryable flags and a
    normalized JSON envelope. That pattern supports explicit handling for
    outbound Make transport failures.
  testing_in_domain: >-
    The repo has frontend tests for summary builders but no PHP tests for an
    outbound webhook transport layer because that layer does not exist yet.
  documentation_in_domain: >-
    Bridge contracts and prior research artifacts are strong and explicit for
    inbound checkout flows, but there is no existing documented outbound
    notification contract.

