patterns_found:
  - category: architecture
    pattern: Minimal stock WordPress runtime with no custom commerce extension layer
    description: >-
      The live v2 instance runs WooCommerce on top of the stock Twenty
      Twenty-Four theme without any custom active plugin, child theme, or
      must-use plugin layer.
    examples:
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:10
        snippet: active plugins are litespeed-cache and woocommerce only
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:14
        snippet: muPlugins output is an empty array and active theme is twentytwentyfour
    prevalence: common
  - category: structure
    pattern: No custom content model exists yet for scheduling or bridge administration
    description: >-
      Registered post types include only core WordPress and WooCommerce types.
      No delivery-slot CPT, admin model, or schedule entity is present on the
      audited site.
    examples:
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:18
        snippet: postTypes output lists product, product_variation, shop_order, shop_coupon and no custom business CPT
      - file: .github/copilot-instructions.md
        location: .github/copilot-instructions.md:10
        snippet: project instructions say availability should eventually use custom post types
    prevalence: common
  - category: architecture
    pattern: Woo checkout pages exist, but operational checkout settings are not aligned to the catering target
    description: >-
      Woo pages are assigned, guest checkout is enabled, and login reminder is
      disabled, but live country and currency defaults point to US and USD,
      with no shipping or tax configuration.
    examples:
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:26
        snippet: USD, US:CA, all countries, empty ship_to_countries, taxes no, tax based on shipping
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:46
        snippet: wooPages point to page ids 7, 8, 9, and 10 for Shop, Cart, Checkout, and My account
    prevalence: common
  - category: architecture
    pattern: Payment and shipping are effectively disabled in current Woo config
    description: >-
      Woo loads only its built-in offline gateways on v2 and marks each as
      disabled. No shipping zones, locations, methods, or tax rates are
      configured.
    examples:
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:34
        snippet: bacs no, cheque no, cod no
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:38
        snippet: shippingZones output empty, shippingLocations output empty, shippingMethods output empty, taxRates output empty
    prevalence: common
  - category: structure
    pattern: Live hook surface is stock Woo plus stock theme init hooks only
    description: >-
      The custom code scan found no site-specific Woo hooks in must-use plugins
      or the active theme. The only hook registrations found were stock
      Twenty Twenty-Four init hooks unrelated to commerce customization.
    examples:
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:50
        snippet: add_action init twentytwentyfour_block_styles
      - file: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json
        location: docs/plan/bulwar-bridge-checkout/live_site_audit_raw.json:50
        snippet: no mu-plugin files were listed before the stock theme hooks
    prevalence: common

