open_questions:
  - question: >-
      Is v2 intentionally a backend staging instance rather than the merchant's
      production commerce configuration?
    context: >-
      The audited v2 site uses USD and US:CA with no shipping or tax setup,
      which conflicts with other local artifacts in the workspace that reflect a
      Polish store address and PLN settings.
  - question: >-
      Should the bridge target v2 immediately, or should its settings be synced
      from another WordPress instance before implementation proceeds?
    context: >-
      The implementation plan treats v2 as the backend target, but current live
      Woo settings on v2 do not match the expected catering geography.
  - question: >-
      Is the MVP expected to keep Woo payment gateways disabled and let the
      bridge create manual or unpaid orders, or is an additional payment plugin
      planned later?
    context: >-
      The audit found only core offline gateways and all were disabled, with no
      external payment plugin active.
  - question: >-
      Should schedule authoring live in CPTs, JSON-first bridge config, or a
      custom admin UI created from scratch?
    context: >-
      Project instructions call for CPT-driven availability, but the audited
      live site contains no such content model or admin screen today.

gaps:
  - area: production-versus-base instance alignment
    description: >-
      The audit proved the state of v2, but it did not reconcile that state with
      the separate hosted WordPress instances and local artifacts already present
      in the workspace.
    impact: >-
      This affects whether the current v2 configuration should gate bridge
      implementation decisions or whether it first needs environment alignment.
  - area: future payment scope
    description: >-
      The live audit can prove that no gateway is enabled now, but it cannot
      prove whether that is the intended MVP state or just an unfinished setup.
    impact: >-
      This directly affects whether direct order creation without online payment
      is the intended checkout path.
  - area: future merchant-facing admin ownership
    description: >-
      The audit can prove the absence of CPTs, bridge settings screens, and
      order-admin renderers, but it cannot prove which of those the team wants
      to introduce first.
    impact: >-
      This shapes the exact scope to delegate to the parallel Woo or WordPress
      agent.
