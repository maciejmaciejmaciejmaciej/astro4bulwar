plan_id: bulwar-bridge-checkout
objective: >-
  Audit WooCommerce and WordPress constraints on the live base site that affect
  bridge checkout implementation, including payment gateways, shipping and tax
  assumptions, plugin and CPT landscape, available hook surface, and the scope
  that should be delegated to a parallel Woo or WordPress agent.
focus_area: live_woo_constraints
created_at: 2026-03-24T16:41:22Z
created_by: GitHub Copilot
status: completed

tldr: |
  - The audited base WordPress instance is https://client.example at server path client.example/public_html.
  - The live stack is minimal: WooCommerce 10.6.1 and LiteSpeed Cache are active, there are no must-use plugins, the active theme is Twenty Twenty-Four, and no custom CPTs are registered.
  - Woo checkout configuration on v2 is effectively unconfigured for the target catering flow: currency is USD, default country is US:CA, taxes are disabled, there are no shipping zones or shipping methods, and all core offline payment gateways are disabled.
  - The Woo pages exist and are assigned to the default Shop, Cart, Checkout, and My account pages, but there is no live custom plugin, CPT layer, or admin screen for scheduling, bridge settings, or order-meta rendering.
  - Existing Woo hook usage on the live site is only the stock Twenty Twenty-Four theme init hooks; no live custom WooCommerce hook implementation was found in must-use plugins or the active theme.

research_metadata:
  methodology: >-
    Hybrid retrieval using local repository evidence, targeted read_file
    inspection of plan and helper artifacts, and a read-only SSH plus WP-CLI
    audit against the live v2 WordPress installation captured in a local raw
    JSON artifact.
  scope: >-
    Focused audit of the live base WordPress instance used for backend and API
    work, including site identity, active plugins and theme, registered post
    types, WooCommerce checkout settings, shipping and tax tables, assigned Woo
    pages, and custom hook presence in active runtime code.
  confidence: high
  coverage: 94

