testing_patterns:
	framework: node:test
	coverage_areas:
		- Stable registry defaults and default-instance ids.
		- Visible server-rendered output for registered blocks.
		- Stable block ids and content fields in generated AI schema JSON.
	test_organization: >-
		Narrow file-local regression tests sit next to the registry domain and the script domain rather
		than under a shared test harness.
	mock_patterns:
		- Temporary file-system fixture setup for generator input and output.
		- Inline schema fixtures for render-path validation.

open_questions:
	- question: Is it acceptable for the AI generator to stop being a plain node-executed CommonJS file?
		context: >-
			A single-source-of-truth refactor that imports block schema definitions into the generator is
			constrained by the current generator execution path and the zip app's ESM/TypeScript boundary.
		type: decision_blocker
		affects:
			- page_builder_registry_refactor_scope

	- question: Should the source-resolution switch in zip/src/blocks/registry/resolvePageBuilderSources.ts stay manual in this refactor?
		context: >-
			The requested scope names only renderPageBuilderSections.tsx and the AI generator, but source
			resolution is another existing per-block switch in the same registry domain.
		type: nice_to_know
		affects:
			- page_builder_registry_refactor_scope

gaps:
