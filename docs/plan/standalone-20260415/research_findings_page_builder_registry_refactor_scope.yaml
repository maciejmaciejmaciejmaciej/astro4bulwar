patterns_found:
	- category: architecture
		pattern: Block definitions already centralize validation/defaults but not executable React rendering.
		description: >-
			Each block schema module exports a PageBuilderBlockDefinition with schema, defaultData,
			exampleData, and a static render descriptor, while the executable JSX adapter remains
			outside the definition.
		examples:
			- file: zip/src/blocks/about-1/schema.ts
				location: zip/src/blocks/about-1/schema.ts:105
				snippet: render: { kind: "existing-react-component", componentName: "AboutSection", ... }
			- file: zip/src/blocks/gallery-masonry-style1/schema.ts
				location: zip/src/blocks/gallery-masonry-style1/schema.ts:56
				snippet: render: { kind: "existing-react-component", componentName: "GallerySection", ... }
			- file: zip/src/blocks/menu-category-photo-parallax-full-width/schema.ts
				location: zip/src/blocks/menu-category-photo-parallax-full-width/schema.ts:96
				snippet: render: { kind: "existing-react-component", componentName: "BreakfastSection", ... }
			- file: zip/src/blocks/our-services/schema.ts
				location: zip/src/blocks/our-services/schema.ts:72
				snippet: render: { kind: "existing-react-component", componentName: "OurServices", ... }
		prevalence: common

	- category: structure
		pattern: React rendering uses a single central switch keyed by blockKey.
		description: >-
			The renderer performs enabled filtering and then switches on section.blockKey to instantiate
			the appropriate component and per-block prop adapter.
		examples:
			- file: zip/src/blocks/registry/renderPageBuilderSections.tsx
				location: zip/src/blocks/registry/renderPageBuilderSections.tsx:19
				snippet: switch (section.blockKey) { case "about-1": ... case "gallery-masonry-style1": ... }
		prevalence: common

	- category: structure
		pattern: Source resolution is also manually keyed by blockKey.
		description: >-
			The menu block source resolver is encoded in a separate switch, so removing manual wiring
			only from renderPageBuilderSections would not eliminate all per-block branching in the
			registry domain.
		examples:
			- file: zip/src/blocks/registry/resolvePageBuilderSources.ts
				location: zip/src/blocks/registry/resolvePageBuilderSources.ts:19
				snippet: switch (section.blockKey) { case "menu-category-photo-parallax-full-width": ... }
		prevalence: occasional

	- category: architecture
		pattern: The AI generator duplicates per-block knowledge through one builder function per block plus a central dispatch chain.
		description: >-
			Four dedicated builder functions produce AI payloads, and buildAiBlock manually dispatches
			by blockKey before buildAiSchema maps sections through that dispatch.
		examples:
			- file: SCRIPTS/generate-page-builder-ai-schema.js
				location: SCRIPTS/generate-page-builder-ai-schema.js:107
				snippet: function buildGalleryBlock(section) { ... }
			- file: SCRIPTS/generate-page-builder-ai-schema.js
				location: SCRIPTS/generate-page-builder-ai-schema.js:283
				snippet: if (section.blockKey === 'gallery-masonry-style1') { return buildGalleryBlock(section); }
		prevalence: common

	- category: architecture
		pattern: The React registry and the AI generator sit on different module/runtime boundaries.
		description: >-
			The zip app is ESM/TypeScript with bundler-oriented resolution, while the AI generator is a
			plain Node/CommonJS entrypoint executed via process.execPath in tests.
		examples:
			- file: zip/package.json
				location: zip/package.json:5
				snippet: '"type": "module"'
			- file: zip/tsconfig.json
				location: zip/tsconfig.json:13
				snippet: '"moduleResolution": "bundler"'
			- file: SCRIPTS/generate-page-builder-ai-schema.test.js
				location: SCRIPTS/generate-page-builder-ai-schema.test.js:91
				snippet: execFileSync(process.execPath, [generatorPath, '--input', inputPath, ...])
		prevalence: common

	- category: testing
		pattern: Existing tests verify output and ids, not the descriptor dispatch mechanism itself.
		description: >-
			The registry test asserts final markup and default-instance behavior, and the generator test
			asserts stable ids and descriptive content after executing the script.
		examples:
			- file: zip/src/blocks/registry/wave2-pagebuilder.test.tsx
				location: zip/src/blocks/registry/wave2-pagebuilder.test.tsx:109
				snippet: const markup = renderToStaticMarkup(<>{renderPageBuilderSections(schema)}</>);
			- file: SCRIPTS/generate-page-builder-ai-schema.test.js
				location: SCRIPTS/generate-page-builder-ai-schema.test.js:107
				snippet: assert.match(output.blocks[0].description, /.../)
		prevalence: common

