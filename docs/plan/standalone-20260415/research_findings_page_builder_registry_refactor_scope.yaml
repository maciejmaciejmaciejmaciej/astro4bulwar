plan_id: standalone-20260415
objective: >-
	Identify the minimal safe architecture change that reduces manual per-block wiring in
	zip/src/blocks/registry/renderPageBuilderSections.tsx and
	SCRIPTS/generate-page-builder-ai-schema.js.
focus_area: page_builder_registry_refactor_scope
created_at: 2026-04-15
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
	- The current React runtime already centralizes block registration in zip/src/blocks/registry/index.ts:20, but rendering still bypasses the registry and uses a blockKey switch in zip/src/blocks/registry/renderPageBuilderSections.tsx:19.
	- The four examined block schema files already contain per-block render metadata at zip/src/blocks/about-1/schema.ts:105, zip/src/blocks/gallery-masonry-style1/schema.ts:56, zip/src/blocks/menu-category-photo-parallax-full-width/schema.ts:96, and zip/src/blocks/our-services/schema.ts:72; the minimal React-side refactor surface is therefore registry/types + those four schema files + renderPageBuilderSections.tsx.
	- Colocating React render functions in the block definitions does not introduce an observed import cycle with the current dependency direction; the main hazard is widening schema modules from data-only definitions into React-aware modules, not a circular import (sources: zip/src/blocks/registry/index.ts:20, zip/src/blocks/registry/types.ts:16, zip/src/blocks/registry/renderPageBuilderSections.tsx:14).
	- The AI generator is on a separate runtime boundary: it is a plain Node/CommonJS script invoked directly by node and tested through child_process, while the zip registry is TypeScript/ESM with bundler-oriented resolution, so importing TS/TSX block definitions into the generator is not the minimal safe path (sources: SCRIPTS/generate-page-builder-ai-schema.js:311, SCRIPTS/generate-page-builder-ai-schema.test.js:91, zip/package.json:5, zip/tsconfig.json:13, zip/tsconfig.json:24).
	- The simplest descriptor-driven replacement for the AI generator if/else chain is an in-script or plain-.js keyed descriptor table consumed by a generic buildAiBlock path; this removes the branch at SCRIPTS/generate-page-builder-ai-schema.js:283 without requiring the generator to execute the React/TS registry.

