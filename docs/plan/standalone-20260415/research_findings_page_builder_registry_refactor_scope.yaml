		description: >-
			The repo contains machine-readable block metadata, including aiEditing fields, but the active
			React renderer and AI generator do not import that artifact.
		impact: research_blocker
		affects:
			- page_builder_registry_refactor_scope

	- area: Descriptor-path regression coverage
		description: >-
			Existing tests verify output and ids after execution, but they do not directly assert that the
			renderer or generator dispatch is registry-driven rather than switch-driven.
		impact: nice_to_know
		affects:
			- page_builder_registry_refactor_scope
