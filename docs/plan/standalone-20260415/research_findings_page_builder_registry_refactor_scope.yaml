			integration_point: zip/src/blocks/registry/resolvePageBuilderSources.ts delegates menu blocks to wooStoreApi-backed resolution.

related_conventions:
	naming_patterns_in_domain: >-
		Block keys use stable kebab-case names such as about-1 and menu-category-photo-parallax-full-width;
		each block exports <name>DataSchema, <name>DefaultData, <name>ExampleData, and <name>BlockDefinition.
	structure_of_domain: >-
		Each approved block owns a local schema.ts file under zip/src/blocks/<block-key>/, the central
		registry in zip/src/blocks/registry/index.ts owns lookup and validation, and downstream adapters
		convert validated block data into React component props.
	error_handling_in_domain: >-
		Unknown block keys and invalid inputs fail fast with thrown Error instances in both the registry
		path and the AI generator path.
	testing_in_domain: >-
		Tests are narrow regression tests that build sample payloads inline, then assert stable ids and
		visible output using node:test.
	documentation_in_domain: >-
		The page-builder instructions require registry-backed dual payload generation, while
		docs/block-registry/registry.machine.json carries a parallel machine-readable description of the
		same blocks but is not imported by the active runtime surfaces.

related_dependencies:
	internal:
		- component: zip/src/blocks/registry/types.ts
			relationship_to_domain: Defines the block contract used by all block schema files.
			direction: inbound
		- component: zip/src/components/sections/AboutSection.tsx and sibling section components
			relationship_to_domain: Receive adapted block data from the renderer.
			direction: outbound
		- component: zip/src/blocks/registry/resolvePageBuilderSources.ts
			relationship_to_domain: Separate runtime phase for source-backed blocks.
			direction: bidirectional
		- component: docs/block-registry/registry.machine.json
			relationship_to_domain: Parallel documentation artifact that overlaps block metadata but is not a runtime dependency.
			direction: outbound
	external:
