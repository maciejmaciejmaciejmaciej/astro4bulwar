		package/tooling reads to verify runtime boundaries.
	scope: >-
		Focused on the four requested block schema files, the registry renderer and registry
		support files, the AI generator, adjacent tests, and the package/tooling files that
		constrain shared-descriptor options.
	confidence: high
	coverage: 92
	decision_blockers: 1
	research_blockers: 0

