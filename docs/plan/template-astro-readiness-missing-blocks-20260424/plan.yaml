  overall_risk_level: high
  critical_failure_modes:
    - scenario: >-
        The build still passes without compiling the new `/template` branches because no
        generated Astro page actually renders the 12 target block keys through
        PageBuilderSection.astro.
      likelihood: high
      impact: critical
      mitigation: >-
        Add a dedicated hidden validation route or equivalent build fixture that renders
        all 12 target blocks via astro-site/src/components/PageBuilderSection.astro, and
        require that route to be part of the `npm.cmd run build` output before the ready
        flip is allowed. Sources: astro-site/src/components/PageBuilderSection.astro,
        astro-site/package.json.
    - scenario: >-
        The manual dispatcher pattern in PageBuilderSection.astro drifts away from the
        astroRegistry projection or the shared readiness manifest, creating a false sense
        of readiness for one or more blocks.
      likelihood: medium
      impact: critical
      mitigation: >-
        Keep projection wiring, dispatcher branching, and any candidate-only validation
        support in one integration task, then block the final manifest flip on both the
        real render-path gate and astro-site/src/lib/astroRegistry.test.ts parity coverage.
        Sources: astro-site/src/components/PageBuilderSection.astro,
        astro-site/src/lib/astroRegistry.ts,
        astro-site/src/lib/astroRegistry.test.ts,
        docs/block-registry/registry.machine.json.
    - scenario: >-
        Promo2, the standalone menu family, and oferta_posts_section are implemented in
        separate resolver passes that all touch astro-site/src/lib/pageBuilder.ts, causing
        unnecessary churn and increasing the chance of parity drift between Woo and
        WordPress source-backed sections.
      likelihood: medium
      impact: high
      mitigation: >-
        Collapse source-backed resolver work into one pageBuilder-centric task with one
        focused astro-site/src/lib/pageBuilder.test.ts checkpoint covering Promo2, one
        headingless menu variant, one heading-bearing menu variant, and oferta CTA/source-order
        fallback behavior. Sources: astro-site/src/lib/pageBuilder.ts,
        astro-site/src/lib/pageBuilder.test.ts,
        astro-site/src/lib/woo.ts,
        astro-site/src/lib/wordpress.ts.
  assumptions:
    - >-
      The target blocks already have React runtime, registry docs, AI descriptors, and
      shared-registry coverage, and the remaining gap is Astro readiness only. Sources:
      docs/block-registry/registry.machine.json, docs/block-registry/index.md,
      zip/src/pages/TemplatePage.tsx.
    - >-
      The current Astro-ready gate is controlled by astro-site/src/lib/types.ts,
      astro-site/src/lib/pageBuilder.ts, astro-site/src/lib/astroRegistry.ts, and
      astro-site/src/components/PageBuilderSection.astro, so extending those seams is the
      smallest credible implementation path. Sources: astro-site/src/lib/types.ts,
      astro-site/src/lib/pageBuilder.ts, astro-site/src/lib/astroRegistry.ts,
      astro-site/src/components/PageBuilderSection.astro.
    - >-
      Immediate implementation matters more than refactoring the dispatcher architecture,
      so the existing manual branch table in PageBuilderSection.astro is accepted as tactical
      debt for this rollout and must be contained with executable validation rather than
      redesigned now. Sources: astro-site/src/components/PageBuilderSection.astro,
      user request.
    - >-
      The active PRD does not define this ad hoc `/template` Astro-readiness objective,
      so scope is locked by the explicit user request and the current repo state rather than
      by docs/PRD.yaml features. Sources: docs/PRD.yaml, user request,
      zip/src/pages/TemplatePage.tsx.

implementation_specification:
  code_structure: |
    Keep the rollout Astro-local and seam-driven. The shared registry and React page-builder
    contracts already exist under zip/src/blocks/** and zip/src/pages/TemplatePage.tsx; this
    plan should not reopen those files except as references. New code should land in five
    bounded slices only: Astro-side block schemas in astro-site/src/lib/types.ts, a single
    pageBuilder-centric source-resolution pass in astro-site/src/lib/pageBuilder.ts plus the
    minimal helper additions required in astro-site/src/lib/woo.ts and astro-site/src/lib/wordpress.ts,
    presentational Astro components under astro-site/src/components/, projection/dispatch support in
    astro-site/src/lib/astroRegistry.ts and astro-site/src/components/PageBuilderSection.astro,
    and a hidden Astro validation route or equivalent build fixture under astro-site/src/pages/**
    that renders all 12 target blocks through the real dispatcher path. The shared readiness
    manifest in docs/block-registry/registry.machine.json and the note in docs/block-registry/index.md
    must remain untouched until the final gate. Do not broaden scope into a dispatcher refactor;
    if candidate-only validation support is needed before the final flip, keep it internal to the
    Astro site and treat it as tactical debt.
  affected_areas:
    - astro-site/src/lib/types.ts
    - astro-site/src/lib/pageBuilder.ts
    - astro-site/src/lib/woo.ts
    - astro-site/src/lib/wordpress.ts
    - astro-site/src/lib/astroRegistry.ts
    - astro-site/src/components/PageBuilderSection.astro
    - astro-site/src/components/*.astro
    - astro-site/src/pages/**
    - astro-site/src/lib/*.test.ts
    - docs/block-registry/registry.machine.json
    - docs/block-registry/index.md
  component_details:
    - component: Astro payload contract
      responsibility: >-
        Parse all 12 target block keys with block-specific Astro-side schemas while keeping
        direct-edit and source-backed variants distinct.
      interfaces:
        - pageBuilderSchema accepts the 12 target block keys in astro-site/src/lib/types.ts
        - Dedicated exported Astro block types remain available to resolver and renderer code
    - component: Consolidated Astro source-resolution seam
      responsibility: >-
        Resolve Promo2, the standalone menu family, and oferta_posts_section in one
        pageBuilder-centric pass before any Astro component renders, only extending helper
        seams where pageBuilder cannot absorb the behavior cleanly.
      interfaces:
        - resolveAstroPageSections(sections)
        - resolveMenuBlock(block)
        - WordPress helper for oferta_posts_section source hydration
    - component: Direct-edit Astro renderer packs
      responsibility: >-
        Render the seven direct-edit `/template` blocks using TemplatePage-aligned geometry
        and normalized absolute asset URLs without introducing fetch logic.
      interfaces:
        - hero/media renderer files for both hero variants plus just_pralax_img_horizontal
        - editorial renderer files for about_2_simple, simple_heading_and_paragraph, and the editorial image block
        - one renderer file for premium_call_to_action_with_image_carousel
    - component: Source-backed Astro renderer pack
      responsibility: >-
        Render Promo2, the standalone menu family, and oferta_posts_section from already-resolved
        data contracts shared with the consolidated resolver seam.
      interfaces:
        - Promo2Section.astro
        - Standalone menu Astro section component for the two-column and three-column variants
        - OfertaPostsSection.astro
    - component: Candidate projection and dispatcher support
      responsibility: >-
        Extend astro-site/src/lib/astroRegistry.ts and the manual dispatcher in
        astro-site/src/components/PageBuilderSection.astro for all 12 target blocks without
        flipping manifest readiness yet. Any candidate-only support added to exercise the real
        render path before the final flip must stay internal to Astro and is tactical debt.
      interfaces:
        - resolveAstroRenderer(blockKey)
        - listAstroRendererBlockKeys()
        - Internal candidate-only helper or allowlist, if needed for validation
    - component: Hidden render-path validation harness
      responsibility: >-
        Force all 12 target block keys through the real Astro dispatch path during build so
        `npm.cmd run build` becomes a meaningful readiness check instead of a generic compile.
      interfaces:
        - Hidden Astro route or equivalent fixture page under astro-site/src/pages/**
        - Fixture payload covering all 12 target block keys through PageBuilderSection.astro
        - Deterministic markers or assertions proving the generated output includes every target block
    - component: Final readiness and docs gate
      responsibility: >-
        Update docs/block-registry/index.md, promote the 12 target blocks to `ready` in
        docs/block-registry/registry.machine.json, and align astro-site/src/lib/astroRegistry.test.ts
        only after the hidden render-path gate and focused Astro tests succeed.
      interfaces:
        - readiness.blocks[*].capabilities.astroRenderer
        - Registry overview note in docs/block-registry/index.md
        - Astro projection parity test suite
  dependencies:
    - component: Astro payload contract
      relationship: Supplies parseable types to the consolidated source-resolution task and all renderer tasks.
    - component: Consolidated Astro source-resolution seam
      relationship: Must stabilize before the source-backed renderer pack and before any readiness validation claims.
    - component: Direct-edit Astro renderer packs
      relationship: Feed candidate projection wiring with stable component paths for the static blocks.
    - component: Source-backed Astro renderer pack
      relationship: Consumes resolved data shapes defined by the consolidated source-resolution seam.
    - component: Candidate projection and dispatcher support
      relationship: Enables the real render-path validation harness while keeping the shared manifest unchanged.
    - component: Hidden render-path validation harness
      relationship: Must pass before docs/block-registry/registry.machine.json or docs/block-registry/index.md may claim ready status.
    - component: Final readiness and docs gate
      relationship: Depends on renderer completion, candidate wiring, and passing validation evidence.
  integration_points:
    - zip/src/pages/TemplatePage.tsx
    - zip/src/blocks/registry/resolvePageBuilderSources.ts
    - docs/block-registry/registry.machine.json
    - docs/block-registry/index.md
    - astro-site/src/lib/types.ts
    - astro-site/src/lib/pageBuilder.ts
    - astro-site/src/lib/astroRegistry.ts
    - astro-site/src/components/PageBuilderSection.astro
    - astro-site/src/pages/**

