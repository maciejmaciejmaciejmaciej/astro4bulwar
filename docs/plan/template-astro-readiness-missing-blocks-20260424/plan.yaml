plan_id: template-astro-readiness-missing-blocks-20260424
objective: >-
  Retry the Astro-readiness rollout for the missing non-preview `/template`
  page-builder blocks only: hero_simple_no_text_py32,
  hero_simple_no_text_normal_wide, about_2_simple, promo2,
  simple_heading_and_paragraph,
  big_img_and_bolded_tex_editorial_style_block,
  menu_two_columns_with_no_heading_no_img,
  menu_two_columns_with_with_heading_no_img, just_pralax_img_horizontal,
  menu_three_columns_with_with_heading_no_img,
  premium_call_to_action_with_image_carousel, and oferta_posts_section.
  Exclude preview-only components, keep React component-to-block conversion out of
  scope, and optimize for minimal cross-file churn with fast validation gates.
created_at: '2026-04-24T00:00:00Z'
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 11
  risk_score: high

tldr: |
  The retry plan keeps the scope fixed to the 12 missing non-preview `/template`
  block keys, but changes the gate order in four ways.
  1. Astro parsing still lands first in astro-site/src/lib/types.ts and is blocked by
     astro-site/src/lib/types.test.ts.
  2. Source-backed work is collapsed into one pageBuilder-centric resolver pass for
     Promo2, the standalone menu family, and oferta_posts_section so the plan does not
     churn astro-site/src/lib/pageBuilder.ts twice. Sources: astro-site/src/lib/pageBuilder.ts,
     astro-site/src/lib/woo.ts, astro-site/src/lib/wordpress.ts.
  3. Renderer packs still land before integration, but the plan now adds a real
     Astro render-path validation gate: a hidden validation route or equivalent fixture
     page that forces all 12 target blocks through astro-site/src/components/PageBuilderSection.astro
     during `npm.cmd run build`, instead of trusting a generic build that may never touch
     `/template`-only branches. Sources: astro-site/src/components/PageBuilderSection.astro,
     astro-site/package.json.
  4. Readiness is no longer promoted in the projection-wiring task. The shared manifest
     stays `refining` until the render-path gate passes; only the final docs + manifest
     parity task may flip the 12 target blocks to `ready`. The plan explicitly carries
     forward the current manual dispatcher pattern in PageBuilderSection.astro as tactical
     debt for this immediate rollout and contains that debt with dedicated projection-parity
     and render-path validation rather than reopening a dispatcher refactor. Sources:
     astro-site/src/components/PageBuilderSection.astro,
     astro-site/src/lib/astroRegistry.ts,
     docs/block-registry/registry.machine.json.

