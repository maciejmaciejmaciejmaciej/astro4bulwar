	- id: define_bridge_ready_checkout_payload
		title: Add a bridge-ready order payload builder and Woo meta recommendation
		description: |
			Add a typed serializer at the checkout boundary that maps the unified cart lines into a bridge-ready payload. The frontend should not attempt to speak directly to Woo credentials or final Store API internals, but it should emit a stable contract the bridge can validate and translate.

			Recommended payload shape:
			- BridgeCheckoutPayload
				- customer: checkout form identity fields
				- fulfillment: pickup or delivery fields
				- lines:
					- clientLineId
					- productId: shell simple-product id for the special menu
					- quantity: 1
					- lineType: special_menu_for_2
					- requestedUnitPrice: display-only client copy of the shell price
					- configuration: SpecialMenuFor2Config
					- metaDataPreview:
						- bulwar_special_type = menu_for_2
						- bulwar_special_config_version = 1
						- bulwar_person_1 = human-readable summary
						- bulwar_person_2 = human-readable summary
						- bulwar_special_config_json = canonical JSON string

			Bridge recommendation:
			- Ignore requestedUnitPrice as canonical truth
			- Revalidate shell product id and option ids
			- Persist meta_data on the Woo order line item, either through REST order creation or cart_item_data copied during checkout
		wave: 4
		agent: gem-implementer
		priority: medium
		status: pending
		dependencies:
			- wire_special_menu_into_route_and_summary
		context_files:
			- zip/components/CheckoutDrawer.tsx: Current submit boundary and checkout form values.
			- zip/src/lib/cateringCart.ts: Source of unified cart-line data and summary helpers.
			- zip/src/lib/cateringBridgePayload.ts: New serializer module for the bridge-ready order contract.
		estimated_effort: medium
		estimated_files: 2
		estimated_lines: 180
		focus_area: bridge payload contract
		verification:
			- Confirm the payload distinguishes simple lines from special lines.
			- Confirm each special line sends ids plus nested configuration rather than labels alone.
			- Confirm the recommended Woo meta keys are stable and merchant-readable.
		acceptance_criteria:
			- CheckoutDrawer can build a stable BridgeCheckoutPayload without losing line identity.
			- Special lines serialize as one shell product plus nested configuration.
			- The contract is explicitly bridge-authoritative for price and validation.
		failure_modes:
			- scenario: The serializer flattens only labels and makes server-side validation impossible.
				likelihood: medium
				impact: critical
				mitigation: Require source product ids and schema version inside the serialized configuration.
			- scenario: Meta keys are too opaque for Woo admin or too verbose for line-item display.
				likelihood: medium
				impact: medium
				mitigation: Emit both human-readable person summaries and one canonical JSON blob under a dedicated machine key.
		tech_stack:
			- TypeScript
			- React Hook Form
			- WooCommerce bridge contract
		test_coverage: null

