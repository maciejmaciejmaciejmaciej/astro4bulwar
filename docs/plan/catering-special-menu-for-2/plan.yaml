tasks:
	- id: define_special_menu_seed_contract
		title: Add the special-menu seed module and versioned configuration contract
		description: |
			Create a dedicated data module that derives the option pools for the menu-for-2 product from the existing Easter catering data. Soups must come from the Zupy category and mains from the Swiateczny obiad category. This module should also define the versioned SpecialMenuFor2Config contract and keep the shell-product identity in one place so the UI, cart, and bridge serializer all consume the same source of truth.

			Proposed data model:
			- SpecialMenuOption: optionId, sourceProductId, label, weight, dietaryTag, categoryKey
			- SpecialMenuPersonSelection: personIndex, soupOptionId, soupSourceProductId, mainOptionId, mainSourceProductId
			- SpecialMenuFor2Config: kind = menu_for_2, schemaVersion = 1, persons = [person1, person2]

			Keep the module small and derived from the existing normalized data rather than duplicating the Easter catalog in a second raw JSON file.
		wave: 1
		agent: gem-implementer
		priority: high
		status: pending
		dependencies: []
		context_files:
			- zip/src/data/cateringWielkanocny.ts: Current normalized category and product contracts that already expose price, weight, and dietary flags.
			- zip/src/data/cateringWielkanocny.json: Raw Easter catalog containing the Zupy and Swiateczny obiad categories that seed the configurable menu.
			- zip/src/data/cateringSpecialMenuFor2.ts: New derived module for shell metadata, option selectors, and versioned config types.
		estimated_effort: medium
		estimated_files: 2
		estimated_lines: 180
		focus_area: data contract
		verification:
			- Confirm soups are sourced only from Zupy and mains only from Swiateczny obiad.
			- Confirm the config schema enforces exactly two persons with one soup and one main each.
			- Confirm every option preserves the original sourceProductId for bridge validation.
		acceptance_criteria:
			- zip/src/data/cateringSpecialMenuFor2.ts exists and exports the special-menu seed contract.
			- The shell-product identity and fixed unit price live in one central contract.
			- The config object is versioned and ready to pass through cart and checkout serialization.
		failure_modes:
			- scenario: Category names change in the source data and the selectors silently return empty option pools.
				likelihood: medium
				impact: high
				mitigation: Fail loudly if Zupy or Swiateczny obiad cannot be found, and isolate the lookup in one module.
			- scenario: The config type stores labels only and drops original product ids needed by the bridge.
				likelihood: medium
				impact: critical
				mitigation: Keep sourceProductId on every selected option and require it in the final config.
		tech_stack:
			- React 19
			- TypeScript
			- zod
		test_coverage: null

	- id: introduce_line_based_catering_cart
		title: Replace quantity-only cart storage with line-based cart state
		description: |
			Replace the route's Record<number, number> cart with a line-based model that can represent both simple products and configured specials. Simple products may still collapse to one predictable line per product for the MVP, but each configured special set must always get a unique lineId so multiple distinct configurations of the same shell product coexist safely.

			Proposed cart shape:
			- SimpleCartLine: lineId, lineType = simple, baseProductId, displayName, unitPrice, quantity
			- SpecialMenuFor2CartLine: lineId, lineType = special_menu_for_2, baseProductId, displayName, unitPrice, quantity = 1, config, metaSummary
			- CateringCartState: lines: CateringCartLine[]

			Add compatibility handling for the existing localStorage value so previously stored simple-product quantities can be migrated into the new line model instead of being discarded abruptly.
		wave: 2
		agent: gem-implementer
		priority: high
		status: pending
		dependencies:
			- define_special_menu_seed_contract
		context_files:
			- zip/src/lib/cateringCart.ts: New helper that will own line types, storage parsing, migration, and totals helpers.
			- zip/src/pages/CateringWielkanocnyPage.tsx: Current quantity-only route state that must migrate to line-based cart state.
			- zip/components/CheckoutDrawer.tsx: Current drawer item contract and quantity actions still keyed by productId instead of lineId.
		estimated_effort: medium
		estimated_files: 3
		estimated_lines: 260
		focus_area: cart architecture
		verification:
			- Confirm two configured specials with the same shell product can coexist without overwriting one another.
			- Confirm simple products still add and remove correctly after migration.
			- Confirm localStorage parsing accepts the old quantity map and upgrades it into line-based state.
		acceptance_criteria:
			- The route no longer stores cart truth as Record<number, number>.
			- Cart mutations for special lines use lineId instead of productId.
			- The special menu is remove-only in the cart for the MVP, with quantity fixed at 1 per configured line.
		failure_modes:
			- scenario: Old storage data becomes unreadable and clears the cart unexpectedly.
				likelihood: medium
				impact: medium
				mitigation: Support a lazy one-way migration from the old shape to the new line array before writing back.
			- scenario: Drawer controls still call handlers with productId and remove the wrong line.
				likelihood: medium
				impact: high
				mitigation: Change the drawer contract to act on lineId for all line mutations.
		tech_stack:
			- React 19
			- TypeScript
			- localStorage
		test_coverage: null

