plan_id: catering-special-menu-for-2
objective: Add a configurable special catering product flow on /catering-wielkanocny using one Woo simple product as the purchasable shell, a stepwise menu-for-2 configurator UI, line-based cart storage that can hold multiple distinct configurations of the same base product, and a bridge-ready checkout payload that persists the configuration as order item meta.
created_at: "2026-03-24T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
	Introduce a dedicated special-product panel named CateringProduct-Special_zestaw_for2.tsx that visually follows the existing CateringProductListAlt and ProductItemAlt language while adding a four-step configuration flow for two people: person 1 soup, person 1 main, person 2 soup, person 2 main, then add-to-cart.
	Replace the current quantity-only Record<number, number> cart model with a line-based cart model keyed by lineId so the same Woo shell product can appear multiple times with different nested configurations. Keep the special menu remove-and-recreate only in the MVP to avoid premature edit-in-cart complexity.
	Serialize each configured set as one shell-product line with a versioned configuration object and bridge-ready meta payload. The bridge remains authoritative for allowed option IDs, canonical pricing, and final Woo order item meta persistence.
open_questions: []

pre_mortem:
	overall_risk_level: medium
	critical_failure_modes:
		- scenario: The cart still keys special sets by productId, causing later configurations to overwrite or merge into earlier ones.
			likelihood: high
			impact: critical
			mitigation: Move the route to a line-based cart model keyed by lineId, with unique line ids for every configured special set and productId used only as base commerce identity.
		- scenario: The new configurator drifts away from the established panel and row design, creating a visually inconsistent block on the catering route.
			likelihood: medium
			impact: high
			mitigation: Keep the component inside the same bordered panel treatment, typography scale, spacing rhythm, and button language already used by CateringProductListAlt and ProductItemAlt; avoid introducing new visual patterns.
		- scenario: The frontend payload becomes the source of truth for price or option labels, enabling tampering or producing Woo order meta that does not match valid catalog choices.
			likelihood: medium
			impact: critical
			mitigation: Send option ids and base product id to the bridge, treat client labels and totals as display-only, and require bridge-side validation plus canonical price resolution before order creation.
	assumptions:
		- The special menu uses a fixed bundle price from one simple Woo shell product for the MVP, with no per-option surcharge logic.
		- The option seeds come from the existing Zupy category for soups and Swiateczny obiad for mains.
		- Duplicate choices are allowed in the MVP unless the business later tightens the rule; the schema and payload remain compatible with a future uniqueness rule.
		- Special-menu lines are remove-only in the cart for the MVP; editing an existing configuration is out of scope.
		- The special panel will be rendered on /catering-wielkanocny after the feature grid and before the existing repeated category sections.

implementation_specification:
	code_structure: Keep the route as the owner of cart state, add one dedicated special-product section component, add one derived data module for the menu-for-2 seed and schema, and add one small cart helper module to centralize line-based storage and serialization. Do not refactor unrelated product-list components unless a direct integration seam is required.
	affected_areas:
		- zip/src/components/sections/CateringProduct-Special_zestaw_for2.tsx (new)
		- zip/src/data/cateringSpecialMenuFor2.ts (new)
		- zip/src/lib/cateringCart.ts (new)
		- zip/src/pages/CateringWielkanocnyPage.tsx
		- zip/components/CheckoutDrawer.tsx
		- zip/src/data/cateringWielkanocny.ts
	component_details:
		- component: cateringSpecialMenuFor2 data module
			responsibility: Derive soups and mains from the normalized Easter catering data, expose the shell-product contract, and define the versioned configuration schema used by the UI, cart, and bridge serializer.
			interfaces:
				- 'Exports SpecialMenuOption { optionId, sourceProductId, categoryKey, label, weight, dietaryTag }.'
				- 'Exports SpecialMenuFor2Seed { shellProductId, shellSlug, title, fixedUnitPrice, soups, mains }.'
				- 'Exports SpecialMenuFor2Config { kind: "menu_for_2", schemaVersion: 1, persons: [SpecialMenuPersonSelection, SpecialMenuPersonSelection] }.'
		- component: CateringProduct-Special_zestaw_for2
			responsibility: Render the stepwise configurator UI inside the existing catering panel style and emit exactly one fully configured set at a time.
			interfaces:
				- 'Accepts seed data, configuredCount, and onCommitConfiguredSet(config).' 
				- 'Handles the button-label switch between "Skonfiguruj zestaw" and "Skonfiguruj kolejny zestaw" based on configuredCount > 0.'
				- 'Auto-advances and scrolls from soup to main within each person section.'
		- component: cateringCart helper
			responsibility: Own the line-based cart types, localStorage parsing and migration, line-id helpers, totals helpers, and display-summary generation for checkout rows.
			interfaces:
				- 'Exports CateringCartLine = SimpleCartLine | SpecialMenuFor2CartLine keyed by lineId.'
				- 'Exports SpecialMenuFor2CartLine { lineId, lineType, baseProductId, displayName, unitPrice, quantity, config, metaSummary }.'
				- 'Exports helpers to loadCartState(), saveCartState(), addSimpleProductLine(), addSpecialConfiguredLine(), removeCartLine(), and buildCheckoutDrawerItems().'
		- component: CheckoutDrawer bridge serializer
			responsibility: Convert cart lines plus checkout form values into a bridge-ready order payload without making the frontend authoritative for price or validation.
			interfaces:
				- 'Builds BridgeCheckoutPayload { customer, fulfillment, lines }.'
				- 'Maps special lines to productId = shellProductId, quantity = 1, configuration, and recommended meta_data preview rows.'
				- 'Keeps special lines separately identifiable by clientLineId so the bridge can trace validation failures precisely.'
	dependencies:
		- component: CateringProduct-Special_zestaw_for2
			relationship: consumes the seed and schema exported by zip/src/data/cateringSpecialMenuFor2.ts
		- component: CateringWielkanocnyPage
			relationship: composes the new special panel and owns the shared line-based cart state used by the drawer and sticky controls
		- component: CheckoutDrawer
			relationship: consumes the new cart-line summaries and emits the bridge-ready payload at submit time
		- component: cateringCart helper
			relationship: is the single source of truth for line identity, storage, totals, and checkout-row shaping
	integration_points:
		- React route composition in zip/src/pages/CateringWielkanocnyPage.tsx for /catering-wielkanocny
		- Existing visual shell conventions established by CateringProductListAlt and ProductItemAlt
		- localStorage persistence under the current catering cart storage key with compatibility handling for the old quantity map
		- Checkout submission boundary in zip/components/CheckoutDrawer.tsx
		- Future bridge endpoint that translates frontend lines into Woo order line_items.meta_data or Store API cart_item_data

