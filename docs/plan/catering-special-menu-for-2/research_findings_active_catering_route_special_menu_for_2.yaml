plan_id: catering-special-menu-for-2
objective: Identify active data sources and UI rendering paths for the special menu for 2 product on the active catering route, including exactly where main description text and option labels/descriptions are defined.
focus_area: active_catering_route_special_menu_for_2
created_at: 2026-03-25T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
  - The active React route is /catering-wielkanocny and renders the special product through CateringWielkanocnyPage -> CateringProductSpecialMenuFor2.
  - The source-of-truth dataset is zip/src/data/cateringSpecialMenuFor2.ts, where shell product text, soup labels, main labels, and weight strings are defined.
  - The user-facing hero/intro paragraph is not read from seed.intro; it is hardcoded in CateringProductSpecialMenuFor2.tsx.
  - Cart and checkout reuse seed.shellProduct.displayName and generated summary lines from selected option labels; they do not define separate option-description datasets.
  - Current source and dist contain per-1-person weights, while older packaged hotfix artifacts still contain stale per-2-person weights.

