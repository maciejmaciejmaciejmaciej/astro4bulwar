  methodology: hybrid retrieval using semantic_search plus targeted grep_search, followed by focused read_file on route, data, component, cart, checkout, and deploy artifacts
  scope: active React catering route, special-menu data seed, component rendering, cart/checkout propagation, and packaged build artifacts relevant to this product
  confidence: high
  coverage: 92

