related_conventions:
	naming_patterns_in_domain: Seed objects use the prefix cateringSpecialMenuFor2..., React sections use CateringProduct... names, and special-product constants use SPECIAL_MENU_FOR_2... uppercase constants.
	structure_of_domain: Route/page/component/data/cart concerns are split into separate files; authoring data lives in src/data and rendering logic lives in src/components/sections.
	error_handling_in_domain: Defensive null/shape guards are used in config building and cart deserialization; invalid or partial selections return null or are ignored.
	testing_in_domain: Tests exist for the seed, component rendering, page route behavior, and cart utilities, but these are verification files rather than active data sources.
	documentation_in_domain: No dedicated inline documentation for this special product beyond type definitions and test coverage.

related_dependencies:
	internal:
		- component: zip/src/pages/CateringWielkanocnyPage.tsx
			relationship_to_domain: injects the special-menu seed into the active page
			direction: inbound
		- component: zip/src/components/sections/CateringProductSpecialMenuFor2.tsx
			relationship_to_domain: renders shell and option text from the seed
			direction: inbound
		- component: zip/src/lib/cateringCart.ts
			relationship_to_domain: persists displayName and label summaries derived from the seed
			direction: outbound
	external:
		- name: react
			purpose_for_domain: UI rendering and state management
