plan_id: catering-special-menu-for-2
objective: Find all active frontend data sources for the special product described as 'zestaw obiad swiateczny dla 2 osob' and identify where the visible description text and option texts live on the active catering route.
focus_area: zip-frontend-data-sources
created_at: 2026-03-25T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
	- The active route is /react/catering-wielkanocny, wired through zip/src/main.tsx -> zip/src/App.tsx -> zip/src/pages/CateringWielkanocnyPage.tsx.
	- The menu-for-2 product is rendered by zip/src/components/sections/CateringProductSpecialMenuFor2.tsx, but its option labels and portion strings come from zip/src/data/cateringSpecialMenuFor2.ts.
	- The main visible intro paragraph for this product is not data-driven; it is hardcoded in the component. The seed field intro exists but is currently unused.
	- Option labels propagate into the cart summary through buildSpecialMenuFor2Config/buildSpecialMenuFor2SummaryLines, while option weights are display-only in the configurator cards.
	- Matching text also appears in dist and deploy snapshot bundles, but those are generated copies of the src authoring source, not separate active authoring sources.

research_metadata:
	methodology: Hybrid retrieval using semantic_search and grep_search, followed by direct file reads of the route entry, page, special menu component, data seed, and cart consumer. Relationship discovery traced imports and downstream label usage.
	scope: Focused on zip/src and nearby generated zip outputs only where duplication needed verification.
	confidence: high
	coverage: 92

