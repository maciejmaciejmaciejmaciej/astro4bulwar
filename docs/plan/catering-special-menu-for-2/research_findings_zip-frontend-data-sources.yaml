domain_security_considerations:
	sensitive_areas:
		- area: local cart persistence
			location: zip/src/lib/cateringCart.ts
			concern: User-selected labels are serialized into localStorage, but no sensitive credentials are involved in this domain slice.
	authentication_patterns_in_domain: None present in the researched frontend slice.
	authorization_patterns_in_domain: None present in the researched frontend slice.
	data_validation_in_domain: Selection and cart payloads are guarded by runtime validators such as isSpecialMenuFor2Config and record checks before reuse.

testing_patterns:
	framework: node:test with assert and renderToStaticMarkup-based component/page tests
	coverage_areas:
		- special-menu seed invariants
		- special-menu component image rendering
		- catering page route rendering
		- cart summary and line behavior
	test_organization: Tests sit alongside source files under zip/src/data, zip/src/components/sections, zip/src/pages, and zip/src/lib.
	mock_patterns:
		- MemoryRouter for route rendering tests
		- Direct seed reuse in unit tests for summary/cart assertions

open_questions:
	- question: Should the requested per-person wording update affect only option.weight strings, or also the hardcoded intro copy and product naming copy?
		context: The active UI mixes portion strings from data with explanatory copy hardcoded in JSX.
	- question: Are generated bundles under zip/dist and zip/deploy-* considered deploy targets or only snapshots for verification?
		context: They contain duplicated copies of the same text, but are not authoring sources.

gaps:
	- area: Deployment source of truth outside src
		description: The research verified generated duplicates in dist and deploy snapshot bundles, but did not inspect deployment automation to determine which generated folder is currently published.
		impact: Low impact on authoring-source identification; medium impact if a user intends to hot-edit built output instead of src.
	- area: Backend product metadata outside zip
		description: The shell product references baseProductId 53, but backend product definitions were intentionally out of scope for this frontend-only pass.
		impact: Low impact on visible frontend wording, but it leaves backend-admin copy parity unverified.
