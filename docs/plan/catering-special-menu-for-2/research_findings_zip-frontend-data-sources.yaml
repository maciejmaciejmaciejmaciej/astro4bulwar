patterns_found:
	- category: architecture
		pattern: Single-seed injection for special product data
		description: The active catering page imports one seed object and passes it into a generic special-product component.
		examples:
			- file: zip/src/pages/CateringWielkanocnyPage.tsx
				location: zip/src/pages/CateringWielkanocnyPage.tsx:223
				snippet: <CateringProductSpecialMenuFor2 seed={cateringSpecialMenuFor2Seed}
		prevalence: common

	- category: structure
		pattern: Data-driven option cards
		description: Option card text is rendered generically from option.label and option.weight, so wording changes in the seed propagate across all rendered cards.
		examples:
			- file: zip/src/components/sections/CateringProductSpecialMenuFor2.tsx
				location: zip/src/components/sections/CateringProductSpecialMenuFor2.tsx:67
				snippet: {option.label} / {option.weight}
		prevalence: common

	- category: structure
		pattern: Mixed data-driven and hardcoded copy
		description: Product title and display name come from the seed, but the main introductory paragraph and cart-line explanation are hardcoded in JSX.
		examples:
