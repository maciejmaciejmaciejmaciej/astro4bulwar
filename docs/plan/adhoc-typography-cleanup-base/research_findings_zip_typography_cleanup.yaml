plan_id: adhoc-typography-cleanup-base
objective: Assess whether the current regex-based typography cleanup scripts are a viable base for a real raw shadcn block normalization script in the zip frontend.
focus_area: zip_typography_cleanup
created_at: 2026-04-22
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - The inspected scripts in zip/refactor_fonts.cjs, zip/refactor_scaleup.cjs, and zip/refactor_scaledown.cjs perform global string replacement across zip/src and do not distinguish fresh raw imports from native project components.
  - Repo instructions for raw imports require semantic cleanup by element role and removal of specific leading, tracking, and font-weight utilities, while preserving block geometry.
  - zip/src/index.css and native sections such as AboutSection and TemplatePage2 show repo-specific typography classes that are intentional and not reducible to a single global text-size replacement pass.
  - About1.tsx is a fresh-import style component with banned typography utilities that matches the instruction-defined cleanup surface more closely than long-lived native sections.
  - The current scripts are useful as a source of replacement tables and filesystem traversal, but not as the control plane for the real normalization workflow.

research_metadata:
  methodology: Hybrid retrieval using targeted file reads and grep searches across scripts, CSS, section components, design instructions, and repo memory.
  scope: Focused on zip typography normalization scripts, theme CSS vocabulary, one fresh-import style component, and the design-system instruction layer governing raw import cleanup.
  confidence: high
  coverage: 88
  decision_blockers: 0
  research_blockers: 0

