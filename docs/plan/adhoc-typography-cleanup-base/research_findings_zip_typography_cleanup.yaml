  structure_of_domain: Imported blocks live under zip/src/components/sections and are previewed on TemplatePage2 after adaptation.
  error_handling_in_domain: The current scripts have minimal error handling beyond filesystem traversal failure and no dry-run or change classification layer.
  testing_in_domain: Tests exist for some typography-sensitive sections, indicating markup-level assertions can lock class behavior.
  documentation_in_domain: Typography cleanup rules are documented in design-system.instructions.md, global-css-adaptation-contract.md, design-token-and-layout-whitelist.md, and repository memory notes.

