    type: decision_blocker
    affects:
      - typography-normalizer-scope
  - question: Should repo-owned custom utilities such as .lead-copy and .theme-block-heading be treated as approved outputs even when they include classes banned for raw imported markup?
    context: index.css contains intentional house utilities using tracking-tight, font-medium, and leading-snug.
    type: research
