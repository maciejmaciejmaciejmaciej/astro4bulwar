patterns_found:
  - category: architecture
    pattern: Global search-and-replace scripts operate over every TypeScript source file under zip/src.
    description: The current scripts use recursive filesystem traversal and string replacement without scoping to imported blocks, semantic tags, or className boundaries.
    examples:
      - file: zip/refactor_fonts.cjs
        location: zip/refactor_fonts.cjs:1
        snippet: walk(path.join(__dirname, 'src')) ... content.replace(/text-\[(\d+|\d+\.\d+)px\]/g, ...)
      - file: zip/refactor_scaleup.cjs
        location: zip/refactor_scaleup.cjs:1
        snippet: content = content.replace(/\btext-xs\b/g, 'text-sm')
    prevalence: common
  - category: structure
    pattern: Raw import cleanup rules are explicitly scoped to fresh imported shadcn or external snippets.
    description: The design instruction layer distinguishes raw imports from approved native components and requires cleanup before preview or reuse.
    examples:
      - file: .github/instructions/design-system.instructions.md
        location: .github/instructions/design-system.instructions.md:59
        snippet: Freshly imported shadcn, v0, or external snippet components must go through mandatory typography cleanup.
      - file: docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md
        location: docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md:71
        snippet: For freshly imported shadcn, v0, or external UI snippets, typography cleanup is mandatory and overrides source typography preservation.
    prevalence: common
  - category: naming
    pattern: Native Bulwar sections use semantic font roles and house tracking patterns not intended for blanket removal.
    description: Established components use font-headline, font-body, uppercase, tracking-[...], and leading-tight as part of the project visual language.
    examples:
      - file: zip/src/components/sections/AboutSection.tsx
        location: zip/src/components/sections/AboutSection.tsx:105
        snippet: className="font-headline text-4xl tracking-[0.3rem] uppercase leading-tight"
      - file: zip/src/pages/TemplatePage2.tsx
        location: zip/src/pages/TemplatePage2.tsx:20
        snippet: className="mt-4 font-headline text-4xl uppercase tracking-tight md:text-6xl"
    prevalence: common
  - category: architecture
    pattern: index.css exposes repo-owned semantic utilities alongside ad hoc utilities.
    description: The CSS layer contains both semantically named utilities and utilities with explicit typography modifiers, so cleanup logic must distinguish raw imported classes from house utilities.
    examples:
      - file: zip/src/index.css
        location: zip/src/index.css:61
        snippet: .theme-block-heading { @apply font-headline text-3xl uppercase tracking-tight text-foreground lg:text-6xl; }
      - file: zip/src/index.css
        location: zip/src/index.css:84
        snippet: .lead-copy { @apply font-body text-xl font-medium leading-snug lg:text-2xl; }
    prevalence: occasional
  - category: structure
    pattern: About1.tsx is a mixed-state adaptation surface.
    description: It already uses repo shell classes like page-margin, but its text classes remain close to raw shadcn defaults and include banned modifiers for fresh-import cleanup.
    examples:
      - file: zip/src/components/sections/About1.tsx
        location: zip/src/components/sections/About1.tsx:11
        snippet: className={cn("bg-white py-32 page-margin", className)}
      - file: zip/src/components/sections/About1.tsx
        location: zip/src/components/sections/About1.tsx:44
        snippet: className="mb-4 text-4xl font-semibold tracking-tight md:text-5xl"
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: raw import section components
      responsibility: Hold imported block JSX that needs normalization before reuse.
      location: zip/src/components/sections
      relationship_to_domain: domain is applied to these files when they are fresh imports
    - component: global theme CSS
      responsibility: Defines project tokens, utilities, and semantic typography roles.
      location: zip/src/index.css
      relationship_to_domain: domain depends on this as the source of allowed styling vocabulary
    - component: TemplatePage2 preview surface
      responsibility: Renders newly adapted blocks for visual checking.
      location: zip/src/pages/TemplatePage2.tsx
      relationship_to_domain: this uses domain outputs after normalization
  interfaces_used_by_domain:
    - interface: className string literals in JSX
      location: zip/src/components/sections/*.tsx
      usage_pattern: Typography utilities are encoded inside JSX className attributes and must be interpreted at element level.
    - interface: global utility classes
      location: zip/src/index.css
      usage_pattern: Semantic classes such as page-margin and font-headline define the target vocabulary.
  data_flow_involving_domain: Imported block JSX enters zip/src/components/sections, is visually adapted to the vocabulary defined by index.css and design docs, then is previewed on TemplatePage2 before reuse or registration.
  key_relationships_to_domain:
    - from: zip/refactor_fonts.cjs
      to: zip/src/**/*.{ts,tsx}
      relationship: rewrites
    - from: .github/instructions/design-system.instructions.md
      to: zip/src/components/sections/About1.tsx
      relationship: governs cleanup expectations for this type of file
    - from: zip/src/pages/TemplatePage2.tsx
      to: zip/src/components/sections/About1.tsx
      relationship: imports

