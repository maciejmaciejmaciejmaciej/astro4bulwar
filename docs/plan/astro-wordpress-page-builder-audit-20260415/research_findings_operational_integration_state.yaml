patterns_found:
  - category: architecture
    pattern: Dual WordPress meta-field model is implemented for page-builder pages.
    description: The current proof stores a render schema and a separate AI-editing schema side by side in page meta, with one controller handling read/write transport for both.
    examples:
      - file: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:12
        snippet: The current system now has page_builder_schema and page_builder_schema_for_ai plus a POST endpoint that writes both in one request.
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:12
        snippet: registerMeta registers both page_builder_schema and page_builder_schema_for_ai.
    prevalence: common
  - category: structure
    pattern: page_builder_schema_for_ai is generated from render schema, not from Firebase draft state.
    description: The existing repo-side generator consumes page_builder_schema JSON and emits AI guidance fields for supported blocks.
    examples:
      - file: SCRIPTS/generate-page-builder-ai-schema.js
        location: SCRIPTS/generate-page-builder-ai-schema.js:9
        snippet: This generator creates the AI-oriented page_builder_schema_for_ai payload from the render-oriented page_builder_schema.
      - file: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
        location: docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md:77
        snippet: The operator workflow explicitly runs the generator against repo JSON before WordPress POST.
    prevalence: common
  - category: architecture
    pattern: Firebase exists only as a documented future working-state model.
    description: Searches found Firebase references only in the draft MVP document and no code package or script implementing Firebase storage, compile, or publish behavior.
    examples:
      - file: docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md
        location: docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:11
        snippet: one Firebase document = one page draft.
      - file: docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md
        location: docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md:176
        snippet: The compile step reads the Firebase page draft and produces both compiled WordPress payloads.
    prevalence: rare
  - category: architecture
    pattern: Astro consumes only render schema at build time.
    description: The Astro proof fetches payload.data.schema from WordPress, resolves Woo-backed sections during build, and does not consume page_builder_schema_for_ai.
    examples:
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:50
        snippet: fetchWordPressPageBuilderSchema loads only the schema field from the page-builder API response.
      - file: astro-site/src/lib/pageBuilder.ts
        location: astro-site/src/lib/pageBuilder.ts:5
        snippet: buildStaticPage resolves render sections and returns a PageBuilderSchema for Astro rendering.
    prevalence: common
  - category: operations
    pattern: Astro deployment has concrete backup, rollback, and permission-repair automation.
    description: Both local PowerShell and GitHub Actions flows deploy built dist artifacts to dhosting with backup and chmod repair.
    examples:
      - file: SCRIPTS/deploy-astro-static.ps1
        location: SCRIPTS/deploy-astro-static.ps1:39
        snippet: Remote deploy clears public_html/astro, unzips archive, and enforces 755/644.
      - file: .github/workflows/deploy-astro-dhosting.yml
        location: .github/workflows/deploy-astro-dhosting.yml:68
        snippet: Action deploys an archive on dhosting and repairs permissions after extraction.
    prevalence: common
  - category: architecture
    pattern: Make page-editing workflow is documented as target-state modules, not implemented as repo artifacts.
    description: Blueprint and instructions define AI editor, meta update, and redeploy trigger modules, but no scenario template files, workflow docs, or generation scripts were found at the referenced paths.
    examples:
      - file: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md
        location: docs/plan/astro-wordpress-page-builder/agentic-page-builder-blueprint.md:371
        snippet: Scenario template files are listed under scripts/make/* as files to add.
      - file: .github/instructions/make-scenario.instructions.md
        location: .github/instructions/make-scenario.instructions.md:48
        snippet: Module 3 is described as a redeploy trigger via webhook after explicit approval.
    prevalence: occasional

