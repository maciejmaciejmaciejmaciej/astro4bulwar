domain_security_considerations:
  sensitive_areas:
    - area: Authenticated schema mutation
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      concern: POST updates require edit_pages capability but currently do not add an explicit pending-redeploy flag or approval gate themselves.
    - area: Deploy credentials
      location: SCRIPTS/deploy-astro-static.ps1 and .github/workflows/deploy-astro-dhosting.yml
      concern: Astro publication depends on SSH keys and GitHub secrets for direct server access.
    - area: Make webhook configuration
      location: wordpress-plugin/bulwar-bridge/src/Config/Constants.php
      concern: Existing Make integration relies on a server-side webhook constant and stays disabled by default.
  authentication_patterns_in_domain: WordPress page updates rely on current_user_can(edit_pages); GitHub Actions deploy relies on repository secrets; local deploy relies on an SSH private key in the repo root.
  authorization_patterns_in_domain: Public reads are allowed for published pages, while non-public pages require edit_post capability; no external redeploy webhook authorization path is implemented in code.
  data_validation_in_domain: Render schema is Zod-validated in Astro; POST input must parse as JSON arrays/objects in PageBuilderController; AI schema generation validates supported block structures per script logic.

testing_patterns:
  framework: Ad hoc PHP tests plus manual operational verification
  coverage_areas:
    - Make webhook sender formatting and failure persistence
    - Manual live verification of Astro HTML path after deploy
  test_organization: Tests for live Make integration sit under wordpress-plugin/bulwar-bridge/tests, while Astro deploy verification is documented as manual Invoke-WebRequest checks.
  mock_patterns:
    - MakeWebhookNotifier uses injected httpPost and logger callables in tests.
    - Deploy verification uses live URL content checks instead of isolated mocks.

open_questions:
  - question: What exact WordPress status or separate flag should mark a page as changed by AI and waiting for redeploy?
    context: The architecture blueprint leaves this open, and the current PageBuilderController POST path does not set any such state.
    type: decision_blocker
    affects:
      - page-agent production editing
      - redeploy approval flow
  - question: Should Make scenarios be generated per page slug, template, or page family?
    context: The architecture blueprint lists this as unresolved, which affects whether scenario bootstrap can become operational.
    type: decision_blocker
    affects:
      - Make.com agent klienta
      - scenario bootstrap automation
  - question: "Which artifact becomes the real source of truth if Firebase draft is introduced later: repo JSON, Firebase draft, or WordPress meta?"
    context: Current active workflow starts from repo JSON, while Firebase docs propose a separate working-state store.
    type: research
    affects:
      - future compile pipeline
      - operator workflow ownership

gaps:
