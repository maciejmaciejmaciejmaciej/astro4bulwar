historical_note: >-
  This audit reflects the implementation state observed on 2026-04-15.
  Some findings are now outdated, especially around Astro slug discovery and
  runtime-assisted publish/create-or-update flow. Use the current authoring
  workflow document for day-to-day operator truth.

tldr: |
  - Firebase draft exists only as an architecture note; no Firebase package, runtime code, script, credential flow, or storage implementation was found in the repo.
  - page_builder_schema_for_ai is real in the current proof: there is a generator, test JSON, WordPress meta registration, GET/POST transport, and a test-page seed path.
  - Astro deploy is operational for the test page path: local PowerShell deploy, rollback, and GitHub Actions deploy all exist and enforce backup plus 755/644 permission repair.
  - The Make.com client-editing path is documented as a target architecture, but no page-agent scenario blueprint, scenario-generation script, deploy webhook entrypoint, or pending-redeploy state implementation was found.
  - The currently usable end-to-end path is repo JSON -> WordPress meta -> Astro build -> Astro deploy for testowa-blueprint; Firebase draft orchestration and client-facing AI editing remain conceptual.

