    - interface: POST /wp-json/bulwar/v1/page-builder/pages/{slug}
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      usage_pattern: Authenticated write of schema and aiSchema together for an existing WordPress page.
    - interface: GitHub Actions deploy workflow
      location: .github/workflows/deploy-astro-dhosting.yml
