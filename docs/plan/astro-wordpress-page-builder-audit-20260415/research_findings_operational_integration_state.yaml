    description: No Firebase dependency, config, service wrapper, storage script, or compile/publish code path exists beyond the Firebase draft MVP document.
    impact: decision_blocker
    affects:
      - firebase draft creation/storage
      - Make draft editing flow
  - area: Make page-agent scenario artifacts
    description: Referenced workflow docs under docs/agent-workflows/** and scenario template files under scripts/make/** were not found; only guidance documents and instructions exist.
