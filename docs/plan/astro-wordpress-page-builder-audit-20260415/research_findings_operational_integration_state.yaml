related_conventions:
  naming_patterns_in_domain: Repo-side page artifacts follow <slug>.page_builder_schema.json and <slug>.page_builder_schema_for_ai.json naming; proof content centers on the slug testowa-blueprint.
  structure_of_domain: Documentation defines target architecture in docs/plan/astro-wordpress-page-builder, operational scripts live in SCRIPTS, WordPress transport lives in bulwar-bridge, and Astro proof rendering lives in astro-site.
  error_handling_in_domain: WordPress transport returns structured error envelopes through Response helpers; Astro throws on missing or invalid schema; deploy scripts stop on first failure and surface explicit markers like ASTRO_DEPLOY_OK and ASTRO_ROLLBACK_OK.
  testing_in_domain: Direct tests are present for MakeWebhookNotifier, but no dedicated Firebase, page-agent Make scenario, or deploy-webhook tests were found in this focus area.
  documentation_in_domain: The repo documents intended Make/Firebase architecture more extensively than it implements it; current operational truth is spread across implementation-plan, authoring workflow, deploy docs, and proof-of-concept status notes.

