  data_flow_involving_domain: Repo page_builder_schema JSON is authored in the repo, transformed into page_builder_schema_for_ai by a local generator, written together into WordPress page meta through the page-builder POST endpoint or a test-only seed script, fetched back by Astro using only the render schema, resolved against WooCommerce at build time, emitted as static HTML, and then deployed to dhosting through local PowerShell or GitHub Actions. Firebase draft storage is not present in this active flow.
