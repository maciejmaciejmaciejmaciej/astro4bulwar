plan_id: react-template-live-deploy-20260415
objective: |
  Prepare a concise execution plan for a production push-live deployment of the existing React app from zip to dhosting, with the runtime change limited to TemplatePage rendering the added AboutSection under the /react/template route.
created_at: 2026-04-15T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 3
  risk_score: medium

tldr: |
  Build or confirm the current zip release artifact, making sure it still targets /react and includes the SPA fallback files needed by BrowserRouter. Upload the validated archive to dhosting, run the existing deploy-react.sh flow that swaps public_html/react, then enforce and verify the required 755/644 permissions. Finish with a live smoke check on /react/template to confirm TemplatePage and the added AboutSection render correctly after a direct open and refresh.
open_questions:
  - Confirm whether the live push will use a freshly rebuilt archive from zip or an already prepared react-deploy.zip whose freshness has been verified.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: A stale or wrong archive is deployed, so live does not include the TemplatePage runtime change with AboutSection.
      likelihood: medium
      impact: critical
      mitigation: Validate the exact release candidate before upload and rebuild/package from zip if artifact freshness is not provable.
    - scenario: The deployed bundle is missing the /react SPA rewrite fallback, so opening or refreshing /react/template returns 404 despite the app booting from /react/.
      likelihood: medium
      impact: critical
      mitigation: Treat the rewrite file as a release gate and verify direct navigation plus refresh on the live /react/template route.
    - scenario: Deployment completes but file permissions are not normalized to 755 for directories and 644 for files, causing white screen or 403 behavior on dhosting.
      likelihood: medium
      impact: critical
      mitigation: Execute the permission repair as an explicit post-deploy step and verify it against the deployed react directory.
  assumptions:
    - The user explicitly requested a live push and the deploy scope is limited to the existing React app in zip.
    - The runtime code change is already implemented locally in TemplatePage and no new code changes are required for this plan.
    - The live React app is served from /home/client-user/domains/client.example/public_html/react and is exposed under /react on https://client.example.

implementation_specification:
  code_structure: |
    This is an operational deployment plan only. Reuse the existing Vite build for zip, the existing BrowserRouter basename of /react, the existing route mapping for /template, and the established server-side deploy-react.sh script that rotates the live react directory and unpacks ~/react-deploy.zip.
  affected_areas:
    - zip build and deployment archive generation
    - deploy-react.sh deployment flow and the live react directory on dhosting
    - live route /react/template served from the client.example domain
  component_details:
    - component: Release artifact validation
      responsibility: Confirm the deployable archive contains the current TemplatePage runtime change and still targets the /react subpath.
      interfaces:
        - zip/package.json build command
        - zip/vite.config.ts base '/react/'
        - react.htaccess or equivalent SPA fallback file packaged into the archive
    - component: Live publication
      responsibility: Upload the validated archive and execute the existing server-side replacement flow into public_html/react.
      interfaces:
        - SCP upload of react-deploy.zip
        - SSH execution of deploy-react.sh
    - component: Permission normalization
      responsibility: Ensure deployed directories are 755 and files are 644 immediately after publication.
      interfaces:
        - find /home/client-user/domains/client.example/public_html/react -type d -exec chmod 755 {} \;
        - find /home/client-user/domains/client.example/public_html/react -type f -exec chmod 644 {} \;
    - component: Live verification
      responsibility: Confirm the released app works from the exact production URL and route shape expected by BrowserRouter.
      interfaces:
        - https://client.example/react/
        - https://client.example/react/template
  dependencies:
    - component: Release artifact validation
      relationship: Must complete before any upload or deploy action.
    - component: Live publication
      relationship: Produces the deployed files that permissions and smoke verification depend on.
    - component: Permission normalization
      relationship: Must execute immediately after publication before live acceptance checks.
    - component: Live verification
      relationship: Depends on the final deployed files and corrected permissions.
  integration_points:
    - zip/package.json build script
    - zip/src/main.tsx BrowserRouter basename '/react'
    - zip/src/App.tsx route '/template'
    - react.htaccess SPA rewrite fallback
    - deploy-react.sh target path /home/client-user/domains/client.example/public_html/react

contracts:
  - from_task: T1
    to_task: T2
    interface: Validated release archive and confirmed target path.
    format: Fresh or freshness-verified react-deploy.zip ready for dhosting upload.
  - from_task: T2
    to_task: T3
    interface: Newly deployed live react directory contents.
    format: public_html/react replaced from ~/react-deploy.zip with backup directory created when applicable.
  - from_task: T3
    to_task: T4
    interface: Live app served from corrected permissions.
    format: Directories 755 and files 644 across the deployed react tree.

