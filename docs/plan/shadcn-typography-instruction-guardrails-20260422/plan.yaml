      Add a strict typography cleanup protocol for freshly imported shadcn
      components that:
      - bans arbitrary font-weight, tracking, and leading classes during translation
      - maps headings to approved single text-size classes
      - maps body copy to approved single text-size classes
      - keeps the workflow as translation rather than redesign
