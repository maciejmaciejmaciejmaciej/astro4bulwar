plan_id: shadcn-typography-instruction-guardrails-20260422
objective: >-
  Strengthen strict agent rules for freshly imported shadcn components by enforcing a
  typography cleanup protocol that bans arbitrary font-weight, tracking, and leading
  classes and maps headings/body copy to approved single text-size classes, while
  preserving the existing geometry-first translation workflow defined in
  .github/instructions/design-system.instructions.md and reinforced in
  .github/copilot-instructions.md.
created_at: '2026-04-22T00:00:00Z'
created_by: gem-planner
status: pending
research_confidence: medium

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 3
  risk_score: low

tldr: |
  The current Translation-Only Rule in .github/instructions/design-system.instructions.md preserves source text sizes, font weights, line heights, and letter spacing, which conflicts with the requested stricter typography cleanup protocol.
  The current downstream whitelist in docs/plan/astro-wordpress-page-builder/design-token-and-layout-whitelist.md still enumerates tracking, leading, and font-weight-heavy typography patterns that could reintroduce the same conflict.
  This plan keeps the existing no-redesign workflow intact, but narrows typography handling into an explicit cleanup exception with mirrored reinforcement in .github/copilot-instructions.md and a final consistency check across all touched instruction files.
open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: The update removes the translation-only geometry guardrail instead of carving out only a typography exception, causing agents to treat imported blocks as redesign opportunities.
      likelihood: low
      impact: high
      mitigation: Keep layout, width, composition, spacing, and responsive-preservation language intact in .github/instructions/design-system.instructions.md while rewriting only the typography clause.
    - scenario: Secondary docs still contain examples that normalize banned tracking, leading, or font-weight classes, making the instruction set internally inconsistent.
      likelihood: medium
      impact: medium
      mitigation: Limit reinforcement edits to the known downstream instruction surfaces and validate with targeted grep for preserved-source typography language and banned class examples.
  assumptions:
    - .github/instructions/design-system.instructions.md remains the canonical workflow document for raw shadcn block adaptation.
    - .github/copilot-instructions.md is the correct secondary reinforcement surface for repo-wide agent behavior.
    - docs/plan/astro-wordpress-page-builder/design-token-and-layout-whitelist.md is the minimal downstream whitelist that must be aligned because it currently teaches approved typography patterns.

implementation_specification:
  code_structure: >-
    Instruction-layer documentation update only. Establish the canonical typography
    cleanup rule in .github/instructions/design-system.instructions.md, mirror the
    rule in .github/copilot-instructions.md, and prune conflicting typography
    examples from docs/plan/astro-wordpress-page-builder/design-token-and-layout-whitelist.md
    without changing the broader raw-block workflow.
  affected_areas:
    - .github/instructions/design-system.instructions.md
    - .github/copilot-instructions.md
    - docs/plan/astro-wordpress-page-builder/design-token-and-layout-whitelist.md
  component_details:
    - component: Primary raw-block workflow instruction
      responsibility: Define the translation-only workflow and add the explicit typography cleanup exception for imported shadcn blocks.
      interfaces:
        - Translation-Only Rule wording
        - Typography cleanup protocol wording
        - Allowed heading/body text-size mapping
    - component: Repo-wide copilot reinforcement instruction
      responsibility: Repeat the strict shadcn-processing rule at the higher-level agent instruction surface so the primary doc is not the only enforcement point.
      interfaces:
        - Raw import processing order
        - Typography cleanup do-not-preserve guidance
    - component: Typography whitelist
      responsibility: Remove or rewrite downstream whitelist examples that would contradict the new typography cleanup protocol.
      interfaces:
        - Approved text-role examples
        - Prohibited arbitrary typography utility guidance
  dependencies:
    - component: Repo-wide copilot reinforcement instruction
      relationship: Must mirror the canonical rule defined in .github/instructions/design-system.instructions.md.
    - component: Typography whitelist
      relationship: Must align with the canonical rule so examples do not override the instruction text in practice.
  integration_points:
    - Agent behavior when translating raw shadcn blocks into project classes.
    - Future block-refinement instructions that inherit wording from the design-system rule set.

contracts:
  - from_task: t-1
    to_task: t-2
    interface: Canonical typography cleanup language, including the preserved geometry rules and the approved heading/body mapping.
    format: Markdown rule text and a short allowed-vs-banned class matrix.
  - from_task: t-2
    to_task: t-3
    interface: Final list of touched instruction files and the phrases/classes that should no longer appear after alignment.
    format: File checklist plus grep targets.

