patterns_found:
  - category: architecture
    pattern: "Stała topologia ścieżek /astro + /react"
    description: "Budowanie i routing obu frontendów zakładają niezmienny model WordPress na root domeny, React pod /react i Astro pod /astro."
    examples:
      - file: astro-site/astro.config.mjs
        location: astro-site/astro.config.mjs:4-6
        snippet: "base: '/astro/' i site: 'https://client.example'"
      - file: zip/vite.config.ts
        location: zip/vite.config.ts:9
        snippet: "base: '/react/'"
      - file: zip/src/main.tsx
        location: zip/src/main.tsx:9
        snippet: "<BrowserRouter basename=\"/react\">"
    prevalence: common

  - category: naming
    pattern: "Slug testowej strony i namespace API są produktowo nazwane pod Bulwar"
    description: "Slug testowa-blueprint i namespace bulwar/v1 są rozlane przez frontend, bridge, testy i skrypty seedujące."
    examples:
      - file: zip/src/pages/TestowaBlueprintPage.tsx
        location: zip/src/pages/TestowaBlueprintPage.tsx:8
        snippet: "const PAGE_BUILDER_SLUG = \"testowa-blueprint\""
      - file: zip/src/App.tsx
        location: zip/src/App.tsx:24
        snippet: "<Route path=\"/testowa-blueprint\" ... />"
      - file: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:16-46
        snippet: "register_rest_route('bulwar/v1', ...)"
    prevalence: common

  - category: structure
    pattern: "Fallback domeny WordPress przez env albo twardą wartość Bulwar"
    description: "React registry i helper global layout korzystają z VITE_WORDPRESS_BASE_URL, ale każdy z tych modułów ma własny fallback do https://client.example. Astro ma osobną twardą stałą bez env override w config.ts."
    examples:
      - file: zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts
        location: zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts:62-70
        snippet: "VITE_WORDPRESS_BASE_URL ?? 'https://client.example'"
      - file: zip/src/blocks/registry/wordpressApi.ts
        location: zip/src/blocks/registry/wordpressApi.ts:29-34
        snippet: "const WORDPRESS_BASE_URL = ... ?? 'https://client.example'"
      - file: astro-site/src/lib/config.ts
        location: astro-site/src/lib/config.ts:1
        snippet: "export const WORDPRESS_BASE_URL = 'https://client.example';"
    prevalence: common

  - category: architecture
    pattern: "Bridge checkout kontraktuje własny REST i własne tokeny"
    description: "React checkout komunikuje się z bridge REST pod bulwar/v1, a bridge z kolei tworzy Woo orders i opcjonalnie wysyła webhook do Make."
    examples:
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:461-621
        snippet: "fetch(.../checkout/slots), fetch(.../checkout/delivery-quote), fetch(.../checkout/orders)"
      - file: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:22-34
        snippet: "register_rest_route('bulwar/v1', '/checkout/...')"
      - file: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
        location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:115-118
        snippet: "(new MakeWebhookNotifier())->send($order);"
    prevalence: common

  - category: error_handling
    pattern: "Bridge i global layout używają meta-status i sentinel errors zamiast łagodnych defaultów produkcyjnych"
    description: "Astro i React traktują unresolved global layout jako błąd kontraktu, a skrypty verify-* emitują własne kody tekstowe typu NO_ORDERS."
    examples:
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:253-272
        snippet: "throw new Error(`Global layout endpoint returned unresolved meta...`)"
      - file: zip/src/lib/fetchWordPressGlobalLayout.ts
        location: zip/src/lib/fetchWordPressGlobalLayout.ts:125-143
        snippet: "kind: 'meta-status'"
      - file: verify-latest-order.sh
        location: verify-latest-order.sh:15
        snippet: "echo \"NO_ORDERS\\n\";"
    prevalence: occasional

  - category: structure
    pattern: "Deploy i operacje są twardo sprzężone z dhosting i bieżącą ścieżką public_html"
    description: "Lokalne skrypty, workflow CI i narzędzia serwisowe zakładają jeden host SSH, jeden klucz id_rsa, jedną strukturę katalogów i ręczne chmod 755/644."
    examples:
      - file: SCRIPTS/deploy-astro-static.ps1
        location: SCRIPTS/deploy-astro-static.ps1:6-12
        snippet: "id_rsa, client.ssh.host, .../public_html/astro"
      - file: .github/workflows/deploy-astro-dhosting.yml
        location: .github/workflows/deploy-astro-dhosting.yml:24-25,76-87
        snippet: "REMOTE_PUBLIC_ROOT, REMOTE_BACKUP_ROOT, chmod 755/644"
      - file: deploy-react.sh
        location: deploy-react.sh:4-12
        snippet: "BASE=.../public_html; find ... chmod 755/644"
    prevalence: common

  - category: structure
    pattern: "Brand i SEO obecnego klienta są wpisane poza page-builderem"
    description: "Część sezonowych stron React i fallback global layout mają literalne URL-e, contact info, linki prawne i copy Bulwar, niezależnie od danych WordPressa."
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:77,96-102,205,219-222
        snippet: "rezerwacje@bulwarrestauracja.pl, canonical v2, homeHref=https://bulwarrestauracja.pl"
      - file: zip/src/pages/CateringWielkanocnyThankYouPage.tsx
        location: zip/src/pages/CateringWielkanocnyThankYouPage.tsx:28-34,96,110-113
        snippet: "canonical v2, legal links, www.bulwarrestauracja.pl"
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:56-155
        snippet: "DEFAULT_GLOBAL_LAYOUT_DATA with Bulwar address/social/legal"
    prevalence: occasional

  - category: testing
    pattern: "Testy i artefakty utrwalają starą domenę i slug"
    description: "Część testów i wygenerowanych paczek sprawdza lub zawiera https://client.example i testowa-blueprint, co zwiększa powierzchnię zmian przy kliencie B."
    examples:
      - file: astro-site/src/lib/wordpress.test.ts
        location: astro-site/src/lib/wordpress.test.ts:44
        snippet: "assert.equal(..., 'https://client.example/wp-json/bulwar/v1/page-builder/pages')"
      - file: zip/src/lib/fetchWordPressGlobalLayout.test.ts
        location: zip/src/lib/fetchWordPressGlobalLayout.test.ts:83
        snippet: "assert.equal(..., 'https://client.example/wp-json/bulwar/v1/layout/global')"
      - file: astro-site/dist/testowa-blueprint/index.html
        location: astro-site/dist/testowa-blueprint/index.html:1
        snippet: "canonical href='https://client.example/astro/testowa-blueprint/'"
    prevalence: occasional

