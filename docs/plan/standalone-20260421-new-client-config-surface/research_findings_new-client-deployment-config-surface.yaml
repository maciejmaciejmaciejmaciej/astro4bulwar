  methodology: "Hybrid retrieval: file_search dla priorytetowych ścieżek, semantic_search dla szerokiego wykrycia wzorców, grep_search dla domen/slugów/SSH/REST/meta keys, read_file dla szczegółowej inspekcji, vscode_listCodeUsages dla zależności WORDPRESS_BASE_URL oraz run_in_terminal do zebrania metadanych linii plików. PRD (docs/prd.yaml:1-20) został sprawdzony i nie zawierał wymagań specyficznych dla tej powierzchni wdrożeniowej."
