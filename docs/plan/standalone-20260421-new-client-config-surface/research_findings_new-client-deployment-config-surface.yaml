  naming_patterns_in_domain: "Bridge używa prefiksu BULWAR_BRIDGE_* dla stałych i _bulwar_* dla meta zamówień; page builder przechowuje page_builder_schema oraz page_builder_schema_for_ai; testowy slug i część skryptów używają nazwy testowa-blueprint (sources: wordpress-plugin/bulwar-bridge/src/Config/Constants.php:10-21; wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:108-156; zip/src/pages/TestowaBlueprintPage.tsx:8)."
  structure_of_domain: "Astro ma jeden centralny config domeny (astro-site/src/lib/config.ts:1), podczas gdy React ma kilka niezależnych helperów WORDPRESS_BASE_URL z lokalnym env fallbackiem w registry/global layout helpers (zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts:62; zip/src/blocks/registry/wordpressApi.ts:30; zip/src/blocks/registry/wooStoreApi.ts:56; zip/src/lib/fetchWordPressGlobalLayout.ts:35)."
  error_handling_in_domain: "Bridge zwraca własne kody VALIDATION_ERROR, QUOTE_REQUIRED, QUOTE_EXPIRED, SLOT_EXPIRED, UNKNOWN_PRODUCT, ORDER_CREATE_FAILED itd. (source: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php:16-138). Global layout React klasyfikuje błędy jako transport/http/application/contract/meta-status (source: zip/src/lib/fetchWordPressGlobalLayout.ts:17-143)."
  testing_in_domain: "Testy jednostkowe i kontraktowe istnieją dla Astro typings/global layout, bridge PHP i generatorów page_builder_schema_for_ai, ale część z nich utrwala starą domenę i slug testowa-blueprint (sources: astro-site/src/lib/wordpress.test.ts:44; zip/src/lib/fetchWordPressGlobalLayout.test.ts:83; astro-site/src/lib/types.test.ts:9,57; SCRIPTS/generate-page-builder-ai-schema.test.js:12-20)."
  documentation_in_domain: "Repo zawiera operator docs o klonowaniu/wdrożeniu nowego klienta w docs/setup/*, a bridge ma własne contracts.md opisujące namespace, checkout contract i manual_cash only (sources: docs/setup/day-1-checklista-klonowania.md:1-24; docs/setup/repo-do-klonowania-plan-parametryzacji.md:1-47; wordpress-plugin/bulwar-bridge/docs/contracts.md:5-28,356-460)."

related_dependencies:
  internal:
    - component: astro-site/src/lib/config.ts
      relationship_to_domain: "Provides WORDPRESS_BASE_URL consumed by Astro fetch helpers and SEO asset absolutization."
      direction: outbound
    - component: zip/src/blocks/registry/**
      relationship_to_domain: "Consumes WordPress/Woo endpoints and emits resolved page-builder data for React preview/runtime."
      direction: outbound
    - component: wordpress-plugin/bulwar-bridge/src/Http/**
      relationship_to_domain: "Exposes the REST surface consumed by Astro and React."
      direction: inbound
    - component: wordpress-plugin/bulwar-bridge/src/Checkout/**
      relationship_to_domain: "Implements quote/order/webhook behaviors behind the REST surface."
      direction: inbound
    - component: deploy-react.sh and SCRIPTS/deploy-astro-static.ps1
      relationship_to_domain: "Publish compiled frontends to remote dhosting paths."
      direction: outbound
  external:
    - name: dhosting SSH/SCP + php83/wp-cli.phar
      purpose_for_domain: "Deployment and live verification against remote WordPress install paths (sources: SCRIPTS/deploy-astro-static.ps1:8-12; get_settings.js:8; verify-order.sh:4-5)."
    - name: WooCommerce runtime
      purpose_for_domain: "Product lookup, store address fallback and order creation (sources: zip/src/blocks/registry/wooStoreApi.ts:154-205; wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:59-118; wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php:72-92,190-203)."
    - name: WordPress option/meta storage
      purpose_for_domain: "Site context, global layout option and page builder schemas are stored there (sources: wordpress-plugin/bulwar-bridge/src/Config/Constants.php:20-21,83,90; wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:83-147,219-246)."

domain_security_considerations:
  sensitive_areas:
    - area: "Bridge config seeding script"
      location: set-bridge-config.sh:11-15
      concern: "Skrypt zawiera jawny Google Maps API key i adres lokalu obecnego klienta."
    - area: "Remote DB extraction tooling"
      location: get_db.js:6-21
      concern: "Script pobiera wp-config.php, parsuje DB creds i składa komendę mysql po SSH."
    - area: "SSH key assumption"
      location: SCRIPTS/deploy-astro-static.ps1:6; SCRIPTS/rollback-astro-static.ps1:8; get_db.js:6; get_settings.js:8
      concern: "Wiele narzędzi zakłada lokalny id_rsa w repo root lub stałą ścieżkę do klucza."
    - area: "Temporary config artifact"
      location: temp_wp_config.php:32
      concern: "Workspace zawiera tymczasowy plik z hostem DB obecnego środowiska."
  authentication_patterns_in_domain: "Deploy i narzędzia operatorskie używają SSH key auth przez scp/ssh; bridge REST checkout jest publiczny i opiera się na walidacji payloadu oraz tokenach quote/slot zamiast auth użytkownika (sources: SCRIPTS/deploy-astro-static.ps1:6-12; .github/workflows/deploy-astro-dhosting.yml:41-67; wordpress-plugin/bulwar-bridge/src/Http/Routes.php:16-46; wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php:16-138)."
  authorization_patterns_in_domain: "Publiczne są GET health/layout/page-builder oraz POST checkout routes; tylko POST update page-builder pages wymaga current_user_can('edit_pages') (sources: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:16-58)."
  data_validation_in_domain: "CheckoutController waliduje shape requestów, OrderService weryfikuje tokeny i produkty Woo, QuoteService waliduje destination i cart lines, a helpery React/Astro parsują odpowiedzi przez zod/normalizację kontraktu (sources: wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php:16-138; wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:16-118; wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php:16-258; astro-site/src/lib/wordpress.ts:221-272; zip/src/lib/fetchWordPressGlobalLayout.ts:64-143)."

testing_patterns:
  framework: "Mieszane testy Node/TypeScript oraz lekkie testy PHP bez pełnego runtime WordPress; dodatkowo obecne są ręczne skrypty verify-* i wpcli-create-test-order.php do live verification."
  coverage_areas:
    - "Kontrakt list/buildable pages i global layout w Astro i React (sources: astro-site/src/lib/wordpress.test.ts:44; zip/src/lib/fetchWordPressGlobalLayout.test.ts:83)."
    - "Bridge controllers/services dla checkout, availability i layout (sources: wordpress-plugin/bulwar-bridge/tests/AvailabilityServiceTest.php:1-98; wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php:176; wordpress-plugin/bulwar-bridge/tests/PageBuilderControllerTest.php:252-315)."
    - "Generatory i runtime page_builder_schema_for_ai oraz seed files dla testowa-blueprint (sources: SCRIPTS/generate-page-builder-ai-schema.test.js:12-20; SCRIPTS/seed-testowa-blueprint-schema.sh:6-27)."
  test_organization: "Testy są rozrzucone po domenach: astro-site/src/lib/*.test.ts, zip/src/lib/*.test.ts, zip/src/blocks/registry/*.test.tsx, wordpress-plugin/bulwar-bridge/tests/*.php oraz SCRIPTS/*.test.*."
  mock_patterns:
    - "fetch stubs z twardą domeną client.example"
    - "PHP helper stubs dla wp_json_encode/wp_salt i tymczasowe pliki slots JSON"
    - "Ręczne live probes przez wp-cli.phar eval"

open_questions:
  - question: "Czy nowa instancja zachowuje ten sam model publikacji: WordPress na /, React na /react i Astro na /astro?"
    context: "Base pathy i routing obu frontendów są twardo ustawione, więc zmiana topologii wpływa na build, router, canonicale i deploy."
    type: decision_blocker
    affects: [new-client-deployment-config-surface]
  - question: "Czy slug testowej strony page-builder ma nadal pełnić rolę testowa-blueprint, czy ma zostać zastąpiony klientowym slugiem wdrożeniowym?"
    context: "Slug jest zaszyty w React, seed scripts, testach i wygenerowanych artefaktach."
    type: decision_blocker
    affects: [new-client-deployment-config-surface]
  - question: "Czy checkout nowego klienta nadal dopuszcza wyłącznie manual_cash, czy będzie potrzebne mapowanie do realnego kodu gatewaya WooCommerce?"
    context: "Bridge i React są zamrożone na manual_cash only, a contracts.md sam wskazuje, że mapowanie do live gateway code wymaga potwierdzenia."
    type: decision_blocker
    affects: [new-client-deployment-config-surface]
  - question: "Czy sezonowe strony cateringowe mają wejść do klonu 1:1, czy powinny zostać potraktowane jako osobna powierzchnia migracji brand/SEO?"
    context: "CateringWielkanocnyPage i ThankYou mają osobne kanoniczne URL-e, linki brandowe i ścieżkę thank-you niezależną od page-buildera."
    type: research
    affects: [new-client-deployment-config-surface]
  - question: "Czy opcje bulwar_bridge_global_layout i bulwar_bridge_site_context pozostają niezmienne jako nazwy techniczne, czy mają być też rebrandowane?"
    context: "Nazwy opcji są używane po obu stronach bridge/site-context i nie są tylko copy marketingowym."
    type: research
    affects: [new-client-deployment-config-surface]

gaps:
  - area: "Wygenerowane artefakty deploy/dist"
    description: "Potwierdzono obecność wielu wygenerowanych paczek i distów zawierających starą domenę oraz slug testowa-blueprint, ale nie zinwentaryzowano każdej kopii katalogów zip/deploy-* i react-deploy-* osobno."
    impact: nice_to_know
    affects: [new-client-deployment-config-surface]
  - area: "Ignorowane env/secrets poza widocznymi plikami"
    description: "Badanie nie otwierało wszystkich potencjalnych plików .env ani sekretów w katalogach ignorowanych; wykryto jedynie jawnie widoczne ślady jak zip/.env:1, temp_wp_config.php:32 i set-bridge-config.sh:11-15."
    impact: nice_to_know
    affects: [new-client-deployment-config-surface]
  - area: "Workflow poza priorytetowymi ścieżkami"
    description: "Nie wykonano pełnej analizy wszystkich pomocniczych skryptów SCRIPTS/* niezwiązanych bezpośrednio z listą priorytetową użytkownika, mimo że grep wykrył dalsze sprzężenia środowiskowe np. w run_upload.js, upload_products.js i sync_catering_category.js."
    impact: nice_to_know
    affects: [new-client-deployment-config-surface]
