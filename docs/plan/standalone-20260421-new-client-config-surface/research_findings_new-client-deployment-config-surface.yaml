created_by: github-copilot-gpt-5.4
status: completed

tldr: |
  - Astro i React są ustawione na topologię WordPress na root domeny, React pod /react i Astro pod /astro; te bazowe ścieżki są wpisane w konfigurację buildu i routingu (sources: astro-site/astro.config.mjs:4-6, zip/vite.config.ts:9, zip/src/main.tsx:9, zip/src/App.tsx:24).
  - Największa powierzchnia parametryzacji nowego klienta dotyczy domeny WordPress, slugu strony testowej, hosta/usera SSH, katalogów public_html, backupów oraz stałych BULWAR_BRIDGE_* w WordPressie (sources: astro-site/src/lib/config.ts:1, zip/src/pages/TestowaBlueprintPage.tsx:8, deploy-react.sh:4, SCRIPTS/deploy-astro-static.ps1:8-11, wordpress-plugin/bulwar-bridge/src/Config/Constants.php:16-21,38-52).
  - Runtime React ma kilka lokalnych fallbacków do obecnego Bulwar i namespace bulwar/v1: page builder, Woo Store API, global layout oraz checkout bridge; przy nowym kliencie muszą wskazywać nową domenę albo być zasilane przez env (sources: zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts:62-70, zip/src/blocks/registry/wordpressApi.ts:29-34, zip/src/blocks/registry/wooStoreApi.ts:55-60, zip/src/lib/fetchWordPressGlobalLayout.ts:35-79, zip/components/CheckoutDrawer.tsx:134-141,461-621).
  - Bridge ma twarde kontrakty danych i nazewnictwa: REST namespace bulwar/v1, meta page_builder_schema/page_builder_schema_for_ai, opcje bulwar_bridge_global_layout/bulwar_bridge_site_context, special product ID i payment_method=manual_cash only (sources: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:16-46, wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php:14-17,53-58,136-147, wordpress-plugin/bulwar-bridge/src/Config/Constants.php:16-21,49,83,90, wordpress-plugin/bulwar-bridge/src/Http/Controllers/CheckoutController.php:120-121, wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:71,215).
  - W repo są też twardo zaszyte operacyjne i brandowe sprzężenia do obecnego Bulwar: kanoniczne URL-e, adresy prawne/social, e-mail rezerwacji, ścieżki wp-load.php, stare aliasy hostingu typu legacy-client-alias i historyczny alias klienta oraz wygenerowane artefakty dist/deploy zawierające starą domenę (sources: zip/src/pages/CateringWielkanocnyPage.tsx:77,96-102,151,205,219-222; zip/src/pages/CateringWielkanocnyThankYouPage.tsx:28-34,89,96,110-113; get_db.js:6,21; get_settings.js:5,8; import.php:3; astro-site/dist/testowa-blueprint/index.html:1; astro-site/dist/restauracja-na-komunie/index.html:1).

