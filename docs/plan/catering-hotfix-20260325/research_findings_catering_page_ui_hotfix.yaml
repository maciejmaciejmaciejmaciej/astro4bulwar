patterns_found:
  - category: structure
    pattern: active catering page is a self-composed page rather than a route nested under RootLayout
    description: the live catering route points straight to CateringWielkanocnyPage, which directly renders shared chrome and its own page-local breadcrumb section
    examples:
      - file: zip/src/App.tsx
        location: zip/src/App.tsx:11
        snippet: <Route path="/catering-wielkanocny" element={<CateringWielkanocnyPage />} />
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:149
        snippet: <Navbar logoSrc="/react/images/logo.png" />
    prevalence: common

  - category: architecture
    pattern: cart UI state is page-owned while sticky controls are presentational triggers
    description: the page calculates itemCount and subtotal from cartState, passes them into StickyCartControls, and controls CheckoutDrawer open state locally
    examples:
      - file: zip/src/pages/CateringWielkanocnyPage.tsx
        location: zip/src/pages/CateringWielkanocnyPage.tsx:141
        snippet: const itemCount = getCateringCartItemCount(cartState); const subtotal = getCateringCartSubtotal(cartState);
      - file: zip/src/components/sections/StickyCartControls.tsx
        location: zip/src/components/sections/StickyCartControls.tsx:11
        snippet: export function StickyCartControls({ onOpenCart, itemCount = 0, totalPrice = 0 }: StickyCartControlsProps)
    prevalence: common

  - category: structure
    pattern: sticky cart has split responsive implementations
    description: desktop uses a full-width fixed bottom bar and mobile uses a floating action button positioned at bottom-right
    examples:
      - file: zip/src/components/sections/StickyCartControls.tsx
        location: zip/src/components/sections/StickyCartControls.tsx:18
        snippet: <div className="hidden md:flex fixed bottom-0 left-0 right-0 h-[50px] ...">
      - file: zip/src/components/sections/StickyCartControls.tsx
        location: zip/src/components/sections/StickyCartControls.tsx:50
        snippet: className="md:hidden fixed bottom-6 right-6 z-40 w-14 h-14 ..."
    prevalence: common

  - category: naming
    pattern: shared chrome still contains template or placeholder restaurant identity
    description: Navbar and Footer include English placeholder copy, dead href="#" targets, routing-test text, and ANDÉ branding unrelated to BulwaR
    examples:
      - file: zip/src/components/sections/Navbar.tsx
        location: zip/src/components/sections/Navbar.tsx:35
        snippet: Contact Us (Routing test)
      - file: zip/src/components/sections/Footer.tsx
        location: zip/src/components/sections/Footer.tsx:33
        snippet: © 2024 ANDÉ CULINARY CURATOR. ALL RIGHTS RESERVED.
    prevalence: common

