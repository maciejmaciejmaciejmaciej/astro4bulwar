status: completed

tldr: |
  - The active catering page at /catering-wielkanocny renders the shared Footer component directly, not through RootLayout.
  - The current Footer content is template/demo content: ANDÉ branding, New York address, US phone, placeholder social/privacy links, and 2024 copyright.
  - The catering page already contains some real BulwaR contact details in its feature grid, but no canonical footer data source or social URLs were found in src.
  - The smallest blast-radius path for a catering-only footer is a sibling component fork of Footer used only by CateringWielkanocnyPage.
  - Editing the shared Footer would affect HomePage immediately and may also affect any future pages using RootLayout or TemplatePage.

