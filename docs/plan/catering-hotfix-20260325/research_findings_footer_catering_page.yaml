open_questions:
  - question: What are the canonical BulwaR footer values for address, opening hours, social URLs, privacy-policy destination, and copyright text?
    context: The current footer is entirely template content, and only partial real contact data was found on the catering page itself.
  - question: Should the catering-only footer reuse the existing image logo path used by Navbar, or should it remain a text mark styled like the current footer?
    context: Footer currently uses hardcoded brand text while the page header already uses /react/images/logo.png.
  - question: Are future routes expected to move under RootLayout?
    context: Shared Footer changes would gain broader blast radius if RootLayout becomes the active route shell.

gaps:
  - area: canonical footer content source
    description: No frontend config/data file was found that defines approved footer address, hours, legal links, or social URLs.
    impact: Any footer replacement still needs validated content inputs from another source.
  - area: dedicated catering footer abstraction
    description: No existing catering-specific footer component or shared footer props model exists.
    impact: The safest catering-only change path is structural isolation at the page import/render boundary, not a drop-in configuration toggle.
  - area: legal destination mapping
    description: No active privacy-policy or regulatory link targets were identified in the examined src files.
    impact: A visual footer hotfix can still leave broken legal navigation if those URLs are not supplied.
