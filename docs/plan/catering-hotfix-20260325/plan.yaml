    tech_stack:
      - React 19
      - TypeScript
      - Tailwind CSS v4
    test_coverage: Text audit via search plus visual spot-check on the active route.

  - id: t3
    title: Integrate The Hotfix Into The Active Catering Route
    description: |
      Replace the shared Navbar, Footer, and StickyCartControls usages in CateringWielkanocnyPage with the new catering-only variants.
      Preserve existing cart state, CheckoutDrawer behavior, and route structure.
      Adjust page spacing and stacking context so the sticky header, fixed mobile FAB, badge, and sticky desktop bottom bar remain visible without obscuring content or controls.
    wave: 2
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - t1
