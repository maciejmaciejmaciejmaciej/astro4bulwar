    context_files:
      - zip/src/pages/CateringWielkanocnyPage.tsx: integration point for the page-only hotfix
      - zip/src/components/CheckoutDrawer.tsx: preserve trigger and drawer-open behavior contract
      - zip/src/App.tsx: verify the active route remains /catering-wielkanocny after the page swap
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: active route integration
    verification:
      - Build/typecheck the affected route after wiring the new components.
      - Confirm the page still opens CheckoutDrawer from both desktop and mobile sticky triggers.
