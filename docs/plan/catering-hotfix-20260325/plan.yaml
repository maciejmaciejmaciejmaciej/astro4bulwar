plan_id: catering-hotfix-20260325
objective: implement a catering-page-only UI/content hotfix in BULWAR APP
created_at: 2026-03-25T00:00:00Z
created_by: GitHub Copilot
status: pending_approval
research_confidence: high

tldr: |
  Deliver the hotfix with page-scoped chrome to avoid regressions on HomePage and any future shared-layout routes.
  The safest path is to add dedicated catering-only header, footer, and sticky cart controls, then swap them into the active CateringWielkanocnyPage.
  Browser validation is required because the requested behavior is responsive and position-sensitive: sticky header on mobile/desktop, mobile FAB with badge, and desktop bottom order bar pinned to the viewport.

open_questions:
  - Confirm the exact Facebook, Instagram, Tripadvisor, Polityka prywatnosci, and Regulamin URLs if they are not already captured in the implementation brief available to the implementer.
  - Confirm whether the breadcrumb strip under the header should remain, be simplified, or be removed once the temporary catering-only header is introduced.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: A shared chrome component is edited instead of adding catering-only variants, causing unwanted UI changes on HomePage or future routes.
      likelihood: medium
      impact: high
      mitigation: Keep the hotfix isolated to new catering-only components and wire them only inside CateringWielkanocnyPage.
    - scenario: Sticky/fixed UI layers overlap the drawer trigger area or obscure content on small screens.
      likelihood: medium
      impact: high
      mitigation: Validate with real mobile and desktop viewports and adjust page bottom/top spacing together with component z-index.
    - scenario: Missing or incorrect real-world URLs leave footer social/legal links broken on the live catering page.
      likelihood: medium
      impact: medium
      mitigation: Treat URLs as explicit content inputs, verify them before merge, and block release if placeholders remain.
  assumptions:
    - The active route to patch remains /catering-wielkanocny and is still mounted directly by CateringWielkanocnyPage.
    - Using dedicated catering-only components is acceptable and preferred over mutating shared Navbar, Footer, or StickyCartControls.
    - The logo asset already used by the catering page can be reused in the new header and footer.

implementation_specification:
  code_structure: Add three page-scoped presentation components under zip/src/components/sections for the catering route only, keep cart state and drawer state in CateringWielkanocnyPage, and confine content edits to the active catering page or its direct data module.
  affected_areas:
    - zip/src/pages/CateringWielkanocnyPage.tsx
    - zip/src/components/sections/
    - zip/src/data/cateringWielkanocnyHero.tsx
  component_details:
    - component: CateringPageHeader
      responsibility: Render a temporary catering-only sticky header with BulwaR logo on the left and a small grey return-to-home text link on the right, preserving the existing design language.
      interfaces:
        - logoSrc: string
        - homeHref: string
        - returnLabel: string
    - component: CateringPageFooter
      responsibility: Render a catering-only footer based on the existing footer structure but with real BulwaR location, contact, hours, social links, legal links, logo, and updated copyright.
      interfaces:
        - logoSrc: string
        - socialLinks: array of label/url pairs
        - legalLinks: array of label/url pairs
    - component: CateringStickyCartControls
      responsibility: Render page-only responsive sticky cart triggers so mobile FAB and desktop bottom bar can be changed without affecting HomePage.
      interfaces:
        - onOpenCart: () => void
        - itemCount: number
        - totalPrice: number
  dependencies:
    - component: CateringWielkanocnyPage
      relationship: Composes CateringPageHeader, CateringPageFooter, and CateringStickyCartControls while continuing to own cart and drawer state.
    - component: CheckoutDrawer
      relationship: Continues to consume page-owned cart state and open/close handlers triggered from the new catering-only sticky controls.
    - component: cateringWielkanocnyHeroData
      relationship: Supplies page copy that may need cleanup if any remaining placeholder or branding mismatch is found on the active catering route.
  integration_points:
    - Swap Navbar for CateringPageHeader only in CateringWielkanocnyPage.
    - Swap Footer for CateringPageFooter only in CateringWielkanocnyPage.
    - Swap StickyCartControls for CateringStickyCartControls only in CateringWielkanocnyPage.
    - Adjust page wrapper spacing so sticky header and sticky desktop/mobile cart affordances do not cover content.

contracts:
  - from_task: t1
    to_task: t3
    interface: Catering-only chrome components exported from zip/src/components/sections and ready for page composition.
    format: TSX React components with typed props for logo source, links, and cart trigger state.
  - from_task: t2
    to_task: t3
    interface: Cleaned page-local content set for brand/address/site text and footer destinations.
    format: Inline TSX strings plus optional data-module constants for hero/content copy.
  - from_task: t3
    to_task: t4
    interface: Active /catering-wielkanocny route renders the new components with preserved cart-open behavior.
    format: Running Vite route with responsive UI states available for manual browser validation.
  - from_task: t3
    to_task: t5
    interface: Final isolated hotfix diff touching only the catering page and new catering-only section components unless an explicitly justified content module edit is needed.
    format: Git diff limited to the planned files with no shared chrome regression surface.

tasks:
  - id: t1
    title: Build Catering-Only Chrome Components
    description: |
      Create new page-scoped components for the catering route instead of editing shared Navbar, Footer, or StickyCartControls.
      The new header must be sticky on desktop and mobile, show the BulwaR logo on the left, and show a small grey '<-powrót do strony głównej' link on the right pointing to https://bulwarrestauracja.pl.
      The new footer must be derived from the existing footer structure but use real BulwaR content and real destinations only.
      The new sticky cart controls must preserve the current cart trigger contract while providing the requested mobile FAB badge and desktop bottom bar behavior.
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies: []
    context_files:
      - zip/src/components/sections/Navbar.tsx: shared header pattern and class vocabulary to mimic without modifying
      - zip/src/components/sections/Footer.tsx: shared footer structure to fork safely for the catering page
      - zip/src/components/sections/StickyCartControls.tsx: existing responsive cart control contract to preserve in the page-only variant
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 260
    focus_area: catering-page chrome isolation
    verification:
      - Confirm the new components compile and export cleanly with typed props.
      - Confirm no shared Navbar/Footer/StickyCartControls source file was modified in this task.
      - Confirm the new footer contains logo, real BulwaR copy, and non-placeholder link targets.
    acceptance_criteria:
      - A new catering-only header component exists and is designed for sticky behavior on mobile and desktop.
      - A new catering-only footer component exists with the requested real content and legal/social link slots.
      - A new catering-only sticky cart control component exists and preserves the existing cart trigger interface.
    failure_modes:
      - scenario: The implementer copies shared markup but accidentally imports or edits shared chrome during cleanup.
        likelihood: medium
        impact: high
        mitigation: Treat shared components as read-only references and keep all new work in distinct catering-only files.
      - scenario: The new footer introduces placeholder href values because the provided URLs are not wired through.
        likelihood: medium
        impact: medium
        mitigation: Fail the task if any social/legal link remains '#'.
    tech_stack:
      - React 19
      - TypeScript
      - Tailwind CSS v4
      - lucide-react
    test_coverage: Component-level compile validation plus route-level manual verification in browser.

