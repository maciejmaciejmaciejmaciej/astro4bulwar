    title: Clean Catering Page Copy And Real-World Content Inputs
    description: |
      Audit the active catering page for fake/template branding or mismatched business identity and replace it with the real BulwaR name, location, and site reference where required by the hotfix.
      Keep the scope on the active catering route and its direct content modules only.
      This includes preparing the exact footer content set and resolving any page-local text that conflicts with the temporary catering-only chrome.
    wave: 1
    agent: gem-implementer
    priority: medium
    status: pending
    dependencies: []
    context_files:
      - zip/src/pages/CateringWielkanocnyPage.tsx: active route composition and breadcrumb/header strip copy
      - zip/src/data/cateringWielkanocnyHero.tsx: page hero copy and supporting brand-facing text
      - zip/src/components/sections/Footer.tsx: source footer content block to map into real BulwaR data
    estimated_effort: small
    estimated_files: 3
    estimated_lines: 120
    focus_area: catering-page content correctness
    verification:
      - Search the active catering page path and its direct chrome for remaining placeholder/demo branding after edits.
      - Confirm the real business identity appears consistently as BulwaR/Bulwar according to the provided wording.
      - Confirm no homepage content is changed by this task.
    acceptance_criteria:
      - The active catering page no longer exposes fake/template restaurant branding in its page-only UI surface.
      - Real business name, address, and site reference are available for use in the new catering-only chrome.
      - Footer social/legal destinations are resolved to concrete URLs before release.
    failure_modes:
      - scenario: Real content is updated in the new footer but template copy remains in the breadcrumb or hero area, leaving the page inconsistent.
        likelihood: medium
        impact: medium
