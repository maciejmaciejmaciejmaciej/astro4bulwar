    validation_matrix:
      - scenario: Desktop sticky chrome
        steps:
          - Open /catering-wielkanocny in a desktop viewport.
          - Scroll from hero through product sections to the footer.
          - Click the bottom order bar action.
        expected_result: Header stays sticky, bottom order bar stays pinned, and CheckoutDrawer opens.
      - scenario: Mobile floating cart action
        steps:
          - Open /catering-wielkanocny in a mobile viewport.
          - Add at least one item to the cart.
          - Observe the FAB position and badge, then tap the button.
        expected_result: FAB remains bottom-right, badge is round and visible above the button, and CheckoutDrawer opens.
      - scenario: Footer content and links
        steps:
          - Scroll to the footer on the catering page.
          - Inspect location, contact, hours, copyright, social links, and legal links.
        expected_result: All displayed content matches the provided BulwaR data and no placeholder/demo text or '#' links remain.

