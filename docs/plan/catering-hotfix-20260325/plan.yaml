  - id: t4
    title: Validate Responsive Sticky Behavior In Browser
    description: |
      Run browser validation against the active catering route with both desktop and mobile viewports.
      Focus on sticky positioning, overlap risk, cart-open interactions, footer link visibility, and the temporary return-to-home affordance.
    wave: 3
    agent: gem-browser-tester
    priority: medium
    status: pending
    dependencies:
      - t3
    context_files:
      - zip/src/pages/CateringWielkanocnyPage.tsx: active route under test
      - zip/src/components/sections/CateringStickyCartControls.tsx: expected responsive sticky trigger behavior
      - zip/src/components/sections/CateringPageHeader.tsx: expected sticky header and return link behavior
    estimated_effort: small
    estimated_files: 3
    estimated_lines: 0
    focus_area: responsive browser QA
    verification:
      - Capture desktop and mobile pass/fail status for all requested UI behaviors.
      - Verify footer social/legal links expose the intended destinations.
      - Verify cart badge count increments visually when the cart has items.
    acceptance_criteria:
      - Desktop sticky order bar remains pinned at the bottom edge while scrolling.
      - Mobile FAB remains fixed at the bottom-right and shows a round badge above it with the cart count.
      - Header remains sticky on both desktop and mobile and the return-to-home link is visible and clickable.
    failure_modes:
