related_conventions:
  naming_patterns_in_domain: Section components use PascalCase filenames under zip/src/components/sections, while design-contract documents live under docs/plan/... and instruction files under .github/instructions/.
  structure_of_domain: Global theme tokens live in zip/src/index.css, canonical usage lives in TemplatePage, imported and native sections share one sections directory, and lightweight utility scripts sit at zip/ root.
  error_handling_in_domain: Existing frontend refactor scripts mutate files directly and log touched files, while the instruction docs require stopping when cleanup would force geometry changes or ad hoc typography invention.
  testing_in_domain: Frontend tests use node:test, react-dom/server renderToStaticMarkup, and regex assertions for exact class fragments and regression guards.
  documentation_in_domain: The adaptation contract and whitelist explicitly define allowed token roles, banned typography utilities, and geometry-preservation rules for raw imports.

related_dependencies:
  internal:
    - component: zip/src/index.css
      relationship_to_domain: supplies token and utility targets for rewrites
      direction: outbound
    - component: zip/src/pages/TemplatePage.tsx
      relationship_to_domain: supplies canonical usage examples for project typography and spacing
      direction: outbound
    - component: zip/lib/utils.ts
      relationship_to_domain: wraps className composition through cn
      direction: outbound
    - component: zip/src/components/sections/*.test.tsx
      relationship_to_domain: verifies transformed markup and layout invariants
      direction: inbound
    - component: docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md
      relationship_to_domain: defines cleanup and geometry rules for raw imports
      direction: outbound
    - component: .github/instructions/design-system.instructions.md
      relationship_to_domain: defines the instruction-layer contract for imported block cleanup
      direction: outbound
  external:
    - name: react
      purpose_for_domain: component runtime for TSX blocks
    - name: tailwindcss
      purpose_for_domain: utility vocabulary and theme variable system
    - name: shadcn
      purpose_for_domain: raw import source ecosystem and registry config
    - name: tsx
      purpose_for_domain: direct execution of a repo-local transform script
    - name: typescript
      purpose_for_domain: typed parsing and compile validation for transformed code

testing_patterns:
  framework: node:test with react-dom/server string rendering assertions
  coverage_areas:
    - section text content
    - repeated class-stack invariants
    - absence of known-bad class combinations
    - data-section and variant markers
  test_organization: colocated *.test.tsx files near sections and layout helpers under zip/src
  mock_patterns:
    - render TSX to static HTML with renderToStaticMarkup
    - assert exact regex class fragments with assert.match and assert.doesNotMatch

open_questions:
  - question: How will the repo identify which section files are still raw imports versus already-curated Bulwar components?
    context: Imported and native sections coexist under zip/src/components/sections, and a broad directory-level transform would hit both.
    type: decision_blocker
    affects:
      - frontend-research
  - question: Should nonsemantic text wrappers like div or span be normalized only when they match an explicit allowlist, or always be left for review?
    context: Feature314 and Feature285 place text roles on nonsemantic wrappers, which prevents deterministic size remapping by tag name alone.
    type: decision_blocker
    affects:
      - frontend-research
  - question: Should layout-shell normalization be entirely out of scope for the first script pass?
    context: The checked-in docs forbid width and geometry changes, but imported sections still use container, rounded-4xl, and other shell choices that are visually meaningful.
    type: decision_blocker
    affects:
      - frontend-research
  - question: Should Button className typography be governed by the same semantic text-role mapping as native text tags?
    context: Hero214 and other sections carry tracking utilities inside Button className strings where semantic element role is indirect.
    type: research
    affects:
      - frontend-research

gaps:
  - area: raw-import targeting
    description: No checked-in manifest, file suffix, or metadata flag distinguishes freshly imported shadcn blocks from curated project sections inside zip/src/components/sections.
    impact: decision_blocker
    affects:
      - frontend-research
  - area: codemod package surface
    description: zip/package.json exposes tsx and TypeScript but does not declare a direct AST codemod dependency such as ts-morph, jscodeshift, or recast as a first-class dev dependency.
    impact: research_blocker
    affects:
      - frontend-research
  - area: non-literal class expressions
    description: This research pass confirmed many static className strings, but it did not inventory every interpolated or computed class expression across zip/src/components/sections.
    impact: research_blocker
    affects:
      - frontend-research
  - area: canonical token replacement table
    description: The docs define approved vocabulary and banned typography utilities, but they do not provide a machine-readable mapping table from common raw shadcn utility stacks to exact project replacements.
    impact: research_blocker
    affects:
      - frontend-research
