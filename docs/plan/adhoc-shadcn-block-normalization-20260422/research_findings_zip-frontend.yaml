      - file: zip/src/components/sections/PageBuilderMenuSection.test.tsx
        location: zip/src/components/sections/PageBuilderMenuSection.test.tsx:43
        snippet: 'assert.doesNotMatch(markup, /...leading-snug tracking-wider.../);'
    prevalence: common

  - category: naming
    pattern: Imported sections coexist with curated Bulwar sections in the same directory.
    description: The sections directory contains both native project sections and raw-import-style components without a dedicated source marker, so file-level targeting cannot rely on directory alone.
    examples:
      - file: zip/src/components/sections/AboutSection.tsx
