plan_id: adhoc-shadcn-block-normalization-20260422
objective: Assess whether a script or codemod is feasible in zip/ to normalize raw shadcn TSX/JSX blocks so typography and theme usage follow the global theme file instead of manual cleanup.
focus_area: zip-frontend
created_at: '2026-04-22T00:00:00Z'
created_by: gem-researcher
status: completed

tldr: |
  - Verdict: partially feasible. The repo already has a deterministic token layer in zip/src/index.css and explicit raw-import typography rules in the checked-in design docs, which gives a codemod a stable rewrite target.
  - Deterministic automation is strongest for literal className strings on semantic text elements, banned typography utility removal, project token substitution, and report generation for unresolved classes or non-literal expressions.
  - Full automatic normalization is unsafe for layout-shell choices, geometry changes, width strategy, component-specific visual intent, and mixed semantic/non-semantic markup where text role must be inferred.
  - The existing zip toolchain favors a repo-local TypeScript or tsx CLI with dry-run and report modes over another broad regex script; current regex refactors in zip/ show precedent but also demonstrate the risk of text-only mutation.
  - Reviewable HTML-string tests already exist in zip/src via node:test plus renderToStaticMarkup, so script output can be checked with lightweight snapshot-style assertions on targeted sections.

research_metadata:
  methodology: hybrid retrieval using targeted read_file, grep_search, file_search, memory lookups, instruction-file reads, and one narrow PowerShell line-count command for metadata
  scope: focused on zip/ theme source-of-truth, representative raw-import section files, frontend package/config files, existing refactor scripts, and nearby frontend testing patterns
  confidence: high
  coverage: 82
  decision_blockers: 0
  research_blockers: 0

