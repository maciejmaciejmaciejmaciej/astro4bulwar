patterns_found:
  - category: architecture
    pattern: Theme normalization targets are explicit and centralized.
    description: The frontend exposes semantic color and font roles plus shared block utilities in one CSS entrypoint, and the design docs explicitly bind raw-import cleanup to that file and TemplatePage.
    examples:
      - file: zip/src/index.css
        location: zip/src/index.css:7
        snippet: '@theme { --color-primary: var(--primary); --font-headline: var(--font-sans); }'
      - file: zip/src/index.css
        location: zip/src/index.css:53
        snippet: '.theme-block-heading { @apply font-headline text-3xl uppercase tracking-tight text-foreground lg:text-6xl; }'
      - file: docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md
        location: docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md:20
        snippet: 'The primary global style source for the React frontend is zip/src/index.css.'
    prevalence: common

  - category: structure
    pattern: Imported sections often keep literal className strings on semantic text tags.
    description: Many representative imported sections still use literal Tailwind class stacks on h1-h3 and p elements, which makes AST-based class rewriting mechanically approachable when className is a static string.
    examples:
      - file: zip/src/components/sections/About1.tsx
        location: zip/src/components/sections/About1.tsx:44
        snippet: '<h3 className="mb-4 text-4xl font-semibold tracking-tight md:text-5xl">'
      - file: zip/src/components/sections/Feature20.tsx
        location: zip/src/components/sections/Feature20.tsx:66
        snippet: '<h2 className="text-4xl font-semibold tracking-tight md:w-1/2 md:text-5xl">'
      - file: zip/src/components/sections/Feature314.tsx
        location: zip/src/components/sections/Feature314.tsx:106
        snippet: '<h3 className="mt-0.5 text-xl font-medium md:text-xl">'
    prevalence: common

  - category: typography
    pattern: Raw imported typography utilities conflict with the checked-in cleanup protocol.
    description: Representative imported sections still contain font-weight and tracking utilities that the instruction layer bans for fresh raw imports.
    examples:
      - file: zip/src/components/sections/Hero214.tsx
        location: zip/src/components/sections/Hero214.tsx:47
        snippet: '<h1 className="font-headline text-left text-5xl tracking-tighter lg:text-6xl">'
      - file: zip/src/components/sections/Feature285.tsx
        location: zip/src/components/sections/Feature285.tsx:53
        snippet: '<span className="text-xl font-semibold tracking-tight">'
      - file: .github/instructions/design-system.instructions.md
        location: .github/instructions/design-system.instructions.md:41
        snippet: 'Never keep or emit these classes on fresh raw imports: leading-*, tracking-*, font-semibold, font-medium, font-bold...'
    prevalence: common

  - category: structure
    pattern: Some imported sections already use compatible tokenized surfaces and borders.
    description: Several imported sections already rely on bg-card, bg-muted, border-border, shadow-sm, and project aliases, so theme normalization does not need to rewrite every class in each block.
    examples:
      - file: zip/src/components/sections/Feature20.tsx
        location: zip/src/components/sections/Feature20.tsx:103
        snippet: '"overflow-hidden rounded-xl border border-border bg-card shadow-sm"'
      - file: zip/src/components/sections/Feature285.tsx
        location: zip/src/components/sections/Feature285.tsx:44
        snippet: '"... overflow-hidden rounded-4xl bg-muted lg:grid-cols-2"'
      - file: zip/components.json
        location: zip/components.json:10
        snippet: '"cssVariables": true'
    prevalence: common

  - category: architecture
    pattern: Existing frontend refactors are regex-driven and mutate broadly.
    description: The current helper scripts traverse zip/src and replace text classes through plain string substitution, without JSX awareness or any safe review mode.
    examples:
      - file: zip/refactor_fonts.cjs
        location: zip/refactor_fonts.cjs:1
        snippet: 'content.replace(/text-\[(\d+|\d+\.\d+)px\]/g, ...)'
      - file: zip/refactor_scaleup.cjs
        location: zip/refactor_scaleup.cjs:1
        snippet: 'content = content.replace(/\btext-xs\b/g, "text-sm")'
      - file: zip/refactor_scaledown.cjs
        location: zip/refactor_scaledown.cjs:1
        snippet: 'content = content.replace(/\btext-lg\b/g, "text-base")'
    prevalence: occasional

  - category: testing
    pattern: Frontend tests validate rendered markup and class invariants with node:test.
    description: Section tests already render TSX to static markup and assert for exact class fragments or the absence of regressions, which fits a codemod verification workflow.
    examples:
      - file: zip/src/components/sections/OurServices.test.tsx
        location: zip/src/components/sections/OurServices.test.tsx:3
        snippet: 'import { renderToStaticMarkup } from "react-dom/server";'
      - file: zip/src/components/sections/OurServices.test.tsx
        location: zip/src/components/sections/OurServices.test.tsx:14
