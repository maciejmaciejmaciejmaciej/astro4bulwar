      - live under zip/src so zip/tsconfig.json covers it
      - accept one or more explicit file paths only
      - default to dry-run output and require an explicit write flag for mutation
      - refuse directory or glob-style recursion in v1
      - define the supported text-role scope up front: h1-h6, p, and small only

      This task should also add the minimal package entry needed to run the tool
      predictably from zip/ without widening scope into a general codemod framework.
