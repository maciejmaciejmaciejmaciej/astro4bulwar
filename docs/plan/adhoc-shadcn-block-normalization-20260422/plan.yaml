            mitigation: Centralize class token parsing and rewrite only matched size tokens on known semantic elements.
          - scenario: The transform tries to infer semantic meaning for spans or Button content and rewrites them incorrectly.
            likelihood: medium
            impact: medium
            mitigation: Route unsupported tags and indirect text roles into unresolved-case reporting with explicit reason codes.
    tech_stack:
