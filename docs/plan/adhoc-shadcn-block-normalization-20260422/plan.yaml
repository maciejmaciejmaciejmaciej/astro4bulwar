      - path: docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md
        description: Geometry-preservation contract and report-the-blocker rule.
      - path: zip/src/index.css
        description: Source of approved semantic text colors and shared token vocabulary that must remain intact.
    planning_pass: 1
    planning_history:
      - pass: 1
        reason: Implement the narrowest transform that is materially safer than the legacy regex scripts.
        timestamp: '2026-04-22T00:00:00Z'
        estimated_effort: medium
