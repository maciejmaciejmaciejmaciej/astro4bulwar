        estimated_lines: 220
        focus_area: AST-guided class rewriting and unresolved reporting
        verification:
          - Targeted semantic tags lose banned font-weight, tracking, and leading classes.
          - Targeted semantic tags end with exactly one approved size class.
          - Semantic color tokens and layout classes remain unchanged.
          - Unsupported cases are reported, not mutated.
        acceptance_criteria:
          - V1 is materially safer than zip/refactor_*.cjs because it is element-aware and file-targeted.
          - Nonsemantic or computed cases are surfaced in the report with reasons.
          - No layout-shell or width normalization is attempted.
        failure_modes:
