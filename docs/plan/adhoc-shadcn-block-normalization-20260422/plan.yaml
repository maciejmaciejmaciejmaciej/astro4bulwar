  - id: t-2
    title: Implement semantic-tag normalization and unresolved-case reporting without layout rewrites
    description: |
      Implement the actual v1 transform using the existing TypeScript dependency
      instead of broad regex substitution.

      The transform should:
      - inspect TSX and touch only supported semantic text elements with static class strings
      - normalize h1-h6, p, and small to the approved single text-size mapping from
        .github/instructions/design-system.instructions.md and /memories/repo/raw-import-typography.md
      - remove banned leading-*, tracking-*, and raw font-weight utilities from the
        targeted class list only
      - preserve non-typography classes such as spacing, layout, radius, border,
        and semantic text color tokens from zip/src/index.css
      - emit unresolved entries instead of rewriting spans, divs, Button className
        stacks, or computed/interpolated className expressions

      Keep shell geometry, wrapper width, and layout composition fully out of scope.
    wave: 2
    agent: gem-implementer
    prototype: false
    priority: high
    status: pending
    dependencies:
      - t-1
    conflicts_with: []
    context_files:
