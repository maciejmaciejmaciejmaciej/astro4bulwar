plan_id: adhoc-shadcn-block-normalization-20260422
objective: >-
  Implement a first proper v1 script in zip/ that takes an explicitly targeted raw
  shadcn TSX block and normalizes typography and theme usage more safely than the
  existing regex-wide scripts, while keeping scope limited to text-bearing elements
  and reporting unresolved cases instead of guessing.
created_at: '2026-04-22T00:00:00Z'
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 3
  risk_score: low

tldr: |
  zip/refactor_fonts.cjs, zip/refactor_scaleup.cjs, and zip/refactor_scaledown.cjs prove the current automation surface is broad text replacement rather than JSX-aware rewriting.
  zip/src/index.css, .github/instructions/design-system.instructions.md, docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md, and /memories/repo/raw-import-typography.md already define the approved semantic text-size mapping and the banned font-weight, tracking, and leading classes.
  The safest v1 is a typed opt-in CLI under a tsconfig-covered zip/src path that accepts explicit files only, rewrites only supported semantic text tags with static class strings, and emits an unresolved-case report for spans, divs, Button className stacks, or computed expressions.
open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: The transform removes every text-* class and accidentally strips color tokens such as text-zinc-500 or text-on-surface along with font-size classes.
      likelihood: medium
      impact: high
      mitigation: Restrict size removal to a narrow allowlist of font-size utilities and arbitrary text-[<length>] tokens, and preserve semantic color classes defined in zip/src/index.css.
    - scenario: The tool mutates curated Bulwar components or geometry-sensitive wrappers because it behaves like the old repo-wide walkers.
      likelihood: low
      impact: high
      mitigation: Require explicit file arguments, default to dry-run, refuse directory recursion in v1, and keep layout-shell or nonsemantic wrapper changes out of scope.
    - scenario: The new CLI lands at zip/ root and bypasses zip/tsconfig.json, so npm run lint does not validate the implementation.
      likelihood: medium
      impact: medium
      mitigation: Place the implementation under a zip/src path already included by zip/tsconfig.json and keep the CLI wrapper thin.
  assumptions:
    - The user-approved v1 scope is limited to semantic text elements h1-h6, p, and small, with ambiguous text roles reported rather than rewritten.
    - Button typography, span or div text roles, and computed className expressions are report-only in v1 because the role cannot be inferred deterministically from the checked-in rules.
    - zip/src/index.css remains the theme and token source of truth, while the semantic size mapping from .github/instructions/design-system.instructions.md and /memories/repo/raw-import-typography.md governs typography cleanup.

implementation_specification:
  code_structure: >-
    Add a typed CLI entrypoint and pure normalization helpers under zip/src so
    zip/tsconfig.json includes the new code. Keep the file-system and argument
    handling thin, and route all rewrite logic through a pure transform that uses
    the existing TypeScript dependency to inspect TSX, limit edits to supported
    semantic text tags, preserve non-typography classes, and return a structured
    unresolved-case report. Add focused node:test coverage next to the tool and a
    short operator-facing v1 usage note in this plan folder.
  affected_areas:
    - zip/src/tools/normalizeRawShadcnTypography.ts
    - zip/package.json
    - zip/src/tools/normalizeRawShadcnTypography.test.ts
    - docs/plan/adhoc-shadcn-block-normalization-20260422/v1-usage.md
  component_details:
    - component: Typed CLI entrypoint
      responsibility: Parse explicit file arguments, expose dry-run and write modes, and print a deterministic summary of rewrites and unresolved cases.
      interfaces:
        - CLI signature with explicit positional file paths only
        - --write flag for in-place updates
        - structured stdout summary for changed files and unresolved cases
    - component: Semantic text normalization core
      responsibility: Rewrite supported TSX text-bearing elements to the approved semantic text-size mapping and remove banned typography utilities without touching layout geometry.
      interfaces:
        - normalizeSource(sourceText, filePath) -> { output, changed, unresolved[] }
        - supported tag mapping for h1-h6, p, and small
        - banned typography class filter for leading-*, tracking-*, and raw font-weight utilities
    - component: Unresolved-case reporter
      responsibility: Capture ambiguous cases that v1 must not auto-fix, including nonsemantic text wrappers, computed className expressions, and indirect component text roles.
      interfaces:
        - unresolved item shape with file, element, location, and reason
        - human-readable console rendering for review
    - component: Focused test harness
      responsibility: Prove the transform rewrites only the intended text-role classes and leaves ambiguous cases for manual review.
      interfaces:
        - node:test fixture cases for direct className and static cn(...) patterns
        - regression assertions for unresolved-case reporting and dry-run behavior
  dependencies:
    - component: zip/src/index.css
      relationship: Supplies the approved token vocabulary that non-typography classes must preserve.
    - component: .github/instructions/design-system.instructions.md
      relationship: Defines the semantic size mapping and banned typography classes that the transform must enforce.
    - component: docs/plan/astro-wordpress-page-builder/global-css-adaptation-contract.md
      relationship: Defines the geometry-preservation boundary and the report-instead-of-guess rule.
    - component: zip/package.json and zip/tsconfig.json
      relationship: Determine how the CLI is executed and whether the implementation is covered by the existing lint gate.
  integration_points:
    - Operator workflow in zip/ via an explicit tsx-powered package script or direct tsx invocation.
    - Imported TSX blocks in zip/src/components/sections that still carry static raw shadcn typography stacks.
    - Existing node:test validation pattern already used by zip/src/**/*.test.tsx.

contracts:
  - from_task: t-1
    to_task: t-2
    interface: Supported CLI contract and transform boundary, including explicit file-only targeting, dry-run default, write mode, supported tags, and report-only categories.
    format: TypeScript option types plus CLI help text examples.
  - from_task: t-2
    to_task: t-3
    interface: Pure transform return shape containing rewritten source, changed flag, and unresolved cases with stable reason codes.
    format: TypeScript return type and fixture input-output expectations.
  - from_task: t-3
    to_task: t-4
    interface: Verified invocation command, supported cases, and unresolved-case examples that operators need to recognize.
    format: Test-backed CLI usage notes and example console output.

