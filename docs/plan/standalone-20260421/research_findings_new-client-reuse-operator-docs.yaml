tldr: |
  - Repo opisuje reuse jako model dwufazowy: najpierw Faza wdrozeniowa doprowadza do dzialajacego WordPress na `/`, React na `/react` i Astro na `/astro`, a dopiero potem Faza produkcyjna przenosi ten sam front Astro na root domeny. Source: docs/setup/klonowanie-astro-wordpress-woocommerce.md:17, docs/setup/day-1-checklista-klonowania.md:29, /memories/repo/astro-wp-clone-workflow.md:1.
  - Twarda bramka przed produkcja wymaga stabilnego `/astro`, health endpointu `wp-json/bulwar/v1/health`, braku runtime fallbackow do starej domeny, poprawnych canonicali/linkow i potwierdzonego manualnego deployu przed CI. Source: docs/setup/klonowanie-astro-wordpress-woocommerce.md:70, docs/setup/sekwencyjny-przewodnik-klonowania.md:100, wordpress-plugin/bulwar-bridge/src/Http/Routes.php:16.
  - Operator przed pierwszym deployem musi miec wypelniony manifest klienta, usuniete lub odizolowane artefakty starej instancji (`id_rsa`, `id_rsa.pub`, `temp_wp_config.php`, lokalne `.env*`), przygotowane katalogi `/react` i `/astro`, ustawione stale bridge i przepiete domeny/slugi/SSH/sciezki deployowe. Source: docs/setup/day-1-checklista-klonowania.md:5, docs/setup/template-manifest-nowej-instancji.md:98, docs/setup/repo-do-klonowania-plan-parametryzacji.md:5, workspace root file inventory.
  - Najwczesniej dotykane pliki sa realnie zahardkodowane pod obecna instancje: `astro-site/astro.config.mjs`, `astro-site/src/lib/config.ts`, `zip/vite.config.ts`, `zip/src/main.tsx`, `deploy-react.sh`, `SCRIPTS/deploy-astro-static.ps1`, `SCRIPTS/rollback-astro-static.ps1`, `.github/workflows/deploy-astro-dhosting.yml`, helpery React z fallbackiem do `https://client.example`, slug `testowa-blueprint`, oraz stale bridge. Source: astro-site/astro.config.mjs:4, astro-site/astro.config.mjs:6, zip/vite.config.ts:9, zip/src/main.tsx:9, deploy-react.sh:4, SCRIPTS/deploy-astro-static.ps1:11, .github/workflows/deploy-astro-dhosting.yml:24, zip/src/pages/TestowaBlueprintPage.tsx:8, zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts:62, zip/src/blocks/registry/wordpressApi.ts:30, zip/src/blocks/registry/wooStoreApi.ts:56, wordpress-plugin/bulwar-bridge/src/Config/Constants.php:39.
  - Dhosting jest w tym repo traktowany jako hosting z obowiazkowym krokiem `chmod 755` dla katalogow i `chmod 644` dla plikow po deployu lub rollbacku; ten sam wymog wystepuje w docs/setup, lokalnych skryptach i workflow GitHub Actions. Source: docs/setup/repo-do-klonowania-plan-parametryzacji.md:84, deploy-react.sh:14, deploy-react.sh:15, SCRIPTS/deploy-astro-static.ps1:49, SCRIPTS/deploy-astro-static.ps1:50, SCRIPTS/rollback-astro-static.ps1:44, SCRIPTS/rollback-astro-static.ps1:45, .github/workflows/deploy-astro-dhosting.yml:86, .github/workflows/deploy-astro-dhosting.yml:87.

