    pattern: Zachowanie topologii `/`, `/react`, `/astro`
    description: Dokumentacja, runtime i bridge contracts utrzymuja WordPress na root domeny, React pod `/react`, a Astro pod `/astro` jako najszybsza droga reuse.
    examples:
      - file: /memories/repo/astro-wp-clone-workflow.md
        location: /memories/repo/astro-wp-clone-workflow.md:1
        snippet: "WordPress on root, React under /react, Astro under /astro"
      - file: astro-site/astro.config.mjs
        location: astro-site/astro.config.mjs:4
        snippet: "base: '/astro/'"
      - file: zip/src/main.tsx
        location: zip/src/main.tsx:9
        snippet: "<BrowserRouter basename=\"/react\">"
    prevalence: common

  - category: deployment
    pattern: Twarde, repo-specyficzne sciezki deployu i backupow
    description: Skrypty deployowe i workflow CI maja zakodowane obecne `public_html`, backup roots i host SSH, wiec sa pierwszorzednym obszarem przepiecia przy reuse.
    examples:
      - file: deploy-react.sh
        location: deploy-react.sh:4
        snippet: "BASE=\"/home/client-user/domains/client.example/public_html\""
      - file: SCRIPTS/deploy-astro-static.ps1
        location: SCRIPTS/deploy-astro-static.ps1:11
        snippet: "$remotePublicRoot = '/home/client-user/domains/client.example/public_html/astro'"
      - file: .github/workflows/deploy-astro-dhosting.yml
        location: .github/workflows/deploy-astro-dhosting.yml:24
        snippet: "REMOTE_PUBLIC_ROOT: /home/client-user/domains/client.example/public_html/astro"
    prevalence: common

  - category: runtime
    pattern: Fallbacki do starej domeny i testowego sluga
    description: React i Astro maja zahardkodowane URL-e do `https://client.example` oraz slug `testowa-blueprint`, co docs/setup i repo memory traktuja jako glowny cluster zmian pierwszego dnia.
    examples:
      - file: astro-site/src/lib/config.ts
        location: astro-site/src/lib/config.ts:1
        snippet: "export const WORDPRESS_BASE_URL = 'https://client.example'"
      - file: zip/src/blocks/registry/wordpressApi.ts
        location: zip/src/blocks/registry/wordpressApi.ts:30
        snippet: "VITE_WORDPRESS_BASE_URL ?? \"https://client.example\""
      - file: zip/src/pages/TestowaBlueprintPage.tsx
        location: zip/src/pages/TestowaBlueprintPage.tsx:8
        snippet: "const PAGE_BUILDER_SLUG = \"testowa-blueprint\""
    prevalence: common

  - category: validation
    pattern: Health endpoint jako operator gate
    description: Bridge health sluzy jako glowny warunek przejscia dalej i expose'uje brakujace stale wymagane dla nowej instancji.
    examples:
      - file: docs/setup/klonowanie-astro-wordpress-woocommerce.md
        location: docs/setup/klonowanie-astro-wordpress-woocommerce.md:70
        snippet: "bridge health zwraca `success=true`"
      - file: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:16
        snippet: "register_rest_route('bulwar/v1', '/health'"
      - file: wordpress-plugin/bulwar-bridge/src/Http/Controllers/HealthController.php
        location: wordpress-plugin/bulwar-bridge/src/Http/Controllers/HealthController.php:21
        snippet: "'missingRequiredConstants' => Constants::missingRequiredConstants()"
    prevalence: common

  - category: seo
    pattern: Root cutover only after `/astro` stability
    description: SEO, canonicale, sitemap i los `/astro` sa modelowane jako osobny etap po domknieciu wdrozeniowej stabilnosci.
    examples:
      - file: docs/setup/checklista-migracji-seo-wordpress-do-astro.md
        location: docs/setup/checklista-migracji-seo-wordpress-do-astro.md:35
        snippet: "Nie rob cutoveru, dopoki Faza wdrozeniowa nie daje stabilnego `domena.pl/astro`."
      - file: docs/setup/tabela-zadan-klonowania.md
        location: docs/setup/tabela-zadan-klonowania.md:22
        snippet: "tylko root domeny jest publicznie indeksowalny"
    prevalence: common

  - category: hosting
    pattern: dhosting chmod post-deploy rule
    description: Prawa 755/644 sa w tym repo czescia definicji udanego deployu i rollbacku, a nie opcjonalna administracja serwera.
    examples:
      - file: docs/setup/repo-do-klonowania-plan-parametryzacji.md
        location: docs/setup/repo-do-klonowania-plan-parametryzacji.md:84
        snippet: "Po kazdym deployu wymus prawa"
      - file: deploy-react.sh
        location: deploy-react.sh:14
        snippet: "find \"$BASE/react\" -type d -exec chmod 755 {} \;"
      - file: .github/workflows/deploy-astro-dhosting.yml
        location: .github/workflows/deploy-astro-dhosting.yml:87
        snippet: "find '${REMOTE_PUBLIC_ROOT}' -type f -exec chmod 644 {} \;"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: docs/setup package
      responsibility: Defines the operator workflow, gates, manifests, and SEO cutover rules for reuse.
      location: docs/setup/
      relationship_to_domain: domain depends on this
    - component: Astro runtime config
      responsibility: Holds Astro base path and WordPress base URL for the static frontend.
      location: astro-site/astro.config.mjs and astro-site/src/lib/config.ts
      relationship_to_domain: domain depends on this
    - component: React runtime config
      responsibility: Holds React SPA basename, `/react` build base, page-builder slug, and WordPress/Woo fallback URLs.
      location: zip/src/main.tsx, zip/vite.config.ts, zip/src/pages/TestowaBlueprintPage.tsx, zip/src/blocks/registry/**, zip/components/CheckoutDrawer.tsx
      relationship_to_domain: domain depends on this
    - component: Deploy scripts and workflow
      responsibility: Transfer artifacts to dhosting, back them up, and restore permissions.
      location: deploy-react.sh, SCRIPTS/deploy-astro-static.ps1, SCRIPTS/rollback-astro-static.ps1, .github/workflows/deploy-astro-dhosting.yml
      relationship_to_domain: domain depends on this
    - component: bulwar-bridge plugin
      responsibility: Exposes same-domain REST endpoints, validates required bridge constants, and anchors the health gate.
      location: wordpress-plugin/bulwar-bridge/
      relationship_to_domain: domain depends on this
  interfaces_used_by_domain:
    - interface: GET /wp-json/bulwar/v1/health
      location: wordpress-plugin/bulwar-bridge/src/Http/Routes.php:16
      usage_pattern: Used as a readiness gate in docs/setup and manifest checklists.
    - interface: GET /wp-json/bulwar/v1/page-builder/pages/{slug}
      location: zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts:67
      usage_pattern: Used by the test page slug during runtime validation of the cloned WordPress content layer.
    - interface: Same-domain React under /react
      location: wordpress-plugin/bulwar-bridge/docs/contracts.md:6
      usage_pattern: SPA stays on `/react` and is not moved during the first deployment phase.
  data_flow_involving_domain: Operator fills manifest and first-day checklist, rewires domain/slug/SSH/public_html values in Astro, React, deploy scripts and bridge constants, deploys React to `/react` and Astro to `/astro`, then validates same-domain bridge health and page-builder endpoints before any production root cutover.
  key_relationships_to_domain:
    - from: docs/setup/template-manifest-nowej-instancji.md
      to: astro-site/astro.config.mjs
      relationship: configures
    - from: docs/setup/template-manifest-nowej-instancji.md
      to: zip/src/main.tsx
      relationship: configures
    - from: docs/setup/template-manifest-nowej-instancji.md
      to: deploy-react.sh
      relationship: configures
    - from: docs/setup/day-1-checklista-klonowania.md
      to: wordpress-plugin/bulwar-bridge/src/Http/Controllers/HealthController.php
      relationship: validates via
    - from: zip/src/pages/TestowaBlueprintPage.tsx
      to: zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts
      relationship: calls
    - from: zip/src/blocks/registry/fetchWordPressPageBuilderSchema.ts
      to: wordpress-plugin/bulwar-bridge/src/Http/Routes.php
      relationship: consumes

related_technology_stack:
  languages_used_in_domain:
    - Markdown
    - YAML
    - TypeScript
    - TSX
    - JavaScript
    - Bash
    - PowerShell
    - PHP
  frameworks_used_in_domain:
    - name: Astro ^5.14.2
      usage_in_domain: Static frontend published under `/astro`, configured by `astro-site/package.json` and `astro-site/astro.config.mjs`.
    - name: React ^19.0.0
      usage_in_domain: SPA published under `/react`, with basename routing and page-builder test page.
    - name: Vite ^6.2.0
      usage_in_domain: Build system for the React SPA and public base `/react/`.
    - name: React Router DOM ^7.13.1
      usage_in_domain: Sets SPA basename `/react` in `zip/src/main.tsx`.
    - name: WordPress plus WooCommerce
      usage_in_domain: Backend root install, same-domain REST surface, and checkout authority for the cloned client.
    - name: GitHub Actions
      usage_in_domain: CI deploy path for Astro using Node.js 22 and SSH-based archive deployment.
  libraries_used_in_domain:
    - name: zod ^4.3.6
      purpose_in_domain: Shared validation dependency present in both Astro and React packages.
    - name: @tailwindcss/vite ^4.1.14
      purpose_in_domain: React build plugin used in the `/react` application.
    - name: @google/genai ^1.29.0
      purpose_in_domain: Present in React package and paired with a Vite build define for `GEMINI_API_KEY`.
  external_apis_used_in_domain:
    - name: WordPress REST bulwar/v1
      integration_point: React page-builder and layout helpers plus operator health checks.
    - name: Make webhook
      integration_point: Bridge constant `BULWAR_BRIDGE_MAKE_WEBHOOK_URL` and post-order notifications documented in bridge contracts.

related_conventions:
  naming_patterns_in_domain: Docs and scripts use "Faza wdrozeniowa" and "Faza produkcyjna" consistently; test landing slug is named `testowa-blueprint`; path variables use explicit names like `REMOTE_PUBLIC_ROOT`, `remotePublicRoot`, `WORDPRESS_BASE_URL`, and `PAGE_BUILDER_SLUG`.
  structure_of_domain: Operator docs live in `docs/setup/`; Astro deployment lives under `astro-site/` and `SCRIPTS/`; React deployment and runtime under `zip/`; WordPress integration under `wordpress-plugin/bulwar-bridge/`.
  error_handling_in_domain: Docs define gates rather than exception flows; runtime helpers throw on non-OK HTTP responses; bridge health returns a success envelope with `missingRequiredConstants` instead of failing closed.
  testing_in_domain: Dominant pattern is manual operator verification through health endpoint, `/react`, `/astro/<slug>`, permissions check, and at least one critical order test before phase closure.
  documentation_in_domain: The setup package is split by intent: one overview, one day-1 checklist, one task table, one blank manifest, one filled manifest example, one sequential guide, one parameterization plan, and one SEO cutover checklist.

related_dependencies:
  internal:
    - component: astro-site/astro.config.mjs
      relationship_to_domain: Supplies `/astro` base and site origin that docs/setup tells the operator to change.
      direction: outbound
    - component: astro-site/src/lib/config.ts
      relationship_to_domain: Supplies Astro WordPress base URL fallback that must follow the new backend.
      direction: outbound
    - component: zip/src/main.tsx and zip/vite.config.ts
      relationship_to_domain: Supply React basename and build base under `/react`.
      direction: outbound
    - component: zip/src/blocks/registry/** and zip/components/CheckoutDrawer.tsx
      relationship_to_domain: Carry hardcoded domain fallbacks and bridge origin logic.
      direction: outbound
    - component: wordpress-plugin/bulwar-bridge/src/Config/Constants.php
      relationship_to_domain: Encodes required business constants and webhook/config defaults that drive health gating.
      direction: outbound
    - component: docs/setup/*
      relationship_to_domain: Provide the operator sequence used to touch the rest of the codebase.
      direction: inbound
  external:
    - name: dhosting SSH/SCP/SSH shell
      purpose_for_domain: Target runtime for manual and CI deploys, including permission repair.
    - name: WordPress plus WooCommerce install
      purpose_for_domain: Backend clone destination and same-domain runtime surface.
    - name: GitHub Secrets
      purpose_for_domain: Provide `DHOSTING_SSH_KEY`, `DHOSTING_SSH_HOST`, and `DHOSTING_SSH_USER` in CI.

domain_security_considerations:
  sensitive_areas:
    - area: Reused repository secrets and credentials
      location: workspace root and docs/setup/repo-do-klonowania-plan-parametryzacji.md:5
      concern: `id_rsa`, `id_rsa.pub`, `temp_wp_config.php`, and local `.env*` are explicitly called out as forbidden to inherit into a new client clone.
    - area: Build-time secret injection in React
      location: zip/vite.config.ts:12
      concern: `GEMINI_API_KEY` is exposed to Vite define logic and therefore belongs to the instance-specific secret set.
    - area: Bridge operational secrets
      location: wordpress-plugin/bulwar-bridge/src/Config/Constants.php:19 and wordpress-plugin/bulwar-bridge/src/Config/Constants.php:38
      concern: Make webhook URL and Google Maps key are instance-specific and tied to backend behavior.
  authentication_patterns_in_domain: Manual deploy scripts use SSH key auth against dhosting; CI writes an SSH private key from GitHub secrets and uses `scp` plus `ssh` for archive deployment.
  authorization_patterns_in_domain: Bridge health, page-builder and global-layout REST endpoints are registered with `permission_callback` set to `__return_true`, matching the same-domain frontend contract documented in bridge contracts.
  data_validation_in_domain: The bridge validates required constants through `Constants::missingRequiredConstants()`, while the operator docs enforce a manifest-first workflow to avoid guessing domain, SSH, public_html, backup and slug parameters.

testing_patterns:
  framework: Mixed manual operator verification plus PHP/TypeScript test coverage around bridge/runtime helpers.
  coverage_areas:
    - Health endpoint readiness via `GET /wp-json/bulwar/v1/health`
    - Live reachability of `/react/` and `/astro/<slug>/`
    - Absence of fallback calls to the old domain in runtime config
    - Post-deploy permissions on dhosting (`755/644`)
    - Minimum one critical order test before closing Faza wdrozeniowa
  test_organization: Manual gates are documented in `docs/setup/*`; bridge contracts and plugin tests live under `wordpress-plugin/bulwar-bridge/`; runtime helper tests exist under `astro-site/src/lib/*.test.ts` and `zip/src/**`.
  mock_patterns:
    - Public health response shape documented in `wordpress-plugin/bulwar-bridge/docs/contracts.md`
    - Runtime helper tests assert against hardcoded `https://client.example` URLs in current fixtures

open_questions:
  - question: Czy React ma byc publiczny pod `/react` dla kazdego nowego klienta, czy tylko wtedy gdy checkout jest potrzebny publicznie?
    context: Glowny overview i task table zachowuja `/react`, ale overview warunkuje jego publiczna poprawnosc fraza "jesli jest potrzebny publicznie".
    type: research
    affects:
      - standalone-20260421
  - question: Czy aktualny first-day must-change cluster powinien formalnie obejmowac `zip/src/App.tsx`, czy `zip/vite.config.ts` i `zip/src/main.tsx` sa nowym substytutem tej odpowiedzialnosci?
    context: `docs/setup/repo-do-klonowania-plan-parametryzacji.md` wskazuje `zip/src/App.tsx`, a repo memory wskazuje `zip/vite.config.ts` i `zip/src/main.tsx` jako first-day cluster.
    type: research
    affects:
      - standalone-20260421
  - question: Czy operator ma czyscic takze wygenerowane artefakty `dist/` i `deploy-*` zawierajace stara domene, czy workflow reuse zaklada dotykanie tylko plikow zrodlowych i skryptow?
    context: Grep pokazal liczne build artifacts z `https://client.example`, ale docs/setup nie rozroznia zrodel od artefaktow.
    type: research
    affects:
      - standalone-20260421

gaps:
  - area: React base-path docs drift
    description: Pakiet `docs/setup/*` nie wymienia explicite `zip/vite.config.ts` i `zip/src/main.tsx`, mimo ze te pliki realnie trzymaja `/react/` base i router basename.
    impact: research_blocker
    affects:
      - standalone-20260421
  - area: Bridge constants provisioning path
    description: Docs/setup mowia o "stalych bridge" i health-gate, ale nie opisują gdzie i jak operator ma je finalnie ustawic w nowej instancji WordPressa.
    impact: research_blocker
    affects:
      - standalone-20260421
  - area: Hardcoded old-domain inventory outside main cluster
    description: Dokumentacja nie ma jednego centralnego spisu wszystkich zahardkodowanych canonicali, asset origins i runtime fallbackow poza glownymi helperami i skryptami.
    impact: research_blocker
    affects:
      - standalone-20260421
