plan_id: firebase-draft-wp-authoring-e2e-20260418
objective: >
  Wdrozyc minimalny, praktyczny workflow authoringu page-buildera, w ktorym
  agent VS Code tworzy draft dokumentu w Firebase, workflow umie utworzyc
  brakujaca strone WordPress po slug, compile zawsze daje poprawne
  page_builder_schema i page_builder_schema_for_ai, a calosc da sie sprawdzic
  lokalnie oraz warunkowo end-to-end bez live credentiali.
created_at: '2026-04-18T00:00:00Z'
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 5
  risk_score: medium

tldr: |
  Najmniejszy spojny plan to utrzymac obecny repo-first bootstrap i compile
  gate jako fundament, dodac runtime-neutralny zapis draftu w ksztalcie
  FirebasePageDraft, rozszerzyc WordPress bridge o create-or-update po slug,
  a potem spiac jeden publish flow: draft -> compile obu schematow -> ensure
  page exists -> write obu meta -> verify readback. Poniewaz live runtime
  Firebase i live credy moga byc niedostepne, done powinno byc oparte o
  lokalny artifact draftu, testowany upsert WordPress i deterministyczny
  contract test dla obu schematow. Sources:
  zip/src/blocks/registry/firebasePageDraft.ts,
  SCRIPTS/generate-page-draft-from-scrape.ts,
  SCRIPTS/make-page-draft-compile-gate.js,
  wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php,
  docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md,
  docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md.

open_questions:
  - >
    Jaki docelowy mechanizm autoryzacji dla runtime Firebase ma obslugiwac
    agent po pojawieniu sie credentiali: service account w skrypcie,
    lokalny emulator, czy osobny backend helper? To nie blokuje etapu lokalnego,
    ale wplywa na finalna implementacje tasku zapisu draftu. Sources:
    docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md,
    user request.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: >
        Zostanie zaimplementowany tylko lokalny JSON artifact, a workflow
        zacznie udawac, ze posiada prawdziwy runtime Firebase create step.
      likelihood: medium
      impact: high
      mitigation: >
        Rozdzielic kontrakt draftu od transportu i nazwac lokalny etap jako
        Firebase-compatible draft write, dopoki live runtime nie zostanie
        skonfigurowany. Sources:
        zip/src/blocks/registry/firebasePageDraft.ts,
        docs/plan/astro-wordpress-page-builder/firebase-page-draft-mvp.md.
    - scenario: >
        Create-by-slug w WordPress zacznie tworzyc duplikaty albo nadpisywac
        niewlasciwa strone, bo obecny endpoint jest zaprojektowany tylko pod
        update istniejacej strony.
      likelihood: medium
      impact: critical
      mitigation: >
        Wprowadzic jawny upsert contract z resolve by sanitized slug,
        idempotent second call i testem, ze drugi publish nie tworzy nowego
        postu. Sources:
        wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php,
        docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md.
    - scenario: >
        Compile i publish rozjada sie semantycznie i workflow zapisze tylko
        jeden z meta payloadow albo utraci mapowanie 1:1 po block id.
      likelihood: medium
      impact: high
      mitigation: >
        Zachowac compile gate jako jedyne miejsce generowania obu payloadow i
        testowac jednoczesny write obu meta z readback verification. Sources:
        SCRIPTS/make-page-draft-compile-gate.js,
        .github/instructions/page-builder.instructions.md,
        wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php.
    - scenario: >
        Pelny live E2E zostanie uznany za blocker, mimo ze brak credentiali byl
        znany od poczatku.
      likelihood: high
      impact: medium
      mitigation: >
        Zdefiniowac warunkowe done: lokalny happy path i mockowane granice sa
        wymagane, live publish jest tylko finalnym smoke testem, jesli credy sa
        dostepne. Source: user request.
  assumptions:
    - >
      Nazwa FirebasePageDraft zostaje bez zmian i nie wchodzi do zakresu tej
      iteracji. Source: user request.
    - >
      Bootstrap draftu i compile gate juz istnieja i powinny zostac reuse,
      zamiast byc przepisywane. Sources:
      SCRIPTS/generate-page-draft-from-scrape.ts,
      SCRIPTS/make-page-draft-compile-gate.js,
      /memories/repo/firebase-draft-compile-gates.md.
    - >
      Najbardziej praktyczne miejsce na obsluge create missing page to obecny
      page-builder bridge, bo juz odpowiada za dual-meta update i permission
      check. Sources:
      wordpress-plugin/bulwar-bridge/src/Http/Routes.php,
      wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php.

implementation_specification:
  code_structure: |
    Zachowac obecny podzial odpowiedzialnosci: registry i kontrakt draftu w
    zip/src/blocks/registry, translacja scrape -> draft i compile w SCRIPTS,
    a WordPress create-or-update oraz dual-meta persistence w bridge pluginie.
    Nie budowac pelnego runtime Firebase na sile; najpierw dodac adapter write,
    ktory potrafi zapisac Firebase-compatible document oraz ma lokalny fallback
    do testow i dry-run. Publish flow ma byc pojedynczym orchestrated command:
    create draft, uzupelnij approved mappings, compile oba payloady, ensure page
    exists by slug, zapisz oba meta, zweryfikuj GET readback.
  affected_areas:
    - zip/src/blocks/registry/firebasePageDraft.ts
    - SCRIPTS/generate-page-draft-from-scrape.ts
    - SCRIPTS/make-page-draft-compile-gate.js
    - SCRIPTS/
    - wordpress-plugin/bulwar-bridge/src/Http/Routes.php
    - wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
    - docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md
  component_details:
    - component: Firebase-compatible draft writer
      responsibility: >
        Przyjac obecny FirebasePageDraft i zapisac go przez runtime adapter,
        ktory dzis moze byc lokalny albo mockowany, a pozniej prawdziwie
        firebase'owy bez zmiany kontraktu draftu.
      interfaces:
        - VS Code agent uruchamia jeden command, ktory konczy sie artifactem draftu i identyfikatorem dokumentu lub lokalnym odpowiednikiem.
        - FirebasePageDraft shape pozostaje kanonicznym kontraktem dokumentu roboczego.
    - component: WordPress page upsert by slug
      responsibility: >
        Upewnic sie, ze publish flow moze utworzyc brakujaca strone i przy
        kolejnym wywolaniu tylko ja zaktualizowac.
      interfaces:
        - Jeden authenticated path przyjmuje slug, title, schema i aiSchema oraz zwraca pageId i updated_meta_keys.
        - Drugi publish tego samego sluga jest idempotentny i nie tworzy duplikatu.
    - component: Compile and publish orchestrator
      responsibility: >
        Spiac istniejacy bootstrap draftu, approved source mappings, compile obu
        schematow i WordPress publish w jedna deterministyczna sciezke.
      interfaces:
        - Orchestrator otrzymuje draft lub scrape input i zwraca compiled payloady, pageId oraz wynik readback verify.
    - component: Local E2E harness
      responsibility: >
        Udowodnic lokalnie caly happy path bez live credow, z mockami granic
        Firebase i WordPress.
      interfaces:
        - Jeden test scenariusza przechodzi bootstrap -> draft write -> compile -> ensure page -> dual-meta publish -> GET verify.
    - component: Operator documentation
      responsibility: >
        Opisac warunkowy done i rozroznic lokalny E2E, dry-run publish oraz
        opcjonalny live smoke test.
      interfaces:
        - Krotka instrukcja uruchomienia i kryteria gotowosci bez live credentiali.
  dependencies:
    - component: createPageDraftFromScrape
      relationship: >
        Jest zrodlem draftu i ma byc pierwszym etapem workflow create draft.
    - component: make-page-draft-compile-gate
      relationship: >
        Pozostaje jedynym compile gate generujacym rownoczesnie
        page_builder_schema i page_builder_schema_for_ai.
    - component: PageBuilderController
      relationship: >
        Jest docelowym miejscem create-or-update strony i zapisu obu meta.
    - component: page-builder docs
      relationship: >
        Dokumenty musza zostac zaktualizowane, aby operator wiedzial kiedy
        workflow jest lokalny, a kiedy live.
  integration_points:
    - zip/src/blocks/registry/firebasePageDraft.ts
    - SCRIPTS/generate-page-draft-from-scrape.ts
    - SCRIPTS/make-page-draft-compile-gate.js
    - wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php
    - wordpress-plugin/bulwar-bridge/src/Http/Routes.php

contracts:
  - from_task: add_firebase_compatible_draft_write
    to_task: add_publish_orchestrator
    interface: >
