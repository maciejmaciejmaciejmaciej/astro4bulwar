plan_id: global-layout-footer-fix-20260420
objective: >-
  Properly fix the live global layout blocker by adding the smallest durable repo-owned
  operational tooling to upsert the shared footer page, set
  bulwar_bridge_global_layout.footerPageId, and verify the live endpoint plus Astro
  production build without ASTRO_ALLOW_GLOBAL_LAYOUT_FALLBACK=true.
created_at: 2026-04-20T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 4
  risk_score: medium

tldr: |
  - The blocker is operational data, not Astro behavior: the bridge already reads `bulwar_bridge_global_layout`, requires a positive `footerPageId`, and falls back when the referenced footer page or `shared_footer` block is missing or invalid. Sources: wordpress-plugin/bulwar-bridge/src/Config/Constants.php, wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php.
  - Astro is already fail-closed in production unless `ASTRO_ALLOW_GLOBAL_LAYOUT_FALLBACK=true` is set, and it rejects any global layout payload whose `layout_option_status` or `footer_status` is not `resolved`. Sources: astro-site/src/lib/wordpress.ts, astro-site/src/pages/[slug].astro.
  - The smallest durable fix is code+ops with no runtime loosening: add one narrow `wp-load.php` bootstrap writer plus one checked-in shared footer schema payload and one short operator update, then run the tool on live and verify `GET /wp-json/bulwar/v1/layout/global` plus `astro-site` production build without the fallback override. Sources: SCRIPTS/seed-testowa-blueprint-schema.php, docs/plan/navbar-footer-global-layout-v1/operator-reference.md, docs/plan/none/research_findings_global_layout_footer_seeding.yaml.

open_questions:
  - Which exact live footer content should seed the shared footer page if no canonical published footer payload is exported first. The plan assumes the repo will store one approved initial footer payload before the live write. Sources: docs/plan/ad-hoc-shared-footer-investigation/research_findings_shared-footer.yaml.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The new writer overwrites the full `bulwar_bridge_global_layout` option and destroys a valid `navbar` payload while fixing only `footerPageId`.
      likelihood: medium
      impact: critical
      mitigation: >-
        Make the script read the existing option, preserve `navbar` as-is, and only merge
        `footerPageId` unless an explicit force-overwrite flag is added later. Print the
        before/after option summary or support a dry-run before mutation. Sources:
        wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php,
        docs/plan/none/research_findings_global_layout_footer_seeding.yaml.
    - scenario: The seeded page_builder_schema uses the wrong block shape so WordPress resolves `fallback_footer_block_invalid` and Astro still fails.
      likelihood: medium
      impact: high
      mitigation: >-
        Keep the payload in a checked-in JSON artifact that contains exactly one enabled
        `shared_footer` section with `blockVersion: 1`, `source: null`, and footer data that
        matches the public footer contract. Validate against the existing contract shape before
        writing. Sources: astro-site/src/lib/globalLayoutContract.ts,
        zip/src/blocks/registry/globalLayoutContract.ts,
        wordpress-plugin/bulwar-bridge/tests/GlobalLayoutControllerTest.php.
    - scenario: Live writes succeed, but operators do not verify the endpoint/build and the failure remains hidden until deployment.
      likelihood: medium
      impact: high
      mitigation: >-
        Make verification explicit and blocking: first confirm `GET /wp-json/bulwar/v1/layout/global`
        returns both statuses as `resolved`, then run the Astro production build without
        `ASTRO_ALLOW_GLOBAL_LAYOUT_FALLBACK`. Sources:
        docs/plan/navbar-footer-global-layout-v1/operator-reference.md,
        astro-site/src/lib/wordpress.ts,
        astro-site/src/pages/[slug].astro.
  assumptions:
    - Live WordPress access allows running a repo-owned PHP script that bootstraps `wp-load.php`, which is already the proven dhosting-safe write pattern in this repo. Sources: SCRIPTS/seed-testowa-blueprint-schema.php, docs/plan/none/research_findings_global_layout_footer_seeding.yaml.
    - The bridge runtime itself does not need code changes for this fix because the failure source is missing/invalid live data, not resolver logic. Sources: wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php, astro-site/src/lib/wordpress.ts.

implementation_specification:
  code_structure: >-
    Add one operational PHP worker under `SCRIPTS/` that owns page upsert and option merge,
    add one checked-in shared footer `page_builder_schema` JSON artifact consumed by that
    worker, and update one existing operator-facing document with the exact invocation and
    verification flow. Do not change Astro or bridge fail-closed runtime logic. Sources:
    SCRIPTS/seed-testowa-blueprint-schema.php,
    docs/plan/navbar-footer-global-layout-v1/operator-reference.md,
    astro-site/src/pages/[slug].astro.
  affected_areas:
    - SCRIPTS/ for the writer and canonical shared footer payload artifact. Sources: SCRIPTS/seed-testowa-blueprint-schema.php.
    - docs/plan/navbar-footer-global-layout-v1/ for the operator workflow update. Sources: docs/plan/navbar-footer-global-layout-v1/operator-reference.md.
    - Live WordPress option `bulwar_bridge_global_layout` and one dedicated shared footer page instance. Sources: wordpress-plugin/bulwar-bridge/src/Config/Constants.php, wordpress-plugin/bulwar-bridge/src/Layout/GlobalLayoutResolver.php.
  component_details:
    - component: SCRIPTS/seed-global-layout-footer.php
      responsibility: >-
        Bootstrap `wp-load.php`, read the checked-in footer schema payload, validate the
        minimal shared footer block contract, upsert the dedicated footer page by slug/title,
        write `page_builder_schema`, merge `footerPageId` into the existing global layout
        option, and emit a concise success summary with page id and option state.
      interfaces:
        - CLI contract: explicit WordPress root path plus optional payload path, slug, and title.
        - Mutation contract: updates only the target page `page_builder_schema` and `bulwar_bridge_global_layout.footerPageId`.
    - component: SCRIPTS/shared-footer.page_builder_schema.json
      responsibility: >-
        Store the canonical minimal render schema for the shared footer page so live content is
        reproducible from the repo instead of being chat-only or server-only.
      interfaces:
        - JSON input for `seed-global-layout-footer.php`.
    - component: docs/plan/navbar-footer-global-layout-v1/operator-reference.md
      responsibility: >-
        Document the exact seed/update command, what data the script mutates, and the required
        post-run verification of endpoint statuses plus Astro build.
      interfaces:
        - Operator runbook for safe production execution.
  dependencies:
    - component: seed-global-layout-footer.php
      relationship: Reads the checked-in JSON payload, mutates a WordPress page instance via `wp-load.php`, and merges `footerPageId` into the bridge-owned option.
    - component: Astro production build
      relationship: Consumes the live `GET /wp-json/bulwar/v1/layout/global` response and remains unchanged; build success depends on the live option/page becoming resolvable.
  integration_points:
    - WordPress option resolved through `Constants::globalLayoutOptionName()`.
    - Dedicated footer page `page_builder_schema` post meta scanned by `GlobalLayoutResolver::resolveFooter()`.
    - Live endpoint `GET /wp-json/bulwar/v1/layout/global`.
    - `astro-site` production build path that calls `fetchWordPressGlobalLayout()`.

