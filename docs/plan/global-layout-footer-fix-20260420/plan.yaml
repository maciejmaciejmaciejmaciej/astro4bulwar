    description: |
      Add the smallest durable repo-owned writer for this operational gap.

      Scope:
      - create `SCRIPTS/seed-global-layout-footer.php`
      - create one checked-in minimal `shared_footer` payload file, for example `SCRIPTS/shared-footer.page_builder_schema.json`
      - follow the existing `wp-load.php` bootstrap pattern from `SCRIPTS/seed-testowa-blueprint-schema.php`

