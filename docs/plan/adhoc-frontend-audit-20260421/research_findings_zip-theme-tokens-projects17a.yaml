tldr: |
  - Global theme token definitions for the zip frontend live in zip/src/index.css via Tailwind v4 `@theme`, `@theme inline`, and the runtime CSS variable blocks in `:root` and `.dark`; the file is imported once from zip/src/main.tsx:5.
  - Repo-approved utility vocabulary for new sections is explicitly documented as `page-margin`, `font-headline`, `font-body`, `font-label`, `text-on-surface`, `text-zinc-500`, `bg-white`, `bg-surface`, `bg-surface-container-low`, and `border-outline-variant/20` in docs/plan/astro-wordpress-page-builder/design-token-and-layout-whitelist.md:39, :65, :69, :97, :111.
  - Projects17a already uses the approved typography and surface tokens for most of its content (`font-headline`, `font-body`, `font-label`, `text-on-surface`, `text-zinc-500`, `bg-surface-container-low`) and already uses the shared Button component with `variant="outline"` and `size="icon-lg"`.
  - The only clear local styling override in Projects17a is the arrow-button class `bg-white/90 shadow-sm hover:bg-white`, which overrides the shared outline button surface instead of relying on the button variant defaults defined in zip/components/ui/button.tsx.
  - Current repo usage mixes two valid shell patterns: section-level `bg-white text-on-surface` in feature sections and app-frame `bg-background text-foreground` in RootLayout.

