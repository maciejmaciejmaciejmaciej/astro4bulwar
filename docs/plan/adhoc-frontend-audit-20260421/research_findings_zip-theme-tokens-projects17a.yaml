patterns_found:
- category: architecture
  pattern: Theme utilities are centralized in one CSS entrypoint
  description: The zip frontend does not use a separate Tailwind config file for these tokens; semantic color/font/shadow utilities are declared in zip/src/index.css and then consumed directly in section class strings.
  examples:
  - file: zip/src/index.css
    location: zip/src/index.css:7
    snippet: '@theme { --color-white: var(--card); --color-primary: var(--primary); --font-headline: var(--font-serif); }'
  - file: zip/src/main.tsx
    location: zip/src/main.tsx:5
    snippet: import './index.css';
  prevalence: common
- category: structure
  pattern: Section shells pair a surface utility with a semantic text utility
  description: Current sections usually combine `bg-white` or `bg-surface` with `text-on-surface`, plus `page-margin` and editorial typography utilities.
  examples:
  - file: zip/src/components/sections/Project10.tsx
    location: zip/src/components/sections/Project10.tsx:131
    snippet: '<section className={cn("bg-white py-24 text-on-surface page-margin md:py-32", className)}>'
  - file: zip/src/components/sections/PageBuilderMenuSection.tsx
    location: zip/src/components/sections/PageBuilderMenuSection.tsx:57
    snippet: 'panelClassName: "bg-white text-on-surface"'
  - file: zip/src/components/sections/PageBuilderMenuSection.tsx
    location: zip/src/components/sections/PageBuilderMenuSection.tsx:68
    snippet: 'panelClassName: "bg-surface text-on-surface"'
  prevalence: common
- category: naming
  pattern: Secondary copy uses tokenized zinc utilities rather than ad hoc colors
  description: Supporting copy and metadata repeatedly use `text-zinc-500`, which is itself mapped back to the muted semantic variable in index.css.
  examples:
  - file: zip/src/index.css
    location: zip/src/index.css:26
    snippet: '--color-zinc-500: var(--muted-foreground);'
  - file: zip/src/components/sections/Project10.tsx
    location: zip/src/components/sections/Project10.tsx:149
    snippet: 'font-body text-base leading-relaxed text-zinc-500'
  - file: zip/src/components/sections/Projects17a.tsx
    location: zip/src/components/sections/Projects17a.tsx:136
    snippet: 'font-body text-sm leading-relaxed text-zinc-500'
  prevalence: common
- category: component_api
  pattern: Shared Button variants are the control styling contract
  description: New controls are expected to start from the shared Button component variants and sizes rather than bespoke button shells.
  examples:
  - file: zip/components/ui/button.tsx
    location: zip/components/ui/button.tsx:12
    snippet: 'outline: "border-border bg-background hover:bg-muted hover:text-foreground ..."'
  - file: zip/components/ui/button.tsx
    location: zip/components/ui/button.tsx:33
    snippet: '"icon-lg": "size-9"'
  - file: zip/src/components/sections/Projects17a.tsx
    location: zip/src/components/sections/Projects17a.tsx:190
    snippet: 'size="icon-lg"'
  prevalence: common
- category: audit_result
  pattern: Projects17a is mostly token-aligned with one local control override
  description: Typography, copy color, pill color, and media surfaces already match the repo token vocabulary; the arrow-button background override is the main divergence from the shared control contract.
  examples:
  - file: zip/src/components/sections/Projects17a.tsx
    location: zip/src/components/sections/Projects17a.tsx:152
    snippet: 'bg-surface-container-low'
  - file: zip/src/components/sections/Projects17a.tsx
    location: zip/src/components/sections/Projects17a.tsx:194
    snippet: 'className="pointer-events-auto rounded-full bg-white/90 shadow-sm hover:bg-white"'
  prevalence: occasional

