related_conventions:
  naming_patterns_in_domain: Section components use PascalCase filenames, optional `className` props, and semantic utility names such as `text-on-surface`, `bg-surface-container-low`, and `border-outline-variant/20`.
  structure_of_domain: Imported visual sections are mounted in TemplatePage for comparison, while shared tokens and utility aliases are kept in zip/src/index.css.
  error_handling_in_domain: No domain-specific runtime error handling is involved in the styling layer; styling consistency is enforced through shared tokens, section patterns, and preview usage.
  testing_in_domain: Styling patterns are snapshot/assertion tested in some section tests, for example PageBuilderMenuSection and registry tests that assert tokenized class names.
  documentation_in_domain: The whitelist doc under docs/plan/astro-wordpress-page-builder formalizes the preferred tokens and utility classes for adapted blocks.

