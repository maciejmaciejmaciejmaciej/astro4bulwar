plan_id: catering-wielkanocny-breakfast-20260326
objective: |
  Implement a minimal Easter catering update so split-mode simple products use a safe cart/checkout display name fallback and the catering-wielkanocny page gains a new first JSON-backed category for "zestaw dla 2 osób" directly under the existing special meal for 2 people block.
created_at: 2026-03-26T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: pending_approval
research_confidence: high

tldr: |
  Apply the smallest viable frontend/data change set: add a cart display-name fallback from combinedText to productName for simple split-mode products, prepend one new Easter JSON category with WooCommerce category id 26 and product id 88, cover the fallback with targeted tests, and verify the new section renders directly below the standalone special-menu block without changing page composition.
open_questions:
  - Confirm whether the new category should intentionally reuse the existing category-section visual treatment with no custom heading or CTA changes.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The new product is entered with an unsupported HTML structure or incomplete split fields, causing normalization failure or degraded rendering.
      likelihood: medium
      impact: high
      mitigation: Keep the product in the existing split-mode shape with both nazwa_produktu and opis_produktu populated and restrict markup to tags already styled by ProductItemAlt.
    - scenario: Cart naming fallback is patched in the wrong layer, leaving checkout drawer and success snapshot inconsistent.
      likelihood: low
      impact: high
      mitigation: Implement the fallback only at simple cart-line creation, where displayName is propagated downstream to drawer and success snapshot flows.
  assumptions:
    - The standalone special-menu-for-2 block must remain unchanged and stay above all JSON-backed categories.
    - The new breakfast product should use existing split-mode rendering rather than introducing a new content mode or new component.
    - No backend or bridge changes are required because checkout payloads already transmit product_id and quantity only.

implementation_specification:
  code_structure: |
    Keep the change inside the existing Easter catering data and cart utility boundaries. Do not alter page composition, component hierarchy, or introduce new renderer variants. Use existing split-mode product contracts and existing category ordering behavior.
  affected_areas:
    - zip/src/lib/cateringCart.ts
    - zip/src/lib/cateringCart.test.ts
    - zip/src/data/cateringWielkanocny.json
  component_details:
    - component: Simple cart line display-name selection
      responsibility: Ensure simple catering lines always receive a stable display name by falling back from combinedText to productName when the product uses split-mode content.
      interfaces:
        - addSimpleProductLine(product) continues to accept the existing CateringProductContract union.
        - buildSimpleCartLine(product, quantity) returns the same cart-line shape with corrected displayName semantics.
    - component: Easter JSON category seed
      responsibility: Provide one additional first category entry with WooCommerce category id 26 and exactly one split-mode product entry for product id 88.
      interfaces:
        - Raw category schema remains unchanged: id, nazwa_kategorii, optional opis_kategorii/image_url, pozycje.
        - Raw product schema remains unchanged: id, cena, nazwa_produktu, opis_produktu.
    - component: Targeted regression coverage
      responsibility: Lock in the naming fallback and prevent future regressions for split-mode simple products.
      interfaces:
        - Existing test runner continues to execute cateringCart unit coverage without new infrastructure.
  dependencies:
    - component: Simple cart line display-name selection
      relationship: Supplies corrected displayName used by checkout drawer items and success snapshot items.
    - component: Easter JSON category seed
      relationship: Feeds the existing normalization pipeline and category renderer unchanged.
    - component: Targeted regression coverage
      relationship: Verifies the two implementation paths without changing production runtime behavior.
  integration_points:
    - Simple product add-to-cart flow in zip/src/pages/CateringWielkanocnyPage.tsx via existing addSimpleProductLine usage.
    - Category normalization in zip/src/data/cateringWielkanocny.ts via existing raw JSON import.
    - Drawer and success snapshot display through existing displayName propagation from cart state.

