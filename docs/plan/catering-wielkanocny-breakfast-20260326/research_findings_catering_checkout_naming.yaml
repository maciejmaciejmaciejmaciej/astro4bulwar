patterns_found:
  - category: architecture
    pattern: Cart naming is derived once and then propagated downstream.
    description: A simple cart line stores displayName, then drawer items and success snapshot reuse it rather than recomputing from product data.
    examples:
      - file: zip/src/lib/cateringCart.ts
        location: zip/src/lib/cateringCart.ts:201
        snippet: displayName: product.combinedText
      - file: zip/src/lib/cateringCart.ts
        location: zip/src/lib/cateringCart.ts:377
        snippet: name: line.displayName
      - file: zip/components/CheckoutDrawer.tsx
        location: zip/components/CheckoutDrawer.tsx:623
        snippet: name: item.name
    prevalence: common
  - category: structure
    pattern: Product contracts are split between combined-text and split-name modes.
    description: Product cards branch on contentMode and render productName/productDescriptionHtml for split products.
    examples:
      - file: zip/src/data/cateringWielkanocny.ts
        location: zip/src/data/cateringWielkanocny.ts:158
        snippet: if (productName !== null || productDescriptionHtml !== null)
      - file: zip/src/components/sections/CateringProductListAlt.tsx
        location: zip/src/components/sections/CateringProductListAlt.tsx:129
        snippet: productName={isStructuredProduct(product) ? product.productName : undefined}
    prevalence: common
  - category: error_handling
    pattern: Data normalization rejects partial split data.
    description: normalizeProduct throws when only one of nazwa_produktu or opis_produktu is present.
    examples:
      - file: zip/src/data/cateringWielkanocny.ts
        location: zip/src/data/cateringWielkanocny.ts:159
        snippet: if (productName === null || productDescriptionHtml === null) { throw new Error(...) }
    prevalence: occasional
  - category: testing
    pattern: Existing tests cover split rendering and cart aggregation, but not split-name cart naming.
    description: Tests do not assert the cart/display name chosen for split-mode products.
    examples:
      - file: zip/src/lib/cateringCart.test.ts
        location: zip/src/lib/cateringCart.test.ts:42
        snippet: simple products still aggregate into one predictable line per product
      - file: zip/src/components/sections/CateringProductListAlt.test.tsx
        location: zip/src/components/sections/CateringProductListAlt.test.tsx:7
        snippet: contentMode: "split"
    prevalence: occasional

