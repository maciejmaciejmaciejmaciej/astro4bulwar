related_conventions:
  naming_patterns_in_domain: Combined-mode products use combinedText; split-mode products use productName and productDescriptionHtml; cart and snapshot layers use displayName/name.
  structure_of_domain: Data normalization is isolated in src/data, cart transformations in src/lib, page wiring in src/pages, and checkout UI in components.
  error_handling_in_domain: Invalid product data is rejected early during normalization; checkout network errors surface as user-facing messages in the drawer.
  testing_in_domain: Lightweight node:test coverage exists for cart transformations and separate rendering tests exist for split-mode product cards.
  documentation_in_domain: No dedicated inline domain documentation beyond type definitions and naming.

