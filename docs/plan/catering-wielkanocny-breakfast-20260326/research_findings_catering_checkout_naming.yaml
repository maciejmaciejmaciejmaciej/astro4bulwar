open_questions:
  - question: Should products with nazwa_produktu but no opis_produktu be accepted, or should the fallback apply only to already valid split-mode products?
    context: The requested behavior mentions missing zespolona_nazwa_z_opisem specifically, but current normalization rejects partial split data before checkout can run.
  - question: Should fallback naming also be reused anywhere else product.combinedText may be assumed in future cart-related helpers?
    context: The current issue is centered in buildSimpleCartLine, but the convention is implicit rather than codified.

gaps:
  - area: backend order presentation
    description: The bridge payload contains no item names, so this research did not establish how WooCommerce or the bridge labels the server-side order lines after product_id resolution.
    impact: Low for the requested frontend checkout/cart naming change; backend naming likely remains unaffected.
