plan_id: catering-wielkanocny-breakfast-20260326
objective: Determine exactly how checkout/cart naming currently works for catering-wielkanocny products and what minimal code changes are needed so that if a product lacks zespolona_nazwa_z_opisem, checkout uses nazwa_produktu instead.
focus_area: catering_checkout_naming
created_at: 2026-03-26T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
  - Simple catering cart lines persist a single displayName generated in buildSimpleCartLine.
  - For simple products, buildSimpleCartLine currently always reads product.combinedText, so split-mode products produce an undefined cart/checkout name.
  - Checkout order submission sends only product_id and quantity to the bridge, but the drawer UI and checkout success snapshot both display item.name copied from cartItems.
  - Current Easter data already contains a split-mode product (Barszcz bardzo czerwony) with nazwa_produktu and opis_produktu and no zespolona_nazwa_z_opisem.
  - If future data may omit zespolona_nazwa_z_opisem and also omit opis_produktu, normalizeProduct currently throws before checkout can load.

research_metadata:
  methodology: Hybrid retrieval using semantic_search and grep_search, followed by targeted read_file examination of cart, page, checkout drawer, snapshot, UI list, tests, and source data.
  scope: Focused on catering-wielkanocny cart and checkout naming path from normalized data through cart line creation, drawer rendering, checkout submission, and post-checkout snapshot.
  confidence: high
  coverage: 90

