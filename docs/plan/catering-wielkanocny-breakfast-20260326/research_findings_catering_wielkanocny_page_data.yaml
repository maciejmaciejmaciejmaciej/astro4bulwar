plan_id: catering-wielkanocny-breakfast-20260326
objective: Inspect the Easter catering data structure and determine exactly where to add a new WooCommerce category id 26 named "zestaw dla 2 osób" under the existing meal set for 2 people on the catering-wielkanocny page, containing one product with id 88.
focus_area: catering_wielkanocny_page_data
created_at: 2026-03-26
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
	- The page renders a standalone special-menu block for "Obiad Wielkanocny dla 2 osób" before any JSON-backed categories.
	- The JSON category order is: Pieczywo, Zupy, Przystawki, Świąteczny obiad, Dodatki, Sosy, Desery, Menu dziecięce; the first JSON object becomes the first section shown under the special-menu block.
	- Split-field products are already supported via nazwa_produktu + opis_produktu, but both fields are mandatory together when used.
	- The product description renderer injects raw HTML with explicit styling hooks for br, em, li, p, strong, and ul.
	- Product id 88 does not exist in the scoped Easter data files, so only the required JSON shape and insertion point are derivable here.

