	naming_patterns_in_domain: "Raw JSON uses Polish field names such as nazwa_kategorii, opis_kategorii, pozycje, nazwa_produktu, opis_produktu, gramatura, cena. Normalized TypeScript contracts translate them to title, description, imageUrl, products, productName, productDescriptionHtml, weight, and priceLabel."
	structure_of_domain: "Special menu content is modeled separately from general categories. General categories remain array-driven JSON content."
	error_handling_in_domain: "Normalization is strict: strings must be non-empty, numbers finite, booleans explicit, image URLs must start with /react/images/, pozycje must be an array, and split product fields must be provided together."
	testing_in_domain: "Renderer tests verify split-product markup paths and category layout markup."
	documentation_in_domain: "No dedicated inline documentation file for this domain was found; the data contracts and tests serve as the primary behavior reference."

