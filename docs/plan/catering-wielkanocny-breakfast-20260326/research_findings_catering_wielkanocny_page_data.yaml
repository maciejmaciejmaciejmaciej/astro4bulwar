	scope: "Focused on zip/src/data/cateringWielkanocny.json, zip/src/data/cateringWielkanocny.ts, zip/src/pages/CateringWielkanocnyPage.tsx, and directly related special-menu/list/item renderer files and tests."
	confidence: high
	coverage: 95

