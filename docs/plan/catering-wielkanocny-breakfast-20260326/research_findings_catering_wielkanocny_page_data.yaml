				location: zip/src/data/cateringWielkanocny.json:1
				snippet: "[{ \"id\": 16, \"nazwa_kategorii\": \"Pieczywo\" ... }]"
		prevalence: common

	- category: structure
		pattern: Products support two mutually exclusive content shapes.
		description: A product is either combined mode using zespolona_nazwa_z_opisem or split mode using nazwa_produktu plus opis_produktu/opis_poduktu.
		examples:
			- file: zip/src/data/cateringWielkanocny.ts
				location: zip/src/data/cateringWielkanocny.ts:149
				snippet: "const productName = normalizeOptionalString(product.nazwa_produktu, ...)"
