				snippet: '"nazwa_produktu": "Barszcz bardzo czerwony"'
		prevalence: common

	- category: error_handling
		pattern: Split fields are validated as an all-or-nothing pair.
		description: If either nazwa_produktu or opis_produktu is missing while the other exists, normalization throws an error.
		examples:
			- file: zip/src/data/cateringWielkanocny.ts
				location: zip/src/data/cateringWielkanocny.ts:158
				snippet: "if (productName === null || productDescriptionHtml === null) { throw new Error(...) }"
		prevalence: common

	- category: structure
		pattern: Raw HTML descriptions are rendered directly in split mode.
		description: productDescriptionHtml is injected with dangerouslySetInnerHTML and only selected tags have explicit prose-like utility styling.
		examples:
