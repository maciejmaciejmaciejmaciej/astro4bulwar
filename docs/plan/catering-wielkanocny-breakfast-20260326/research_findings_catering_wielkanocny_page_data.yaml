				location: zip/src/data/cateringSpecialMenuFor2.ts:83
				snippet: "baseProductId: 53"
		prevalence: common

	- category: structure
		pattern: Category display order follows raw JSON array order without additional sorting.
		description: The normalization layer maps the raw array directly, and the page renders that mapped array as-is.
		examples:
