open_questions:
	- question: What image_url should category id 26 use?
		context: The renderer requires image_url to exist and to start with /react/images/, but the requested new category did not specify an image asset.
	- question: What exact product fields beyond id 88 are intended for the single product?
		context: Product id 88 is not present in the scoped Easter data, so title, description HTML, weight, price, and dietary flags are not derivable from these files.
	- question: Should the new category become the first JSON category or be integrated into the standalone special-menu component instead?
		context: The current architecture treats the special menu as a separate page block, not as a JSON category, so "under the existing meal set for 2 people" maps to the first JSON position if the new section must appear immediately below it.

