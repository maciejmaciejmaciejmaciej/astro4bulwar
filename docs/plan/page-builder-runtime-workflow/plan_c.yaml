plan_id: "page-builder-runtime-workflow"
objective: >
  Skorygowac kolejny etap wdrozenia runtime workflow page buildera po blocking
  critique tak, aby prawdziwy runtime z sekretami nie mieszkal w zip/src,
  node-only boundary zylo poza bundlerem Vite, compile pozostalo single source
  of truth, a najblizszy etap byl praktyczny: move/extract runtime workflow,
  live Firestore adapter, CLI z env validation i trybami dry-run/readback.
created_at: "2026-04-19T00:00:00Z"
created_by: "gem-planner"
status: "pending"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 4
  risk_score: "medium"

tldr: |
  Po blocking critique nie wystarczy juz dokladac live adaptera obok runtime w
  zip/src. Korekta planu musi zmienic boundary: zip zachowuje tylko czyste
  kontrakty, typy i helpery bez sekretow, a realny execution path przechodzi do
  node-only boundary pod SCRIPTS/. Minimalny praktyczny etap to:
  1) wyodrebnic z obecnych modulow tylko czesci shared i zostawic je w zip,
  2) przeniesc prawdziwy runtime workflow oraz realnych adapterow do
  SCRIPTS/page-builder-runtime/,
  3) dodac live Firestore adapter i WordPress adapter skladane tylko w Node,
  4) dodac jeden CLI entrypoint z env validation oraz opcjami dry-run/readback,
  5) przepiac testy i dokumentacje tak, aby compile dalej szedl tylko przez
  SCRIPTS/make-page-draft-compile-gate.js. Sources:
  zip/src/blocks/registry/pageBuilderRuntimeWorkflow.ts,
  zip/src/blocks/registry/firebasePageDraftStore.ts,
  zip/src/blocks/registry/wordpressPageBuilderClient.ts,
  zip/src/blocks/registry/firebasePageDraft.ts,
  SCRIPTS/make-page-draft-compile-gate.js,
  SCRIPTS/generate-page-draft-from-scrape.ts,
  docs/plan/page-builder-runtime-workflow/plan_b.yaml,
  .github/instructions/project-foundation.instructions.md,
  /memories/repo/firebase-draft-compile-gates.md.

open_questions:
  - >
    Czy po korekcie node-only runtime ma zostac uruchamiany dalej przez
    `npx --prefix zip tsx --tsconfig zip/tsconfig.json ...`, czy od razu dostac
    osobne toolchain/package boundary pod SCRIPTS/? Ten plan rekomenduje najpierw
    zachowac obecny runner tsx z zip jako narzedzie developerskie, ale sam
    runtime composition root i env contract przeniesc pod SCRIPTS/.

pre_mortem:
  overall_risk_level: "medium"
  critical_failure_modes:
    - scenario: >
        Sekrety WordPress albo Firebase nadal beda przechodzily przez pliki z
        zip/src, bo nowy plan zostawi tam realny workflow lub realnego klienta
        HTTP/store pod pozorem dependency injection.
      likelihood: "high"
      impact: "critical"
      mitigation: >
        Zip ma po korekcie przechowywac tylko czyste kontrakty, typy, parsery i
        helpery bez env i bez klientow operacyjnych; realny workflow, env
        loading i adaptery live maja miec jedyny composition root w SCRIPTS/.
    - scenario: >
        Compile zostanie skopiowany do nowego runtime boundary albo CLI zacznie
        budowac payloady bokiem, przez co rozjedzie sie z kanonicznym
        SCRIPTS/make-page-draft-compile-gate.js.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        Runtime core i CLI maja wywolywac tylko compilePageDraft z istniejacego
        gate. Brak drugiego buildera schema, brak drugiej translacji AI schema.
    - scenario: >
        Testy beda nadal targetowaly zip/src i dadza falszywe poczucie
        bezpieczenstwa, mimo ze prawdziwy entrypoint i adaptery beda juz poza
        tym drzewem.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        Rozdzielic testy shared contracts od testow node-only runtime/CLI i
        jawnie przestawic smoke path na SCRIPTS/page-builder-runtime/.
  assumptions:
    - >
      Obecne testy runtime dla firebasePageDraftStore, wordpressPageBuilderClient
      i pageBuilderRuntimeWorkflow przechodza w aktualnym stanie repo, wiec
      korekta boundary jest refaktorem architektury, a nie ratowaniem logiki.
      Source: terminal context z passing tests.
    - >
      compilePageDraft w SCRIPTS/make-page-draft-compile-gate.js jest juz
      kanonicznym single source of truth dla page_builder_schema i
      page_builder_schema_for_ai i nie powinien byc przenoszony do zip/src.
      Sources: SCRIPTS/make-page-draft-compile-gate.js,
      SCRIPTS/make-page-draft-compile-gate.test.js.
    - >
      SCRIPTS jest poprawnym repo-side boundary dla node-only tooling i juz
      hostuje CLI bootstrapu draftu, wiec to jest najmniejszy bezpieczny target
      dla realnego runtime execution path. Sources:
      SCRIPTS/generate-page-draft-from-scrape.ts,
      .github/instructions/project-foundation.instructions.md.
    - >
      zip/.env.example jest frontendowym artefaktem i nie jest dobrym miejscem
      na runtime secrets dla page builder publish flow. Source: zip/.env.example.

implementation_specification:
  code_structure: |
    Po korekcie boundary architektura powinna wygladac tak:

    1. zip/src/blocks/registry pozostaje warstwa shared:
       - firebasePageDraft.ts jako kontrakt draftu i workflow gates
       - createPageDraftFromScrape.ts jako bootstrap structure-only
       - types.ts, common.ts, pageBuilderSchema.ts i podobne helpery bez sekretow
       - ewentualny nowy plik z czystymi runtime contracts/type aliases bez fetch,
         env loading, Basic Auth i bez SDK Firebase.

    2. SCRIPTS/page-builder-runtime/ staje sie node-only boundary:
       - runtimeWorkflow.ts jako prawdziwy orchestration core
       - adapters/liveFirestoreDraftStore.ts jako realny Firestore adapter
       - adapters/wordpressPageBuilderClient.ts jako realny authenticated client
       - env.ts jako env parsing i validation
       - cli.ts jako jedyny operator entrypoint

    3. SCRIPTS/make-page-draft-compile-gate.js pozostaje bezposrednio reuse'owany
       przez runtime core jako jedyny compiler. Nie powstaje drugi compile path.
  affected_areas:
    - "zip/src/blocks/registry/firebasePageDraft.ts"
    - "zip/src/blocks/registry/createPageDraftFromScrape.ts"
    - "zip/src/blocks/registry/firebasePageDraftStore.ts"
    - "zip/src/blocks/registry/wordpressPageBuilderClient.ts"
    - "zip/src/blocks/registry/pageBuilderRuntimeWorkflow.ts"
    - "SCRIPTS/make-page-draft-compile-gate.js"
    - "SCRIPTS/generate-page-draft-from-scrape.ts"
    - "SCRIPTS/page-builder-runtime/"
    - "docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md"
    - "docs/plan/page-builder-runtime-workflow/"
  component_details:
    - component: "Shared draft contract layer"
      responsibility: >
        Utrzymywac czysty shape draftu, lifecycle gates i helpery compile-input
        bez wiedzy o sekretach, env ani transportach runtime.
      interfaces:
        - "parseFirebasePageDraft(value)"
        - "computeSourceMappingWorkflow(blocks, lifecycleFlags)"
        - "type FirebasePageDraft"
    - component: "Node-only runtime workflow"
      responsibility: >
        Orkiestrowac load/save draftu, ensure page, compile przez istniejacy gate,
        publish i opcjonalny readback verify poza bundlerem Vite.
      interfaces:
        - "runPageBuilderRuntimeWorkflow({ draft, approvedSourceMappings, draftStore, wordpressClient, verifyReadback })"
    - component: "Node-only live Firestore adapter"
      responsibility: >
        Inicjalizowac prawdziwy persistence layer dla draftu tylko po stronie
        Node i zwracac store zgodny z runtime workflow contract.
      interfaces:
        - "createLiveFirestoreDraftStoreFromEnv(env)"
        - "loadDraft(docId)"
        - "saveDraft(draft, options)"
        - "upsertDraft(draft, options)"
    - component: "Node-only WordPress publish adapter"
      responsibility: >
        Obslugiwac authenticated ensure/create-update strony, publish obu meta
        payloadow i readback weryfikacyjny bez wycieku sekretow do zip.
      interfaces:
        - "createNodeWordPressPageBuilderClientFromEnv(env)"
        - "ensurePageExists(input)"
        - "publishPageBuilderPayloads(input)"
        - "readPageBuilderPayloads(slug)"
    - component: "CLI entrypoint"
      responsibility: >
        Walidowac env i flagi operatora, skladac adaptery, uruchamiac runtime
        workflow i raportowac dry-run/readback bez duplikacji compile.
      interfaces:
        - "page-builder-runtime publish --doc-id <id>|--slug <slug>"
        - "--dry-run"
        - "--readback"
  dependencies:
    - component: "Node-only runtime workflow"
      relationship: "Reuse'uje compilePageDraft z SCRIPTS/make-page-draft-compile-gate.js jako jedyny compiler."
    - component: "Node-only runtime workflow"
      relationship: "Konsumuje live Firestore adapter i node-only WordPress publish adapter przez jawne interfaces."
    - component: "CLI entrypoint"
      relationship: "Jest jedynym composition root dla env loading i secret-bearing dependencies."
    - component: "Shared draft contract layer"
      relationship: "Pozostaje source of truth dla shape draftu uzywanego przez bootstrap i runtime."
  integration_points:
    - "zip/src/blocks/registry/firebasePageDraft.test.ts"
    - "zip/src/blocks/registry/firebasePageDraftStore.test.ts"
    - "zip/src/blocks/registry/wordpressPageBuilderClient.test.ts"
    - "zip/src/blocks/registry/pageBuilderRuntimeWorkflow.test.ts"
    - "SCRIPTS/make-page-draft-compile-gate.test.js"
    - "docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md"

