    to_task: "implement_runtime_workflow"
    interface: "Store contract for save/load/upsert of validated FirebasePageDraft documents."
    format: "Typed TypeScript store interface with in-memory and FirestoreLike adapters"
  - from_task: "implement_wordpress_page_builder_client"
