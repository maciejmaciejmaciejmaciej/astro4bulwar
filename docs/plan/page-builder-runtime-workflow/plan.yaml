plan_id: "page-builder-runtime-workflow"
objective: >
  Domknac minimalny, bezpieczny runtime workflow page builder draft -> Firebase
  draft store -> compile -> WordPress publish/readback bez czekania na pelne
  live SDK Firebase i bez zmian rozszerzajacych surface backendu ponad to, co
  jest potrzebne do wdrozenia teraz.
created_at: "2026-04-19T00:00:00Z"
created_by: "gem-planner"
status: "pending"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 4
  risk_score: "medium"

tldr: |
  Najmniejszy bezpieczny zakres, ktory realnie domyka agentowy workflow, to:
  1) dodac store draftu z adapterem in-memory i kontraktem FirestoreLike,
  2) dodac serwerowy klient WordPress, ktory najpierw zapewnia istnienie strony
  przez core REST /wp/v2/pages, a dopiero potem publikuje oba meta payloady do
  istniejacego bridge POST,
  3) dodac runtime orchestrator reuse'ujacy istniejacy compile gate zamiast
  dublowac logike,
  4) odpalic kontrakty store/client/workflow oraz istniejace testy bootstrapu i
  compile gate. Sources: zip/src/blocks/registry/firebasePageDraft.ts,
  zip/src/blocks/registry/createPageDraftFromScrape.ts,
  zip/src/blocks/registry/firebasePageDraftStore.test.ts,
  zip/src/blocks/registry/wordpressPageBuilderClient.test.ts,
  zip/src/blocks/registry/pageBuilderRuntimeWorkflow.test.ts,
  SCRIPTS/make-page-draft-compile-gate.js,
  wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php.

open_questions:
  - >
    Czy runtime ma byc uruchamiany tylko w Node/agent host, czy ktos planuje
    podpinac go bezposrednio do bundla React? Dla wdrozenia teraz plan zaklada
    tylko wykonanie poza przegladarka, bo workflow wymaga sekretow WordPress.

pre_mortem:
  overall_risk_level: "medium"
  critical_failure_modes:
    - scenario: >
        WordPress application password albo przyszle credentiale Firebase trafią
        do bundla frontendu, bo runtime zostanie potraktowany jak kod browserowy.
      likelihood: "medium"
      impact: "critical"
      mitigation: >
        Trzymac klienta WordPress i ewentualna konfiguracje live Firebase za
        interfejsami wykonywanymi tylko w Node/agent runtime; testy maja
        korzystac z in-memory store i mock fetch zamiast z prawdziwych sekretow.
    - scenario: >
        Compile zostanie zaimplementowany drugi raz w runtime i zacznie emitowac
        payloady rozne od SCRIPTS/make-page-draft-compile-gate.js.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        Reuse jedynej istniejacej funkcji compilePageDraft jako wspolnego gate;
        nie kopiowac translacji page_builder_schema i aiSchema do nowego modulu.
    - scenario: >
        Publish bedzie probowal uzyc update-only bridge bez zapewnienia strony,
        przez co nowe slugi beda konczyly sie PAGE_NOT_FOUND.
      likelihood: "high"
      impact: "high"
      mitigation: >
        Wymusic krok ensurePageExists przed publish i realizowac go przez core
        WordPress REST pages endpoint, bez zmian w aktualnym bridge na start.
  assumptions:
    - >
      Obecny bridge POST pozostaje update-only i nie jest rozszerzany w tym
      minimalnym wdrozeniu. Sources:
      wordpress-plugin/bulwar-bridge/src/Http/Routes.php,
      wordpress-plugin/bulwar-bridge/src/Http/Controllers/PageBuilderController.php.
    - >
      compilePageDraft z SCRIPTS/make-page-draft-compile-gate.js jest juz
      kanonicznym gate dla obu payloadow i powinien pozostac single source of
      truth. Sources: SCRIPTS/make-page-draft-compile-gate.js,
      SCRIPTS/make-page-draft-compile-gate.test.js.
    - >
      Na wdrozenie teraz wystarcza store oparte o FirestoreLike plus adapter
      in-memory; pelna inicjalizacja live SDK Firebase moze pozostac poza tym
      zakresem. Sources: zip/src/blocks/registry/firebasePageDraftStore.test.ts,
      docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md.

implementation_specification:
  code_structure: |
    Runtime ma byc zlozony z trzech waskich modulow w registry:
    firebasePageDraftStore.ts odpowiada tylko za save/load/upsert draftu,
    wordpressPageBuilderClient.ts odpowiada tylko za ensure/create-update page i
    publish/readback payloadow, a pageBuilderRuntimeWorkflow.ts skleja store,
    compile gate i publikacje. Logika compile nie moze byc powielona; runtime
    ma konsumowac wynik istniejacego compile gate. Live Firebase SDK nie jest
    wymagany do domkniecia workflow i powinien pozostac opcjonalnym adapterem,
    nie warunkiem uruchomienia testow.
  affected_areas:
    - "zip/src/blocks/registry/firebasePageDraftStore.ts"
    - "zip/src/blocks/registry/wordpressPageBuilderClient.ts"
    - "zip/src/blocks/registry/pageBuilderRuntimeWorkflow.ts"
    - "docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md"
  component_details:
    - component: "firebasePageDraftStore"
      responsibility: >
        Persistowac i odczytywac FirebasePageDraft przez prosty kontrakt store,
        domyslnie po pageSlug jako doc id, z adapterem in-memory do testow i
        FirestoreLike do integracji runtime.
      interfaces:
        - "createInMemoryFirebasePageDraftStore()"
        - "createFirestoreFirebasePageDraftStore({ firestore, collectionName? })"
        - "saveDraft(draft, { docId? })"
        - "loadDraft(docIdOrPageSlug)"
        - "upsertDraft(draft, { docId? })"
    - component: "wordpressPageBuilderClient"
      responsibility: >
        Zapewniac istnienie strony WordPress po slugu przez core REST API oraz
        publikowac oba meta payloady do istniejacego bridge POST, a potem
        odczytywac je przez bridge GET do weryfikacji.
      interfaces:
        - "createWordPressPageBuilderClient({ baseUrl, username, applicationPassword, fetch? })"
        - "ensurePageExists({ slug, title, status })"
        - "publishPageBuilderPayloads({ slug, schema, aiSchema })"
        - "readPageBuilderPayloads(slug)"
    - component: "pageBuilderRuntimeWorkflow"
      responsibility: >
        Orkiestrowac save draftu, apply approved source mappings, compile,
        ensure page, publish, opcjonalny readback verify i zapis finalnego
        wordpressPostId oraz compiled payloads do draftu.
      interfaces:
        - "runPageBuilderRuntimeWorkflow({ draft, approvedSourceMappings, draftStore, wordpressClient, verifyReadback? })"
  dependencies:
    - component: "pageBuilderRuntimeWorkflow"
      relationship: "Konsumuje firebasePageDraftStore do save/upsert oraz wordpressPageBuilderClient do ensure/publish/readback."
    - component: "pageBuilderRuntimeWorkflow"
      relationship: "Reuse'uje compilePageDraft z SCRIPTS/make-page-draft-compile-gate.js jako jedyny compiler."
    - component: "wordpressPageBuilderClient"
      relationship: "Uzywa core WordPress REST /wp-json/wp/v2/pages do ensure create-update i bridge bulwar/v1 do meta publish/readback."
  integration_points:
    - "zip/src/blocks/registry/firebasePageDraftStore.test.ts"
    - "zip/src/blocks/registry/wordpressPageBuilderClient.test.ts"
    - "zip/src/blocks/registry/pageBuilderRuntimeWorkflow.test.ts"
    - "SCRIPTS/make-page-draft-compile-gate.js"
    - "wordpress-plugin/bulwar-bridge/src/Http/Routes.php"

