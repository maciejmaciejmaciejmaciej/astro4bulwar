plan_id: "page-builder-runtime-workflow"
objective: >
  Zaplanowac minimalny, bezpieczny kolejny etap po istniejacych modulach
  runtime page buildera: live adapter Firestore wykonywany tylko w Node,
  cienki CLI wrapper z env secrets i minimalna dokumentacja operacyjna,
  bez dublowania compile gate ani runtime orchestratora.
created_at: "2026-04-19T00:00:00Z"
created_by: "gem-planner"
status: "pending"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 4
  risk_score: "medium"

tldr: |
  Najmniejszy bezpieczny follow-up po gotowych modulach runtime to domkniecie
  warstwy uruchomieniowej poza bundlerem przegladarkowym. Obecny workflow juz
  reuse'uje compile gate z SCRIPTS i wykonuje ensurePageExists przed publish,
  wiec kolejny etap powinien dodac tylko: node-only adapter Firestore,
  uruchamialny CLI wrapper z env-based secret injection oraz krotka dokumentacje
  operatora. Sources: zip/src/blocks/registry/firebasePageDraftStore.ts,
  zip/src/blocks/registry/wordpressPageBuilderClient.ts,
  zip/src/blocks/registry/pageBuilderRuntimeWorkflow.ts,
  docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md,
  docs/plan/page-builder-runtime-workflow/plan.yaml,
  .github/instructions/project-foundation.instructions.md.

open_questions:
  - >
    Czy operator ma odpalac runtime zawsze na lokalnym hoście przez `npx --prefix zip tsx`,
    czy potrzebny jest tez wariant CI-only? Minimalny plan zaklada lokalny Node runtime,
    bo to jest zgodne z obecnym wzorcem SCRIPTS/generate-page-draft-from-scrape.ts.

pre_mortem:
  overall_risk_level: "medium"
  critical_failure_modes:
    - scenario: >
        Firebase Admin albo sekrety WordPress trafia do kodu wykonywanego przez
        browserowy runtime w zip, co naruszy twardy boundary bezpieczenstwa.
      likelihood: "medium"
      impact: "critical"
      mitigation: >
        Trzymac live adapter i ladowanie env wyłącznie po stronie SCRIPTS,
        a runtime workflow w zip pozostawic jako czysta, dependency-injected
        orkiestracje bez importu firebase-admin ani dotenv.
    - scenario: >
        CLI zacznie kopiowac compile logic albo sterowac publikacja bokiem,
        przez co wyjscie runtime rozjedzie sie z istniejacym compile gate.
      likelihood: "medium"
      impact: "high"
      mitigation: >
        CLI ma tylko zlozyc zaleznosci, wczytac draft i wywolac istniejace
        runPageBuilderRuntimeWorkflow. Zero drugiego compiler path. Sources:
        zip/src/blocks/registry/pageBuilderRuntimeWorkflow.ts,
        SCRIPTS/make-page-draft-compile-gate.js.
    - scenario: >
        Live adapter zostanie sprzezony z konkretnym ksztaltem SDK i utrudni
        testy albo przyszla podmiane backendu draft store.
      likelihood: "medium"
      impact: "medium"
      mitigation: >
        Zamknac inicjalizacje Firestore Admin w cienkim adapterze/factory,
        a do runtime workflow dalej podawac tylko kontrakt store kompatybilny z
        createFirestoreFirebasePageDraftStore().
  assumptions:
    - >
      Obecne moduly runtime przechodza testy i stanowia stabilna baze follow-upu.
      Source: terminal context with passing tests for firebasePageDraftStore,
      wordpressPageBuilderClient and pageBuilderRuntimeWorkflow.
    - >
      SCRIPTS jest poprawnym boundary dla node-only narzedzi i juz hostuje
      compile gate oraz inne repo-side CLI. Sources: SCRIPTS/generate-page-draft-from-scrape.ts,
      SCRIPTS/make-page-draft-compile-gate.js,
      .github/instructions/project-foundation.instructions.md.
    - >
      Sekrety i live credentials nie moga trafic do repo ani do browser bundle.
      Source: .github/copilot-instructions.md,
      .github/instructions/project-foundation.instructions.md.

implementation_specification:
  code_structure: |
    Zachowac obecny podzial odpowiedzialnosci. `zip/src/blocks/registry`
    pozostaje miejscem dla testowalnych, env-agnostic kontraktow runtime,
    natomiast `SCRIPTS/` przejmuje tylko node-only composition root:
    inicjalizacje env, zbudowanie live Firestore adaptera, wczytanie draftu z
    pliku lub docId i wywolanie istniejacej orkiestracji runtime. Dokumentacja
    ma opisac jedyny kanoniczny sposob uruchomienia i wymagane zmienne,
    bez dodawania drugiego toru publikacji.
  affected_areas:
    - "SCRIPTS/"
    - "zip/src/blocks/registry/"
    - "docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md"
    - ".env.example"
  component_details:
    - component: "Node-only live Firestore adapter"
      responsibility: >
        Zainicjalizowac Firebase Admin/Firestore tylko w Node i wystawic store
        zgodny z juz istniejacym kontraktem FirebasePageDraftStore.
      interfaces:
        - "Factory zwraca draftStore kompatybilny z runPageBuilderRuntimeWorkflow()."
        - "Konfiguracja pochodzi z env, nie z kodu bundle'a."
    - component: "CLI runtime wrapper"
      responsibility: >
        Wczytac env, przyjac input operatora, zlozyc wordpressClient + draftStore,
        zaladowac draft i wywolac istniejacy workflow wraz z opcjonalnym verifyReadback.
      interfaces:
        - "Jedna komenda CLI dla publish flow z jawnymi flagami i bez duplikacji compile logiki."
    - component: "Operational usage note"
      responsibility: >
        Udokumentowac wymagane env, boundary Node-only, wejscia CLI i kroki weryfikacji.
      interfaces:
        - "Krótki usage doc plus lista sekretow w .env.example bez realnych wartosci."
  dependencies:
    - component: "CLI runtime wrapper"
      relationship: "Konsumuje istniejące runPageBuilderRuntimeWorkflow() jako jedyny orchestrator publish flow."
    - component: "Node-only live Firestore adapter"
      relationship: "Jest composition root nad createFirestoreFirebasePageDraftStore(), nie nowym store contractem."
    - component: "Operational usage note"
      relationship: "Dokumentuje tylko kanoniczny flow oparty o SCRIPTS boundary i obecny WordPress client."
  integration_points:
    - "zip/src/blocks/registry/pageBuilderRuntimeWorkflow.ts"
    - "zip/src/blocks/registry/firebasePageDraftStore.ts"
    - "zip/src/blocks/registry/wordpressPageBuilderClient.ts"
    - "SCRIPTS/generate-page-draft-from-scrape.ts"
    - "docs/plan/astro-wordpress-page-builder/page-builder-authoring-workflow.md"

