plan_id: catering-special-menu-wording-live-20260325
objective: Verify the active BULWAR APP catering frontend source and build outputs for the special product 'Obiad Wielkanocny dla 2 osób', remove any remaining active per-2-person portion wording from authoring sources, deploy the current correct frontend to live v2, and verify the live bundle contains per-1-person wording for option labels and weights.
created_at: "2026-03-25T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  Current authoring sources in zip/src already use per-1-person option weights, while an older packaged artifact still contains stale per-2-person wording.
  The minimal path is to audit the active source-of-truth and generated dist bundle, align any remaining bundled copy in the special-menu source module/component to per-1-person semantics, then redeploy the current frontend package to v2 and confirm the live JS bundle exposes only per-1-person wording for the special menu option text.
open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: A stale string remains in an unused but bundled source field, so the live bundle still contains per-2-person wording even after redeploy.
      likelihood: medium
      impact: high
      mitigation: Audit both the visible JSX copy and the seed data module, then verify the built asset text before deployment.
    - scenario: Deployment publishes an older package snapshot instead of the freshly built dist output.
      likelihood: medium
      impact: critical
      mitigation: Build from current zip/src, package from the new dist directory only, and verify the deployed asset fingerprint/content after publish.
    - scenario: Live caching masks the new asset and the browser keeps serving a previous hotfix bundle.
      likelihood: medium
      impact: high
      mitigation: Validate the live asset URL directly and confirm the new bundle contains per-1-person strings before relying on page-level visual checks.
  assumptions:
    - The active live catering frontend is the React app mounted under the v2 WordPress host.
    - zip/src/data/cateringSpecialMenuFor2.ts and zip/src/components/sections/CateringProductSpecialMenuFor2.tsx remain the only authoring sources for this product's wording.
    - zip/dist and zip/deploy-live-hotfix-* are generated artifacts, not sources of truth.
    - The existing SCP plus deploy-react.sh workflow remains the correct deployment path for the live React overlay.

implementation_specification:
  code_structure: Keep the scope limited to the special-menu authoring sources and the existing frontend deployment workflow. Treat the seed data module and the special-menu section component as the only places where wording should be authored; dist and deploy snapshots must be regenerated rather than edited manually.
  affected_areas:
    - zip/src/data/cateringSpecialMenuFor2.ts
    - zip/src/components/sections/CateringProductSpecialMenuFor2.tsx
    - zip/dist
    - zip/deploy-live-hotfix-*
    - deploy-react.sh
  component_details:
    - component: special-menu source audit
      responsibility: Identify whether any active or bundled authoring strings for the special product still imply per-2-person portions.
      interfaces:
        - Produces a list of authoritative source locations and stale-copy findings for the special-menu wording.
    - component: special-menu wording source
      responsibility: Keep visible intro copy, seed data text, and option weight strings aligned to per-1-person semantics.
      interfaces:
        - Exposes the final source strings consumed by the build for the special-menu component and option cards.
    - component: live deployment package
      responsibility: Build and publish the current React frontend bundle to the v2 environment using the existing deployment script path.
      interfaces:
        - Produces a deployed asset set whose special-menu bundle text matches the corrected source.
  dependencies:
    - component: special-menu wording source
      relationship: depends on the source audit to identify any remaining stale strings before rebuild.
    - component: live deployment package
      relationship: depends on a fresh build generated from the audited or corrected authoring sources.
  integration_points:
    - Vite build output under zip/dist/assets
    - Existing packaging and SCP deployment flow using deploy-react.sh
    - Live route under the v2 React frontend for the catering page
    - Direct live bundle verification against deployed asset text

contracts:
  - from_task: audit_special_menu_wording_sources
    to_task: align_special_menu_wording_sources
    interface: Definitive list of active source locations and any stale per-2-person strings that are still bundled or rendered.
    format: File-path plus string-inventory findings for zip/src and zip/dist
  - from_task: align_special_menu_wording_sources
    to_task: build_and_deploy_current_frontend_to_v2
    interface: Clean authoring sources and fresh build output containing only per-1-person wording for the special-menu option copy.
    format: Updated source files and regenerated dist assets
  - from_task: build_and_deploy_current_frontend_to_v2
    to_task: verify_live_bundle_per_person_wording
    interface: Deployed live asset path or fingerprint for the newly published frontend bundle.
    format: Live asset reference and deployment timestamp

