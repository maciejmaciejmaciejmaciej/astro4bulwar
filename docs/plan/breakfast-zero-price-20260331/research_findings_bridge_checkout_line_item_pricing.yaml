  breakfast_vs_normal:
    simple_breakfast_product_88:
      file: zip/src/data/cateringWielkanocny.json
      location: zip/src/data/cateringWielkanocny.json:9
      detail: Product 88 ("Sniadanie Wielkanocne dla 2 osob", cena 129) is a normal JSON-backed simple product.
    simple_breakfast_mapping:
      file: zip/src/data/cateringWielkanocny.ts
      location: zip/src/data/cateringWielkanocny.ts:128
      detail: normalizeProduct() maps raw JSON products, including product 88, into the standard simple product contract with id and price.
    special_shell_product_53:
      file: zip/src/data/cateringSpecialMenuFor2.ts
      location: zip/src/data/cateringSpecialMenuFor2.ts:79
      detail: The configurable special menu uses shell product id 53 with frontend seed unitPrice 169 and line_type special_menu_for_2.
    actual_bridge_difference:
      file: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
      location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:100
      detail: special_menu_for_2 differs only by extra order-item meta written after add_product(); pricing still uses product->get_price() before that branch.
    sync_scope_difference:
      file: SCRIPTS/sync_catering_category.js
      location: SCRIPTS/sync_catering_category.js:629
      detail: Normal JSON-backed products are upserted with Woo regular_price/price from cena, but the special shell product 53 is outside this sync flow and is maintained separately.
  direct_vs_store_api:
    detail: >-
      The plugin creates orders through WooCommerce PHP APIs directly (wc_create_order + add_product).
      No Store API payload builder was found in the examined bridge source.

