domain_security_considerations:
  sensitive_areas:
    - area: price authority
      location: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php:91
      concern: The bridge correctly distrusts client totals, but that makes Woo product data the sole pricing authority for paid lines.
    - area: order write path
      location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:95
      concern: Zero or stale Woo prices will be persisted silently because the bridge does not reject nonpositive paid prices.
  authentication_patterns_in_domain: Public REST routes rely on payload validation, token checks, and server-side recomputation rather than logged-in user auth.
  authorization_patterns_in_domain: No per-user authorization gate exists on checkout endpoints; safety depends on server-side validation and authoritative product data.
  data_validation_in_domain: Request shape, quote tokens, slot tokens, product existence, and quantity are validated, but price reasonableness is not validated separately.

testing_patterns:
  framework: ad hoc PHP test files plus workspace search evidence
  coverage_areas:
    - availability/slot logic
    - Make webhook payload formatting
    - frontend cart serialization and display flows
  test_organization: Tests exist under wordpress-plugin/bulwar-bridge/tests and zip/src/*.test.ts(x), but price-path assertions for checkout order creation were not found.
  mock_patterns:
    - fake order/item objects in MakeWebhookNotifierTest
    - frontend unit tests around cart serialization and special menu config

fix_candidates:
  - candidate: Correct the live Woo price on the actually affected product id and keep Woo as the single pricing authority
    scope: Works for either simple breakfast product 88 or shell product 53
    why_minimal: No bridge logic change is required because the bridge is already intentionally reading Woo price data
    risks:
      - Does not prevent future silent zero-priced orders if another product record drifts to 0
      - Requires first confirming which product id is affected in live orders
  - candidate: Add a bridge-side guard that rejects paid cart lines whose resolved Woo price is <= 0 before quote creation and before order write
    scope: QuoteService::cartSubtotal and OrderService::create
    why_minimal: Small localized code change in the existing pricing path
    risks:
      - Would also reject any intentionally free products unless those are explicitly allowed
      - Converts a silent pricing bug into a checkout failure, which is safer but operationally noisier
  - candidate: Special-case special_menu_for_2 to use a server-owned bridge config price instead of shell product get_price()
    scope: Only relevant if the affected 0-priced line is shell product 53
    why_minimal: Narrow code path change limited to special_menu_for_2
    risks:
      - Introduces a second source of truth separate from Woo catalog data and normal sync scripts
      - Leaves simple breakfast product 88 unaffected if that is the real failing product
      - Requires matching the same override in QuoteService and OrderService to avoid subtotal/order drift

open_questions:
  - question: Which product id is actually appearing with 0 PLN in the live Woo order items: simple breakfast product 88, special shell product 53, or both?
    context: The code path is clear, but the workspace does not contain the current live Woo product records or the failing order export.
  - question: What is the current live Woo get_price() value for product 88 and product 53?
    context: That single fact determines whether the root cause is catalog data drift or a need for a targeted bridge override.
  - question: Has the normal category sync been run after product 88 was added to the JSON data?
    context: Product 88 is JSON-backed and should inherit its price via sync, unlike shell product 53 which is outside that flow.

gaps:
  - area: live catalog state
    description: No local export of the current live Woo product objects for ids 88 and 53 was available in the examined workspace.
    impact: Prevents proving whether the bad line is caused by simple-product sync drift, shell-product drift, or both.
  - area: direct order-service tests
    description: No PHP tests were found that assert QuoteService and OrderService behavior for zero-priced breakfast/simple/special products.
    impact: The safest code-level guard can be identified, but its regression surface is not currently covered by automated tests.
  - area: failing order evidence
    description: No failing Woo order snapshot or line-item export was present showing the exact product id and stored totals for the bad breakfast line.
    impact: Root-cause confidence remains medium rather than high even though the responsible pricing path is identified.
