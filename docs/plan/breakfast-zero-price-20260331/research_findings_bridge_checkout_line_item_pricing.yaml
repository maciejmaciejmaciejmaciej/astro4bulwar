plan_id: breakfast-zero-price-20260331
objective: >-
  identify the shortest safe fix for a bug where the checkout->WooCommerce bridge
  creates breakfast items with price 0 zl in Woo order line items.
focus_area: bridge_checkout_line_item_pricing
created_at: 2026-03-31
created_by: GitHub Copilot
status: completed

tldr: |
  - Orders are created directly inside wordpress-plugin/bulwar-bridge via Woo PHP APIs, not via a Woo Store API payload builder.
  - The checkout payload never sends line-item prices; it sends product_id, quantity, and optional configuration only.
  - Both QuoteService and OrderService recompute price from wc_get_product(product_id)->get_price(). Any Woo product whose current price is 0 will be quoted and written as 0 in the order.
  - The JSON breakfast product id 88 follows the normal simple-product path. The only divergent breakfast-adjacent path is the special menu shell product id 53, which differs only by extra order-item meta and is outside the normal category sync script.

research_metadata:
  methodology: >-
    Medium-complexity hybrid retrieval: semantic_search for prior bridge/docs context,
    grep_search for exact order, subtotal, special_menu_for_2, breakfast, and sync patterns,
    read_file for end-to-end controller/service/cart data flow, plus targeted terminal line counts for file metadata.
  scope: >-
    Examined the active checkout submit path in zip plus the WordPress plugin order/quote services,
    and the supporting product-sync and shell-product setup scripts needed to distinguish simple breakfast products from the special shell product path.
  confidence: medium
  coverage: 93

probable_root_cause:
  statement: >-
    The bridge is not sourcing prices from the frontend checkout payload. It recalculates every cart line from the live Woo product record using wc_get_product(product_id)->get_price() in both quote and order creation.
    As a result, any affected breakfast product whose Woo price is currently 0 will be saved into the Woo order as 0. The code does not contain a breakfast-specific pricing override.
  confidence: medium
  evidence:
    - file: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php
      location: wordpress-plugin/bulwar-bridge/src/Checkout/QuoteService.php:91
      detail: cartSubtotal() loads each product with wc_get_product() and adds get_price() * quantity.
    - file: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php
      location: wordpress-plugin/bulwar-bridge/src/Checkout/OrderService.php:95
      detail: add_product() is called with explicit subtotal and total derived from product->get_price() * quantity.
    - file: zip/src/lib/cateringCart.ts
      location: zip/src/lib/cateringCart.ts:411
      detail: buildBridgeCheckoutCartLines() emits product_id, quantity, line_type, and optional configuration only; no price fields exist.
    - file: zip/components/CheckoutDrawer.tsx
      location: zip/components/CheckoutDrawer.tsx:584
      detail: checkout POST sends cart_lines exactly as built above; no explicit line totals are posted.

