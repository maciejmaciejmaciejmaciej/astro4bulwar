related_conventions:
  naming_patterns_in_domain: >-
    Frontend cart lines use snake_case wire fields such as client_line_id, line_type, and product_id.
    Special-product code uses SPECIAL_MENU_FOR_2 constants and line_type special_menu_for_2.
  structure_of_domain: >-
    Frontend keeps display prices in cart state, but the bridge treats the browser as untrusted and recomputes server-side totals from Woo product data.
  error_handling_in_domain: >-
    CheckoutController converts thrown RuntimeException codes like UNKNOWN_PRODUCT, QUOTE_EXPIRED, and SLOT_UNAVAILABLE into REST errors, but there is no dedicated guard for zero-priced paid items.
  testing_in_domain: >-
    The plugin has tests around availability and Make webhook formatting, but no focused OrderService or QuoteService tests asserting price behavior for simple breakfast products or the special shell product.
  documentation_in_domain: >-
    docs/contracts.md explicitly states that client-submitted prices are excluded and the bridge resolves price server-side.

