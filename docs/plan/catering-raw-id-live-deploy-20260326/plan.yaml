plan_id: catering-raw-id-live-deploy-20260326
objective: |
	Deploy the already-implemented Easter catering raw-key refactor to production by publishing the zip frontend only. Preserve the runtime/public id contract while releasing the raw boundary rename from id to category_id/product_id.
created_at: 2026-03-26T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: pending_approval
research_confidence: high

tldr: |
	This release stays inside the zip React overlay. The production runtime consumes normalized cateringWielkanocnyCategories, while the raw rename is confined to zip/src/data/cateringWielkanocny.json and zip/src/data/cateringWielkanocny.ts, so no wordpress-plugin or bridge deploy is required. Reuse the existing zip build and deploy-react.sh path, then enforce the mandatory dhosting permission fix: directories 755 and files 644.
open_questions: []

pre_mortem:
	overall_risk_level: low
	critical_failure_modes:
		- scenario: A stale frontend artifact is deployed, so production does not actually contain the raw-key refactor.
			likelihood: medium
			impact: high
			mitigation: Build or confirm a fresh zip/react-deploy.zip from the current zip sources before upload.
		- scenario: The upload succeeds but dhosting permissions are not normalized, producing white screen or 403 behavior.
			likelihood: medium
			impact: critical
			mitigation: Treat the chmod pass as a required deployment gate immediately after remote unzip.
	assumptions:
		- The raw-key refactor is already implemented and validated in the zip frontend.
		- Production serves the React overlay from /home/client-user/domains/client.example/public_html/react.
		- Backend checkout payload contracts remain unchanged because the normalizer still emits public id fields.

implementation_specification:
	code_structure: |
		This is an operational deployment plan only. Release the zip React bundle through the existing archive upload plus deploy-react.sh flow and do not modify or publish wordpress-plugin, bridge, or sync scripts as part of this release.
	affected_areas:
		- zip/src/data/cateringWielkanocny.json
		- zip/src/data/cateringWielkanocny.ts
		- zip production build artifact and zip/react-deploy.zip
		- deploy-react.sh
	component_details:
		- component: Frontend scope validation
			responsibility: Confirm the refactor remains confined to the zip runtime boundary and does not require backend publication.
			interfaces:
				- Runtime page consumes cateringWielkanocnyCategories with unchanged public id fields.
				- Raw source uses category_id and product_id only inside the frontend data boundary.
		- component: Frontend artifact publication
			responsibility: Build or confirm the release archive, upload it, and publish it into the live react directory.
			interfaces:
				- zip/react-deploy.zip
				- deploy-react.sh backup and unzip flow
		- component: Post-deploy permission normalization
			responsibility: Enforce dhosting-required permissions on the deployed frontend files.
			interfaces:
				- find <react-path> -type d -exec chmod 755 {} \;
				- find <react-path> -type f -exec chmod 644 {} \;
	dependencies:
		- component: Frontend scope validation
			relationship: Must confirm frontend-only release before any production deployment action.
		- component: Frontend artifact publication
			relationship: Produces the live files that permission normalization and smoke verification depend on.
		- component: Post-deploy permission normalization
			relationship: Must complete before live verification is considered valid.
	integration_points:
		- zip/package.json build script
		- deploy-react.sh
		- /home/client-user/domains/client.example/public_html/react

contracts:
	- from_task: T1
