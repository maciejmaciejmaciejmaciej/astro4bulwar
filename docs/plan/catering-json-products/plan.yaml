plan_id: catering-json-products
objective: Convert the catering page to render JSON-driven categories and products, reuse the current CateringProductListAlt section for each category, add vegan or vegetarian indicators under the combined product text, keep products addable to cart, right-align pricing, source category background images from public/images via image_url, preserve the existing design patterns, and keep the frontend build passing.
created_at: "2026-03-24T00:00:00Z"
created_by: gem-planner
status: completed
research_confidence: high

tldr: |
  The catering page now renders fully from the JSON-backed data source under zip/src/data, reuses CateringProductListAlt for every category, shows dietary indicators beneath the combined product text, keeps pricing right-aligned, and routes add-to-cart actions into shared page-level cart state consumed by ProductItemAlt, StickyCartControls, and CheckoutDrawer. Validation completed with clean diagnostics on the affected files and a successful frontend production build.
open_questions: []

completion_summary:
  implementation:
    - Added a JSON source of truth under zip/src/data plus a typed normalization layer that exposes reusable category and product contracts.
    - Refactored the category section and product row so all categories render through the same reusable section and dietary metadata is displayed directly beneath the combined product text.
    - Replaced mock cart data with shared page-level cart state wired into the product rows, sticky cart controls, and checkout drawer.
  validation:
    - Confirmed there are no current editor diagnostics in the affected route, data, section, drawer, sticky cart, or tsconfig files.
    - Ran the frontend production build from zip with `npm run build`; Vite completed successfully on 2026-03-24.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The new data source is placed under src/data as JSON, but TypeScript cannot import it cleanly in the current Vite app configuration.
      likelihood: medium
      impact: high
      mitigation: Treat direct JSON import as part of the implementation scope and either enable resolveJsonModule in the main tsconfig or add a tiny typed adapter that keeps the source of truth in JSON without changing the page contract.
    - scenario: Cart state remains split between ProductItemAlt, StickyCartControls, and CheckoutDrawer, so products appear addable but the drawer still shows mock items.
      likelihood: high
      impact: critical
      mitigation: Centralize cart state in CateringWielkanocnyPage and make the row and cart surfaces fully prop-driven before removing any mock data.
    - scenario: image_url values do not match existing public filenames, producing blank hero bands for some categories.
      likelihood: medium
      impact: medium
      mitigation: Normalize image_url values against the confirmed public/images asset set during the data-preparation task and keep the existing bgImage rendering pattern unchanged.
  assumptions:
    - The current CateringProductListAlt and ProductItemAlt layout is the correct visual baseline and should be extended rather than redesigned.
    - A page-local cart state is sufficient for this route and no app-wide store is required.
    - The existing public image path convention /react/images/... must be preserved because the app is built with Vite base /react/.
    - The new catering menu source of truth should live under zip/src/data and remain human-editable as JSON.

implementation_specification:
  code_structure: Keep the data source and data-shaping logic inside zip/src/data, keep section and row rendering inside the existing section components, and keep cart state orchestration inside CateringWielkanocnyPage with prop-driven updates flowing into StickyCartControls and CheckoutDrawer. Avoid introducing a new design system, global state library, or separate cart feature module.
  affected_areas:
    - zip/src/data/
    - zip/src/components/sections/CateringProductListAlt.tsx
    - zip/src/components/sections/ProductItemAlt.tsx
    - zip/src/pages/CateringWielkanocnyPage.tsx
    - zip/components/CheckoutDrawer.tsx
    - zip/src/components/sections/StickyCartControls.tsx
    - zip/tsconfig.json
  component_details:
    - component: catering JSON data module
      responsibility: Hold the editable category and product source of truth, including category title, description, image_url, product ids, pricing, gramatura, and vegan or vegetarian flags in a shape the page can consume safely.
      interfaces:
        - Exports typed category and product records derived from the JSON source.
        - Guarantees each category provides an image_url compatible with the existing bgImage prop pattern.
    - component: CateringProductListAlt
      responsibility: Render a single reusable category block from props and map its products into ProductItemAlt rows while preserving the current overlay image panel and table-like list shell.
      interfaces:
        - Accepts category title, optional category description, normalized products, background image, and cart action callbacks.
    - component: ProductItemAlt
      responsibility: Render the combined product text, dietary icon row, quantity controls, right-aligned price block, and add-to-cart interaction without owning cart truth locally.
      interfaces:
        - Accepts product id, text fields, dietary flags, quantity value, and callbacks for quantity and add-to-cart actions.
    - component: CateringWielkanocnyPage
      responsibility: Import the JSON-backed categories, render one CateringProductListAlt per category, own cart state, and pass aggregated data to StickyCartControls and CheckoutDrawer.
      interfaces:
        - Maps category data to repeated section instances.
        - Exposes cart items, totals, and UI handlers to the drawer and sticky controls.
    - component: CheckoutDrawer and StickyCartControls
      responsibility: Stop using placeholder order data and reflect the shared cart state coming from the page while preserving the existing shell and interaction model.
      interfaces:
        - Receive cart items, totals, counts, and open or close handlers through props.
  dependencies:
    - component: CateringWielkanocnyPage
      relationship: composes CateringProductListAlt for each category and owns the cart state consumed by ProductItemAlt, StickyCartControls, and CheckoutDrawer
    - component: CateringProductListAlt
      relationship: maps normalized category products into ProductItemAlt rows
    - component: ProductItemAlt
      relationship: emits quantity and add-to-cart actions back to page-owned cart state
    - component: CheckoutDrawer
      relationship: renders the current cart summary and checkout form from page-provided cart data instead of mock constants
    - component: StickyCartControls
      relationship: reflects cart count or summary state and opens the drawer
  integration_points:
    - React route composition in zip/src/pages/CateringWielkanocnyPage.tsx
    - Static data loading from zip/src/data
    - Existing section shell styles and bgImage prop flow in CateringProductListAlt
    - Existing cart drawer and sticky bar surfaces
    - Frontend build command in zip/package.json

contracts:
  - from_task: prepare_catering_json_contract
    to_task: refactor_category_section_and_row
    interface: A typed JSON-backed category collection with category title, optional description, image_url, and product records including id, combined text, gramatura, numeric or formatted price, vegan, and vegetarian fields.
    format: JSON source plus typed TypeScript adapter contract
  - from_task: refactor_category_section_and_row
    to_task: wire_page_level_cart_flow
    interface: Reusable section and row props that expose product identity, dietary metadata, quantity control hooks, and add-to-cart callbacks while preserving current classes and layout rhythm.
    format: TSX component prop contract
  - from_task: prepare_catering_json_contract
    to_task: wire_page_level_cart_flow
    interface: Category list and product ids that the page can iterate over and use as stable cart keys.
    format: Typed category and product arrays
  - from_task: wire_page_level_cart_flow
    to_task: verify_catering_json_page
    interface: The page renders all categories from JSON, cart surfaces consume shared state, and no mock order constants remain in the active flow.
    format: Integrated TSX route and prop-driven cart surfaces

