plan_id: catering-wielkanocny-salatki-overlay-fix
objective: Refine the SAŁATKI NA WYNOS section on /catering-wielkanocny so the menu panel is slightly narrower than the background image, the heading aligns to the panel width, and both retain a layered parallax / overlap parallax relationship over the existing broad image width pattern.
