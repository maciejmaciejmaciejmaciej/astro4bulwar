tldr: |
	Keep the existing broad image-width section pattern in CateringProductListAlt and make only a minimal structural adjustment inside that component. The heading and the menu panel should share the same narrower content width, overlap the wider image, and preserve the current scroll-depth feel as layered parallax / overlap parallax. Validation should include the frontend build.
open_questions: []

pre_mortem:
	overall_risk_level: low
	critical_failure_modes:
		- scenario: The panel and heading are narrowed at the wrong wrapper level, causing the image width pattern to collapse to the same width as the panel.
			likelihood: medium
			impact: medium
			mitigation: Keep the outer broad image container unchanged and apply the narrower alignment only to the overlapping heading/panel shell.
		- scenario: The overlap spacing is adjusted statically and weakens the existing vertical relative-motion depth effect while scrolling.
			likelihood: low
			impact: medium
			mitigation: Preserve the current scroll-linked transform source and only retune the nested layout wrappers so the layered parallax / overlap parallax behavior remains intact.
	assumptions:
		- The requested section is the existing SAŁATKI NA WYNOS block rendered by CateringProductListAlt on /catering-wielkanocny.
		- The broad image width pattern already in use should remain the visual reference and should not be replaced with a new layout rule.
		- A minimal focused change means no route-level redesign and no new styling system primitives.

