				- Preserves the existing scroll-linked motion behavior, described in the plan as layered parallax / overlap parallax.
		- component: CateringWielkanocnyPage
			responsibility: Continue rendering the existing SAŁATKI NA WYNOS section on the route without composition changes.
			interfaces:
