	dependencies:
		- component: CateringWielkanocnyPage
			relationship: renders CateringProductListAlt on the /catering-wielkanocny route
		- component: CateringProductListAlt
			relationship: reuses the existing framer-motion scroll transform and current broad image shell pattern
	integration_points:
		- React Router route /catering-wielkanocny
		- Existing Tailwind utility classes already used in the section
		- Frontend build command exposed through zip/package.json

