plan_id: ad-hoc-block-color-variants
objective: "Ustalić najlepszy wzorzec dla wielu wersji kolorystycznych jednego bloku w BULWAR APP z uwzględnieniem design systemu i page-buildera."
focus_area: block-color-variants
created_at: "2026-04-16"
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - Repo ma już semantyczny słownik kolorów w globalnym CSS i instrukcję, że styling ma bazować na istniejącym design language, nie na nowym ad hoc systemie (sources: zip/src/index.css:9-17, .github/instructions/design-system.instructions.md:18,44-45).
  - Komponenty blokowe używają semantycznych tokenów i lokalnych stałych klas; Promo2 dopuszcza tylko ogólne className override, bez jawnego wariantu kolorystycznego (sources: zip/components/Promo2.tsx:28,101,121,146; zip/src/components/sections/OurServices.tsx:78-85).
  - Page-builder ma już osobne pole section.variant oraz wsparcie registry-level dla variants[], więc wariant kolorystyczny jest architektonicznie bliższy nazwanej wartości string niż surowym klasom lub obiektom stylów (sources: zip/src/blocks/registry/types.ts:33,45; zip/src/blocks/registry/pageBuilderSchema.ts:10; zip/src/blocks/registry/blueprint.ts:19).
  - Obecne definicje bloków promo2 i our-services nie deklarują jeszcze dozwolonych variants[], mimo że runtime i schema registry już to przewidują (sources: zip/src/blocks/promo2/schema.ts, zip/src/blocks/our-services/schema.ts, zip/src/blocks/registry/types.ts:33).
  - Domyślny flow page-buildera inicjalizuje variant jako null i zachowuje stabilne ids w sections[], więc wariant powinien być jawny, serializowalny i bezpieczny dla AI/page-builder payloadów (sources: zip/src/blocks/registry/index.ts:89, .github/instructions/page-builder.instructions.md:19,39).

