        location: "zip/src/blocks/registry/pageBuilderSchema.ts:10"
        snippet: "variant: z.string().nullable()"
      - file: zip/src/blocks/registry/blueprint.ts
        location: "zip/src/blocks/registry/blueprint.ts:19"
        snippet: "variant: z.string().optional()"
