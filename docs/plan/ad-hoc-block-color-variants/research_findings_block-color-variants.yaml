    examples:
      - file: zip/components/Promo2.tsx
        location: "zip/components/Promo2.tsx:28,101"
        snippet: "className?: string ... cn('page-margin py-32', className)"
    prevalence: occasional
  - category: architecture
    pattern: "Registry i page-builder mają już osobny kanał na nazwany variant"
    description: "Model danych bloków i instancji sekcji przewiduje variant niezależny od data payload oraz opcjonalną listę variants[] przy definicji bloku."
    examples:
      - file: zip/src/blocks/registry/types.ts
        location: "zip/src/blocks/registry/types.ts:33,45"
        snippet: "variants?: readonly string[] ... variant: string | null"
