  methodology: "Hybrid retrieval: grep_search for exact contracts and tokens, targeted read_file on design-system instructions, page-builder instructions, block registry files, and representative components."
  scope: "Skupiono się na globalnych tokenach stylu, dwóch reprezentatywnych blokach UI, rejestrze bloków i kontrakcie page-buildera."
  confidence: high
  coverage: 88
  decision_blockers: 1
  research_blockers: 0

