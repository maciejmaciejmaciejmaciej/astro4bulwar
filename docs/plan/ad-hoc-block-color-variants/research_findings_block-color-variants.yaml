  - category: documentation
    pattern: "Meaningful variants mają być jawnie nazwane i udokumentowane"
    description: "Instrukcja design-systemu odrzuca niejawne systemy stylowania i wymaga nazwania wariantów bloku, jeśli są znaczące biznesowo lub wizualnie."
    examples:
