patterns_found:
  - category: architecture
    pattern: Static build uses separate public-origin and content-origin constants
    description: >-
      The Astro page route resolves public SEO URLs from `Astro.site` while also
      using `WORDPRESS_BASE_URL` as the content fetch and relative-asset origin.
      When both point at v2, generated HTML bakes in v2 URLs.
    examples:
      - file: astro-site/src/pages/[slug].astro
        location: astro-site/src/pages/[slug].astro:52-60
        snippet: "const siteUrl = Astro.site ?? new URL(WORDPRESS_BASE_URL); ... return `${WORDPRESS_BASE_URL}${src.startsWith('/') ? '' : '/'}${src}`;"
      - file: astro-site/src/lib/config.ts
        location: astro-site/src/lib/config.ts:1
        snippet: "export const WORDPRESS_BASE_URL = 'https://client.example';"
      - file: astro-site/astro.config.mjs
        location: astro-site/astro.config.mjs:6
        snippet: "site: 'https://client.example'"
    prevalence: common

  - category: structure
    pattern: Layout emits resolved absolute SEO values supplied by the page route
    description: >-
      SEO is centralized: `[slug].astro` computes canonical/OG/Twitter fields,
      and `BaseLayout.astro` renders them directly into `<head>`.
    examples:
      - file: astro-site/src/pages/[slug].astro
        location: astro-site/src/pages/[slug].astro:159-174
        snippet: "const seoCanonical = resolveAbsoluteUrl(...); ... canonical: seoCanonical ... url: seoCanonical"
      - file: astro-site/src/layouts/BaseLayout.astro
        location: astro-site/src/layouts/BaseLayout.astro:23-33
        snippet: "<link rel=\"canonical\" href={seo.canonical} /> ... <meta property=\"og:url\" content={seo.og.url} />"
    prevalence: common

  - category: naming
    pattern: Root-relative internal chrome links, absolute external legal/social links
    description: >-
      Internal navigation/brand links use `/`-style or data-provided hrefs,
      while footer legal/social links are absolute URLs when authored that way.
    examples:
      - file: astro-site/src/lib/wordpress.ts
        location: astro-site/src/lib/wordpress.ts:41-42,114,139-140
        snippet: "href: '/', logoSrc: '/react/images/logo.png' ... legalLinks: https://bulwarrestauracja.pl/..."
      - file: astro-site/src/components/Navbar.astro
        location: astro-site/src/components/Navbar.astro:18,25,31
        snippet: "href={reserveLink.href} ... href={item.href} ... href={childItem.href}"
      - file: astro-site/src/components/Footer.astro
        location: astro-site/src/components/Footer.astro:16,31,45-46
        snippet: "href={footer.brand.href} ... href={item.href} ... target={isExternalHttpHref(item.href) ? '_blank' : undefined}"
    prevalence: common

  - category: deployment
    pattern: Deployment targets are domain-path specific even when app topology stays `/astro`
    description: >-
      Manual deploy and rollback scripts point at a filesystem path whose name
      includes the v2 domain, so infrastructure cutover is not only a DNS concern.
    examples:
      - file: SCRIPTS/deploy-astro-static.ps1
        location: SCRIPTS/deploy-astro-static.ps1:11
        snippet: "$remotePublicRoot = '/home/client-user/domains/client.example/public_html/astro'"
      - file: SCRIPTS/rollback-astro-static.ps1
        location: SCRIPTS/rollback-astro-static.ps1:12
        snippet: "$remotePublicRoot = '/home/client-user/domains/client.example/public_html/astro'"
      - file: docs/setup/klonowanie-astro-wordpress-woocommerce.md
        location: docs/setup/klonowanie-astro-wordpress-woocommerce.md:117
        snippet: "`base: '/astro/'` zostaw bez zmian, jesli chcesz najszybsza droge"
    prevalence: common

  - category: testing
    pattern: Tests encode the current v2 content endpoint assumption
    description: >-
      Existing tests assert that global layout fetches hit the v2 host, so a
      domain cutover also changes expected test fixtures.
    examples:
      - file: astro-site/src/lib/globalLayout.test.ts
        location: astro-site/src/lib/globalLayout.test.ts:85
        snippet: "assert.equal(String(fetchCalls[0]?.input), 'https://client.example/wp-json/bulwar/v1/layout/global');"
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: Astro static config
      responsibility: Defines public origin and mount path for generated pages/assets.
      location: astro-site/astro.config.mjs
      relationship_to_domain: domain migration changes this public-origin source of truth
    - component: SEO resolver route
      responsibility: Resolves canonical/OG/Twitter/image URLs for each page.
      location: astro-site/src/pages/[slug].astro
      relationship_to_domain: domain migration changes emitted absolute URLs
    - component: Build-time WordPress bridge client
      responsibility: Fetches page builder, layout, and Woo data from WordPress.
      location: astro-site/src/lib/wordpress.ts and astro-site/src/lib/woo.ts
      relationship_to_domain: domain migration changes content API origin unless backend remains on v2
    - component: Layout chrome
      responsibility: Renders nav/footer links as provided by normalized layout data.
      location: astro-site/src/components/Navbar.astro and astro-site/src/components/Footer.astro
      relationship_to_domain: domain migration is safe for root-relative hrefs but not for hard-coded absolute external links
    - component: Manual Astro deploy scripts
      responsibility: Publish built static output to the live `/astro` directory.
      location: SCRIPTS/deploy-astro-static.ps1 and SCRIPTS/rollback-astro-static.ps1
      relationship_to_domain: domain migration changes deploy target path when hosting path changes
  interfaces_used_by_domain:
    - interface: ResolvedPageSeo
      location: astro-site/src/lib/types.ts:130-144
      usage_pattern: `[slug].astro` composes this object and `BaseLayout.astro` renders it into head tags
    - interface: GlobalLayoutData
      location: astro-site/src/lib/wordpress.ts:4-5 and astro-site/src/layouts/BaseLayout.astro:5-9
      usage_pattern: WordPress bridge returns nav/footer hrefs that chrome components render without host rewriting
  data_flow_involving_domain: >-
    `astro build` reads `site` from Astro config and `WORDPRESS_BASE_URL` from
    runtime config, fetches WordPress page-builder/global-layout/Woo data,
    resolves canonical and absolute asset URLs inside `[slug].astro`, then writes
    static HTML into `dist/` and deploy scripts copy that output to the live
    `/astro` directory.
  key_relationships_to_domain:
    - from: astro-site/astro.config.mjs
      to: astro-site/src/pages/[slug].astro
      relationship: supplies public origin through `Astro.site`
    - from: astro-site/src/lib/config.ts
      to: astro-site/src/lib/wordpress.ts
      relationship: imports
    - from: astro-site/src/lib/config.ts
      to: astro-site/src/lib/woo.ts
      relationship: imports
    - from: astro-site/src/pages/[slug].astro
      to: astro-site/src/layouts/BaseLayout.astro
      relationship: passes resolved SEO object
    - from: astro-site/src/lib/wordpress.ts
      to: astro-site/src/components/Navbar.astro
      relationship: provides root-relative and absolute href data via global layout
    - from: SCRIPTS/deploy-astro-static.ps1
      to: astro-site/dist
      relationship: deploys generated static output

