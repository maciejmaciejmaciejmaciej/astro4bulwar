plan_id: domain-cutover-research
objective: >-
  Research whether switching the public domain from client.example to
  bulwarrestauracja.pl requires an Astro redeploy, and identify which
  links/meta/build outputs are host-dependent versus host-safe.
focus_area: astro-domain-migration
created_at: '2026-04-18T00:00:00Z'
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - Host/domain assumptions are encoded in Astro config and runtime config: `site: 'https://client.example'` and `WORDPRESS_BASE_URL = 'https://client.example'` (astro-site/astro.config.mjs:4-6, astro-site/src/lib/config.ts:1).
  - Internal chrome links are mostly root-relative or data-driven and will still resolve after a hostname alias change, but generated SEO tags and asset URLs are absolute and currently bake in `https://client.example` (astro-site/src/pages/[slug].astro:52-60, 159-174; astro-site/src/layouts/BaseLayout.astro:23-33; astro-site/dist/testowa-blueprint/index.html:1).
  - No Astro sitemap integration or `robots.txt` generator was found in `astro-site/`; SEO host dependence currently comes from canonical/Open Graph/Twitter output, while Astro docs state any sitemap generation would also depend on the configured `site` value (astro-site/package.json:1-20; Astro docs search result `@astrojs/sitemap|Usage`).
  - For a real public cutover to `bulwarrestauracja.pl`, a rebuild/redeploy is required to regenerate canonical/OG URLs and any absolute asset origins, and the current deploy scripts also still target the v2 server path (SCRIPTS/deploy-astro-static.ps1:10-12, SCRIPTS/rollback-astro-static.ps1:12-13).
  - Repo docs consistently document the safe temporary model as WordPress on `/`, React on `/react`, Astro on `/astro`, with `base: '/astro/'` left unchanged during domain changes and a manual Astro deploy after updating domain config (docs/setup/sekwencyjny-przewodnik-klonowania.md:125-143, 241-249; docs/setup/klonowanie-astro-wordpress-woocommerce.md:113-129).

research_metadata:
  methodology: >-
    Hybrid retrieval using file discovery, regex search, targeted source reads,
    repository memory review, and Astro docs lookup for `site`/sitemap behavior.
    Sources examined: docs/prd.yaml, Astro source/config files, deploy scripts,
    setup docs, generated dist HTML, and Astro docs search results.
  scope: >-
    Focused on `astro-site/` host assumptions, generated SEO output, obvious
    deployment docs/scripts, and `zip/src/main.tsx` only where host migration
    assumptions intersect with `/react` routing.
  confidence: high
  coverage: 92
  decision_blockers: 1
  research_blockers: 0

