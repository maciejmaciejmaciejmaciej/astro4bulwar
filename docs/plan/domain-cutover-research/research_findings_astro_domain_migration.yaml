related_conventions:
  naming_patterns_in_domain: >-
    Host-sensitive constants are centralized (`WORDPRESS_BASE_URL`, `TEST_PAGE_SLUGS`,
    `site`, `base`), while SEO output uses a typed `ResolvedPageSeo` contract.
  structure_of_domain: >-
    Build-time config lives in `astro-site/astro.config.mjs`, runtime/build fetch
    helpers live under `astro-site/src/lib/`, and presentation components render
    already-resolved values without host transformations.
  error_handling_in_domain: >-
    Build-time fetches fail closed in production for missing global layout unless an
    explicit fallback override is enabled; repository memory notes this behavior on
    2026-04-18 (/memories/repo/global-layout-endpoint-notes.md:8).
  testing_in_domain: >-
    Tests are node:test/assert based and include endpoint-string assertions for the
    current host in `astro-site/src/lib/globalLayout.test.ts`.
  documentation_in_domain: >-
    Setup docs consistently describe the stable topology as WordPress on `/`, React
    on `/react`, Astro on `/astro`, and treat domain changes as config-plus-deploy work.

related_dependencies:
  internal:
    - component: astro-site/src/lib/config.ts
      relationship_to_domain: provides build-time host constants to page, WordPress, and Woo modules
      direction: outbound
    - component: astro-site/src/lib/wordpress.ts
      relationship_to_domain: fetches layout and page-builder data from the configured host
      direction: outbound
    - component: astro-site/src/lib/woo.ts
      relationship_to_domain: fetches product/category data from the configured host
      direction: outbound
    - component: astro-site/src/layouts/BaseLayout.astro
      relationship_to_domain: consumes resolved SEO object and renders host-sensitive head tags
      direction: inbound
    - component: SCRIPTS/deploy-astro-static.ps1
