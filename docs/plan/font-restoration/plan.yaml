plan_id: font-restoration
objective: Restore the exact original font size classes to all component files in zip/src/components/sections/ using zip/src/App.tmp.tsx as the source of truth.
created_at: '2026-03-22T00:00:00Z'
created_by: gem-planner
status: pending_approval
research_confidence: medium

tldr: |
  Mass regex scripts corrupted font sizes in the split section components. This plan involves strictly reversing these changes by extracting the correct classes from the original monolithic file ('App.tmp.tsx') and applying them surgically to the split components, concluding with a build and deployment phase.

open_questions:
  - "Are there any specific UI discrepancies outside of font sizes (e.g. line-height, padding) that were also corrupted during the mass regex replacement?"
  - "Does the deployment process need to interact with the WordPress/WooCommerce bridge, or just upload to the public_html path?"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Implementer applies classes blindly and misses edge cases resulting in visual regressions in responsive viewports (sm:, md: prefixes)."
      likelihood: medium
      impact: high
      mitigation: "Ensure the researcher task thoroughly maps the entire class string, and the implementer replaces the entire class attribute exactly as it was in App.tmp.tsx."
    - scenario: "Deployment fails due to network or SSH restrictions."
      likelihood: low
      impact: high
      mitigation: "DevOps agent will capture SCP/SSH outputs and revert to manual steps if automated commands fail."
  assumptions:
    - "App.tmp.tsx accurately reflects the desired visual state before the regex corruption."
    - "The component structure inside the sections did not heavily change during the file split, allowing for 1:1 mapping."

implementation_specification:
  code_structure: "Updates will happen in-place within the existing split component files in zip/src/components/sections/."
  affected_areas:
    - "zip/src/components/sections/*.tsx"
  component_details:
    - component: "Typography Elements in Sections"
      responsibility: "Display text at the exact sizes intended by the original design."
      interfaces: []
  dependencies: []
  integration_points:
    - "Tailwind CSS compilation step during Vite build."

contracts:
  - from_task: map_original_classes
    to_task: restore_core_sections
    interface: "A precise mapping document detailing the exact className attributes for text-bearing elements in the core sections."
    format: "Markdown list or JSON mapping."
  - from_task: map_original_classes
    to_task: restore_secondary_sections
    interface: "A precise mapping document detailing the exact className attributes for text-bearing elements in the secondary sections."
    format: "Markdown list or JSON mapping."

tasks:
